<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Income Panel</title>
</head>

<body>

<h2>💰 Admin Income Panel</h2>

<hr>

<!-- FILTER -->
<label>Filter:</label>
<select id="filterType">
  <option value="">All</option>
  <option value="upgrade">Upgrade</option>
  <option value="repurchase">Repurchase</option>
  <option value="ctor">CTOR</option>
</select>

<button id="refreshBtn">🔄 Refresh</button>

<hr>

<!-- SUMMARY -->
<div>
  <p>Total Income: ₹<span id="totalPayout">0</span></p>
  <p>Total Records: <span id="totalRecords">0</span></p>
</div>

<hr>

<!-- TABLE -->
<table border="1" width="100%">
  <thead>
    <tr>
      <th>Time</th>
      <th>User ID</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Source</th>
      <th>Note</th>
    </tr>
  </thead>

  <tbody id="incomeTable"></tbody>
</table>

<!-- CORE SYSTEM -->
<script src="core_system.js"></script>
<script src="income_log_system.js"></script>

<!-- ADMIN LOGIC -->
<script>

let session = null;
let currentUser = null;
let lock = false;

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {
  initPage();
  authPage();
  bindEvents();
  loadAllIncome();
});

// ================= INIT PAGE =================
function initPage() {
  if (typeof initCoreSystem === "function") {
    initCoreSystem();
  } else {
    alert("core_system.js missing");
  }
}

// ================= AUTH =================
function authPage() {

  session = JSON.parse(localStorage.getItem("loggedInAdmin") || "null");

  if (!session?.userId) {
    window.location.href = "admin_login.html";
    return;
  }

  currentUser = typeof getUserById === "function"
    ? getUserById(session.userId)
    : null;

  if (!currentUser || currentUser.role !== "admin") {
    localStorage.removeItem("loggedInAdmin");
    window.location.href = "admin_login.html";
    return;
  }

  if ((currentUser.status || "active") !== "active") {
    localStorage.removeItem("loggedInAdmin");
    window.location.href = "admin_login.html";
    return;
  }
}

// ================= EVENTS =================
function bindEvents() {

  const filter = document.getElementById("filterType");
  const refreshBtn = document.getElementById("refreshBtn");

  if (filter) {
    filter.addEventListener("change", loadAllIncome);
  }

  if (refreshBtn) {
    refreshBtn.addEventListener("click", loadAllIncome);
  }
}

// ================= LOAD INCOME =================
function loadAllIncome() {

  const filterEl = document.getElementById("filterType");
  const type = filterEl ? filterEl.value : "";

  let logs = [];

  try {
    if (typeof getIncomeLogs === "function") {
      logs = getIncomeLogs() || [];
    }
  } catch (_) {
    logs = [];
  }

  if (type) {
    logs = logs.filter(l => l?.type === type);
  }

  renderIncomeTable(logs);
}

// ================= TABLE =================
function renderIncomeTable(logs) {

  const table = document.getElementById("incomeTable");
  if (!table) return;

  let total = 0;
  table.innerHTML = "";

  if (!logs || logs.length === 0) {
    table.innerHTML = "<tr><td colspan='6'>No Data</td></tr>";
    updateSummary(0, 0);
    return;
  }

  logs.slice().reverse().forEach(log => {

    const amount = Number(log?.amount) || 0;
    total += amount;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${log?.time ? new Date(log.time).toLocaleString() : "-"}</td>
      <td>${log?.userId || "-"}</td>
      <td>${log?.type || "-"}</td>
      <td>₹${amount.toFixed(2)}</td>
      <td>${log?.sourceUser || "-"}</td>
      <td>${log?.note || ""}</td>
    `;

    table.appendChild(row);
  });

  updateSummary(total, logs.length);
}

// ================= SUMMARY =================
function updateSummary(total, count) {

  const payout = document.getElementById("totalPayout");
  const records = document.getElementById("totalRecords");

  if (payout) payout.innerText = (Number(total) || 0).toFixed(2);
  if (records) records.innerText = count || 0;
}

// ================= REALTIME BRIDGE =================
(function connectIncomeToAdminPanel() {

  function refresh() {
    loadAllIncome?.();
  }

  function bind() {

    if (!window.SYSTEM_EVENTS?.on) return;

    window.SYSTEM_EVENTS.on("INCOME_UPDATED", refresh);
    window.SYSTEM_EVENTS.on("INCOME_EVENT", refresh);
    window.SYSTEM_EVENTS.on("INCOME_LOG_CREATED", refresh);
    window.SYSTEM_EVENTS.on("HOLD_INCOME_RELEASED", refresh);
    window.SYSTEM_EVENTS.on("INCOME_CREDIT", refresh);
  }

  if (window.SYSTEM_EVENTS?.emit) {
    bind();
  } else {

    const timer = setInterval(() => {
      if (window.SYSTEM_EVENTS?.emit) {
        clearInterval(timer);
        bind();
      }
    }, 50);
  }

})();

</script>

</body>
</html>
