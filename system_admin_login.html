<body>

<h2>SYSTEM ADMIN LOGIN</h2>

<input id="userId" placeholder="System Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="safeClick(login)">Login</button>

<p id="msg"></p>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// ================= LOCK SYSTEM =================
let lock = false;
function safeClick(fn) {
  if (lock) return;
  lock = true;
  fn();
  setTimeout(() => lock = false, 800); // safer
}

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInFranchise");
  localStorage.removeItem("loggedInUser");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= SYSTEM CHECK =================
function isSystemAllowed(user) {

  if (typeof getSystemSettings !== "function") {
    showMsg("❌ System not ready");
    return false;
  }

  let s = getSystemSettings() || {};

  // SUPER ADMIN always bypass
  if (user.role === "super_admin") {
    return true;
  }

  // SYSTEM ADMIN obeys lock mode
  if (s.lockMode === true) {
    showMsg("🚫 System is locked");
    return false;
  }

  if (s.adminAccess === false) {
    showMsg("🚫 Admin access OFF");
    return false;
  }

  return true;
}


// ================= LOGIN =================
function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    showMsg("⚠️ Enter ID & Password");
    return;
  }

  let users = typeof getUsers === "function" ? getUsers() : [];

  let user = users.find(u =>
    (u.userId || "").toLowerCase() === userId.toLowerCase() &&
    (u.role || "").toLowerCase() === "system_admin" &&
    safeDecode(u.password).trim() === password
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  if (!isSystemAllowed(user)) return;

  if (user.status && user.status !== "active") {
    showMsg("🚫 Account inactive");
    return;
  }

  logoutAll();

  localStorage.setItem("loggedInSystemAdmin", JSON.stringify({
    userId: user.userId
  }));

  if (typeof logActivity === "function") {
    logActivity(user.userId, "SYSTEM_ADMIN", "Login");
  }

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "system_admin_dashboard.html";
  }, 700);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
