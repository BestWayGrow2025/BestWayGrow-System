<!DOCTYPE html>
<html>
<head>
  <title>System Admin Login</title>

  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin-bottom: 10px; padding: 6px; width: 220px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>SYSTEM ADMIN LOGIN</h2>

<input id="userId" placeholder="System Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script src="CORE_system.js"></script>

<script>
initCoreSystem();
</script>

<script>

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInFranchise");
  localStorage.removeItem("loggedInUser");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN =================
function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    showMsg("⚠️ Enter ID & Password");
    return;
  }

  let users = getUsers();

  let user = users.find(u =>
    u.userId.toLowerCase() === userId.toLowerCase() &&
    u.role === "system_admin" &&
    (u.password === password || safeDecode(u.password) === password)
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  // 🔥🔥🔥 FINAL FIX (REAL CONTROL)
  if (user.status !== "active") {
    showMsg("🚫 Account inactive by Super Admin");
    return;
  }

  // ✅ CLEAR OLD SESSIONS
  logoutAll();

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInSystemAdmin", JSON.stringify({
    userId: user.userId
  }));

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "system_admin_dashboard.html";
  }, 800);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
