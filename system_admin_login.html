<!DOCTYPE html>
<html>
<head>
  <title>System Admin Login</title>

  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      text-align:center;
      background:#f4f7f9;
    }

    input { 
      margin-bottom: 10px; 
      padding: 8px; 
      width: 240px; 
    }

    button { 
      padding: 8px 15px; 
      cursor: pointer; 
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>SYSTEM ADMIN LOGIN</h2>

<input id="userId" placeholder="System Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ FIXED FILE NAME -->
<script src="core_system.js"></script>

<script>

// ================= SAFE INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInFranchise");
  localStorage.removeItem("loggedInUser");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch {
    return p;
  }
}

// ================= LOGIN =================
function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    showMsg("⚠️ Enter ID & Password");
    return;
  }

  let users = [];

  try {
    users = typeof getUsers === "function" ? getUsers() : [];
  } catch {
    users = [];
  }

  let user = users.find(u =>
    u.userId.toLowerCase() === userId.toLowerCase() &&
    u.role === "system_admin" &&
    safeDecode(u.password) === password
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  // 🔒 STATUS CHECK
  if (user.status && user.status !== "active") {
    showMsg("🚫 Account inactive by Super Admin");
    return;
  }

  // ✅ CLEAR OLD SESSIONS
  logoutAll();

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInSystemAdmin", JSON.stringify({
    userId: user.userId
  }));

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "system_admin_dashboard.html";
  }, 700);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
