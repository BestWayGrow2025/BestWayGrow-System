<!DOCTYPE html>
<html>
<head>
  <title>System Admin Login</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin-bottom: 10px; padding: 5px; }
    button { padding: 6px 10px; }
  </style>
</head>
<body>

<h2>System Admin Login</h2>

<input id="userId" placeholder="System Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem();
</script>

<script>

// ================= LOGIN =================
function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    showMsg("⚠️ Enter ID & Password");
    return;
  }

  let users = getUsers();

  // ✅ CHECK FROM CORE USERS
  let user = users.find(u =>
    u.userId === userId &&
    u.role === "system_admin" &&
    (u.password === password || atob(u.password) === password)
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  // ✅ SAVE SESSION (CLEAN FORMAT)
  localStorage.setItem("loggedInSystemAdmin", JSON.stringify({
    userId: user.userId
  }));

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "system_admin_dashboard.html";
  }, 800);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
