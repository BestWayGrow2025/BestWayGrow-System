<!DOCTYPE html>
<html>
<head>
  <title>System Admin PIN Panel</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7f9;
    }

    header {
      background: #006633;
      color: white;
      padding: 15px;
      text-align: center;
    }

    header button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: red;
      color: white;
      cursor: pointer;
    }

    .menu {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: white;
      justify-content: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .menu button {
      padding: 10px 14px;
      border: none;
      border-radius: 20px;
      background: #00994d;
      color: white;
      cursor: pointer;
    }

    #contentArea {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    input {
      width: 250px;
      padding: 10px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h2>SYSTEM ADMIN PIN PANEL</h2>
  <p id="welcome"></p>
  <button id="logoutBtn">Logout</button>
</header>

<div class="menu">
  <button id="createTabBtn">Create PIN</button>
  <button id="allTabBtn">All PIN</button>
  <button id="availableTabBtn">Available</button>
  <button id="usedTabBtn">Used</button>
</div>

<div id="contentArea">

  <div class="card">

    <h3>PIN Request Control</h3>

    <label for="filter">Filter Requests</label>

    <select id="filter">
      <option value="ALL">All</option>
      <option value="PENDING">Pending</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
    </select>

  </div>

  <div class="card">

    <h3>PIN Product Status</h3>

    <p>
      <strong>Upgrade Status:</strong>
      <span id="upgradeStatus">Loading...</span>
    </p>

    <p>
      <strong>Repurchase Status:</strong>
      <span id="repurchaseStatus">Loading...</span>
    </p>

  </div>

<div class="card">

  <h3>PIN Controls</h3>

  <button id="startUpgradeBtn">Start Upgrade PIN</button>
  <button id="stopUpgradeBtn">Stop Upgrade PIN</button>

  <br><br>

  <button id="startRepurchaseBtn">Start Repurchase PIN</button>
  <button id="stopRepurchaseBtn">Stop Repurchase PIN</button>

</div>

<div class="card">

  <h3>PIN Requests</h3>

  <table>

    <thead>
      <tr>
        <th>Request ID</th>
        <th>User ID</th>
        <th>Type</th>
        <th>Qty</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Payment Ref</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="reqTable">
      <tr>
        <td colspan="8">Loading...</td>
      </tr>
    </tbody>

  </table>

  <p id="msg"></p>

</div>

</div>

<script src="core_boot_manager.js"></script>
<script src="core_initializer.js"></script>
<script src="core_session_authority.js"></script>
 <script src="system_admin_pin_request_dashboard.js"></script>
<script src="system_admin_pin_request_authority.js"></script>

</body>
</html>
