<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Income Policy Dashboard</title>

<link rel="icon" href="data:,">

<style>

body{
font-family:Arial,sans-serif;
margin:20px;
background:#f4f7f9;
}

.income-control-panel{
max-width:900px;
margin:auto;
}

.card{
background:#ffffff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

.on-btn{
background:#28a745;
color:#fff;
border:none;
}

.off-btn{
background:#dc3545;
color:#fff;
border:none;
}

.status{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="admin-income-control-module">

  <div class="income-control-panel">

    <div class="card">
      <h2>Income Control Panel</h2>
    </div>

    <!-- UGLI -->
    <div class="card">
      <h3>UGLI (Upgrade Income)</h3>

      <button class="on-btn" id="ugliOnBtn">ON</button>
      <button class="off-btn" id="ugliOffBtn">OFF</button>

      <p class="status" id="ugliStatus"></p>
    </div>

    <!-- RLI -->
    <div class="card">
      <h3>RLI (Repurchase Income)</h3>

      <button class="on-btn" id="rliOnBtn">ON</button>
      <button class="off-btn" id="rliOffBtn">OFF</button>

      <p class="status" id="rliStatus"></p>
    </div>

    <!-- BINARY -->
    <div class="card">
      <h3>Binary Income</h3>

      <button class="on-btn" id="binaryOnBtn">ON</button>
      <button class="off-btn" id="binaryOffBtn">OFF</button>

      <p class="status" id="binaryStatus"></p>
    </div>

  </div>

</div>

<script src="core_boot_manager.js"></script>
<script src="core_initializer.js"></script>
<script src="core_session_authority.js"></script>
<script src="admin_income_policy_controller.js"></script>

</body>

</html>
