<div class="admin-income-control-module">

  <div class="income-control-panel">

    <div class="card">
      <h2>Income Control Panel</h2>
    </div>

    <!-- UGLI -->
    <div class="card">
      <h3>UGLI (Upgrade Income)</h3>

      <button class="on-btn" id="ugliOnBtn">ON</button>
      <button class="off-btn" id="ugliOffBtn">OFF</button>

      <p class="status" id="ugliStatus"></p>
    </div>

    <!-- RLI -->
    <div class="card">
      <h3>RLI (Repurchase Income)</h3>

      <button class="on-btn" id="rliOnBtn">ON</button>
      <button class="off-btn" id="rliOffBtn">OFF</button>

      <p class="status" id="rliStatus"></p>
    </div>

    <!-- BINARY -->
    <div class="card">
      <h3>Binary Income</h3>

      <button class="on-btn" id="binaryOnBtn">ON</button>
      <button class="off-btn" id="binaryOffBtn">OFF</button>

      <p class="status" id="binaryStatus"></p>
    </div>

  </div>

</div>
