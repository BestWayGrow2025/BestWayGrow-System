<!DOCTYPE html>
<html>
<head>
  <title>Activity Log Panel</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 1100px;
      margin: auto;
    }

    input,
    select {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: #fff;
    }

    button.danger {
      background: #dc3545;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 13px;
    }

    th {
      background: #f1f1f1;
    }
  </style>
</head>
<body>

  <header>
    <h2>📜 Activity Log Panel</h2>
    <p id="welcome"></p>
  </header>

  <div class="container">
    <div class="card">

      <h3>🔍 Filters</h3>

      <input id="userId" placeholder="User ID">

      <select id="role">
        <option value="">All Roles</option>
        <option value="user">User</option>
        <option value="admin">Admin</option>
        <option value="system_admin">System Admin</option>
        <option value="super_admin">Super Admin</option>
      </select>

      <input id="keyword" placeholder="Keyword">

      <select id="source">
        <option value="">All Source</option>
        <option value="SYSTEM">SYSTEM</option>
        <option value="ADMIN">ADMIN</option>
      </select>

      <br>

      <button id="loadLogsBtn">Load Logs</button>
      <button id="clearLogsBtn" class="danger">Clear Logs</button>

      <div id="logTable"></div>

      <hr>

      <h3>⚠️ Critical Logs</h3>
      <button id="loadCriticalBtn">Load Critical</button>

      <div id="criticalTable"></div>

    </div>
  </div>

  <script src="core_system.js"></script>
  <script src="session_manager.js"></script>
  <script src="activity_log.js"></script>
  <script src="activity_log_panel.js"></script>
</body>
</html>
