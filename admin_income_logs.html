<!DOCTYPE html>
<html>
<head>
  <title>ADMIN INCOME LOGS</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    input { padding: 6px; margin: 5px; }
    button { padding: 6px 12px; margin: 5px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>

<h2>INCOME LOGS (ADMIN)</h2>

<!-- ================= FILTER ================= -->
<div class="box">
  <h3>Filter</h3>

  <input id="filterUser" placeholder="User ID">
  <select id="filterType">
    <option value="">All Types</option>
    <option value="upgrade">Upgrade</option>
    <option value="repurchase">Repurchase</option>
    <option value="hold">Hold</option>
    <option value="binary">Binary</option>
  </select>

  <button onclick="loadLogs()">Apply Filter</button>
  <button onclick="clearLogs()">Clear All Logs</button>
</div>

<!-- ================= TABLE ================= -->
<div class="box">
  <h3>Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Log ID</th>
        <th>User</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Source</th>
        <th>Note</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="logTable"></tbody>
  </table>
</div>

<!-- ================= SCRIPT ================= -->
<script src="income_log_system.js"></script>

<script>

// ================= LOAD LOGS =================
function loadLogs() {

  let logs = getIncomeLogs().slice().reverse();

  let userFilter = document.getElementById("filterUser").value.trim();
  let typeFilter = document.getElementById("filterType").value;

  if (userFilter) {
    logs = logs.filter(l => l.userId === userFilter);
  }

  if (typeFilter) {
    logs = logs.filter(l => l.type === typeFilter);
  }

  let table = document.getElementById("logTable");

  if (!logs.length) {
    table.innerHTML = "<tr><td colspan='7'>No logs found</td></tr>";
    return;
  }

  let html = "";

  logs.forEach(l => {
    html += `
      <tr>
        <td>${l.logId}</td>
        <td>${l.userId}</td>
        <td>${l.type}</td>
        <td>₹ ${l.amount}</td>
        <td>${l.sourceUser || "-"}</td>
        <td>${l.note}</td>
        <td>${new Date(l.time).toLocaleString()}</td>
      </tr>
    `;
  });

  table.innerHTML = html;
}

// ================= CLEAR LOGS =================
function clearLogs() {

  if (!confirm("Are you sure to delete all logs?")) return;

  clearIncomeLogs();
  loadLogs();

  alert("All logs cleared");
}

// ================= INIT =================
loadLogs();

</script>

</body>
</html>
