<!DOCTYPE html>
<html>
<head>
  <title>ADMIN INCOME LOGS</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    input, select { padding: 6px; margin: 5px; }
    button { padding: 6px 12px; margin: 5px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>

<h2>INCOME LOGS (ADMIN)</h2>

<!-- ================= FILTER ================= -->
<div class="box">
  <h3>Filter</h3>

  <input id="filterUser" placeholder="User ID">
  
  <select id="filterType">
    <option value="">All Types</option>
    <option value="upgrade">Upgrade</option>
    <option value="repurchase">Repurchase</option>
    <option value="hold">Hold</option>
    <option value="binary">Binary</option>
    <option value="ctor">CTOR</option> <!-- 🔥 ADDED -->
  </select>

  <button onclick="loadLogs()">Apply Filter</button>
  <button onclick="clearLogs()">Clear All Logs</button>
</div>

<!-- ================= TABLE ================= -->
<div class="box">
  <h3>Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Log ID</th>
        <th>User</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Source</th>
        <th>Note</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="logTable"></tbody>
  </table>
</div>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="income_log_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= SECURITY =================
let admin = protectPage({ role: "admin" });
if (!admin) return;


// ================= COLOR FUNCTION (NEW 🔥)
// =================
function getColor(type) {
  if (type === "hold") return "red";
  if (type === "upgrade" || type === "repurchase") return "green";
  if (type === "ctor") return "blue";
  return "black";
}


// ================= LOAD LOGS =================
function loadLogs() {

  let logs = [];

  // 🔒 SAFE FETCH
  try {
    logs = getIncomeLogs() || [];
  } catch {
    logs = [];
  }

  logs = logs.slice().reverse();

  let userFilter = document.getElementById("filterUser").value.trim();
  let typeFilter = document.getElementById("filterType").value;

  if (userFilter) {
    logs = logs.filter(l => l.userId === userFilter);
  }

  if (typeFilter) {
    logs = logs.filter(l => l.type === typeFilter);
  }

  let table = document.getElementById("logTable");

  if (!logs.length) {
    table.innerHTML = "<tr><td colspan='7'>No logs found</td></tr>";
    return;
  }

  let html = "";

  logs.forEach((l, i) => {

    let color = getColor(l.type);

    html += `
      <tr>
        <td>${l.logId || i + 1}</td>
        <td>${l.userId || "-"}</td>
        <td style="color:${color}">${l.type || "-"}</td>
        <td style="color:${color}">₹ ${l.amount || 0}</td>
        <td>${l.sourceUser || "-"}</td>
        <td>${l.note || "-"}</td>
        <td>${l.time ? new Date(l.time).toLocaleString() : "-"}</td>
      </tr>
    `;
  });

  table.innerHTML = html;

  // 📜 LOG VIEW
  if (typeof logActivity === "function") {
    logActivity(admin.userId, "ADMIN", "Viewed income logs");
  }
}


// ================= CLEAR LOGS =================
function clearLogs() {

  if (!confirm("Are you sure to delete all logs?")) return;

  try {
    clearIncomeLogs();
  } catch {
    alert("Error clearing logs");
    return;
  }

  loadLogs();

  alert("All logs cleared");

  // 📜 LOG CLEAR
  if (typeof logActivity === "function") {
    logActivity(admin.userId, "ADMIN", "Cleared all income logs");
  }
}


// ================= INIT =================
loadLogs();

</script>

</body>
</html>
