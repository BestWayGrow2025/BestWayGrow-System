<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Admin Income Dashboard
</title>

<link rel="icon" href="data:,">

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f4f7f9;
}

.card{
background:#ffffff;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button,
select{
padding:10px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
background:#ffffff;
}

th,
td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<h2>
💰 Admin Income Dashboard
</h2>

<select id="filterType">

<option value="">
All
</option>

<option value="upgrade">
Upgrade
</option>

<option value="repurchase">
Repurchase
</option>

<option value="ctor">
CTOR
</option>

</select>

<button id="refreshBtn">
🔄 Refresh
</button>

</div>

<div class="card">

<p>
Total Income:
₹<span id="totalPayout">0.00</span>
</p>

<p>
Total Records:
<span id="totalRecords">0</span>
</p>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Time</th>
<th>User ID</th>
<th>Type</th>
<th>Amount</th>
<th>Source</th>
<th>Note</th>

</tr>

</thead>

<tbody id="incomeTable">

</tbody>

</table>

</div>

<!-- Existing repository files only -->

<script src="core_session_authority.js"></script>
<script src="admin_income_dashboard.js"></script>

</body>

</html>
