<!DOCTYPE html>
<html>
<head>
  <title>Upgrade</title>
</head>
<body>

<h2>Upgrade Page</h2>

<p>User ID: <span id="userId"></span></p>

<button onclick="upgrade()">Upgrade (₹2100)</button>

<!-- ✅ CORE MUST -->
<script src="CORE_system.js"></script>
<script>
  initCoreSystem();
</script>

<script>

// =====================
// GET USER FROM URL (FIXED)
// =====================
let params = new URLSearchParams(window.location.search);
let userId = params.get("user"); // ✅ FIXED

document.getElementById("userId").innerText = userId || "Not Found";

// =====================
// WALLET INIT
// =====================
function initWallet(user) {
  user.wallet = user.wallet || 0;
}

// =====================
// 🔥 UGLI INCOME
// =====================
function payUGLIIncome(buyerId) {

  let users = getUsers();
  let buyer = users.find(u => u.userId === buyerId);
  if (!buyer) return;

  let current = buyer;
  let level = 1;

  while (current && current.introducerId && level <= 30) {

    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    initWallet(parent);

    let income = (level === 1) ? 500 : 25;

    parent.wallet += income;

    current = parent;
    level++;
  }

  saveUsers(users);
}

// =====================
// UPGRADE ACTION
// =====================
function upgrade() {

  if (!userId) {
    alert("Invalid user");
    return;
  }

  payUGLIIncome(userId);

  alert("Upgrade Successful! Income Distributed ✅");

  // ✅ FIXED REDIRECT
  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
