<!DOCTYPE html>
<html>
<head>
  <title>Upgrade</title>
</head>
<body>

<h2>Upgrade Page</h2>

<p>User ID: <span id="userId"></span></p>

<button onclick="upgrade()">Upgrade (₹2100)</button>

<script>

// =====================
// GET USER FROM URL
// =====================
let params = new URLSearchParams(window.location.search);
let userId = params.get("id");

document.getElementById("userId").innerText = userId;

// =====================
// USERS STORAGE
// =====================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// =====================
// WALLET INIT
// =====================
function initWallet(user) {
  user.wallet = user.wallet || 0;
}

// =====================
// 🔥 UGLI INCOME (FINAL LOGIC)
// =====================
function payUGLIIncome(buyerId) {

  let users = getUsers();
  let buyer = users.find(u => u.userId === buyerId);
  if (!buyer) return;

  let current = buyer;
  let level = 1;

  while (current && current.introducerId && level <= 30) {

    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    initWallet(parent);

    let income = (level === 1) ? 500 : 25;

    parent.wallet += income;

    current = parent;
    level++;
  }

  saveUsers(users);
}

// =====================
// UPGRADE ACTION
// =====================
function upgrade() {

  if (!userId) {
    alert("Invalid user");
    return;
  }

  // 💥 CALL INCOME DISTRIBUTION
  payUGLIIncome(userId);

  alert("Upgrade Successful! Income Distributed ✅");

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
