<!DOCTYPE html>
<html>
<head>
  <title>ADMIN PIN CONTROL</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 6px; margin: 5px 0; width: 220px; }
    button { padding: 6px 12px; margin: 5px; cursor: pointer; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
  </style>
</head>
<body>

<h2>PIN CONTROL PANEL</h2>

<!-- ================= UPGRADE ================= -->
<div class="box">
  <h3>Upgrade PIN</h3>

  <input type="number" id="up_bv" placeholder="BV"><br>
  <input type="number" id="up_amount" placeholder="Amount"><br>
  <input type="number" id="up_gst" placeholder="GST"><br>

  <label>Start Date:</label><br>
  <input type="datetime-local" id="up_start"><br>

  <label>End Date (Optional):</label><br>
  <input type="datetime-local" id="up_end"><br>

  <button onclick="startUpgrade()">START</button>
  <button onclick="stopUpgrade()">STOP</button>

  <p id="upgradeStatus"></p>
</div>

<!-- ================= REPURCHASE ================= -->
<div class="box">
  <h3>Repurchase PIN</h3>

  <input type="number" id="re_bv" placeholder="BV"><br>
  <input type="number" id="re_amount" placeholder="Amount"><br>
  <input type="number" id="re_gst" placeholder="GST"><br>

  <label>Start Date:</label><br>
  <input type="datetime-local" id="re_start"><br>

  <label>End Date (Optional):</label><br>
  <input type="datetime-local" id="re_end"><br>

  <button onclick="startRepurchase()">START</button>
  <button onclick="stopRepurchase()">STOP</button>

  <p id="repurchaseStatus"></p>
</div>

<!-- ================= SCRIPT ================= -->
<script src="pin_config_system.js"></script>

<script>

// ================= STATUS =================
function refreshStatus() {

  let settings = getPinSettings();

  let up = settings.upgrade;
  let re = settings.repurchase;

  document.getElementById("upgradeStatus").innerText =
    up.active ? "🟢 ACTIVE" : "🔴 OFF";

  document.getElementById("repurchaseStatus").innerText =
    re.active ? "🟢 ACTIVE" : "🔴 OFF";
}

// ================= START UPGRADE =================
function startUpgrade() {

  enablePin("upgrade", {
    bv: Number(document.getElementById("up_bv").value),
    amount: Number(document.getElementById("up_amount").value),
    gst: Number(document.getElementById("up_gst").value),
    startDate: document.getElementById("up_start").value,
    endDate: document.getElementById("up_end").value
  });

  refreshStatus();
  alert("✅ Upgrade Started");
}

// ================= STOP UPGRADE =================
function stopUpgrade() {
  disablePin("upgrade");
  refreshStatus();
  alert("⛔ Upgrade Stopped");
}

// ================= START REPURCHASE =================
function startRepurchase() {

  enablePin("repurchase", {
    bv: Number(document.getElementById("re_bv").value),
    amount: Number(document.getElementById("re_amount").value),
    gst: Number(document.getElementById("re_gst").value),
    startDate: document.getElementById("re_start").value,
    endDate: document.getElementById("re_end").value
  });

  refreshStatus();
  alert("✅ Repurchase Started");
}

// ================= STOP REPURCHASE =================
function stopRepurchase() {
  disablePin("repurchase");
  refreshStatus();
  alert("⛔ Repurchase Stopped");
}

// ================= INIT =================
refreshStatus();

</script>

</body>
</html>
