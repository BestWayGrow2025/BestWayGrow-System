<!DOCTYPE html>
<html>
<head>
  <title>ADMIN PIN CONTROL</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { padding: 6px; margin: 5px 0; width: 220px; }
    button { padding: 6px 12px; margin: 5px; cursor: pointer; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    table { margin-top: 10px; }
  </style>
</head>
<body>

<h2>PIN CONTROL PANEL</h2>

<!-- ================= UPGRADE ================= -->
<div class="box">
  <h3>Upgrade PIN</h3>

  <input type="number" id="up_bv" placeholder="BV"><br>
  <input type="number" id="up_amount" placeholder="Amount"><br>
  <input type="number" id="up_gst" placeholder="GST"><br>

  <label>Start Date:</label><br>
  <input type="datetime-local" id="up_start"><br>

  <label>End Date (Optional):</label><br>
  <input type="datetime-local" id="up_end"><br>

  <button onclick="startUpgrade()">START</button>
  <button onclick="stopUpgrade()">STOP</button>

  <p id="upgradeStatus"></p>
</div>

<!-- ================= REPURCHASE ================= -->
<div class="box">
  <h3>Repurchase PIN</h3>

  <input type="number" id="re_bv" placeholder="BV"><br>
  <input type="number" id="re_amount" placeholder="Amount"><br>
  <input type="number" id="re_gst" placeholder="GST"><br>

  <label>Start Date:</label><br>
  <input type="datetime-local" id="re_start"><br>

  <label>End Date (Optional):</label><br>
  <input type="datetime-local" id="re_end"><br>

  <button onclick="startRepurchase()">START</button>
  <button onclick="stopRepurchase()">STOP</button>

  <p id="repurchaseStatus"></p>
</div>

<!-- ================= REQUEST MANAGEMENT ================= -->
<div class="box">
  <h3>PIN Requests</h3>

  <select id="filter" onchange="loadRequests()">
    <option value="ALL">All</option>
    <option value="PENDING">Pending</option>
    <option value="PROCESSING">Processing</option>
    <option value="COMPLETED">Completed</option>
    <option value="FAILED">Failed</option>
    <option value="REJECTED">Rejected</option>
  </select>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>ID</th>
        <th>User</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="reqTable"></tbody>
  </table>
</div>

<!-- ================= SCRIPT ================= -->
<script src="pin_config_system.js"></script>
<script src="pin_master_system.js"></script>
<script src="pin_request_system.js"></script>

<script>

// ================= SAFE GET =================
function getSafeSettings() {
  let s = getPinSettings() || {};
  return {
    upgrade: s.upgrade || {},
    repurchase: s.repurchase || {}
  };
}

// ================= STATUS =================
function refreshStatus() {

  let settings = getSafeSettings();

  let up = settings.upgrade;
  let re = settings.repurchase;

  document.getElementById("upgradeStatus").innerText =
    up.active
      ? `🟢 ACTIVE | BV: ${up.bv || 0} | ₹${up.amount || 0}`
      : "🔴 OFF";

  document.getElementById("repurchaseStatus").innerText =
    re.active
      ? `🟢 ACTIVE | BV: ${re.bv || 0} | ₹${re.amount || 0}`
      : "🔴 OFF";
}

// ================= VALIDATION =================
function validateInput(bv, amount) {
  if (bv <= 0 || amount <= 0) {
    alert("BV and Amount must be greater than 0");
    return false;
  }
  return true;
}

// ================= START UPGRADE =================
function startUpgrade() {

  let bv = Number(document.getElementById("up_bv").value);
  let amount = Number(document.getElementById("up_amount").value);

  if (!validateInput(bv, amount)) return;

  enablePin("upgrade", {
    bv,
    amount,
    gst: Number(document.getElementById("up_gst").value || 0),
    startDate: document.getElementById("up_start").value || new Date().toISOString(),
    endDate: document.getElementById("up_end").value || null
  });

  refreshStatus();
  alert("✅ Upgrade Started");
}

// ================= STOP UPGRADE =================
function stopUpgrade() {
  disablePin("upgrade");
  refreshStatus();
  alert("⛔ Upgrade Stopped");
}

// ================= START REPURCHASE =================
function startRepurchase() {

  let bv = Number(document.getElementById("re_bv").value);
  let amount = Number(document.getElementById("re_amount").value);

  if (!validateInput(bv, amount)) return;

  enablePin("repurchase", {
    bv,
    amount,
    gst: Number(document.getElementById("re_gst").value || 0),
    startDate: document.getElementById("re_start").value || new Date().toISOString(),
    endDate: document.getElementById("re_end").value || null
  });

  refreshStatus();
  alert("✅ Repurchase Started");
}

// ================= STOP REPURCHASE =================
function stopRepurchase() {
  disablePin("repurchase");
  refreshStatus();
  alert("⛔ Repurchase Stopped");
}

// ================= LOAD REQUESTS =================
function loadRequests() {

  let filter = document.getElementById("filter").value;
  let data = getRequests();

  let table = document.getElementById("reqTable");
  table.innerHTML = "";

  if (!data.length) {
    table.innerHTML = "<tr><td colspan='7'>No Requests</td></tr>";
    return;
  }

  data.forEach(req => {

    if (filter !== "ALL" && req.status !== filter) return;

    let color =
      req.priority === "GREEN" ? "green" :
      req.priority === "YELLOW" ? "orange" :
      "red";

    let action = "-";

    if (req.status === "PENDING") {
      action = `
        <button onclick="approve('${req.requestId}')">Approve</button>
        <button onclick="reject('${req.requestId}')">Reject</button>
      `;
    }

    table.innerHTML += `
      <tr>
        <td>${req.requestId}</td>
        <td>${req.userId}</td>
        <td>${req.type}</td>
        <td>₹${req.amount}</td>
        <td style="color:${color}">${req.priority}</td>
        <td>${req.status}</td>
        <td>${action}</td>
      </tr>
    `;
  });
}

// ================= APPROVE =================
function approve(id) {
  if (!confirm("Approve this request?")) return;

  approveRequest(id, "ADMIN_A");
  loadRequests();
}

// ================= REJECT =================
function reject(id) {
  let reason = prompt("Enter reject reason:");
  if (!reason) return;

  rejectRequest(id, reason);
  loadRequests();
}

// ================= INIT =================
refreshStatus();
loadRequests();

</script>

</body>
</html>
