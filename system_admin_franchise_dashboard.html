<!DOCTYPE html>
<html>
<head>
  <title>Admin Franchise Requests</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f7f9;
    }

    .card {
      background: #ffffff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h2, h3 {
      margin-top: 0;
    }

    button {
      padding: 10px 14px;
      margin: 5px 5px 5px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: #fff;
    }

    .approve-btn {
      background: #28a745;
    }

    .reject-btn {
      background: #dc3545;
    }

    .request-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .request-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Admin Franchise Requests</h2>
    <button id="refreshBtn">Refresh</button>
    <button id="resetPasswordBtn">Reset User Password</button>
  </div>

  <div class="card">
    <h3>All Franchise Requests</h3>
    <div id="requestList"></div>
  </div>

  <script src="core_system.js"></script>
  <script src="session_manager.js"></script>
  <script src="admin_franchise_requests.js"></script>
</body>
</html>
