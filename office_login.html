<!DOCTYPE html>
<html>
<head>
  <title>Office Login</title>
</head>
<body>

<h2>Office Login</h2>

<input type="text" id="userId" placeholder="Enter User ID"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<script>
// =====================
// OFFICE LOGIN FUNCTION
// =====================
function login() {

  let officeUsers = JSON.parse(localStorage.getItem("officeUsers") || "[]");

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    alert("Enter User ID and Password");
    return;
  }

  let user = officeUsers.find(u => u.userId === userId && u.password === password);

  if (!user) {
    alert("Invalid User ID or Password");
    return;
  }

  // Save session
  localStorage.setItem("loggedInOfficeUser", JSON.stringify(user));

  alert("Login successful");

  // Role-based redirect
  if (user.role === "super_admin") {
    window.location.href = "dashboard_super_admin.html";
  } 
  else if (user.role === "admin") {
    window.location.href = "dashboard_admin.html";
  } 
  else {
    alert("Role not recognized");
  }
}
</script>

</body>
</html>
