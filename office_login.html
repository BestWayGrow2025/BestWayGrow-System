<!DOCTYPE html>
<html>
<head>
  <title>Office Login</title>
</head>
<body>

<h2>Office Login</h2>

<input type="text" id="userId" placeholder="Enter User ID"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<script>
// =====================
// OFFICE LOGIN SYSTEM
// =====================

// Get office users from storage
function getOfficeUsers() {
  return JSON.parse(localStorage.getItem("officeUsers") || "[]");
}

function login() {
  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    alert("Enter User ID and Password");
    return;
  }

  let users = getOfficeUsers();

  let user = users.find(u => u.userId === userId && u.password === password);

  if (!user) {
    alert("Invalid Office Credentials");
    return;
  }

  // Save session
  localStorage.setItem("loggedInUser", JSON.stringify(user));

  alert("Login Successful");

  // Redirect based on role
  if (user.role === "super_admin") {
    window.location.href = "dashboard_super_admin.html";
  } 
  else if (user.role === "admin") {
    window.location.href = "dashboard_admin.html";
  } 
  else {
    alert("Unknown role");
  }
}
</script>

</body>
</html>
