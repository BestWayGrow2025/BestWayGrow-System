<!DOCTYPE html>
<html>
<head>
  <title>User Repurchase</title>
</head>
<body>

<h2>Repurchase Page</h2>

<p>User ID: <span id="userId"></span></p>

<button onclick="repurchase()">Repurchase</button>

<!-- ✅ CORE -->
<script src="CORE_system.js"></script>
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH (SECURE) =================
let session = JSON.parse(localStorage.getItem("loggedInUser"));

if (!session) {
  alert("Login required");
  window.location.href = "user_login.html";
}

let user = getUserById(session.userId);

if (!user) {
  alert("User not found");
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= UI =================
document.getElementById("userId").innerText = user.userId;


// ================= DUPLICATE PROTECTION =================
function isRepurchaseAllowed(u) {

  // Example: allow every time OR add cooldown
  // simple version: always true
  return true;

  // Advanced (optional):
  // let last = new Date(u.lastRepurchase || 0);
  // let now = new Date();
  // return (now - last) > (24 * 60 * 60 * 1000); // 1 day
}


// ================= REPURCHASE =================
function repurchase() {

  let users = getUsers();
  let u = users.find(x => x.userId === user.userId);

  if (!u) return;

  if (!isRepurchaseAllowed(u)) {
    alert("Repurchase not allowed now");
    return;
  }

  // 💰 BV AMOUNT (CONFIG)
  let bvAmount = 500;

  // ================= COMMISSION =================
  // 🔥 USE SAME ENGINE (IMPORTANT)
  processCommission(u.userId, bvAmount);

  // ================= SAVE LAST REPURCHASE =================
  u.lastRepurchase = new Date().toISOString();

  saveUsers(users);

  alert("✅ Repurchase Successful!");

  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
