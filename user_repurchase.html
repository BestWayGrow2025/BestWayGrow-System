<!DOCTYPE html>
<html>
<head>
  <title>User Repurchase</title>
</head>
<body>

<h2>Repurchase Page</h2>

<p>User ID: <span id="userId"></span></p>

<input type="text" id="pinInput" placeholder="Enter PIN"><br><br>

<button onclick="repurchase()">Repurchase</button>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="commission_engine.js"></script>
<script src="income_control_system.js"></script>
<script src="active_system.js"></script>

<!-- PIN -->
<script src="pin_config_system.js"></script>
<script src="pin_master_system.js"></script>

<script>

// ================= FULL SAFE START =================
document.addEventListener("DOMContentLoaded", function () {

  initCoreSystem();

  let session = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!session) {
    alert("Login required");
    window.location.href = "user_login.html";
    throw new Error("STOP");
  }

  let user = getUserById(session.userId);

  if (!user) {
    alert("User not found");
    localStorage.removeItem("loggedInUser");
    window.location.href = "user_login.html";
    throw new Error("STOP");
  }

  let userEl = document.getElementById("userId");
  if (userEl) userEl.innerText = user.userId;

  // ================= REPURCHASE =================
  window.repurchase = function () {

    let u = getUsers().find(x => x.userId === user.userId);
    if (!u) return;

    let pinId = document.getElementById("pinInput").value.trim();

    if (!pinId) {
      alert("Enter PIN");
      return;
    }

    try {

      // 🔒 USE PIN (MASTER SYSTEM)
      let pin = usePin(pinId, u.userId, "repurchase");

      if (!pin) {
        alert("Invalid PIN");
        return;
      }

      let bv = Number(pin.bv || 0);

      // 💰 INCOME
      if (typeof isRLIEnabled === "function" &&
          typeof processIncome === "function" &&
          isRLIEnabled() &&
          typeof isUserActive === "function" &&
          isUserActive(u.userId)) {

        processIncome("repurchase", u.userId, bv);
      }

      alert("✅ Repurchase Successful");

      window.location.href = "user_dashboard.html";

    } catch (err) {
      alert(err.message || "Repurchase failed");
      console.error(err);
    }
  };

});

</script>

</body>
</html>
