<!DOCTYPE html>
<html>
<head>
  <title>User Repurchase</title>
</head>
<body>

<h2>Repurchase Page</h2>

<p>User ID: <span id="userId"></span></p>

<button onclick="repurchase()">Repurchase</button>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>
<script src="income_control_system.js"></script>

<!-- PIN -->
<script src="pin_config_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInUser"));

if (!session) {
  alert("Login required");
  window.location.href = "user_login.html";
}

let user = getUserById(session.userId);

if (!user) {
  alert("User not found");
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= UI =================
document.getElementById("userId").innerText = user.userId;


// ================= REPURCHASE =================
function repurchase() {

  let users = getUsers();
  let u = users.find(x => x.userId === user.userId);

  if (!u) return;

  // 🔒 PIN SAFETY (NEW 🔥)
  if (!isPinSystemSafe("repurchase")) {
    alert("Repurchase not available or invalid");
    return;
  }

  // 🔒 INCOME SYSTEM SAFETY (NEW 🔥)
  if (typeof isIncomeSystemSafe === "function" && !isIncomeSystemSafe()) {
    alert("System temporarily unavailable");
    return;
  }

  // ================= PIN =================
  let pin = getActivePin("repurchase");

  if (!pin) {
    alert("Repurchase not available");
    return;
  }

  let bv = Number(pin.bv || 0);
  let amount = Number(pin.amount || 0);

  // 🔒 EXTRA SAFETY
  if (bv <= 0 || amount <= 0) {
    alert("Invalid PIN configuration");
    return;
  }

  // 💰 WALLET CHECK
  if ((u.wallet || 0) < amount) {
    alert("Insufficient wallet balance");
    return;
  }

  // 💸 DEBIT
  debitWallet(u.userId, amount, "Repurchase");

  // 💰 INCOME (FINAL SAFE)
  if (isRLIEnabled() && isUserActive(u.userId)) {
    processIncome("repurchase", u.userId, bv);
  }

  // 💾 SAVE (IMPORTANT FIX 🔥)
  localStorage.setItem("users", JSON.stringify(users));

  alert("✅ Repurchase Successful");

  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
