<!DOCTYPE html>
<html>
<head>
  <title>Admin - User Control</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
    input { padding: 5px; margin: 5px; }
  </style>
</head>
<body>

<h2>ADMIN → USER CONTROL PANEL</h2>

<button onclick="goBack()">⬅ Back to Dashboard</button>

<div class="box">
  <h3>Search User</h3>
  <input id="searchId" placeholder="Enter User ID">
  <button onclick="searchUser()">Search</button>

  <div id="result"></div>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>

// ================= AUTH =================
let admin = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!admin) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// ================= NAV =================
function goBack() {
  window.location.href = "dashboard_admin.html";
}

// ================= SEARCH =================
function searchUser() {

  let id = document.getElementById("searchId").value.trim();
  let users = getUsers();

  let user = users.find(u => u.userId === id);

  if (!user) {
    document.getElementById("result").innerHTML = "❌ User not found";
    return;
  }

  document.getElementById("result").innerHTML = `
    <p>
      <b>ID:</b> ${user.userId} <br>
      <b>Name:</b> ${user.username} <br>
      <b>Status:</b> ${user.status} <br>
      <b>Wallet:</b> ₹ ${user.wallet || 0}
    </p>

    <button onclick="activateUser('${user.userId}')">Activate</button>
    <button onclick="deactivateUser('${user.userId}')">Deactivate</button>
    <br><br>

    <button onclick="addMoney('${user.userId}')">Add Wallet</button>
    <button onclick="deductMoney('${user.userId}')">Deduct Wallet</button>
    <br><br>

    <button onclick="resetPassword('${user.userId}')">Reset Password</button>
  `;
}

// ================= ACTIVATE =================
function activateUser(id) {
  let users = getUsers();
  let user = users.find(u => u.userId === id);

  user.status = "active";
  user.isActive = true;

  saveUsers(users);

  alert("User Activated");
  searchUser();
}

// ================= DEACTIVATE =================
function deactivateUser(id) {
  let users = getUsers();
  let user = users.find(u => u.userId === id);

  user.status = "inactive";
  user.isActive = false;

  saveUsers(users);

  alert("User Deactivated");
  searchUser();
}

// ================= ADD MONEY =================
function addMoney(id) {
  let amt = prompt("Enter amount to ADD:");
  if (!amt || amt <= 0) return;

  let users = getUsers();
  let user = users.find(u => u.userId === id);

  user.wallet = (user.wallet || 0) + parseFloat(amt);

  saveUsers(users);

  alert("Money Added");
  searchUser();
}

// ================= DEDUCT MONEY =================
function deductMoney(id) {
  let amt = prompt("Enter amount to DEDUCT:");
  if (!amt || amt <= 0) return;

  let users = getUsers();
  let user = users.find(u => u.userId === id);

  user.wallet = (user.wallet || 0) - parseFloat(amt);

  saveUsers(users);

  alert("Money Deducted");
  searchUser();
}

// ================= RESET PASSWORD =================
function resetPassword(id) {
  let newPass = prompt("Enter new password:");
  if (!newPass) return;

  let users = getUsers();
  let user = users.find(u => u.userId === id);

  user.password = newPass;

  saveUsers(users);

  alert("Password Reset Done");
}

</script>

</body>
</html>
