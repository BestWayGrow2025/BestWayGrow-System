<!DOCTYPE html>
<html>
<head>
  <title>User Register V8 FINAL</title>
</head>
<body>

<h2 id="introLabel">User Registration</h2>

<div id="formArea">
  <input type="text" id="username" placeholder="Name"><br><br>
  <input type="text" id="mobile" placeholder="Mobile"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <input type="text" id="pin" placeholder="Enter Assigned PIN"><br><br>

  <label>Select Position:</label><br>
  <input type="radio" name="position" value="L"> LEFT
  <input type="radio" name="position" value="R"> RIGHT
  <br><br>

  <button id="regBtn" onclick="handleRegister()">Register</button>
</div>

<p id="msg"></p>

<script src="core_system.js"></script>
<script src="tree_system.js"></script> <!-- ✅ FIXED -->
<script src="registration_queue.js"></script>
<script src="pin_master_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") initCoreSystem();

// ================= PARAM =================
let params = new URLSearchParams(window.location.search);
let introducerId = params.get("ref") || "BWG000001";

let introUser = (typeof getUserById === "function")
  ? getUserById(introducerId)
  : null;

document.getElementById("introLabel").innerText =
  "Introducer: " + introducerId +
  (introUser ? " (" + (introUser.username || "") + ")" : "");

// ================= SAFE =================
function encodePass(p){
  try { return btoa(p); } catch { return p; }
}

// ================= PIN VALIDATION =================
function validateAssignedPin(pinInput) {

  if (!pinInput || typeof loadPins !== "function") {
    return { ok:false, msg:"PIN system error" };
  }

  let pins = loadPins();
  let pin = pins.find(p => p.pinId === pinInput);

  if (!pin) return { ok:false, msg:"Invalid PIN" };
  if (pin.status !== "assigned") return { ok:false, msg:"PIN not assigned" };
  if (pin.type !== "upgrade") return { ok:false, msg:"Use upgrade PIN" };

  return { ok:true, pin };
}

// ================= REGISTER =================
function handleRegister() {

  if (window.registerLock) return;
  window.registerLock = true;

  let btn = document.getElementById("regBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  try {

    // 🔒 SYSTEM CHECK
    let s = (typeof getSystemSettings === "function") ? getSystemSettings() : {};
    if (s.lockMode) {
      alert("System locked");
      return resetAll();
    }

    // 🔒 PIN SYSTEM
    if (typeof isPinSystemSafe === "function") {
      if (!isPinSystemSafe("upgrade")) {
        alert("PIN system disabled");
        return resetAll();
      }
    }

    let username = document.getElementById("username").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let password = document.getElementById("password").value;
    let pinInput = document.getElementById("pin").value.trim();

    let positionElement = document.querySelector('input[name="position"]:checked');

    if (!username || !mobile || !password || !pinInput) {
      alert("Fill all fields");
      return resetAll();
    }

    if (!/^[6-9]\d{9}$/.test(mobile)) {
      alert("Invalid mobile");
      return resetAll();
    }

    let position = positionElement ? positionElement.value : "L";

    if (typeof isValidIntroducer === "function") {
      if (!isValidIntroducer(introducerId)) {
        alert("Invalid Introducer");
        return resetAll();
      }
    }

    let users = (typeof getUsers === "function") ? getUsers() : [];

    if (users.find(u => u.mobile === mobile)) {
      alert("Mobile exists");
      return resetAll();
    }

    // 🔥 PIN CHECK
    let pinCheck = validateAssignedPin(pinInput);
    if (!pinCheck.ok) {
      alert(pinCheck.msg);
      return resetAll();
    }

    let selectedPin = pinCheck.pin;

    // ================= QUEUE =================
    if (typeof addToRegistrationQueue !== "function") {
      alert("Queue error");
      return resetAll();
    }

    addToRegistrationQueue({
      username,
      password: encodePass(password),
      mobile,
      introducerId,
      position
    });

    document.getElementById("msg").innerText = "⏳ Processing...";

    // ================= CHECK RESULT =================
    let attempts = 0;

    let checker = setInterval(() => {

      let users = getUsers();
      let newUser = users.find(u => u.mobile === mobile);

      if (newUser) {

        // 🔥 USE PIN
        if (typeof usePin === "function") {
          try {
            usePin(selectedPin.pinId, newUser.userId, "registration");
          } catch {}
        }

        // 🔥 LOG
        if (typeof logActivity === "function") {
          logActivity(newUser.userId, "USER", "Registered", "REGISTRATION");
        }

        document.getElementById("msg").innerHTML = `
          ✅ Registration Successful <br>
          User ID: <b>${newUser.userId}</b><br>
          🔗 Referral: <small>${newUser.referralLink || "N/A"}</small><br>
          👉 <a href="user_login.html">Login</a>
        `;

        clearInterval(checker);
        resetAll();

      } else {

        attempts++;

        if (attempts > 10) {
          document.getElementById("msg").innerText =
            "⚠️ Delay... please retry";
          clearInterval(checker);
          resetAll();
        }

      }

    }, 1000);

  } catch (err) {
    console.error(err);
    alert("Registration failed");
    resetAll();
  }
}

// ================= RESET =================
function resetAll() {
  let btn = document.getElementById("regBtn");
  btn.disabled = false;
  btn.innerText = "Register";
  window.registerLock = false;
}

</script>

</body>
</html>
