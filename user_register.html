<!DOCTYPE html>
<html>
<head>
  <title>User Register</title>
</head>
<body>

<h2 id="introLabel">User Registration</h2>

<div id="formArea">
  <input type="text" id="username" placeholder="Name"><br><br>
  <input type="text" id="mobile" placeholder="Mobile"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <!-- 🔥 NEW: PIN INPUT -->
  <input type="text" id="pin" placeholder="Enter Assigned PIN"><br><br>

  <label>Select Position:</label><br>
  <input type="radio" name="position" value="L"> LEFT
  <input type="radio" name="position" value="R"> RIGHT
  <br><br>

  <button id="regBtn" onclick="handleRegister()">Register</button>
</div>

<p id="msg"></p>

<!-- ✅ ORDER MUST BE THIS -->
<script src="core_system.js"></script>
<script src="tree_engine.js"></script>
<script src="registration_queue.js"></script>

<!-- 🔥 PIN MASTER -->
<script src="pin_master_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= PARAM =================
let params = new URLSearchParams(window.location.search);
let introducerId = params.get("ref") || "BWG000001";

let introUser = getUserById(introducerId);

document.getElementById("introLabel").innerText =
  "Introducer: " + introducerId +
  (introUser ? " (" + (introUser.username || "") + ")" : "");

// ================= PIN VALIDATION =================
function validateAssignedPin(pinInput) {

  let pins = loadPins();

  let pin = pins.find(p => p.pinId === pinInput);

  if (!pin) return { ok: false, msg: "Invalid PIN" };

  if (pin.status !== "assigned") {
    return { ok: false, msg: "PIN not assigned" };
  }

  return { ok: true, pin };
}

// ================= REGISTER =================
function handleRegister() {

  if (window.registerLock) return;
  window.registerLock = true;

  let btn = document.getElementById("regBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  try {

    let username = document.getElementById("username").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let password = document.getElementById("password").value;
    let pinInput = document.getElementById("pin").value.trim();

    let positionElement = document.querySelector('input[name="position"]:checked');

    if (!username || !mobile || !password || !pinInput) {
      alert("Fill all fields including PIN");
      return;
    }

    // ✅ MOBILE VALIDATION
    if (!/^[6-9]\d{9}$/.test(mobile)) {
      alert("Invalid mobile number");
      return;
    }

    let position = positionElement ? positionElement.value : "L";

    if (!isValidIntroducer(introducerId)) {
      alert("Invalid Introducer");
      return;
    }

    let users = getUsers();

    let duplicate = users.find(u => u.mobile === mobile);
    if (duplicate) {
      alert("Mobile already registered");
      return;
    }

    // 🔥 PIN VALIDATION (ENTERPRISE)
    let pinCheck = validateAssignedPin(pinInput);

    if (!pinCheck.ok) {
      alert(pinCheck.msg);
      return;
    }

    let selectedPin = pinCheck.pin;

    // ✅ ADD TO QUEUE
    addToRegistrationQueue({
      username,
      password,
      mobile,
      introducerId,
      position
    });

    document.getElementById("msg").innerText =
      "⏳ Registration in process... Please wait";

    // 🔍 CHECK RESULT
    let attempts = 0;

    let checker = setInterval(() => {

      let users = getUsers();
      let newUser = users.find(u => u.mobile === mobile);

      if (newUser) {

        // 🔥 USE PIN AFTER SUCCESS
        try {
          usePin(selectedPin.pinId, newUser.userId, "registration");
        } catch (err) {
          console.warn("PIN use failed:", err.message);
        }

        document.getElementById("msg").innerHTML = `
          ✅ Registration Successful <br>
          User ID: <b>${newUser.userId}</b><br>
          Introducer: ${introducerId}<br>
          Position: ${newUser.position === "L" ? "LEFT" : "RIGHT"}<br><br>
          🔗 <a href="user_login.html">Go to Login</a>
        `;

        clearInterval(checker);

      } else {

        attempts++;

        if (attempts > 8) {
          document.getElementById("msg").innerText =
            "⚠️ Processing delay... please wait or refresh";

          clearInterval(checker);
        }

      }

    }, 1000);

  } finally {
    resetBtn();
    window.registerLock = false;
  }
}

// ================= RESET =================
function resetBtn() {
  let btn = document.getElementById("regBtn");
  btn.disabled = false;
  btn.innerText = "Register";
}

</script>

</body>
</html>
