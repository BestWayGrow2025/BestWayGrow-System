<!DOCTYPE html>
<html>
<head>
  <title>User Register FINAL QUEUE</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      background: #f4f7f9;
      text-align: center;
      padding: 20px;
    }

    #formArea {
      background: #fff;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      background: blue;
      color: #fff;
      border: none;
    }

    .success-box {
      margin-top: 20px;
      background: #e6ffed;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2 id="introLabel">User Registration</h2>

<div id="formArea">
  <input id="username" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <label>Select Position:</label><br><br>
  <input type="radio" name="position" value="L"> LEFT
  <input type="radio" name="position" value="R"> RIGHT
  <br><br>

  <button onclick="registerUser()">Register</button>
</div>

<p id="msg"></p>

<!-- ✅ SCRIPT ORDER (FINAL) -->
<script src="core_system.js"></script>
<script src="registration_tree_engine.js"></script>
<script src="registration_queue.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") {
  initCoreSystem();
}

// REFERRAL
let params = new URLSearchParams(location.search);
let introducerId = params.get("ref") || "BWG000001";

let introUser = (typeof getUserById === "function")
  ? getUserById(introducerId)
  : null;

if (!introUser) {
  document.getElementById("introLabel").innerText = "Invalid Referral Link";
  document.getElementById("formArea").style.display = "none";
} else {
  document.getElementById("introLabel").innerText =
    "Introducer: " + introducerId;
}

// HELPERS
function encodePass(p){
  try { return btoa(p); } catch { return p; }
}

// REGISTER (QUEUE BASED)
function registerUser() {

  let username = document.getElementById("username").value.trim();
  let email = document.getElementById("email").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let password = document.getElementById("password").value.trim();
  let pos = document.querySelector('input[name="position"]:checked');

  if (!username || !email || !mobile || !password) {
    alert("Fill all fields");
    return;
  }

  if (!pos) {
    alert("Select position");
    return;
  }

  if (!/^[6-9]\d{9}$/.test(mobile)) {
    alert("Invalid mobile");
    return;
  }

  let users = (typeof getUsers === "function") ? getUsers() : [];

  if (users.find(u => u.mobile === mobile)) {
    alert("Mobile exists");
    return;
  }

  if (users.find(u => u.email === email)) {
    alert("Email exists");
    return;
  }

  // ✅ QUEUE REQUEST
  let added = addToRegistrationQueue({
    username,
    password: encodePass(password),
    mobile,
    introducerId,
    position: pos.value
  });

  if (!added) {
    alert("Registration failed or duplicate");
    return;
  }

  // ✅ SUCCESS UI
  document.getElementById("msg").innerHTML = `
    <div class="success-box">
      ✅ Registration Submitted<br><br>
      Processing... Please login after few seconds<br><br>

      <a href="user_login.html">
        <button>Go to Login</button>
      </a>
    </div>
  `;
}

</script>

</body>
</html>
