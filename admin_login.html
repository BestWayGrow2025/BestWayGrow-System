<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

// ================= GET USERS =================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// ================= LOGIN =================
function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  let users = getUsers();

  // 🔥 FIX: CHECK INSIDE USERS
  let admin = users.find(u =>
    u.userId === id &&
    u.role === "admin" &&
    (u.password === pass || atob(u.password) === pass) // support encoded + normal
  );

  if (!admin) {
    document.getElementById("msg").innerText = "❌ Invalid login";
    return;
  }

  // SAVE SESSION
  localStorage.setItem("loggedInAdmin", JSON.stringify({
    adminId: admin.userId
  }));

  // REDIRECT
  window.location.href = "dashboard_admin.html";
}

</script>

</body>
</html>
