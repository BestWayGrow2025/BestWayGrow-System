<!DOCTYPE html>
<html>
<head>
  <title>Admin Login V8 FINAL</title>

  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      text-align:center;
      background:#f4f7f9;
    }

    input { 
      padding: 8px; 
      width: 240px; 
      margin-bottom: 10px;
    }

    button { 
      padding: 8px 15px; 
      cursor: pointer;
    }

    #msg {
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ CORE DEPENDENCIES -->
<script src="core_system.js"></script>
<script src="activity_log_system.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p || ""; }
}

// ================= BUTTON LOCK =================
function lockBtn() {
  let btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Checking...";
}

function unlockBtn() {
  let btn = document.getElementById("loginBtn");
  btn.disabled = false;
  btn.innerText = "Login";
}

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  try {
    localStorage.removeItem("loggedInSuperAdmin");
    localStorage.removeItem("loggedInSystemAdmin");
    localStorage.removeItem("loggedInAdmin");
    localStorage.removeItem("loggedInUser");
  } catch {}
}

// ================= SESSION KEY =================
function getSessionKey(role) {
  if (role === "super_admin") return "loggedInSuperAdmin";
  if (role === "system_admin") return "loggedInSystemAdmin";
  return "loggedInAdmin";
}

// ================= LOGIN =================
function login() {

  lockBtn();

  let id = document.getElementById("adminId").value.trim().toLowerCase();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    showMsg("⚠ Enter ID & Password");
    unlockBtn();
    return;
  }

  if (typeof getUsers !== "function") {
    alert("System error");
    unlockBtn();
    return;
  }

  let users = getUsers() || [];

  let user = users.find(u => {
    let storedPass = safeDecode(u.password);

    return (
      (u.userId || "").toLowerCase() === id &&
      ["admin","system_admin","super_admin"].includes(u.role) &&
      storedPass === pass
    );
  });

  if (!user) {
    showMsg("❌ Invalid login");
    unlockBtn();
    return;
  }

  // ================= STATUS CHECK =================
  if (user.status && user.status !== "active") {
    showMsg("🚫 Account inactive");
    unlockBtn();
    return;
  }

  // ================= SYSTEM CHECK =================
  let settings = {};
  if (typeof getSystemSettings === "function") {
    settings = getSystemSettings() || {};
  } else {
    alert("System settings error");
    unlockBtn();
    return;
  }

  if (settings.adminAccess === false) {
    showMsg("🚫 Admin access OFF");
    unlockBtn();
    return;
  }

  if (settings.lockMode === true) {
    showMsg("🚫 System locked");
    unlockBtn();
    return;
  }

  // ================= CLEAR OLD =================
  logoutAll();

  // ================= SAVE SESSION =================
  try {
    let key = getSessionKey(user.role);

    localStorage.setItem(key, JSON.stringify({
      userId: user.userId
    }));

  } catch {
    alert("Storage error");
    unlockBtn();
    return;
  }

  // ================= VERIFY =================
  let sessionExists =
    localStorage.getItem("loggedInAdmin") ||
    localStorage.getItem("loggedInSystemAdmin") ||
    localStorage.getItem("loggedInSuperAdmin");

  if (!sessionExists) {
    alert("Session not saved");
    unlockBtn();
    return;
  }

  // ================= LOG =================
  if (typeof logActivity === "function") {
    logActivity(user.userId, "ADMIN", "Login");
  }

  // ================= SUCCESS =================
  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "admin_dashboard.html";
  }, 600);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
