<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      text-align:center;
      background:#f4f7f9;
    }

    input { 
      padding: 8px; 
      width: 240px; 
      margin-bottom: 10px;
    }

    button { 
      padding: 8px 15px; 
      cursor: pointer;
    }

    #msg {
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ FIXED FILE NAME -->
<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= SAFE INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInUser");
}

// ================= LOGIN =================
function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    showMsg("⚠ Enter ID & Password");
    return;
  }

  let users = typeof getUsers === "function" ? getUsers() : [];

  let user = users.find(u =>
    u.userId.toLowerCase() === id.toLowerCase() &&
    u.role === "admin" &&
    safeDecode(u.password) === pass
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  // ✅ STATUS CHECK
  if (user.status && user.status !== "active") {
    showMsg("🚫 Account inactive");
    return;
  }

  let settings = getSystemSettings();

  // ❗ SYSTEM CONTROL
  if (settings.adminAccess === false) {
    showMsg("🚫 Admin access OFF");
    return;
  }

  if (settings.lockMode === true) {
    showMsg("🚫 System locked");
    return;
  }

  // ✅ CLEAR OLD SESSIONS
  logoutAll();

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInAdmin", JSON.stringify({
    userId: user.userId
  }));

  // 📜 LOG
  if (typeof logActivity === "function") {
    logActivity(user.userId, "ADMIN", "Login");
  }

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "admin_dashboard.html";
  }, 700);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
