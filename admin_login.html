<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      text-align:center;
      background:#f4f7f9;
    }

    input { 
      padding: 8px; 
      width: 240px; 
      margin-bottom: 10px;
    }

    button { 
      padding: 8px 15px; 
      cursor: pointer;
    }

    #msg {
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= BUTTON LOCK =================
function lockBtn() {
  let btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Checking...";
}

function unlockBtn() {
  let btn = document.getElementById("loginBtn");
  btn.disabled = false;
  btn.innerText = "Login";
}

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  try {
    localStorage.removeItem("loggedInSuperAdmin");
    localStorage.removeItem("loggedInSystemAdmin");
    localStorage.removeItem("loggedInAdmin");
    localStorage.removeItem("loggedInUser");
  } catch (e) {
    console.warn("Logout cleanup failed");
  }
}

// ================= LOGIN =================
function login() {

  lockBtn();

  let id = document.getElementById("adminId").value.trim().toLowerCase();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    showMsg("⚠ Enter ID & Password");
    unlockBtn();
    return;
  }

  if (typeof getUsers !== "function") {
    alert("System error");
    unlockBtn();
    return;
  }

  let users = getUsers() || [];

  let user = users.find(u =>
    (u.userId || "").toLowerCase() === id &&
    u.role === "admin" &&
    (safeDecode(u.password) === pass)
  );

  if (!user) {
    showMsg("❌ Invalid login");
    unlockBtn();
    return;
  }

  // ✅ STATUS CHECK
  if (user.status && user.status !== "active") {
    showMsg("🚫 Account inactive");
    unlockBtn();
    return;
  }

  if (typeof getSystemSettings !== "function") {
    alert("System settings error");
    unlockBtn();
    return;
  }

  let settings = getSystemSettings() || {};

  // ❗ SYSTEM CONTROL
  if (settings.adminAccess === false) {
    showMsg("🚫 Admin access OFF");
    unlockBtn();
    return;
  }

  if (settings.lockMode === true) {
    showMsg("🚫 System locked");
    unlockBtn();
    return;
  }

  // ✅ CLEAR OLD SESSIONS
  logoutAll();

  // ✅ SAVE SESSION
  try {
    localStorage.setItem("loggedInAdmin", JSON.stringify({
      userId: user.userId
    }));
  } catch (e) {
    alert("Storage error");
    unlockBtn();
    return;
  }

  // 🔍 VERIFY SESSION
  let check = localStorage.getItem("loggedInAdmin");
  if (!check) {
    alert("Session not saved");
    unlockBtn();
    return;
  }

  // 📜 LOG
  if (typeof logActivity === "function") {
    logActivity(user.userId, "ADMIN", "Login");
  }

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "admin_dashboard.html";
  }, 700);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
