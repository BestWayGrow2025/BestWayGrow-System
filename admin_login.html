<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 6px; width: 200px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script src="CORE_system.js"></script>

<script>

// ✅ INIT CORE
initCoreSystem();

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN =================
function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    showMsg("⚠ Enter ID & Password");
    return;
  }

  let users = getUsers();

  let admin = users.find(u =>
    u.userId.toLowerCase() === id.toLowerCase() &&
    u.role === "admin" &&
    (u.password === pass || safeDecode(u.password) === pass)
  );

  if (!admin) {
    showMsg("❌ Invalid login");
    return;
  }

  // 🔥 STATUS CONTROL (VERY IMPORTANT)
  if (admin.status !== "active") {
    showMsg("🚫 Account inactive by System Admin");
    return;
  }

  // 🔥 SYSTEM ACCESS CONTROL (FROM SUPER ADMIN)
  let settings = getSystemSettings();
  if (settings.adminAccess === false) {
    showMsg("🚫 Admin access OFF by Super Admin");
    return;
  }

  // 🔥 SYSTEM LOCK (BLOCK LOWER ROLES)
  if (settings.lockMode === true) {
    showMsg("🚫 System locked by Super Admin");
    return;
  }

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInAdmin", JSON.stringify({
    userId: admin.userId
  }));

  showMsg("✅ Login successful");

  // ✅ REDIRECT
  setTimeout(() => {
    window.location.href = "admin_dashboard.html";
  }, 800);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
