<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 6px; width: 200px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem(); // ✅ MUST ADD
</script>

<script>

// ================= LOGIN =================
function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    document.getElementById("msg").innerText = "⚠ Enter ID & Password";
    return;
  }

  let users = getUsers();

  // ✅ CHECK ADMIN FROM USERS
  let admin = users.find(u =>
    u.userId === id &&
    u.role === "admin" &&
    (u.password === pass || atob(u.password) === pass)
  );

  if (!admin) {
    document.getElementById("msg").innerText = "❌ Invalid login";
    return;
  }

  // ✅ SAVE SESSION (STANDARD FORMAT)
  localStorage.setItem("loggedInAdmin", JSON.stringify({
    adminId: admin.userId   // 🔥 IMPORTANT FIX
  }));

  // REDIRECT
  window.location.href = "dashboard_admin.html";
}

</script>

</body>
</html>
