<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <!-- ✅ FIX: remove favicon 404 -->
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 6px; width: 200px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>

// ✅ INIT CORE
initCoreSystem();

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN =================
function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    document.getElementById("msg").innerText = "⚠ Enter ID & Password";
    return;
  }

  let users = getUsers();

  let admin = users.find(u =>
    u.userId.toLowerCase() === id.toLowerCase() &&   // ✅ case-insensitive
    u.role === "admin" &&
    u.status !== "blocked" &&
    (u.password === pass || safeDecode(u.password) === pass) // ✅ safe check
  );

  if (!admin) {
    document.getElementById("msg").innerText = "❌ Invalid login";
    return;
  }

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInAdmin", JSON.stringify({
    userId: admin.userId
  }));

  // ✅ REDIRECT
  window.location.href = "admin_dashboard.html";
}

</script>

</body>
</html>
