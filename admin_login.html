<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

// ✅ USE SAME USERS STORAGE
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  let users = getUsers();

  // ✅ LOGIN ONLY ADMIN ROLE
  let admin = users.find(u => 
    u.userId === id && 
    u.password === pass && 
    u.role === "admin"
  );

  if (!admin) {
    document.getElementById("msg").innerText = "❌ Invalid Admin Login";
    return;
  }

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInAdmin", JSON.stringify(admin));

  // ✅ REDIRECT
  window.location.href = "dashboard_admin.html";
}

</script>

</body>
</html>
