<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 6px; width: 200px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>ADMIN / SUPER ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script src="CORE_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ✅ INIT CORE
initCoreSystem();

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= LOGIN =================
function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!id || !pass) {
    showMsg("⚠ Enter ID & Password");
    return;
  }

  let users = getUsers();

  let user = users.find(u =>
    u.userId.toLowerCase() === id.toLowerCase() &&
    (u.role === "admin" || u.role === "super_admin") &&
    (u.password === pass || safeDecode(u.password) === pass)
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  // ✅ STATUS CONTROL
  if (user.status !== "active") {
    showMsg("🚫 Account inactive by System Admin");
    return;
  }

  let settings = getSystemSettings();

  // ================= 🔐 SUPER ADMIN LOGIN =================
  if (user.role === "super_admin") {

    localStorage.removeItem("loggedInAdmin");

    localStorage.setItem("loggedInSuperAdmin", JSON.stringify({
      userId: user.userId
    }));

    // 📜 LOG
    if (typeof logActivity === "function") {
      logActivity(user.userId, "SUPER_ADMIN", "Login");
    }

    showMsg("👑 Super Admin Login Successful");

    setTimeout(() => {
      window.location.href = "super_admin_dashboard.html";
    }, 800);

    return;
  }

  // ================= 🔐 ADMIN LOGIN =================

  // ❗ SUPER ADMIN CONTROL
  if (settings.adminAccess === false) {
    showMsg("🚫 Admin access OFF by Super Admin");
    return;
  }

  // ❗ SYSTEM LOCK
  if (settings.lockMode === true) {
    showMsg("🚫 System locked by Super Admin");
    return;
  }

  // ✅ CLEAR OLD SESSIONS
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInAdmin");

  localStorage.setItem("loggedInAdmin", JSON.stringify({
    userId: user.userId
  }));

  // 📜 LOG
  if (typeof logActivity === "function") {
    logActivity(user.userId, "ADMIN", "Login");
  }

  showMsg("✅ Admin Login Successful");

  setTimeout(() => {
    window.location.href = "admin_dashboard.html";
  }, 800);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
