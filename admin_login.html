<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

<h2>ADMIN LOGIN</h2>

<input id="adminId" placeholder="Admin ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function login() {

  let id = document.getElementById("adminId").value.trim();
  let pass = document.getElementById("password").value.trim();

  let users = getUsers();

  let admin = users.find(u => {
    if (u.userId !== id || u.role !== "admin") return false;

    // ✅ decode stored password
    let decoded = atob(u.password); // base64 decode

    return decoded === pass;
  });

  if (!admin) {
    document.getElementById("msg").innerText = "❌ Invalid Admin Login";
    return;
  }

  localStorage.setItem("loggedInAdmin", JSON.stringify(admin));

  window.location.href = "dashboard_admin.html";
}

</script>

</body>
</html>
