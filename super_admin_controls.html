<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Controls</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .on {
      background: #28a745;
      color: white;
    }

    .off {
      background: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

  <h2>⚡ SUPER ADMIN CONTROL PANEL</h2>

  <div class="box">
    <h3>System Toggles</h3>

    <p id="status"></p>

    <button id="lockBtn">🔒 System Lock</button>
    <button id="queueBtn">📦 Queue Stop</button>
    <button id="withdrawBtn">💸 Withdraw Stop</button>
    <button id="adminBtn">👨‍💼 Admin Access</button>
    <button id="registrationBtn">🧾 Registration</button>
  </div>

  <div class="box">
    <h3>Danger Zone ⚠️</h3>

    <button id="resetBtn" class="off">🔥 Reset System</button>
    <button id="clearLogsBtn" class="off">🧹 Clear All Logs</button>
  </div>

  <script src="core_system.js"></script>
  <script src="activity_log.js"></script>
  <script src="session_manager.js"></script>
  <script src="super_admin_controls.js"></script>

</body>
</html>
