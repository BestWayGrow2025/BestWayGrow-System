<!DOCTYPE html>
<html>
<head>
  <title>Create Admin</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f7f9;
    }

    h2 {
      text-align: center;
    }

    .box {
      background: white;
      border: 1px solid #ccc;
      padding: 20px;
      max-width: 420px;
      margin: auto;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #ff6600;
      color: white;
    }

    #msg {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>SYSTEM ADMIN → CREATE ADMIN</h2>

<div class="box">
  <label>Admin ID:</label>
  <input id="adminId">

  <label>Name:</label>
  <input id="name">

  <label>Password:</label>
  <input id="password" type="password">

  <label>Type:</label>
  <select id="type">
    <option value="A">All-in-One (Type A)</option>
    <option value="B">Department (Type B)</option>
  </select>

  <div id="deptBox" style="display:none;">
    <label><input type="checkbox" value="finance"> Finance</label><br>
    <label><input type="checkbox" value="franchisee"> Franchisee</label><br>
    <label><input type="checkbox" value="kyc"> KYC</label><br><br>
  </div>

  <button id="createBtn">Create Admin</button>

  <p id="msg"></p>
</div>

<script src="core_system.js"></script>
<script src="session_manager.js"></script>
<script src="system_admin_create_admin.js"></script>

</body>
</html>
