<!DOCTYPE html>
<html>
<head>
  <title>System Admin Create Admin</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f7f9;
    }

    h2 {
      text-align: center;
    }

    .box {
      background: #fff;
      border: 1px solid #ccc;
      padding: 20px;
      max-width: 460px;
      margin: auto;
      border-radius: 10px;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ff6600;
      color: #fff;
    }

    #deptBox {
      display: none;
      margin-bottom: 15px;
    }

    #msg {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>SYSTEM ADMIN → CREATE ADMIN</h2>

<div class="box">
  <label>Admin ID</label>
  <input id="adminId">

  <label>Name</label>
  <input id="name">

  <label>Password</label>
  <input id="password" type="password">

  <label>Admin Type</label>
  <select id="adminType">
    <option value="root_admin">Root Admin (User Tree)</option>
    <option value="admin_a">Admin A (Full Access)</option>
    <option value="admin_b">Admin B (Department Access)</option>
  </select>

  <div id="deptBox">
    <label><input type="checkbox" value="finance"> Finance</label><br>
    <label><input type="checkbox" value="franchisee"> Franchisee</label><br>
    <label><input type="checkbox" value="kyc"> KYC</label><br>
  </div>

  <button id="createBtn">Create Admin</button>
  <p id="msg"></p>
</div>

<script src="core_system.js"></script>
<script src="session_manager.js"></script>
<script src="system_admin_create_admin.js"></script>
</body>
</html>
