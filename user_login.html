<!DOCTYPE html>
<html>
<head>
  <title>User Login</title>
  <link rel="icon" href="data:,">
</head>
<body>

<h2>USER LOGIN</h2>

<form onsubmit="loginUser(event)">
  <input type="text" id="userId" placeholder="User ID" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>
  <button type="submit" id="loginBtn">Login</button>
</form>

<p id="msg"></p>

<!-- ✅ CORE -->
<script src="core_system.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch {
    return p;
  }
}

// ================= SYSTEM SAFETY =================
function isLoginAllowed() {

  // 🔒 SYSTEM LOCK
  if (typeof getSystemSettings === "function") {
    let s = getSystemSettings();
    if (s && s.lockMode) return false;
  }

  // 🔒 SYSTEM SAFE
  if (typeof isSystemSafe === "function") {
    if (!isSystemSafe()) return false;
  }

  return true;
}

// ================= LOGIN CORE =================
function localLogin(userId, password) {

  if (!isLoginAllowed()) {
    alert("System locked. Try later.");
    return false;
  }

  if (typeof getUsers !== "function") {
    alert("System not loaded");
    return false;
  }

  let users = getUsers();

  let user = users.find(u =>
    u.userId.toLowerCase().trim() === userId.toLowerCase().trim() &&
    u.status !== "blocked" &&
    (u.password === password || safeDecode(u.password) === password)
  );

  if (!user) {
    document.getElementById("msg").innerText = "❌ Invalid ID or Password";
    return false;
  }

  // ================= SESSION SAVE =================
  try {

    let sessionData = {
      userId: user.userId,
      loginAt: new Date().toISOString()
    };

    localStorage.setItem("loggedInUser", JSON.stringify(sessionData));

    // VERIFY
    let check = localStorage.getItem("loggedInUser");
    if (!check) throw new Error("Session not saved");

  } catch (e) {
    alert("Session error");
    console.error(e);
    return false;
  }

  // ================= SUCCESS =================
  document.getElementById("msg").innerText = "✅ Login Success";

  resetBtn();

  setTimeout(() => {
    if (localStorage.getItem("loggedInUser")) {
      window.location.href = "user_dashboard.html";
    } else {
      alert("Session lost");
    }
  }, 500);

  return true;
}

// ================= FORM HANDLER =================
function loginUser(e) {
  e.preventDefault();

  // 🔒 HARD LOCK
  if (window.loginLock) return;
  window.loginLock = true;

  let btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Checking...";

  try {

    let userId = document.getElementById("userId").value.trim();
    let password = document.getElementById("password").value;

    if (!userId || !password) {
      alert("Enter ID and Password");
      return resetBtn();
    }

    if (!localLogin(userId, password)) {
      return resetBtn();
    }

  } catch (err) {
    console.error("Login error:", err);
    alert("Login failed");
    resetBtn();
  }
}

// ================= RESET BUTTON =================
function resetBtn() {
  let btn = document.getElementById("loginBtn");
  btn.disabled = false;
  btn.innerText = "Login";
  window.loginLock = false;
}

</script>

</body>
</html>
