<!DOCTYPE html>
<html>
<head>
  <title>User Login</title>
  <link rel="icon" href="data:,">
</head>
<body>

<h2>USER LOGIN</h2>

<form onsubmit="loginUser(event)">
  <input type="text" id="userId" placeholder="User ID" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>
  <button type="submit" id="loginBtn">Login</button>
</form>

<p id="msg"></p>

<!-- ✅ FIXED FILE -->
<script src="core_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN CORE =================
function localLogin(userId, password) {

  // 🔒 DEPENDENCY CHECK
  if (typeof getUsers !== "function") {
    alert("System not loaded");
    return false;
  }

  let users = getUsers();

  let user = users.find(u => 
    u.userId.toLowerCase().trim() === userId.toLowerCase().trim() &&
    u.status !== "blocked" &&
    (u.password === password || safeDecode(u.password) === password)
  );

  if (!user) {
    document.getElementById("msg").innerText = "❌ Invalid ID or Password";
    return false;
  }

  // 🔥 SAVE SESSION
  try {
    localStorage.setItem("loggedInUser", JSON.stringify({
      userId: user.userId
    }));
  } catch (e) {
    alert("Storage error");
    console.error(e);
    return false;
  }

  // 🔍 VERIFY SESSION
  let check = localStorage.getItem("loggedInUser");
  if (!check) {
    alert("Session not saved");
    return false;
  }

  // ✅ SUCCESS
  document.getElementById("msg").innerText = "✅ Login Success";

  resetBtn();

  // 🚀 REDIRECT
  setTimeout(() => {
    if (localStorage.getItem("loggedInUser")) {
      window.location.href = "user_dashboard.html";
    } else {
      alert("Session lost");
    }
  }, 500);

  return true;
}

// ================= FORM HANDLER =================
function loginUser(e) {
  e.preventDefault();

  let btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Checking...";

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value;

  if (!userId || !password) {
    alert("Enter ID and Password");
    resetBtn();
    return;
  }

  if (!localLogin(userId, password)) {
    resetBtn();
  }
}

// ================= RESET BUTTON =================
function resetBtn() {
  let btn = document.getElementById("loginBtn");
  btn.disabled = false;
  btn.innerText = "Login";
}

</script>

</body>
</html>
