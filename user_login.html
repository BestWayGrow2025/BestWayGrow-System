<!DOCTYPE html>
<html>
<head>
  <title>User Login V7 FINAL</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      text-align:center;
      padding:30px;
      background:#f4f7f9;
    }

    input {
      padding:8px;
      width:220px;
      margin:8px;
    }

    button {
      padding:8px 14px;
      cursor:pointer;
    }

    #msg {
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<h2>USER LOGIN</h2>

<input type="text" id="userId" placeholder="User ID"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="safeClick(login)">Login</button>

<p id="msg"></p>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>
<script src="session_manager.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") initCoreSystem();

// ================= LOCK =================
let lock = false;
function safeClick(fn) {
  if (lock) return;
  lock = true;

  try { fn(); } catch(e){ console.error(e); }

  setTimeout(()=> lock=false, 500);
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= SYSTEM CHECK =================
function isLoginAllowed() {

  let s = (typeof getSystemSettings === "function")
    ? getSystemSettings()
    : {};

  if (s.lockMode) {
    showMsg("🚫 System Locked");
    return false;
  }

  return true;
}

// ================= LOGIN =================
function login() {

  if (!isLoginAllowed()) return;

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    return showMsg("⚠️ Enter ID & Password");
  }

  let users = (typeof getUsers === "function") ? getUsers() : [];

  let user = users.find(u =>
    u.userId.toLowerCase() === userId.toLowerCase() &&
    u.role === "user"
  );

  if (!user) {
    return showMsg("❌ Invalid ID");
  }

  if (user.status && user.status !== "active") {
    return showMsg("🚫 Account inactive");
  }

  let storedPass = safeDecode(user.password);

  if (storedPass !== password) {
    return showMsg("❌ Wrong Password");
  }

  // ================= SESSION SAVE =================
  let saved = false;

  try {
    saved = saveSession({
      userId: user.userId,
      role: user.role
    });
  } catch(e){
    console.error(e);
  }

  if (!saved) {
    return showMsg("❌ Session Failed");
  }

  // ================= LOG =================
  if (typeof logActivity === "function") {
    logActivity(user.userId, "USER", "Login", "LOGIN_PAGE");
  }

  showMsg("✅ Login Success");

  setTimeout(()=>{
    window.location.href = "user_dashboard.html";
  }, 500);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
