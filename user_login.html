<!DOCTYPE html>
<html>
<head>
  <title>User Login</title>
  <link rel="icon" href="data:,">
</head>
<body>

<h2>USER LOGIN</h2>

<form onsubmit="loginUser(event)">
  <input type="text" id="userId" placeholder="User ID" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>
  <button type="submit">Login</button>
</form>

<p id="msg"></p>

<script src="CORE_system.js"></script>

<script>

// INIT
initCoreSystem();

// SAFE DECODE (OLD SYSTEM SUPPORT)
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN =================
function loginUser(e) {
  e.preventDefault();

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value;

  // 🔥 FIRST TRY BACKEND LOGIN
  fetch("http://localhost:3000/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId, password })
  })
  .then(res => res.json())
  .then(data => {

    if (data.success) {
      // ✅ BACKEND LOGIN SUCCESS
      localStorage.setItem("loggedInUser", JSON.stringify({
        userId: data.user.userId
      }));

      document.getElementById("msg").innerText = "✅ Login Success (Server)";
      setTimeout(() => {
        window.location.href = "user_dashboard.html";
      }, 800);

    } else {
      // 🔄 FALLBACK → OLD LOCAL SYSTEM

      let users = getUsers();

      let user = users.find(u => 
        u.userId.toLowerCase() === userId.toLowerCase() &&
        u.status !== "blocked" &&
        (u.password === password || safeDecode(u.password) === password)
      );

      if (!user) {
        document.getElementById("msg").innerText = "❌ Invalid login";
        return;
      }

      localStorage.setItem("loggedInUser", JSON.stringify({
        userId: user.userId
      }));

      document.getElementById("msg").innerText = "⚠️ Login via Local System";

      setTimeout(() => {
        window.location.href = "user_dashboard.html";
      }, 800);
    }

  })
  .catch(err => {
    document.getElementById("msg").innerText = "❌ Server error";
  });
}

</script>

</body>
</html>
