<!DOCTYPE html>
<html>
<head>
  <title>User Login</title>

  <!-- ✅ FIX: remove favicon 404 -->
  <link rel="icon" href="data:,">
</head>
<body>

<h2>USER LOGIN</h2>

<form onsubmit="loginUser(event)">
  <input type="text" id="userId" placeholder="User ID" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>
  <button type="submit">Login</button>
</form>

<p id="msg"></p>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>

// ================= INIT CORE =================
initCoreSystem();

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN =================
function loginUser(e) {
  e.preventDefault();

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value;

  let users = getUsers();

  let user = users.find(u => 
    u.userId.toLowerCase() === userId.toLowerCase() &&   // ✅ case-insensitive
    u.status !== "blocked" &&                            // ✅ safety
    (u.password === password || safeDecode(u.password) === password)
  );

  if (!user) {
    document.getElementById("msg").innerText = "❌ Invalid login";
    return;
  }

  // ✅ SAVE SESSION (clean format)
  localStorage.setItem("loggedInUser", JSON.stringify({
    userId: user.userId
  }));

  // ✅ REDIRECT
  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
