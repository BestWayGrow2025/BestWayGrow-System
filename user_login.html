<!DOCTYPE html>
<html>
<head>
  <title>User Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="userId" placeholder="Enter User ID"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<script>
// =====================
// LOGIN FUNCTION
// =====================
function login() {
  let users = JSON.parse(localStorage.getItem("users") || "[]");

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    alert("Enter User ID and Password");
    return;
  }

  let user = users.find(u => u.userId === userId && u.password === password);

  if (!user) {
    alert("Invalid User ID or Password");
    return;
  }

  // Save session
  localStorage.setItem("loggedInUser", JSON.stringify(user));

  alert("Login successful");

  // =====================
  // ROLE BASED REDIRECT
  // =====================
  if (user.role === "super_admin") {
    window.location.href = "dashboard_super_admin.html";
  } 
  else if (user.role === "admin") {
    window.location.href = "dashboard_admin.html";
  } 
  else if (user.role === "franchisee") {
    window.location.href = "dashboard_franchisee.html";
  } 
  else {
    window.location.href = "dashboard_user.html";
  }
}
</script>

</body>
</html>
