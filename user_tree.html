<!DOCTYPE html>
<html>
<head>
  <title>User Tree</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f7f9;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .tree {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      overflow-x: auto;
    }

    .node-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 10px;
    }

    .node {
      border: 1px solid #333;
      padding: 10px;
      border-radius: 8px;
      background: #fff;
      min-width: 130px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .children {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .line {
      width: 2px;
      height: 20px;
      background: #333;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h2>MY TREE</h2>

  <div id="tree"></div>

  <script src="core_system.js"></script>
  <script src="session_manager.js"></script>
  <script src="tree_engine.js"></script>
  <script src="user_tree.js"></script>
</body>
</html>
