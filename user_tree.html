<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Tree</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f7f9;
      padding: 20px;
      margin: 0;
    }

    h2 {
      margin-bottom: 20px;
      color: #222;
    }

    #tree {
      width: 100%;
      overflow-x: auto;
      padding: 10px 0;
    }

    .tree {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      min-width: max-content;
    }

    .node-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 10px;
    }

    .node {
      border: 1px solid #333;
      padding: 10px;
      border-radius: 8px;
      background: #fff;
      min-width: 130px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-size: 14px;
    }

    .children {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 12px;
    }

    .line {
      width: 2px;
      height: 20px;
      background: #333;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h2>My Tree</h2>

  <div id="tree"></div>

  <!-- CORE -->
  <script src="core_system.js"></script>

  <!-- SESSION -->
  <script src="session_manager.js"></script>

  <!-- TREE ENGINE -->
  <script src="tree_engine.js"></script>

  <!-- PAGE JS -->
  <script src="user_tree.js"></script>
</body>
</html>
