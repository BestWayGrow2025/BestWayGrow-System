<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Tree</title>
  <link rel="stylesheet" href="user_tree.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f1c;
      color: #fff;
      text-align: center;
    }

    h2 {
      margin: 20px 0;
    }

    #tree {
      width: 100%;
      overflow-x: auto;
      padding: 20px;
    }
  </style>
</head>

<body>

  <h2>🌳 My Tree</h2>
  <div id="tree">Loading tree...</div>

  <!-- AUTO DEPENDENCY LOADER -->
  <script>
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error("Failed: " + src));
        document.head.appendChild(s);
      });
    }

    async function loadSystem() {
      try {
        // CORE LAYER
        await loadScript("core_system.js");
        await loadScript("session_manager.js");

        // TREE ENGINE (DATA LOGIC)
        await loadScript("tree_system.js");

        // UI LAYER
        await loadScript("user_tree.js");

        console.log("✅ All systems loaded successfully");
      } catch (err) {
        console.error("❌ Load error:", err);
        document.getElementById("tree").innerHTML =
          "<div style='color:red'>System failed to load</div>";
      }
    }

    loadSystem();
  </script>

</body>
</html>
