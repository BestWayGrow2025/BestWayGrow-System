<!DOCTYPE html>
<html>
<head>
  <title>User Tree</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .node {
      border: 1px solid #333;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      border-radius: 6px;
      background: #f5f5f5;
      min-width: 120px;
      text-align: center;
    }
    .children {
      margin-left: 20px;
    }
  </style>
</head>
<body>

<h2>MY TREE</h2>

<div id="tree"></div>

<script src="CORE_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInUser"));

if (!session) {
  alert("Login required");
  window.location.href = "user_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user) {
  alert("User not found");
  window.location.href = "user_login.html";
  throw new Error("STOP");
}

// ================= TREE RENDER =================
function createNode(u) {

  let div = document.createElement("div");
  div.className = "node";

  div.innerHTML = `
    <b>${u.userId}</b><br>
    ${u.username}<br>
    ${u.position || ""}
  `;

  let childrenDiv = document.createElement("div");
  childrenDiv.className = "children";

  let children = getChildren(u.userId);

  children.forEach(child => {
    childrenDiv.appendChild(createNode(child));
  });

  div.appendChild(childrenDiv);

  return div;
}

// ================= LOAD TREE =================
function loadTree() {
  let container = document.getElementById("tree");
  container.innerHTML = "";

  let root = createNode(user);
  container.appendChild(root);
}

loadTree();

</script>

</body>
</html>
