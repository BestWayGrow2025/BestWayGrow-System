<!DOCTYPE html>
<html>
<head>
  <title>User Tree</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .tree {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .node {
      border: 1px solid #333;
      padding: 10px;
      border-radius: 6px;
      background: #f5f5f5;
      min-width: 120px;
      text-align: center;
      margin: 10px;
    }

    .children {
      display: flex;
      justify-content: center;
    }

    .line {
      height: 20px;
      border-left: 2px solid #333;
      margin: auto;
    }
  </style>

</head>
<body>

<h2>MY TREE</h2>

<div id="tree"></div>

<script src="core_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInUser"));

if (!session) {
  alert("Login required");
  window.location.href = "user_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user) {
  alert("User not found");
  window.location.href = "user_login.html";
  throw new Error("STOP");
}

// ================= CREATE NODE =================
function createNode(u) {

  if (!u) return null;

  let wrapper = document.createElement("div");

  let div = document.createElement("div");
  div.className = "node";

  div.innerHTML = `
    <b>${u.userId}</b><br>
    ${u.username}<br>
    ${u.mobile || ""}
  `;

  wrapper.appendChild(div);

  let childrenContainer = document.createElement("div");
  childrenContainer.className = "children";

  let hasChild = false;

  // LEFT
  if (u.leftChild) {
    let leftUser = getUserById(u.leftChild);
    if (leftUser) {
      childrenContainer.appendChild(createNode(leftUser));
      hasChild = true;
    }
  }

  // RIGHT
  if (u.rightChild) {
    let rightUser = getUserById(u.rightChild);
    if (rightUser) {
      childrenContainer.appendChild(createNode(rightUser));
      hasChild = true;
    }
  }

  if (hasChild) {
    let line = document.createElement("div");
    line.className = "line";
    wrapper.appendChild(line);
    wrapper.appendChild(childrenContainer);
  }

  return wrapper;
}

// ================= LOAD TREE =================
function loadTree() {
  let container = document.getElementById("tree");
  container.innerHTML = "";

  let treeDiv = document.createElement("div");
  treeDiv.className = "tree";

  treeDiv.appendChild(createNode(user));

  container.appendChild(treeDiv);
}

loadTree();

</script>

</body>
</html>
