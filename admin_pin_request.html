<!DOCTYPE html>
<html>
<head>
  <title>Admin PIN Requests</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f7f9;
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    .actions {
      margin-bottom: 15px;
    }

    .actions button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    .pending { color: orange; }
    .completed { color: green; }
    .failed { color: red; }
    .rejected { color: gray; }
  </style>
</head>
<body>

<h2>📌 ADMIN PIN REQUEST PANEL</h2>

<div class="actions">
  <button id="refreshBtn">🔄 Refresh</button>
  <button id="logoutBtn">Logout</button>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>User</th>
      <th>Type</th>
      <th>Qty</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="requestTable"></tbody>
</table>

<script src="core_system.js"></script>
<script src="session_manager.js"></script>
<script src="admin_pin_request.js"></script>
