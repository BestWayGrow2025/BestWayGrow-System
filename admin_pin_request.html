<!DOCTYPE html>
<html>
<head>
  <title>Admin PIN Requests</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    button { padding: 6px 10px; cursor: pointer; margin: 2px; }
    .pending { color: orange; }
    .completed { color: green; }
    .failed { color: red; }
    .rejected { color: gray; }
  </style>
</head>
<body>

<h2>Admin PIN Request Panel</h2>

<button onclick="loadRequests()">🔄 Refresh</button>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>User</th>
      <th>Type</th>
      <th>Qty</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="requestTable"></tbody>
</table>

<!-- CORE -->
<script src="core_system.js"></script>

<!-- PIN SYSTEM -->
<script src="pin_request_system.js"></script>
<script src="pin_master_system.js"></script>

<script>

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {

  if (typeof initCoreSystem === "function") {
    initCoreSystem();
  }

  let session = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!session) {
    alert("Login required");
    window.location.href = "admin_login.html";
    return;
  }

  loadRequests();
});

// ================= LOAD =================
function loadRequests() {

  let table = document.getElementById("requestTable");
  table.innerHTML = "";

  let requests = [];

  try {
    if (typeof getPinRequests === "function") {
      requests = getPinRequests();
    }
  } catch (err) {
    console.error("Load error:", err);
    requests = [];
  }

  if (!requests.length) {
    table.innerHTML = "<tr><td colspan='7'>No Requests</td></tr>";
    return;
  }

  // ✅ LATEST FIRST
  requests.slice().reverse().forEach(r => {

    let statusClass = "";

    if (r.status === "PENDING") statusClass = "pending";
    if (r.status === "COMPLETED") statusClass = "completed";
    if (r.status === "FAILED") statusClass = "failed";
    if (r.status === "REJECTED") statusClass = "rejected";

    let actions = "-";

    if (r.status === "PENDING") {
      actions = `
        <button onclick="autoProcess('${r.requestId}')">AUTO</button>
        <button onclick="rejectReq('${r.requestId}')">REJECT</button>
      `;
    }

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${r.requestId}</td>
      <td>${r.userId}</td>
      <td>${r.type}</td>
      <td>${r.quantity || 1}</td>
      <td>₹${Number(r.amount || 0).toFixed(2)}</td>
      <td class="${statusClass}">${r.status}</td>
      <td>${actions}</td>
    `;

    table.appendChild(row);
  });
}

// ================= AUTO PROCESS =================
function autoProcess(id) {

  try {

    processPinRequestAuto(id);

    alert("✅ Auto processed");

    loadRequests();

  } catch (err) {

    console.error("Auto process error:", err);

    alert(err.message || "Processing failed");
  }
}

// ================= REJECT =================
function rejectReq(id) {

  if (!confirm("Reject this request?")) return;

  try {

    rejectPinRequest(id, "ADMIN");

    alert("❌ Request Rejected");

    loadRequests();

  } catch (err) {

    console.error("Reject error:", err);

    alert(err.message || "Reject failed");
  }
}

</script>

</body>
</html>
