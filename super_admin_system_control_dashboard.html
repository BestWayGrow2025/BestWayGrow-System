<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Controls</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .off {
      background: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

  <h2>⚡ SUPER ADMIN CONTROL PANEL</h2>

  <div class="box">
    <h3>System Toggles</h3>

  <p id="systemStatus"></p>

   <button id="backBtn">⬅ Back</button>
<button id="toggleWithdrawBtn">💸 Withdraw Stop</button>
<button id="toggleRegisterBtn">🧾 Registration</button>
  </div>

  <div class="box">

  <h3>Admin Management</h3>

  <table border="1" width="100%">

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
        <th>Type</th>
        <th>Tree</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="adminTable"></tbody>

   </table>

  </div>

  <div class="box">

    <h3>Danger Zone ⚠️</h3>

    <button
      id="clearLogsBtn"
      class="off">

      🧹 Clear All Logs

    </button>

  </div>

</body>
</html>
