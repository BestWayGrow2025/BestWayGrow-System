<!DOCTYPE html>
<html>
<head>
  <title>User Register</title>
</head>
<body>

<h2 id="introLabel">User Registration</h2>

<div id="formArea">
  <input type="text" id="username" placeholder="Name"><br><br>
  <input type="text" id="mobile" placeholder="Mobile"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <label>Sponsor ID:</label><br>
  <input type="text" id="sponsorId" placeholder="Enter Sponsor ID"><br><br>

  <label>Select Position:</label><br>
  <input type="radio" name="position" value="LEFT"> LEFT
  <input type="radio" name="position" value="RIGHT"> RIGHT
  <br><br>

  <button id="regBtn" onclick="handleRegister()">Register</button>
</div>

<p id="msg"></p>

<!-- ✅ CORE -->
<script src="CORE_system.js"></script>

<!-- ✅ QUEUE SYSTEM -->
<script src="queue_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= PARAM =================
let params = new URLSearchParams(window.location.search);
let introducerId = params.get("ref") || "BWG000001";

document.getElementById("introLabel").innerText =
  "Introducer: " + introducerId;


// ================= REGISTER =================
function handleRegister() {

  let btn = document.getElementById("regBtn");
  btn.disabled = true; // 🔒 prevent double click

  let username = document.getElementById("username").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let password = document.getElementById("password").value;
  let sponsorId = document.getElementById("sponsorId").value.trim();

  let positionElement = document.querySelector('input[name="position"]:checked');

  // ✅ VALIDATION
  if (!username || !mobile || !password) {
    alert("Fill all fields");
    btn.disabled = false;
    return;
  }

  if (!/^[0-9]{10}$/.test(mobile)) {
    alert("Invalid mobile number");
    btn.disabled = false;
    return;
  }

  if (!positionElement) {
    alert("Select LEFT or RIGHT");
    btn.disabled = false;
    return;
  }

  let position = positionElement.value;

  let users = getUsers();

  // ✅ INTRODUCER CHECK
  if (!isValidIntroducer(introducerId)) {
    alert("Invalid Introducer");
    btn.disabled = false;
    return;
  }

  // ✅ SPONSOR CHECK
  if (!sponsorId) {
    alert("Sponsor required");
    btn.disabled = false;
    return;
  }

  let sponsorExists = users.find(u => u.userId === sponsorId);
  if (!sponsorExists) {
    alert("Invalid Sponsor ID");
    btn.disabled = false;
    return;
  }

  // ✅ DUPLICATE MOBILE CHECK (IMPORTANT 🔥)
  let duplicate = users.find(u => u.mobile === mobile);
  if (duplicate) {
    alert("Mobile already registered");
    btn.disabled = false;
    return;
  }

  // 🔥 ADD TO QUEUE
  addToQueue({
    username,
    password,
    mobile,
    introducerId,
    sponsorId,
    position
  });

  // 🔥 PROCESS QUEUE (SAFE)
  processQueue();

  // ✅ SUCCESS MESSAGE
  document.getElementById("msg").innerText =
    "✅ Registration submitted. Processing...";

  // 🔓 enable again after delay
  setTimeout(() => {
    btn.disabled = false;
  }, 2000);
}

</script>

</body>
</html>
