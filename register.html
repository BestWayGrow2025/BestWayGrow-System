<!DOCTYPE html>
<html>
<head>
  <title>User Register</title>
</head>
<body>

<h2 id="introLabel">User Registration</h2>

<div id="formArea">
  <input type="text" id="username" placeholder="Name"><br><br>
  <input type="text" id="mobile" placeholder="Mobile"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <label>Select Position:</label><br>
  <input type="radio" name="position" value="LEFT"> LEFT
  <input type="radio" name="position" value="RIGHT"> RIGHT
  <br><br>

  <button onclick="handleRegister()">Register</button>
</div>

<p id="msg"></p>

<script>
// =====================
// URL PARAMS
// =====================
let params = new URLSearchParams(window.location.search);
let type = params.get("type");    
let userId = params.get("id");    
let introducerId = params.get("ref") || "BWG000000";

// =====================
// STORAGE HELPERS
// =====================
function getUsers() {
  let data = localStorage.getItem("users");
  if (!data) {
    localStorage.setItem("users", JSON.stringify([]));
    return [];
  }
  return JSON.parse(data);
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// =====================
// GENERATE USER ID
// =====================
function generateUserId() {
  let users = getUsers();
  let id;
  do {
    id = "BWG" + Math.floor(100000 + Math.random() * 900000);
  } while (users.find(u => u.userId === id));
  return id;
}

// =====================
// REGISTER USER
// =====================
function registerUser(username, mobile, password, introducerId, position) {
  let users = getUsers();

  let newUser = {
    userId: generateUserId(),
    name: username,
    mobile: mobile,
    password: password,
    role: "user",

    introducerId: introducerId,
    sponsorId: null,
    position: position,

    joinTime: new Date().toLocaleString(),

    wallet: 0,
    status: "inactive",
    isActive: false,

    kyc: "PENDING",
    upgrade: "NOT DONE"
  };

  users.push(newUser);
  saveUsers(users);

  placeInTree(newUser);

  return newUser;
}

// =====================
// TREE PLACEMENT (LEFT / RIGHT)
// =====================
function placeInTree(newUser) {
  let users = getUsers();
  let introducer = users.find(u => u.userId === newUser.introducerId);
  if (!introducer) return;

  let queue = [introducer];

  while (queue.length > 0) {
    let current = queue.shift();
    let children = users.filter(u => u.sponsorId === current.userId);

    let left = children.find(c => c.position === "LEFT");
    let right = children.find(c => c.position === "RIGHT");

    if (newUser.position === "LEFT") {
      if (!left) {
        newUser.sponsorId = current.userId;
        break;
      } else queue.push(left);
    }

    if (newUser.position === "RIGHT") {
      if (!right) {
        newUser.sponsorId = current.userId;
        break;
      } else queue.push(right);
    }
  }

  saveUsers(users);
}

// =====================
// UGLI UPGRADE LOGIC
// =====================
function payUGLIIncome(buyerId) {
  let users = getUsers();
  let buyer = users.find(u => u.userId === buyerId);
  if (!buyer) return;

  let current = buyer;
  let level = 1;

  while (current && current.introducerId && level <= 30) {
    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    parent.wallet = parent.wallet || 0;

    let income = (level === 1) ? 500 : 25;
    parent.wallet += income;

    current = parent;
    level++;
  }

  saveUsers(users);
}

// =====================
// UI INIT
// =====================
let formArea = document.getElementById("formArea");
let introLabel = document.getElementById("introLabel");

// Show introducer
if (introLabel) {
  introLabel.innerText = "Introducer: " + introducerId;
}

// Upgrade mode
if (type === "upgrade" && userId) {
  if (formArea) formArea.style.display = "none";
  introLabel.innerText = "UPGRADE MODE";

  payUGLIIncome(userId);

  alert("Upgrade Successful!");
}

// =====================
// FORM SUBMIT
// =====================
function handleRegister() {

  let username = document.getElementById("username").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let password = document.getElementById("password").value;

  let positionElement = document.querySelector('input[name="position"]:checked');

  if (!username || !mobile || !password) {
    alert("Fill all fields");
    return;
  }

  if (!positionElement) {
    alert("Select LEFT or RIGHT");
    return;
  }

  let position = positionElement.value;

  let user = registerUser(username, mobile, password, introducerId, position);

  alert("Registered! ID: " + user.userId);

  localStorage.setItem("loggedInUser", JSON.stringify(user));

  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
