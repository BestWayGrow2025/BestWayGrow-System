<script>
// =====================
// URL PARAMS
// =====================
let params = new URLSearchParams(window.location.search);
let type = params.get("type");   
let userId = params.get("id");   
let introducerId = params.get("ref") || "BWG000000";

// =====================
// USERS STORAGE
// =====================
function getUsers() {
  let data = localStorage.getItem("users");

  if (!data) {
    localStorage.setItem("users", JSON.stringify([]));
    return [];
  }

  try {
    return JSON.parse(data);
  } catch (e) {
    localStorage.setItem("users", JSON.stringify([]));
    return [];
  }
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// =====================
// WALLET INIT
// =====================
function initWallet(user) {
  user.wallet = user.wallet || 0;
}

// =====================
// GENERATE USER ID
// =====================
function generateUserId() {
  let users = getUsers();
  let id;
  do {
    id = "BWG" + Math.floor(100000 + Math.random() * 900000);
  } while (users.find(u => u.userId === id));
  return id;
}

// =====================
// REGISTER USER
// =====================
function registerUser(username, mobile, introducerId, position) {
  let users = getUsers();

  let newUser = {
    userId: generateUserId(),
    username: username,
    mobile: mobile,

    // IMPORTANT ROLE
    role: "user",

    // TREE
    introducerId: introducerId,
    sponsorId: null,
    position: position, // LEFT / RIGHT

    createdAt: new Date().toISOString(),

    wallet: 0,
    status: "inactive",
    isActive: false,

    package: {
      ugliCount: 0,
      rliCount: 0
    },

    franchiseeStatus: "none",
    trainingCompleted: false,
    pinLevel: 0
  };

  users.push(newUser);
  saveUsers(users);

  // Sponsor placement
  placeInSponsorTree(newUser);

  return newUser;
}

// =====================
// SPONSOR TREE PLACEMENT (BFS SPILLOVER)
// =====================
function placeInSponsorTree(newUser) {
  let users = getUsers();

  let introducer = users.find(u => u.userId === newUser.introducerId);
  if (!introducer) return;

  let queue = [introducer];

  while (queue.length > 0) {
    let current = queue.shift();

    let children = users.filter(u => u.sponsorId === current.userId);

    let leftChild = children.find(c => c.position === "LEFT");
    let rightChild = children.find(c => c.position === "RIGHT");

    if (newUser.position === "LEFT") {
      if (!leftChild) {
        newUser.sponsorId = current.userId;
        break;
      } else {
        queue.push(leftChild);
      }
    }

    if (newUser.position === "RIGHT") {
      if (!rightChild) {
        newUser.sponsorId = current.userId;
        break;
      } else {
        queue.push(rightChild);
      }
    }
  }

  saveUsers(users);
}

// =====================
// UGLI INCOME
// =====================
function payUGLIIncome(buyerId) {
  let users = getUsers();
  let buyer = users.find(u => u.userId === buyerId);
  if (!buyer) return;

  let current = buyer;
  let level = 1;

  while (current && current.introducerId && level <= 30) {
    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    initWallet(parent);

    let income = (level === 1) ? 500 : 25;
    parent.wallet += income;

    current = parent;
    level++;
  }

  saveUsers(users);
}

// =====================
// HANDLE UPGRADE MODE
// =====================
if (type === "upgrade" && userId) {
  document.getElementById("formArea").style.display = "none";
  document.getElementById("introId").innerText = "UPGRADE MODE";

  payUGLIIncome(userId);

  alert("Upgrade Successful!");
}

// =====================
// SHOW INTRODUCER
// =====================
document.getElementById("introId").innerText = introducerId;

// =====================
// FORM SUBMIT
// =====================
function handleRegister() {
  let username = document.getElementById("username").value;
  let mobile = document.getElementById("mobile").value;
  let position = document.querySelector('input[name="position"]:checked').value;

  if (!username || !mobile) {
    alert("Fill all fields");
    return;
  }

  let user = registerUser(username, mobile, introducerId, position);

  alert("Registered! ID: " + user.userId);

  localStorage.setItem("loggedInUser", JSON.stringify(user));

  // IMPORTANT: redirect will later depend on role
  window.location.href = "dashboard_user.html";
}

// =====================
// DEBUG
// =====================
if (type === "upgrade" && userId) {
  console.log("Upgrade mode active for:", userId);
}
</script>
