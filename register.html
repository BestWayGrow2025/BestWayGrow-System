<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>

<h2>Register Page</h2>

<p>Introducer ID: <span id="introId"></span></p>

<input type="text" id="username" placeholder="Enter Name" required>
<br><br>

<input type="text" id="mobile" placeholder="Enter Mobile" required>
<br><br>

<label>Select Position:</label><br>
<input type="radio" name="position" value="LEFT" checked> LEFT
<input type="radio" name="position" value="RIGHT"> RIGHT
<br><br>

<button onclick="handleRegister()">Register</button>

<script>
// Get introducer from URL
let params = new URLSearchParams(window.location.search);
let introducerId = params.get("ref") || "BWG000000";
document.getElementById("introId").innerText = introducerId;

// Load users
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// Save users
function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// Generate unique user ID
function generateUserId() {
  let users = getUsers();
  let id;
  do {
    id = "BWG" + Math.floor(100000 + Math.random() * 900000);
  } while (users.find(u => u.userId === id));
  return id;
}

// ✅ Find bottom-most placement
function findBottomPosition(users, introducerId, position) {
  let queue = [introducerId];
  let lastFound = introducerId;

  while (queue.length > 0) {
    let currentId = queue.shift();

    let children = users.filter(u => 
      u.introducerId === currentId && u.position === position
    );

    if (children.length === 0) {
      lastFound = currentId;
      break;
    }

    children.forEach(child => queue.push(child.userId));
  }

  return lastFound;
}

// Register user
function registerUser(username, mobile, introducerId, position) {
  let users = getUsers();

  // Find sponsor (bottom placement)
  let sponsorId = findBottomPosition(users, introducerId, position);

  let newUser = {
    userId: generateUserId(),
    username: username,
    mobile: mobile,
    introducerId: introducerId,
    sponsorId: sponsorId,
    position: position,
    createdAt: new Date().toISOString()
  };

  users.push(newUser);
  saveUsers(users);

  alert("Registered Successfully! Your ID: " + newUser.userId);

  return newUser;
}

// Handle button click
function handleRegister() {
  let username = document.getElementById("username").value;
  let mobile = document.getElementById("mobile").value;
  let position = document.querySelector('input[name="position"]:checked').value;

  if (!username || !mobile || !position) {
    alert("Please fill all fields");
    return;
  }

  let user = registerUser(username, mobile, introducerId, position);

  // Auto login after registration
  localStorage.setItem("loggedInUser", JSON.stringify(user));

  window.location.href = "login.html";
}
</script>

</body>
</html>
