<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>

<h2>Register Page</h2>

<p>Introducer ID: <span id="introId"></span></p>

<input type="text" id="username" placeholder="Enter Name"><br><br>
<input type="text" id="mobile" placeholder="Enter Mobile"><br><br>

<label>Select Position:</label><br>
<input type="radio" name="position" value="LEFT" checked> LEFT
<input type="radio" name="position" value="RIGHT"> RIGHT

<br><br>

<button onclick="handleRegister()">Register</button>

<script>

// =====================
// GET INTRODUCER FROM URL
// =====================
let params = new URLSearchParams(window.location.search);
let introducerId = params.get("ref") || "BWG000000";

document.getElementById("introId").innerText = introducerId;

// =====================
// USERS STORAGE
// =====================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// =====================
// GENERATE USER ID
// =====================
function generateUserId() {
  let users = getUsers();
  let id;

  do {
    id = "BWG" + Math.floor(100000 + Math.random() * 900000);
  } while (users.find(u => u.userId === id));

  return id;
}

// =====================
// WALLET INIT
// =====================
function initWallet(user) {
  user.wallet = user.wallet || 0;
}

// =====================
// UGLI INCOME FUNCTION
// =====================
function payUGLIIncome(buyerId) {

  let users = getUsers();
  let buyer = users.find(u => u.userId === buyerId);
  if (!buyer) return;

  let current = buyer;
  let level = 1;

  while (current && current.introducerId && level <= 30) {

    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    initWallet(parent);

    let income = (level === 1) ? 500 : 25;

    parent.wallet += income;

    current = parent;
    level++;
  }

  saveUsers(users);
}

// =====================
// REGISTER USER
// =====================
function registerUser(username, mobile, introducerId, position) {

  let users = getUsers();

  let newUser = {
    userId: generateUserId(),
    username: username,
    mobile: mobile,
    introducerId: introducerId,
    position: position,
    createdAt: new Date().toISOString(),
    wallet: 0
  };

  users.push(newUser);
  saveUsers(users);

  return newUser;
}

// =====================
// HANDLE REGISTER
// =====================
function handleRegister() {

  let username = document.getElementById("username").value;
  let mobile = document.getElementById("mobile").value;
  let position = document.querySelector('input[name="position"]:checked').value;

  if (!username || !mobile) {
    alert("Fill all fields");
    return;
  }

  let user = registerUser(username, mobile, introducerId, position);

  // 🔥 CHECK UGLI
  let type = params.get("type");

  if (type === "upgrade") {
    payUGLIIncome(user.userId);
  }

  alert("Registered! ID: " + user.userId);

  localStorage.setItem("loggedInUser", JSON.stringify(user));

  window.location.href = "login.html";
}

</script>

</body>
</html>
