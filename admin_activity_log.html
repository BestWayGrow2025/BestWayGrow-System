<!DOCTYPE html>
<html>
<head>
  <title>Admin - Activity Logs</title>

  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }

    .box { border: 1px solid #ccc; padding: 15px; margin-top: 15px; }

    input, select {
      padding: 6px;
      margin: 5px;
    }

    button {
      padding: 6px 12px;
      margin: 5px;
      cursor: pointer;
    }

    .log {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .admin { color: green; }
    .system { color: blue; }
    .error { color: red; }
  </style>
</head>
<body>

<h2>📜 ADMIN ACTIVITY LOGS</h2>

<button onclick="goBack()">⬅ Back</button>
<button onclick="loadLogs()">🔄 Refresh</button>

<!-- 🔍 FILTER -->
<div class="box">
  <h3>Filter</h3>

  <input id="filterUser" placeholder="User ID">

  <select id="filterRole">
    <option value="">All Roles</option>
    <option value="ADMIN">Admin</option>
    <option value="SYSTEM">System</option>
    <option value="USER">User</option>
  </select>

  <input id="filterKeyword" placeholder="Search action">

  <button onclick="applyFilter()">Apply</button>
  <button onclick="clearLogs()">Clear Logs</button>
</div>

<!-- 📜 LOGS -->
<div class="box">
  <div id="logs"></div>
</div>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// 🔐 SECURITY
let admin = protectPage({
  role: "admin",
  department: "report"
});

if (!admin) {
  throw new Error("Access Blocked");
}


// ================= NAV =================
function goBack() {
  window.location.href = "admin_dashboard.html";
}


// ================= COLOR =================
function getRoleClass(role) {
  if (role === "ADMIN") return "admin";
  if (role === "SYSTEM") return "system";
  return "";
}


// ================= LOAD =================
function loadLogs(customLogs = null) {

  let logs = customLogs || getActivityLogs();
  let container = document.getElementById("logs");

  if (!logs.length) {
    container.innerHTML = "No activity logs found";
    return;
  }

  let html = "";

  logs.slice().reverse().forEach(l => {

    let roleClass = getRoleClass(l.role);

    html += `
      <div class="log ${roleClass}">
        <b>${l.role}</b> (${l.userId}) → ${l.action} <br>
        <small>${l.time ? new Date(l.time).toLocaleString() : "-"}</small>
      </div>
    `;
  });

  container.innerHTML = html;

  // 📜 VIEW LOG
  if (typeof logActivity === "function") {
    logActivity(admin.userId, "ADMIN", "Viewed activity logs");
  }
}


// ================= FILTER =================
function applyFilter() {

  let userId = document.getElementById("filterUser").value.trim();
  let role = document.getElementById("filterRole").value;
  let keyword = document.getElementById("filterKeyword").value.trim();

  let logs = filterLogsAdvanced({
    userId,
    role,
    keyword
  });

  loadLogs(logs);
}


// ================= CLEAR =================
function clearLogs() {

  if (!confirm("Delete all activity logs?")) return;

  clearActivityLogs();
  loadLogs();

  alert("Logs cleared");
}


// ================= INIT =================
loadLogs();

</script>

</body>
</html>
