<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: #f4f7f9;
      text-align: center;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      background: #0077b5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }

    .danger {
      background: #d9534f;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <h2>🔥 ADMIN CONTROL PANEL (V6++++ FINAL)</h2>
  <p id="welcome"></p>
  <button class="danger" onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>Profile</h3>
    <p id="profile"></p>
  </div>

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>
    <p id="system"></p>

    <button onclick="toggleSystem('registrationOpen')">Register</button>
    <button onclick="toggleSystem('upgradesOpen')">Upgrade</button>
    <button onclick="toggleSystem('repurchaseOpen')">Repurchase</button>
  </div>

  <!-- COUNTS -->
  <div class="card">
    <h3>Overview</h3>

    <div>Total Users <div class="stat" id="totalUsers">0</div></div>
    <div>Active Users <div class="stat" id="activeUsers">0</div></div>
  </div>

  <!-- PIN CONTROL (FIXED LINKS) -->
  <div class="card">
    <h3>PIN Control</h3>

    <button onclick="goTo('admin_pin_request.html')">Request PIN</button>
    <button onclick="goTo('admin_pin_panel.html')">Create PIN</button>
  </div>

  <!-- USER CONTROL (FIXED LINKS) -->
  <div class="card">
    <h3>User Control</h3>

    <button onclick="goTo('admin_franchise_requests.html')">Franchise Requests</button>
    <button onclick="goTo('admin_kyc.html')">KYC Verification</button>
  </div>

  <!-- QUICK VIEW -->
  <div class="card">
    <h3>Quick View</h3>

    <button onclick="showData('user')">Users</button>
    <button onclick="showData('franchise')">Franchise</button>

    <div id="dataPanel">Click to view</div>
  </div>

</div>

<!-- CORE -->
<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// SECURITY
let admin = protectPage({ role: "admin" });
if (!admin) throw new Error("STOP");

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// PROFILE
document.getElementById("profile").innerHTML = `
  ID: ${admin.userId} <br>
  Name: ${admin.username || admin.userId} <br>
  Status: ${admin.status}
`;

// SYSTEM STATUS
function loadSystem() {
  let s = getSystemSettings() || {};

  document.getElementById("system").innerHTML = `
    Register: ${s.registrationOpen !== false ? "🟢" : "🔴"} <br>
    Upgrade: ${s.upgradesOpen !== false ? "🟢" : "🔴"} <br>
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"}
  `;
}

// TOGGLE (SECURE)
function toggleSystem(key) {

  let allowed = ["registrationOpen","upgradesOpen","repurchaseOpen"];

  if (!allowed.includes(key)) {
    alert("Not allowed");
    return;
  }

  let s = getSystemSettings() || {};
  s[key] = !s[key];

  localStorage.setItem("systemSettings", JSON.stringify(s));

  if (typeof logActivity === "function") {
    logActivity(admin.userId, "TOGGLE_" + key);
  }

  loadSystem();
}

// COUNTS
function loadCounts() {

  let users = getUsers() || [];

  document.getElementById("totalUsers").innerText =
    users.filter(u => u.role === "user").length;

  document.getElementById("activeUsers").innerText =
    users.filter(u => u.status === "active").length;
}

// QUICK VIEW
function showData(role) {

  let users = (getUsers() || []).filter(u => u.role === role);

  if (!users.length) {
    document.getElementById("dataPanel").innerHTML = "No Data";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username || u.userId}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("dataPanel").innerHTML = html;
}

// NAV
function goTo(page) {
  window.location.href = page;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

// AUTO REFRESH
setInterval(() => {
  loadSystem();
  loadCounts();
}, 3000);

// INIT
loadSystem();
loadCounts();

</script>

</body>
</html>
