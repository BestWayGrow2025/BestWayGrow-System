<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard V8 FINAL</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family:'Segoe UI', Arial;
      margin:0;
      background:linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background:linear-gradient(135deg,#000,#434343);
      color:#fff;
      padding:18px;
      text-align:center;
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .menu button {
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg,#007bff,#00c6ff);
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }

    .menu button.active {
      background:linear-gradient(135deg,#003f88,#0059b3);
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      max-width:1000px;
      margin:auto;
      box-shadow:0 3px 12px rgba(0,0,0,0.08);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      margin-top:15px;
    }

    .miniCard {
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:15px;
      text-align:center;
    }

    .miniCard h4 {
      margin:0 0 8px;
      font-size:14px;
      color:#555;
    }

    .miniCard p {
      margin:0;
      font-size:18px;
      font-weight:bold;
      color:#111;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:13px;
    }

    th, td {
      border:1px solid #eee;
      padding:10px;
      text-align:center;
    }

    th {
      background:#f1f4f8;
    }

    .on {
      background:#28a745;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
      margin-right:5px;
    }

    .off {
      background:#dc3545;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
    }

    .warn {
      color:#dc3545;
      font-weight:bold;
    }

    .good {
      color:#28a745;
      font-weight:bold;
    }
  </style>
</head>
<body>

<header>
  <h2>👨‍💼 ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="safeClick(this,loadHome)">Home</button>
  <button onclick="safeClick(this,loadUsers)">Users</button>
  <button onclick="safeClick(this,loadPinsUI)">PIN</button>
  <button onclick="safeClick(this,loadWallet)">Wallet</button>
  <button onclick="safeClick(this,loadIncome)">Income</button>
  <button onclick="safeClick(this,loadSystem)">System</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<!-- CORE -->
<script src="core_system.js"></script>
<script src="activity_log.js"></script>
<script src="wallet_system.js"></script>
<script src="session_manager.js"></script>
<script src="registration_queue.js"></script>
<script src="system_config.js"></script>
<script src="trigger_system.js"></script>
<script src="hold_income_system.js"></script>
<script src="income_control_system.js"></script>
<script src="income_log_system.js"></script>
<script src="income_engine.js"></script>
<script src="pin_master_system.js"></script>
<script src="pin_request_system.js"></script>
  
<script>
// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("core_system.js missing");
  throw new Error("STOP");
}

// ================= AUTH =================
let adminSession = JSON.parse(
  localStorage.getItem("loggedInAdmin")
);

if (!adminSession || !adminSession.userId) {
  alert("Login Required");
  window.location.href = "admin_login.html";
  throw new Error("STOP");
}

// ================= ADMIN USER =================
let adminUser = null;

if (typeof getUserById === "function") {
  adminUser = getUserById(adminSession.userId);
}

if (!adminUser) {
  alert("Admin not found");
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
  throw new Error("STOP");
}

// ================= STATUS CHECK =================
if (
  (adminUser.accountStatus || adminUser.status || "active") !== "active"
) {
  alert("Admin inactive");
  logout();
  throw new Error("STOP");
}

// ================= ROLE CHECK =================
if (adminUser.role !== "admin") {
  alert("Access Denied");
  logout();
  throw new Error("STOP");
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + (adminUser.username || adminUser.userId) +
  " (" + adminUser.userId + ")";

// ================= BUTTON LOCK =================
let clickLock = false;

function safeClick(btn, fn) {
  if (clickLock) return;

  clickLock = true;

  document.querySelectorAll(".menu button").forEach(b => {
    b.classList.remove("active");
  });

  btn.classList.add("active");

  try {
    fn();
  } catch (err) {
    console.error(err);
    document.getElementById("mainContent").innerHTML =
      `<p class="warn">Section failed to load</p>`;
  }

  setTimeout(() => {
    clickLock = false;
  }, 300);
}

// ================= HOME =================
function loadHome() {

  let users = (typeof getUsers === "function") ? getUsers() : [];
  let allUsers = users.filter(u => u.role === "user");
 let activeUsers = allUsers.filter(u => u.accountStatus === "active");
let blockedUsers = allUsers.filter(u => u.accountStatus !== "active");

  let totalWallet = users.reduce((sum, u) => {
    return sum + Number(u.walletBalance || 0);
  }, 0);

  document.getElementById("mainContent").innerHTML = `
    <h3>Dashboard Overview</h3>

    <div class="grid">
      <div class="miniCard">
        <h4>Total Users</h4>
        <p>${allUsers.length}</p>
      </div>

      <div class="miniCard">
        <h4>Active Users</h4>
        <p>${activeUsers.length}</p>
      </div>

      <div class="miniCard">
        <h4>Blocked Users</h4>
        <p>${blockedUsers.length}</p>
      </div>

      <div class="miniCard">
        <h4>Total Wallet</h4>
        <p>₹${totalWallet.toFixed(2)}</p>
      </div>
    </div>

    <br>

    <p><b>Name:</b> ${adminUser.username || "Admin"}</p>
    <p><b>User ID:</b> ${adminUser.userId}</p>
    <p><b>Role:</b> ${adminUser.role}</p>
    <p><b>Status:</b> ${adminUser.accountStatus || "active"}</p>
  `;
}

// ================= USERS =================
let currentPage = 1;
let perPage = 10;
let userSortType = "";

function loadUsers() {
  let html = `
    <h3>User List</h3>

    <input
      type="text"
      id="userSearch"
      placeholder="Search User ID / Name"
      onkeyup="filterUsers()"
      style="
        padding:10px;
        width:100%;
        margin-bottom:10px;
        border:1px solid #ddd;
        border-radius:8px;
      "
    >

    <table>
      <tr>
        <th>User ID</th>
        <th>Name</th>
        <th onclick="sortUsers('wallet')" style="cursor:pointer;">
          Wallet ⬍
        </th>
        <th onclick="sortUsers('status')" style="cursor:pointer;">
          Status ⬍
        </th>
      </tr>

      <tbody id="userTableBody"></tbody>
    </table>

    <div id="pagination" style="margin-top:15px;text-align:center;"></div>
  `;

  document.getElementById("mainContent").innerHTML = html;

  renderUsers(1);
}

function renderUsers(page = 1) {
  currentPage = page;

  let users = (typeof getUsers === "function") ? getUsers() : [];
  users = users.filter(u => u.role === "user");

  if (userSortType === "wallet") {
    users.sort((a, b) => {
      return Number(b.walletBalance || 0) - Number(a.walletBalance || 0);
    });
  }

  if (userSortType === "status") {
    users.sort((a, b) => {
      let statusA = (a.accountStatus || "").toLowerCase();
      let statusB = (b.accountStatus || "").toLowerCase();
      return statusA.localeCompare(statusB);
    });
  }

  let input = "";
  let searchBox = document.getElementById("userSearch");

  if (searchBox) {
    input = searchBox.value.toLowerCase();

    users = users.filter(u => {
      let userId = (u.userId || "").toLowerCase();
      let name = (u.fullName || u.username || "").toLowerCase();

      return userId.includes(input) || name.includes(input);
    });
  }

  let start = (page - 1) * perPage;
  let end = start + perPage;
  let paginatedUsers = users.slice(start, end);

  let rows = "";

  if (!paginatedUsers.length) {
    rows = `
      <tr>
        <td colspan="4">No Users Found</td>
      </tr>
    `;
  } else {
    paginatedUsers.forEach(u => {
      rows += `
        <tr>
          <td>${u.userId || "-"}</td>
          <td>${u.fullName || u.username || "-"}</td>
          <td>₹${Number(u.walletBalance || 0).toFixed(2)}</td>
          <td>${u.accountStatus || "active"}</td>
        </tr>
      `;
    });
  }

  document.getElementById("userTableBody").innerHTML = rows;

  let totalPages = Math.ceil(users.length / perPage);
  let pageHtml = "";

  for (let i = 1; i <= totalPages; i++) {
    pageHtml += `
      <button
        onclick="renderUsers(${i})"
        style="
          margin:3px;
          padding:6px 10px;
          border:none;
          border-radius:6px;
          background:${i === page ? '#007bff' : '#ddd'};
          color:${i === page ? '#fff' : '#000'};
          cursor:pointer;
        "
      >
        ${i}
      </button>
    `;
  }

  document.getElementById("pagination").innerHTML = pageHtml;
}

function filterUsers() {
  renderUsers(1);
}

function sortUsers(type) {
  userSortType = type;
  renderUsers(1);
}                       
// ================= PIN =================
function loadPinsUI() {
  let pins = (typeof loadPins === "function") ? loadPins() : [];

  let html = `
    <h3>PIN Control</h3>

    <input
      type="text"
      id="pinSearch"
      placeholder="Search PIN ID / Type"
      onkeyup="filterPins()"
      style="
        padding:10px;
        width:100%;
        margin-bottom:10px;
        border:1px solid #ddd;
        border-radius:8px;
      "
    >

    <table>
      <tr>
        <th>PIN ID</th>
        <th>Type</th>
        <th>Status</th>
      </tr>

      <tbody id="pinTableBody"></tbody>
    </table>
  `;

  document.getElementById("mainContent").innerHTML = html;

  renderPins();
}

function renderPins() {
  let pins = (typeof loadPins === "function") ? loadPins() : [];

  let input = "";
  let searchBox = document.getElementById("pinSearch");

  if (searchBox) {
    input = searchBox.value.toLowerCase();

    pins = pins.filter(p => {
      let pinId = (p.pinId || "").toLowerCase();
      let type = (p.type || "").toLowerCase();

      return pinId.includes(input) || type.includes(input);
    });
  }

  let rows = "";

  if (!pins.length) {
    rows = `
      <tr>
        <td colspan="3">No PIN Available</td>
      </tr>
    `;
  } else {
    pins.slice(-50).reverse().forEach(p => {
      rows += `
        <tr>
          <td>${p.pinId || "-"}</td>
          <td>${p.type || "-"}</td>
          <td>${p.status || "-"}</td>
        </tr>
      `;
    });
  }

  document.getElementById("pinTableBody").innerHTML = rows;
}

function filterPins() {
  renderPins();
}

// ================= WALLET =================
function loadWallet() {
  let users = (typeof getUsers === "function") ? getUsers() : [];
  users = users.filter(u => u.role === "user");

  let totalBalance = 0;
  let totalCredit = 0;
  let totalDebit = 0;
  let totalHoldIncome = 0;

  users.forEach(u => {
    totalBalance += Number(u.walletBalance || 0);
    totalCredit += Number(u.totalCredit || 0);
    totalDebit += Number(u.totalDebit || 0);
    totalHoldIncome += Number(u.holdIncome || 0);
  });

  let html = `
    <h3>Wallet Overview</h3>

    <div class="grid">
      <div class="miniCard">
        <h4>Total Balance</h4>
        <p>₹${totalBalance.toFixed(2)}</p>
      </div>

      <div class="miniCard">
        <h4>Total Credit</h4>
        <p>₹${totalCredit.toFixed(2)}</p>
      </div>

      <div class="miniCard">
        <h4>Total Debit</h4>
        <p>₹${totalDebit.toFixed(2)}</p>
      </div>

      <div class="miniCard">
        <h4>Total Hold Income</h4>
        <p>₹${totalHoldIncome.toFixed(2)}</p>
      </div>
    </div>

    <br>

    <table>
      <tr>
        <th>User ID</th>
        <th>Wallet</th>
        <th>Total Credit</th>
        <th>Total Debit</th>
        <th>Hold Income</th>
      </tr>
  `;

  if (!users.length) {
    html += `
      <tr>
        <td colspan="5">No Users Found</td>
      </tr>
    `;
  } else {
    users.forEach(u => {
      html += `
        <tr>
          <td>${u.userId || "-"}</td>
          <td>₹${Number(u.walletBalance || 0).toFixed(2)}</td>
          <td>₹${Number(u.totalCredit || 0).toFixed(2)}</td>
          <td>₹${Number(u.totalDebit || 0).toFixed(2)}</td>
          <td>₹${Number(u.holdIncome || 0).toFixed(2)}</td>
        </tr>
      `;
    });
  }

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= INCOME =================
function loadIncome() {
  let logs = (typeof getIncomeLogs === "function") ? getIncomeLogs() : [];
  let incomeSettings = (typeof getIncomeSettings === "function")
    ? getIncomeSettings()
    : {};

  let html = `
    <h3>Income Logs</h3>

    <div class="grid">
      <div class="miniCard">
        <h4>Master Income</h4>
        <p>${incomeSettings.incomeEnabled ? "ON" : "OFF"}</p>
      </div>

      <div class="miniCard">
        <h4>UGLI</h4>
        <p>${incomeSettings.ugli ? "ON" : "OFF"}</p>
      </div>

      <div class="miniCard">
        <h4>RLI</h4>
        <p>${incomeSettings.rli ? "ON" : "OFF"}</p>
      </div>

      <div class="miniCard">
        <h4>Binary</h4>
        <p>${incomeSettings.binary ? "ON" : "OFF"}</p>
      </div>
    </div>

    <br>

    <input
      type="text"
      id="incomeSearch"
      placeholder="Search User ID / Income Type"
      onkeyup="filterIncomeLogs()"
      style="
        padding:10px;
        width:100%;
        margin-bottom:10px;
        border:1px solid #ddd;
        border-radius:8px;
      "
    >

    <table>
      <tr>
        <th>User ID</th>
        <th>Amount</th>
        <th>Type</th>
      </tr>

      <tbody id="incomeTableBody"></tbody>
    </table>
  `;

  document.getElementById("mainContent").innerHTML = html;

  renderIncomeLogs();
}

function renderIncomeLogs() {
  let logs = (typeof getIncomeLogs === "function") ? getIncomeLogs() : [];

  let input = "";
  let searchBox = document.getElementById("incomeSearch");

  if (searchBox) {
    input = searchBox.value.toLowerCase();

    logs = logs.filter(l => {
      let userId = (l.userId || "").toLowerCase();
      let type = (l.type || "").toLowerCase();

      return userId.includes(input) || type.includes(input);
    });
  }

  let rows = "";

  if (!logs.length) {
    rows = `
      <tr>
        <td colspan="3">No Income Logs</td>
      </tr>
    `;
  } else {
    logs.slice(-50).reverse().forEach(l => {
      rows += `
        <tr>
          <td>${l.userId || "-"}</td>
          <td>₹${Number(l.amount || 0).toFixed(2)}</td>
          <td>${l.type || "-"}</td>
        </tr>
      `;
    });
  }

  document.getElementById("incomeTableBody").innerHTML = rows;
}

function filterIncomeLogs() {
  renderIncomeLogs();
}

// ================= SYSTEM =================
function loadSystem() {

  let s = (typeof getSystemSettings === "function")
    ? getSystemSettings()
    : {};

  let requests = (typeof getPinRequests === "function")
    ? getPinRequests()
    : [];

  let regQueue = (typeof getRegQueue === "function")
    ? getRegQueue()
    : [];

  let pendingPins = requests.filter(r => r.status === "PENDING").length;
  let completedPins = requests.filter(r => r.status === "COMPLETED").length;
  let failedPins = requests.filter(r => r.status === "FAILED").length;

  let pendingReg = regQueue.filter(r => r.status === "PENDING").length;
  let doneReg = regQueue.filter(r => r.status === "DONE").length;
  let failedReg = regQueue.filter(r => r.status === "FAILED").length;

  let html = `
    <h3>System Control</h3>

    <div class="grid">
      <div class="miniCard"><h4>Registration</h4><p>${s.registrationOpen ? "ON" : "OFF"}</p></div>
      <div class="miniCard"><h4>Upgrade</h4><p>${s.upgradesOpen ? "ON" : "OFF"}</p></div>
      <div class="miniCard"><h4>Repurchase</h4><p>${s.repurchaseOpen ? "ON" : "OFF"}</p></div>
      <div class="miniCard"><h4>Withdraw</h4><p>${s.withdrawOpen ? "ON" : "OFF"}</p></div>
      <div class="miniCard"><h4>Admin Access</h4><p>${s.adminAccess ? "ON" : "OFF"}</p></div>
      <div class="miniCard"><h4>Lock Mode</h4><p>${s.lockMode ? "ON" : "OFF"}</p></div>
    </div>

    <hr>

    <h3>PIN Queue</h3>
    <p>Status: ${s.pinQueue?.enabled ? "🟢 RUNNING" : "🔴 STOPPED"}</p>
  `;

  // ✅ FIXED: only admin can control queue
  if (adminUser.role === "admin") {
    html += `
      <button class="on" onclick="toggleQueue(true)">ON</button>
      <button class="off" onclick="toggleQueue(false)">OFF</button>
    `;
  }

  html += `
    <hr>

    <h3>PIN Request Stats</h3>
    <div class="grid">
      <div class="miniCard"><h4>Pending</h4><p>${pendingPins}</p></div>
      <div class="miniCard"><h4>Completed</h4><p>${completedPins}</p></div>
      <div class="miniCard"><h4>Failed</h4><p>${failedPins}</p></div>
    </div>

    <hr>

    <h3>Registration Queue Stats</h3>
    <div class="grid">
      <div class="miniCard"><h4>Pending</h4><p>${pendingReg}</p></div>
      <div class="miniCard"><h4>Done</h4><p>${doneReg}</p></div>
      <div class="miniCard"><h4>Failed</h4><p>${failedReg}</p></div>
    </div>
  `;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= SAVE SETTINGS SAFE =================
function saveSystemSettingsSafe(settings) {
  if (typeof safeSet === "function") {
    safeSet("systemSettings", settings);
  } else {
    localStorage.setItem("systemSettings", JSON.stringify(settings));
  }
}

// ================= TOGGLE QUEUE =================
function toggleQueue(val) {
  if (queueBtnLock) return;

  queueBtnLock = true;

  let s = getSystemSettings() || {};

  if (!s.pinQueue) {
    s.pinQueue = {};
  }

  s.pinQueue.enabled = val;

  saveSystemSettingsSafe(s);

  setTimeout(() => {
    queueBtnLock = false;
    loadSystem();
  }, 300);
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "admin_login.html";
}

// ================= DEFAULT =================
document.querySelector(".menu button").classList.add("active");
loadHome();
  
// ================= AUTO REFRESH SYSTEM =================
setInterval(() => {
  let currentBtn = document.querySelector(".menu button.active");

  if (currentBtn && currentBtn.innerText === "System") {
    loadSystem();
  }

  if (currentBtn && currentBtn.innerText === "Users") {
    renderUsers(currentPage);
  }

  if (currentBtn && currentBtn.innerText === "PIN") {
    renderPins();
  }

  if (currentBtn && currentBtn.innerText === "Income") {
    renderIncomeLogs();
  }
}, 5000);

// ================= SAFE ERROR LOG =================
window.addEventListener("error", function(e) {
  console.error("Dashboard Error:", e.message);
});

// ================= FINAL SAFE STARTUP CHECK =================
window.addEventListener("load", function() {
  console.log("Admin Dashboard Loaded Successfully");
});

</script>

</body>
</html>
