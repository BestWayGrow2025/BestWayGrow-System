<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: #f4f7f9;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      padding: 8px 15px;
      margin-top: 10px;
      border: none;
      background: #0077b5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }

    footer {
      background: #222;
      color: white;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>Admin Profile</h3>
    <p id="profile"></p>
  </div>

  <!-- SYSTEM -->
  <div class="card">
    <h3>System Status</h3>
    <p id="system"></p>
  </div>

  <!-- 🔥 INCOME STATUS -->
  <div class="card">
    <h3>Income System</h3>
    <p id="incomeStatus"></p>
  </div>

  <!-- 📊 LIVE STATS (NEW 🔥🔥🔥) -->
  <div class="card">
    <h3>📊 Live Stats</h3>
    <div>Total Users <div class="stat" id="totalUsers">0</div></div>
    <div>Active Users <div class="stat" id="activeUsers">0</div></div>
    <div>Total Withdraw <div class="stat" id="totalWithdraw">₹0</div></div>
    <div>Pending Withdraw <div class="stat" id="pendingWithdraw">0</div></div>
  </div>

  <!-- 💰 FINANCE -->
  <div class="card" id="financeCard">
    <h3>Finance Panel</h3>
    <button onclick="goTo('admin_withdrawals.html')">Withdrawals</button>
  </div>

  <!-- 🎟️ PIN -->
  <div class="card" id="pinCard">
    <h3>PIN Management</h3>
    <button onclick="goTo('admin_pin_panel.html')">Open PIN Panel</button>
  </div>

  <!-- 📊 INCOME -->
  <div class="card" id="incomeCard">
    <h3>Income</h3>
    <button onclick="goTo('admin_income_control.html')">Control</button>
    <button onclick="goTo('admin_income_logs.html')">Logs</button>
  </div>

  <!-- 📜 ACTIVITY LOG (NEW 🔥) -->
  <div class="card">
    <h3>Activity Logs</h3>
    <button onclick="goTo('admin_activity_log.html')">View Logs</button>
  </div>

</div>

<footer>
  © 2026 BestWayGrow
</footer>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="income_control_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
initCoreSystem();
initIncomeControl();

// ================= SECURITY =================
let admin = protectPage({ role: "admin" });
if (!admin) return;

// ================= SETTINGS =================
let s = getSystemSettings();

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  ID: ${admin.userId} <br>
  Name: ${admin.username} <br>
  Type: ${admin.type || "A"} <br>
  Status: ${admin.status}
`;

// ================= SYSTEM =================
document.getElementById("system").innerHTML = `
  Registration: ${s.registrationOpen !== false ? "OPEN" : "CLOSED"} <br>
  Lock Mode: ${s.lockMode ? "ON" : "OFF"}
`;

// ================= INCOME STATUS =================
function loadIncomeStatus() {

  document.getElementById("incomeStatus").innerHTML = `
    UGLI: ${isUGLIEnabled() ? "🟢 ON" : "🔴 OFF"} <br>
    RLI: ${isRLIEnabled() ? "🟢 ON" : "🔴 OFF"} <br>
    Binary: ${isBinaryEnabled() ? "🟢 ON" : "🔴 OFF"}
  `;
}

// ================= 📊 STATS SYSTEM (NEW 🔥) =================
function loadStats() {

  let users = JSON.parse(localStorage.getItem("users") || "[]");
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");

  let totalUsers = users.length;
  let activeUsers = users.filter(u => u.active).length;

  let totalWithdraw = withdrawals
    .filter(w => w.status === "APPROVED")
    .reduce((sum, w) => sum + (w.finalAmount || 0), 0);

  let pendingWithdraw = withdrawals
    .filter(w => w.status === "PENDING").length;

  document.getElementById("totalUsers").innerText = totalUsers;
  document.getElementById("activeUsers").innerText = activeUsers;
  document.getElementById("totalWithdraw").innerText = "₹ " + totalWithdraw;
  document.getElementById("pendingWithdraw").innerText = pendingWithdraw;
}


// ================= ROLE CONTROL =================
if (admin.type === "B") {

  let d = admin.departments || [];

  if (!d.includes("finance")) document.getElementById("financeCard").style.display = "none";
  if (!d.includes("pin")) document.getElementById("pinCard").style.display = "none";
  if (!d.includes("income")) document.getElementById("incomeCard").style.display = "none";
}


// ================= NAV =================
function goTo(page) {

  if (typeof logActivity === "function") {
    logActivity(admin.userId, "ADMIN", "Opened " + page);
  }

  window.location.href = page;
}


// ================= LOGOUT =================
function logout() {

  if (typeof logActivity === "function") {
    logActivity(admin.userId, "ADMIN", "Logout");
  }

  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}


// ================= AUTO REFRESH (NEW 🔥) =================
setInterval(() => {
  loadStats();
}, 5000); // every 5 sec


// ================= INIT =================
loadIncomeStatus();
loadStats();

</script>

</body>
</html>
