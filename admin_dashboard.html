<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: #f4f7f9;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      background: #0077b5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }
  </style>
</head>

<body>

<header>
  <h2>ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>Profile</h3>
    <p id="profile"></p>
  </div>

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="system"></p>
  </div>

  <!-- COUNTS -->
  <div class="card">
    <h3>Overview</h3>

    <div>Total Users <div class="stat" id="totalUsers">0</div></div>
    <div>Active Users <div class="stat" id="activeUsers">0</div></div>
  </div>

  <!-- QUICK VIEW -->
  <div class="card">
    <h3>Quick View</h3>

    <button onclick="showData('user')">Users</button>
    <button onclick="showData('franchise')">Franchise</button>
  </div>

  <!-- DATA PANEL -->
  <div class="card">
    <h3>Details</h3>
    <div id="dataPanel">Click button to view</div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <h3>Actions</h3>

    <button onclick="goTo('admin_withdrawals.html')">Withdrawals</button>
    <button onclick="goTo('admin_pin_panel.html')">PIN Panel</button>
    <button onclick="goTo('admin_income_control.html')">Income</button>
  </div>

</div>

<script src="CORE_system.js"></script>

<script>

// INIT
initCoreSystem();

// SECURITY
let admin = protectPage({ role: "admin" });
if (!admin) return;

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// PROFILE
document.getElementById("profile").innerHTML = `
  ID: ${admin.userId} <br>
  Name: ${admin.username} <br>
  Status: ${admin.status}
`;

// SYSTEM STATUS
function loadSystem() {
  let s = getSystemSettings() || {};

  document.getElementById("system").innerHTML = `
    Registration: ${s.registrationOpen !== false ? "🟢" : "🔴"} <br>
    Upgrade: ${s.upgradesOpen !== false ? "🟢" : "🔴"} <br>
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"}
  `;
}

// COUNTS
function loadCounts() {
  let users = getUsers();

  document.getElementById("totalUsers").innerText =
    users.filter(u => u.role === "user").length;

  document.getElementById("activeUsers").innerText =
    users.filter(u => u.isActive === true).length;
}

// SHOW DATA
function showData(role) {

  let users = getUsers().filter(u => u.role === role);

  if (!users.length) {
    document.getElementById("dataPanel").innerHTML = "No Data";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("dataPanel").innerHTML = html;
}

// NAV
function goTo(page) {
  window.location.href = page;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

// AUTO REFRESH
setInterval(() => {
  loadSystem();
  loadCounts();
}, 3000);

// INIT
loadSystem();
loadCounts();

</script>

</body>
</html>
