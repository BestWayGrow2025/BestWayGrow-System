<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f7f9;
    }

    header {
      background:#0077b5;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#28a745;
      color:#fff;
    }

    .menu button:hover {
      background:#1e7e34;
    }

    .content {
      padding:20px;
      text-align:center;
    }

    .card {
      background:#fff;
      padding:20px;
      margin:auto;
      max-width:600px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
    }
  </style>
</head>

<body>

<header>
  <h2>ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<!-- TOP MENU -->
<div class="menu">
  <button onclick="loadSection('home')">Home</button>
  <button onclick="loadSection('users')">Users</button>
  <button onclick="loadSection('franchise')">Franchise</button>
  <button onclick="loadSection('pin')">PIN</button>
  <button onclick="loadSection('kyc')">KYC</button>
  <button onclick="loadSection('system')">System</button>
  <button onclick="loadSection('profile')">Profile</button>
</div>

<!-- DYNAMIC CONTENT -->
<div class="content">
  <div id="mainBox" class="card">
    Loading...
  </div>
</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js not loaded"); throw new Error("STOP"); }

// AUTH (SECURE)
let admin = protectPage({ role: "admin" });
if (!admin) throw new Error("STOP");

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// SECTION LOADER
function loadSection(section) {

  let box = document.getElementById("mainBox");

  // HOME
  if (section === "home") {
    box.innerHTML = `
      <h3>Dashboard</h3>
      <p>ID: ${admin.userId}</p>
      <p>Name: ${admin.username || admin.userId}</p>
      <p>Status: ${admin.status}</p>
    `;
  }

  // USERS
  else if (section === "users") {

    let users = (getUsers() || []).filter(u => u.role === "user");

    if (!users.length) {
      box.innerHTML = "<h3>No Users</h3>";
      return;
    }

    let html = `<h3>Users</h3><table>
      <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

    users.forEach(u => {
      html += `
        <tr>
          <td>${u.userId}</td>
          <td>${u.username || u.userId}</td>
          <td>${u.status || "active"}</td>
        </tr>`;
    });

    html += "</table>";

    box.innerHTML = html;
  }

  // FRANCHISE
  else if (section === "franchise") {
    box.innerHTML = `
      <h3>Franchise Requests</h3>
      <button onclick="goTo('admin_franchise_requests.html')">
        Open Panel
      </button>
    `;
  }

  // PIN
  else if (section === "pin") {
    box.innerHTML = `
      <h3>PIN Control</h3>
      <button onclick="goTo('admin_pin_request.html')">Request PIN</button><br><br>
      <button onclick="goTo('admin_pin_panel.html')">Create PIN</button>
    `;
  }

  // KYC
  else if (section === "kyc") {
    box.innerHTML = `
      <h3>KYC Verification</h3>
      <button onclick="goTo('admin_kyc.html')">Open KYC Panel</button>
    `;
  }

  // SYSTEM CONTROL
  else if (section === "system") {

    let s = getSystemSettings() || {};

    box.innerHTML = `
      <h3>System Control</h3>

      Register: ${s.registrationOpen !== false ? "🟢" : "🔴"} <br>
      Upgrade: ${s.upgradesOpen !== false ? "🟢" : "🔴"} <br>
      Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"} <br><br>

      <button onclick="toggle('registrationOpen')">Toggle Register</button>
      <button onclick="toggle('upgradesOpen')">Toggle Upgrade</button>
      <button onclick="toggle('repurchaseOpen')">Toggle Repurchase</button>
    `;
  }

  // PROFILE
  else if (section === "profile") {
    box.innerHTML = `
      <h3>Profile</h3>
      <p>ID: ${admin.userId}</p>
      <p>Name: ${admin.username || admin.userId}</p>
      <p>Status: ${admin.status}</p>
    `;
  }

}

// TOGGLE SYSTEM
function toggle(key) {

  let allowed = ["registrationOpen","upgradesOpen","repurchaseOpen"];

  if (!allowed.includes(key)) return alert("Not allowed");

  let s = getSystemSettings() || {};
  s[key] = !s[key];

  localStorage.setItem("systemSettings", JSON.stringify(s));

  if (typeof logActivity === "function") {
    logActivity(admin.userId, "TOGGLE_" + key);
  }

  loadSection("system");
}

// NAVIGATION
function goTo(page) {
  window.location.href = page;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInAdmin");
  location.href = "admin_login.html";
}

// DEFAULT LOAD
loadSection("home");

</script>

</body>
</html>
