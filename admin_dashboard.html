<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family:'Segoe UI', Arial;
      margin:0;
      background:linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background:linear-gradient(135deg,#000,#434343);
      color:#fff;
      padding:18px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.2);
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    /* MENU */
    .menu {
      display:flex;
      overflow-x:auto;
      white-space:nowrap;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .menu button {
      flex:0 0 auto;
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      background:linear-gradient(135deg,#007bff,#00c6ff);
      color:#fff;
      font-size:13px;
      transition:0.3s;
    }

    .menu button:hover {
      transform:scale(1.05);
      opacity:0.9;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
      max-width:800px;
      margin:auto;
      animation:fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
      font-size:13px;
    }

    th {
      background:#f1f4f8;
    }

    th, td {
      border:1px solid #eee;
      padding:10px;
      text-align:center;
    }

    h3 {
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>👨‍💼 ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadFranchise()">Franchise</button>
  <button onclick="loadPins()">PIN</button>
  <button onclick="loadRequests()">Requests</button>
  <button onclick="loadSystem()">System</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let admin = protectPage({ role: "admin" });
if (!admin) throw new Error("STOP");

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// STORAGE
function getPins() {
  return JSON.parse(localStorage.getItem("pins") || "[]");
}

// HOME
function loadHome() {
  document.getElementById("mainContent").innerHTML = `
    <h3>Overview</h3>
    <p>Name: ${admin.username || admin.userId}</p>
    <p>Status: ${admin.status}</p>
  `;
}

// USERS
function loadUsers() {

  let users = (getUsers() || []).filter(u => u.role === "user");

  let html = `<h3>Users</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Users</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// FRANCHISE
function loadFranchise() {

  let f = (getUsers() || []).filter(u => u.role === "franchise");

  let html = `<h3>Franchise</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!f.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  f.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// PIN
function loadPins() {

  let pins = getPins();

  let html = `<h3>PIN Control</h3>
  <button onclick="location.href='admin_pin_panel.html'">Create PIN</button>
  <table>
  <tr><th>PIN</th><th>Status</th></tr>`;

  if (!pins.length) html += `<tr><td colspan="2">No PIN</td></tr>`;

  pins.forEach(p => {
    html += `<tr>
      <td>${p.pin}</td>
      <td>${p.used ? "USED" : "AVAILABLE"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// REQUESTS
function loadRequests() {
  document.getElementById("mainContent").innerHTML = `
    <h3>Requests</h3>
    <button onclick="location.href='admin_franchise_requests.html'">Franchise Requests</button>
    <button onclick="location.href='admin_kyc.html'">KYC</button>
  `;
}

// SYSTEM
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("mainContent").innerHTML = `
    <h3>System Control</h3>
    <p>Register: ${s.registrationOpen ? "ON" : "OFF"}</p>
    <p>Upgrade: ${s.upgradesOpen ? "ON" : "OFF"}</p>
    <p>Repurchase: ${s.repurchaseOpen ? "ON" : "OFF"}</p>
  `;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInAdmin");
  location.href = "admin_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
