<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: #f4f7f9;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 15px;
      margin-top: 10px;
      border: none;
      background: #0077b5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }

    footer {
      background: #222;
      color: white;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>Admin Profile</h3>
    <p id="profile"></p>
  </div>

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="system"></p>
  </div>

  <!-- FINANCE -->
  <div class="card" id="financeCard">
    <h3>Finance Panel</h3>
    <button onclick="goTo('admin_withdrawals.html')">Withdrawals</button>
  </div>

  <!-- FRANCHISE -->
  <div class="card" id="franchiseCard">
    <h3>Franchise Panel</h3>
    <button onclick="goTo('admin_franchise_requests.html')">Requests</button>
  </div>

  <!-- REPORT -->
  <div class="card" id="reportCard">
    <h3>Reports</h3>
    <button onclick="goTo('admin_reports.html')">Open Reports</button>
  </div>

</div>

<footer>
  ⬅ Back to Home <br>
  © 2026 BestWayGrow
</footer>

<script src="CORE_system.js"></script>

<script>
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

let admin = getUserById(session.userId);

if (!admin || admin.role !== "admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

// 🔥 STATUS CHECK (IMPORTANT)
if (admin.status !== "active") {
  alert("Account inactive by System Admin");
  logout();
}

// 🔥 SYSTEM ACCESS CHECK
let s = getSystemSettings();

if (s.adminAccess === false) {
  alert("Admin access OFF by Super Admin");
  logout();
}

if (s.lockMode === true) {
  alert("System locked by Super Admin");
  logout();
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  ID: ${admin.userId} <br>
  Name: ${admin.username} <br>
  Type: ${admin.type || "A"} <br>
  Status: ${admin.status}
`;

// ================= SYSTEM =================
document.getElementById("system").innerHTML = `
  Registration: ${s.registrationOpen !== false ? "OPEN" : "CLOSED"} <br>
  Lock Mode: ${s.lockMode ? "ON" : "OFF"}
`;

// ================= ROLE CONTROL =================

// TYPE B → department control
if (admin.type === "B") {

  let depts = admin.departments || [];

  // ✅ MATCH FIXED HERE
  if (!depts.includes("finance")) {
    document.getElementById("financeCard").style.display = "none";
  }

  if (!depts.includes("franchise")) {
    document.getElementById("franchiseCard").style.display = "none";
  }

  if (!depts.includes("report")) {
    document.getElementById("reportCard").style.display = "none";
  }
}

// ================= NAV =================
function goTo(page) {
  window.location.href = page;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

</script>

</body>
</html>
