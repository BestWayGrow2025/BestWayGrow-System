<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#f4f7f9;
    }

    header {
      background: linear-gradient(90deg,#222,#0077b5);
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 6px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:20px;
      background:#eee;
      cursor:pointer;
      transition:0.3s;
    }

    .menu button:hover {
      background:#0077b5;
      color:#fff;
    }

    .active {
      background:#222 !important;
      color:#fff !important;
    }

    .content {
      padding:20px;
      text-align:center;
    }

    .card {
      background:#fff;
      padding:20px;
      margin:10px auto;
      width:90%;
      max-width:600px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th,td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    input, button {
      padding:8px;
      margin:5px;
    }
  </style>
</head>

<body>

<header>
  <h2>🔥 ADMIN DASHBOARD V7</h2>
  <p id="welcome"></p>
</header>

<!-- MENU -->
<div class="menu">

  <button onclick="loadPage('home',this)">Home</button>
  <button onclick="loadPage('users',this)">Users</button>
  <button onclick="loadPage('pin',this)">PIN</button>
  <button onclick="loadPage('wallet',this)">Wallet</button>
  <button onclick="loadPage('franchise',this)">Franchise</button>
  <button onclick="loadPage('kyc',this)">KYC</button>
  <button onclick="loadPage('ticket',this)">Ticket</button>
  <button onclick="loadPage('content',this)">Content</button>
  <button onclick="loadPage('reports',this)">Reports</button>
  <button onclick="loadPage('settings',this)">Settings</button>

</div>

<!-- CONTENT -->
<div class="content" id="contentBox">
  Loading...
</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH (SAFE)
let admin = protectPage({ role: "admin" });
if (!admin) throw new Error("STOP");

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// ACTIVE MENU
function setActive(btn){
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// LOAD PAGE
function loadPage(page,btn){

  if(btn) setActive(btn);

  let html = "";

  // HOME
  if(page === "home"){
    html = `
    <div class="card">
      <h3>Overview</h3>
      <p>ID: ${admin.userId}</p>
      <p>Status: ${admin.status}</p>
    </div>`;
  }

  // USERS
  if(page === "users"){
    let users = getUsers().filter(u => u.role === "user");

    html = `<div class="card"><h3>All Users</h3>`;

    if(!users.length) html += "No Users";
    else {
      html += `<table><tr><th>ID</th><th>Status</th></tr>`;
      users.forEach(u=>{
        html += `<tr><td>${u.userId}</td><td>${u.status || "active"}</td></tr>`;
      });
      html += "</table>";
    }

    html += "</div>";
  }

  // PIN
  if(page === "pin"){
    html = `
    <div class="card">
      <h3>PIN Control</h3>
      <button onclick="goTo('admin_pin_panel.html')">Open Panel</button>
    </div>`;
  }

  // WALLET
  if(page === "wallet"){
    html = `
    <div class="card">
      <h3>Wallet Control</h3>
      <p>Manage transactions</p>
    </div>`;
  }

  // FRANCHISE
  if(page === "franchise"){
    html = `
    <div class="card">
      <h3>Franchise Requests</h3>
      <button onclick="goTo('admin_franchise_requests.html')">Open</button>
    </div>`;
  }

  // KYC
  if(page === "kyc"){
    html = `
    <div class="card">
      <h3>KYC Verification</h3>
      <button onclick="goTo('admin_kyc.html')">Open</button>
    </div>`;
  }

  // TICKET
  if(page === "ticket"){
    html = `
    <div class="card">
      <h3>Support Tickets</h3>
      <p>Handle user issues</p>
    </div>`;
  }

  // CONTENT
  if(page === "content"){
    html = `
    <div class="card">
      <h3>Content Control</h3>
      <p>Manage posts / shorts</p>
    </div>`;
  }

  // REPORTS
  if(page === "reports"){
    html = `
    <div class="card">
      <h3>Reports</h3>
      <p>System reports here</p>
    </div>`;
  }

  // SETTINGS
  if(page === "settings"){
    html = `
    <div class="card">
      <h3>Settings</h3>
      <button onclick="logout()">Logout</button>
    </div>`;
  }

  document.getElementById("contentBox").innerHTML = html;
}

// NAV
function goTo(page){
  window.location.href = page;
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedInAdmin");
  location.href = "admin_login.html";
}

// DEFAULT LOAD
loadPage('home');

</script>

</body>
</html>
