<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: #f4f7f9;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 15px;
      margin-top: 10px;
      border: none;
      background: #0077b5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }

    footer {
      background: #222;
      color: white;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>Admin Profile</h3>
    <p id="profile"></p>
  </div>

  <!-- SYSTEM -->
  <div class="card">
    <h3>System Status</h3>
    <p id="system"></p>
  </div>

  <!-- 💰 FINANCE -->
  <div class="card" id="financeCard">
    <h3>Finance Panel</h3>
    <button onclick="goTo('admin_withdrawals.html')">Withdrawals</button>
  </div>

  <!-- 🎟️ PIN CONTROL -->
  <div class="card" id="pinCard">
    <h3>PIN Management</h3>
    <button onclick="goTo('admin_pin_panel.html')">Open PIN Panel</button>
  </div>

  <!-- 📊 INCOME -->
  <div class="card" id="incomeCard">
    <h3>Income Management</h3>
    <button onclick="goTo('admin_income_control.html')">Income Control</button>
    <button onclick="goTo('admin_income_logs.html')">View Income Logs</button>
  </div>

  <!-- 🏢 FRANCHISE -->
  <div class="card" id="franchiseCard">
    <h3>Franchise Panel</h3>
    <button onclick="goTo('admin_franchise_requests.html')">Requests</button>
  </div>

  <!-- 📈 REPORT -->
  <div class="card" id="reportCard">
    <h3>Reports</h3>
    <button onclick="goTo('admin_reports.html')">Open Reports</button>
  </div>

  <!-- 🧾 KYC -->
  <div class="card" id="kycCard">
    <h3>KYC Panel</h3>
    <button onclick="goTo('admin_kyc.html')">Open KYC</button>
  </div>

</div>

<footer>
  ⬅ Back to Home <br>
  © 2026 BestWayGrow
</footer>

<!-- CORE -->
<script src="CORE_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= SECURITY =================
let admin = protectPage({
  role: "admin"
});

// ================= SETTINGS =================
let s = getSystemSettings();

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  ID: ${admin.userId} <br>
  Name: ${admin.username} <br>
  Type: ${admin.type || "A"} <br>
  Status: ${admin.status}
`;

// ================= SYSTEM =================
document.getElementById("system").innerHTML = `
  Registration: ${s.registrationOpen !== false ? "OPEN" : "CLOSED"} <br>
  Lock Mode: ${s.lockMode ? "ON" : "OFF"}
`;

// ================= ROLE CONTROL =================
if (admin.type === "B") {

  let depts = admin.departments || [];

  // FINANCE
  if (!depts.includes("finance")) {
    document.getElementById("financeCard").style.display = "none";
  }

  // PIN
  if (!depts.includes("pin")) {
    document.getElementById("pinCard").style.display = "none";
  }

  // INCOME
  if (!depts.includes("income")) {
    document.getElementById("incomeCard").style.display = "none";
  }

  // FRANCHISE
  if (!depts.includes("franchise")) {
    document.getElementById("franchiseCard").style.display = "none";
  }

  // REPORT
  if (!depts.includes("report")) {
    document.getElementById("reportCard").style.display = "none";
  }

  // KYC
  if (!depts.includes("kyc")) {
    document.getElementById("kycCard").style.display = "none";
  }
}

// ================= NAV =================
function goTo(page) {
  window.location.href = page;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

</script>

</body>
</html>
