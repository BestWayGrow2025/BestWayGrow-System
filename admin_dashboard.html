<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard V8 FINAL</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family:'Segoe UI', Arial;
      margin:0;
      background:linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background:linear-gradient(135deg,#000,#434343);
      color:#fff;
      padding:18px;
      text-align:center;
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .menu button {
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg,#007bff,#00c6ff);
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }

    .menu button.active {
      background:linear-gradient(135deg,#003f88,#0059b3);
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      max-width:1000px;
      margin:auto;
      box-shadow:0 3px 12px rgba(0,0,0,0.08);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      margin-top:15px;
    }

    .miniCard {
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:15px;
      text-align:center;
    }

    .miniCard h4 {
      margin:0 0 8px;
      font-size:14px;
      color:#555;
    }

    .miniCard p {
      margin:0;
      font-size:18px;
      font-weight:bold;
      color:#111;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:13px;
    }

    th, td {
      border:1px solid #eee;
      padding:10px;
      text-align:center;
    }

    th {
      background:#f1f4f8;
    }

    .on {
      background:#28a745;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
      margin-right:5px;
    }

    .off {
      background:#dc3545;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
    }

    .warn {
      color:#dc3545;
      font-weight:bold;
    }

    .good {
      color:#28a745;
      font-weight:bold;
    }
  </style>
</head>
<body>

<header>
  <h2>👨‍💼 ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="safeClick(this,loadHome)">Home</button>
  <button onclick="safeClick(this,loadUsers)">Users</button>
  <button onclick="safeClick(this,loadPinsUI)">PIN</button>
  <button onclick="safeClick(this,loadWallet)">Wallet</button>
  <button onclick="safeClick(this,loadIncome)">Income</button>
  <button onclick="safeClick(this,loadSystem)">System</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<!-- CORE -->
<script src="core_system.js"></script>
<script src="wallet_system.js"></script>
<script src="income_log_system.js"></script>
<script src="income_engine.js"></script>
<script src="pin_master_system.js"></script>
<script src="pin_request_system.js"></script>
<script src="registration_queue.js"></script>
<script src="hold_income_system.js"></script>
<script src="income_control_system.js"></script>

<script>
// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("core_system.js missing");
  throw new Error("STOP");
}

// ================= AUTH =================
let adminSession =
  JSON.parse(localStorage.getItem("loggedInAdmin")) ||
  JSON.parse(localStorage.getItem("loggedInSystemAdmin")) ||
  JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!adminSession || !adminSession.userId) {
  alert("Login Required");
  window.location.href = "admin_login.html";
}

// ================= ADMIN USER =================
let adminUser = null;

if (typeof getUserById === "function") {
  adminUser = getUserById(adminSession.userId);
}

if (!adminUser) {
  alert("Admin not found");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "admin_login.html";
}

if (adminUser.status && adminUser.status !== "active") {
  alert("Admin inactive");
  logout();
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + (adminUser.username || adminUser.userId) +
  " (" + adminUser.userId + ")";

// ================= BUTTON LOCK =================
let clickLock = false;

function safeClick(btn, fn) {
  if (clickLock) return;

  clickLock = true;

  document.querySelectorAll(".menu button").forEach(b => {
    b.classList.remove("active");
  });

  btn.classList.add("active");

  try {
    fn();
  } catch (err) {
    console.error(err);
    document.getElementById("mainContent").innerHTML =
      `<p class="warn">Section failed to load</p>`;
  }

  setTimeout(() => {
    clickLock = false;
  }, 300);
}

// ================= HOME =================
function loadHome() {

  let users = (typeof getUsers === "function") ? getUsers() : [];
  let allUsers = users.filter(u => u.role === "user");
  let activeUsers = allUsers.filter(u => u.status === "active");
  let blockedUsers = allUsers.filter(u => u.status !== "active");

  let totalWallet = users.reduce((sum, u) => {
    return sum + Number(u.wallet?.balance || 0);
  }, 0);

  document.getElementById("mainContent").innerHTML = `
    <h3>Dashboard Overview</h3>

    <div class="grid">
      <div class="miniCard">
        <h4>Total Users</h4>
        <p>${allUsers.length}</p>
      </div>

      <div class="miniCard">
        <h4>Active Users</h4>
        <p>${activeUsers.length}</p>
      </div>

      <div class="miniCard">
        <h4>Blocked Users</h4>
        <p>${blockedUsers.length}</p>
      </div>

      <div class="miniCard">
        <h4>Total Wallet</h4>
        <p>₹${totalWallet.toFixed(2)}</p>
      </div>
    </div>

    <br>

    <p><b>Name:</b> ${adminUser.username || "Admin"}</p>
    <p><b>User ID:</b> ${adminUser.userId}</p>
    <p><b>Role:</b> ${adminUser.role}</p>
    <p><b>Status:</b> ${adminUser.status || "active"}</p>
  `;
}

// ================= USERS =================
function loadUsers() {
  let users = (typeof getUsers === "function") ? getUsers() : [];
  users = users.filter(u => u.role === "user");

  let html = `
    <h3>User List</h3>
    <table>
      <tr>
        <th>User ID</th>
        <th>Name</th>
        <th>Wallet</th>
        <th>Status</th>
      </tr>
  `;

  if (!users.length) {
    html += `<tr><td colspan="4">No Users Found</td></tr>`;
  }

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId || "-"}</td>
        <td>${u.username || "-"}</td>
        <td>₹${Number(u.wallet?.balance || 0).toFixed(2)}</td>
        <td>${u.status || "active"}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= PIN =================
function loadPinsUI() {
  let pins = (typeof loadPins === "function") ? loadPins() : [];

  let html = `
    <h3>PIN Control</h3>
    <table>
      <tr>
        <th>PIN ID</th>
        <th>Type</th>
        <th>Status</th>
      </tr>
  `;

  if (!pins.length) {
    html += `<tr><td colspan="3">No PIN Available</td></tr>`;
  }

  pins.slice(-20).reverse().forEach(p => {
    html += `
      <tr>
        <td>${p.pinId || "-"}</td>
        <td>${p.type || "-"}</td>
        <td>${p.status || "-"}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= WALLET =================
function loadWallet() {
  let users = (typeof getUsers === "function") ? getUsers() : [];

  let totalBalance = 0;
  let totalCredit = 0;
  let totalDebit = 0;
  let totalHoldIncome = 0;

  users.forEach(u => {
    totalBalance += Number(u.wallet?.balance || 0);
    totalCredit += Number(u.wallet?.totalCredit || 0);
    totalDebit += Number(u.wallet?.totalDebit || 0);
    totalHoldIncome += Number(u.wallet?.holdIncome || 0);
  });

  document.getElementById("mainContent").innerHTML = `
    <h3>Wallet Overview</h3>

    <div class="grid">
      <div class="miniCard">
        <h4>Total Balance</h4>
        <p>₹${totalBalance.toFixed(2)}</p>
      </div>

      <div class="miniCard">
        <h4>Total Credit</h4>
        <p>₹${totalCredit.toFixed(2)}</p>
      </div>

      <div class="miniCard">
        <h4>Total Debit</h4>
        <p>₹${totalDebit.toFixed(2)}</p>
      </div>

      <div class="miniCard">
        <h4>Total Hold Income</h4>
        <p>₹${totalHoldIncome.toFixed(2)}</p>
      </div>
    </div>
  `;
}


// ================= INCOME =================
function loadIncome() {
  let logs = (typeof getIncomeLogs === "function") ? getIncomeLogs() : [];
  let incomeSettings = (typeof getIncomeSettings === "function")
    ? getIncomeSettings()
    : {};

  let html = `
    <h3>Income Logs</h3>

    <div class="grid">
      <div class="miniCard">
        <h4>Master Income</h4>
        <p>${incomeSettings.incomeEnabled ? "ON" : "OFF"}</p>
      </div>

      <div class="miniCard">
        <h4>UGLI</h4>
        <p>${incomeSettings.ugli ? "ON" : "OFF"}</p>
      </div>

      <div class="miniCard">
        <h4>RLI</h4>
        <p>${incomeSettings.rli ? "ON" : "OFF"}</p>
      </div>

      <div class="miniCard">
        <h4>Binary</h4>
        <p>${incomeSettings.binary ? "ON" : "OFF"}</p>
      </div>
    </div>

    <br>
    
    <table>
      <tr>
        <th>User ID</th>
        <th>Amount</th>
        <th>Type</th>
      </tr>
  `;

  if (!logs.length) {
    html += `<tr><td colspan="3">No Income Logs</td></tr>`;
  }

  logs.slice(-20).reverse().forEach(l => {
    html += `
      <tr>
        <td>${l.userId || "-"}</td>
        <td>₹${Number(l.amount || 0).toFixed(2)}</td>
        <td>${l.type || "-"}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= SYSTEM =================
let queueBtnLock = false;

function loadSystem() {

  let s = (typeof getSystemSettings === "function")
    ? getSystemSettings()
    : {};

  let requests = (typeof getPinRequests === "function")
    ? getPinRequests()
    : [];

  let regQueue = (typeof getRegQueue === "function")
    ? getRegQueue()
    : [];

  let pendingPins = requests.filter(r => r.status === "PENDING").length;
  let completedPins = requests.filter(r => r.status === "COMPLETED").length;
  let failedPins = requests.filter(r => r.status === "FAILED").length;

  let pendingReg = regQueue.filter(r => r.status === "PENDING").length;
  let doneReg = regQueue.filter(r => r.status === "DONE").length;
  let failedReg = regQueue.filter(r => r.status === "FAILED").length;

  document.getElementById("mainContent").innerHTML = `
    <h3>System Control</h3>

    <p>Registration: <b>${s.registrationOpen ? "ON" : "OFF"}</b></p>
    <p>Upgrade: <b>${s.upgradesOpen ? "ON" : "OFF"}</b></p>
    <p>Repurchase: <b>${s.repurchaseOpen ? "ON" : "OFF"}</b></p>
    <p>Withdraw: <b>${s.withdrawOpen ? "ON" : "OFF"}</b></p>
    <p>Admin Access: <b>${s.adminAccess ? "ON" : "OFF"}</b></p>
   <p>Lock Mode: <b>${s.lockMode ? "ON" : "OFF"}</b></p>
<p>Income Master: <b>${typeof getIncomeSettings === "function" && getIncomeSettings().incomeEnabled ? "ON" : "OFF"}</b></p>
<p>UGLI: <b>${typeof getIncomeSettings === "function" && getIncomeSettings().ugli ? "ON" : "OFF"}</b></p>
<p>RLI: <b>${typeof getIncomeSettings === "function" && getIncomeSettings().rli ? "ON" : "OFF"}</b></p>
<p>Binary: <b>${typeof getIncomeSettings === "function" && getIncomeSettings().binary ? "ON" : "OFF"}</b></p>

    <hr>

    <h3>PIN Queue</h3>
    <p>Status: ${s.pinQueue?.enabled ? "🟢 RUNNING" : "🔴 STOPPED"}</p>

    <button class="on" onclick="toggleQueue(true)">ON</button>
    <button class="off" onclick="toggleQueue(false)">OFF</button>

    <hr>

    <h3>PIN Request Stats</h3>
    <p>Pending: ${pendingPins}</p>
    <p>Completed: ${completedPins}</p>
    <p>Failed: ${failedPins}</p>

    <hr>

    <h3>Registration Queue Stats</h3>
    <p>Pending: ${pendingReg}</p>
    <p>Done: ${doneReg}</p>
    <p>Failed: ${failedReg}</p>
  `;
}

// ================= SAVE SETTINGS SAFE =================
function saveSystemSettingsSafe(settings) {
  if (typeof safeSet === "function") {
    safeSet("systemSettings", settings);
  } else {
    localStorage.setItem("systemSettings", JSON.stringify(settings));
  }
}

// ================= TOGGLE QUEUE =================
function toggleQueue(val) {
  if (queueBtnLock) return;

  queueBtnLock = true;

  let s = getSystemSettings() || {};

  if (!s.pinQueue) {
    s.pinQueue = {};
  }

  s.pinQueue.enabled = val;

  saveSystemSettingsSafe(s);

  setTimeout(() => {
    queueBtnLock = false;
    loadSystem();
  }, 300);
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "admin_login.html";
}

// ================= DEFAULT =================
document.querySelector(".menu button").classList.add("active");
loadHome();

// AUTO REFRESH SYSTEM SECTION
setInterval(() => {
  let currentBtn = document.querySelector(".menu button.active");

  if (currentBtn && currentBtn.innerText === "System") {
    loadSystem();
  }
}, 5000);


</script>

</body>
</html>
