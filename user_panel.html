<!DOCTYPE html>
<html>
<head>
  <title>User Panel</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; text-align:center; background:#f9f9f9; }
    .card { background:#fff; padding:20px; margin:15px; border-radius:10px; }
  </style>
</head>

<body>

<h2>USER PANEL</h2>
<button onclick="logout()">Logout</button>

<div class="card">
  <h3>Profile</h3>
  <p id="profile"></p>
</div>

<div class="card">
  <h3>Status</h3>
  <p id="status"></p>
</div>

<script src="CORE_system.js"></script>

<script>

initCoreSystem();

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInUser"));
if (!session) {
  alert("Login required");
  window.location.href = "user_login.html";
}

let user = getUserById(session.userId);

// PROFILE
document.getElementById("profile").innerHTML = `
  ID: ${user.userId} <br>
  Name: ${user.username}
`;

// STATUS
document.getElementById("status").innerHTML = `
  Active: ${user.isActive ? "YES 🟢" : "NO 🔴"} <br>
  Wallet: ₹ ${user.wallet || 0}
`;

function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
