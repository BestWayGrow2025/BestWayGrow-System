<!DOCTYPE html>
<html>
<head>
  <title>Activate PIN</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      background:#f4f7f9;
      text-align:center;
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
      display:inline-block;
      width:300px;
    }

    input {
      padding:8px;
      margin:10px;
      width:90%;
    }

    button {
      padding:8px 15px;
      background:#007bff;
      color:#fff;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    #msg {
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>🔑 Activate Your PIN</h2>

<div class="card">

  <input id="pinInput" placeholder="Enter PIN"><br>

  <button onclick="activatePin()">Activate</button>

  <p id="msg"></p>

</div>


<!-- CORE -->
<script src="core_boot_manager.js"></script>
<script src="core_initializer.js"></script>
<script src="core_session_authority.js"></script>


<!-- PIN AUTHORITY -->
<script src="pin_activation_system.js"></script>


<!-- CONTROLLER -->
<script src="user_pin_activation.js"></script>


<script>

document.addEventListener("DOMContentLoaded", function () {

  if (typeof initCoreSystem === "function") {
    initCoreSystem();
  }

  if (typeof initPinActivation === "function") {
    initPinActivation();
  }

});

</script>


</body>
</html>
