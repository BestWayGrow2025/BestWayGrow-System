<!DOCTYPE html>
<html>
<head>
  <title>Admin PIN Panel</title>
</head>
<body>

<h2>🔐 Admin PIN Panel</h2>

<hr>

<!-- 🔥 CREATE PIN -->
<h3>Create PIN</h3>

<select id="pinType">
  <option value="upgrade">Upgrade</option>
  <option value="repurchase">Repurchase</option>
</select><br><br>

<input type="number" id="amount" placeholder="Amount"><br><br>
<input type="number" id="bv" placeholder="BV"><br><br>
<input type="number" id="gst" placeholder="GST"><br><br>

<button onclick="handleCreatePin()">Create PIN</button>

<p id="createMsg"></p>

<hr>

<!-- 🔥 ASSIGN PIN -->
<h3>Assign PIN to User</h3>

<input type="text" id="assignPinId" placeholder="Enter PIN ID"><br><br>
<input type="text" id="assignUserId" placeholder="Enter User ID"><br><br>

<button onclick="handleAssignPin()">Assign PIN</button>

<p id="assignMsg"></p>

<hr>

<!-- 🔥 VIEW ALL PINS -->
<h3>All PINs</h3>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>PIN</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Owner</th>
    </tr>
  </thead>
  <tbody id="pinTable"></tbody>
</table>

<!-- ✅ CORE -->
<script src="core_system.js"></script>

<!-- 🔥 PIN MASTER -->
<script src="pin_master_system.js"></script>

<script>

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {

  initCoreSystem();
  loadAllPins();
});


// ================= CREATE PIN =================
function handleCreatePin() {

  let type = document.getElementById("pinType").value;
  let amount = Number(document.getElementById("amount").value);
  let bv = Number(document.getElementById("bv").value);
  let gst = Number(document.getElementById("gst").value);

  try {

    let newPin = createPin({
      type,
      amount,
      bv,
      gst,
      createdBy: "ADMIN"
    });

    document.getElementById("createMsg").innerText =
      "✅ PIN Created: " + newPin.pinId;

    loadAllPins();

  } catch (err) {
    alert(err.message);
  }
}


// ================= ASSIGN PIN =================
function handleAssignPin() {

  let pinId = document.getElementById("assignPinId").value.trim();
  let userId = document.getElementById("assignUserId").value.trim();

  if (!pinId || !userId) {
    alert("Enter PIN ID and User ID");
    return;
  }

  try {

    assignPin(pinId, userId, "user", "ADMIN");

    document.getElementById("assignMsg").innerText =
      "✅ PIN Assigned";

    loadAllPins();

  } catch (err) {
    alert(err.message);
  }
}


// ================= LOAD ALL PINS =================
function loadAllPins() {

  let pins = [];

  try {
    pins = loadPins();
  } catch {
    pins = [];
  }

  let table = document.getElementById("pinTable");
  table.innerHTML = "";

  if (!pins.length) {
    table.innerHTML = "<tr><td colspan='5'>No PINs</td></tr>";
    return;
  }

  pins.forEach(pin => {

    let row = document.createElement("tr");

    let statusColor =
      pin.status === "active" ? "green" :
      pin.status === "assigned" ? "blue" :
      "red";

    row.innerHTML = `
      <td>${pin.pinId}</td>
      <td>${pin.type}</td>
      <td>₹${pin.amount}</td>
      <td style="color:${statusColor}">${pin.status}</td>
      <td>${pin.ownerId || "-"}</td>
    `;

    table.appendChild(row);
  });
}

</script>

</body>
</html>
