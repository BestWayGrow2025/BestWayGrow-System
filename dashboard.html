<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<hr>

<h3>Your Links</h3>

<p><b>UGLI (Upgrade Link):</b></p>
<input type="text" id="ugliLink" readonly>
<button onclick="copyLink('ugliLink')">Copy</button>

<br><br>

<p><b>RLI (Repurchase Link):</b></p>
<input type="text" id="rliLink" readonly>
<button onclick="copyLink('rliLink')">Copy</button>

<br><br>

<p><b>FR (Friend Referral Link):</b></p>
<input type="text" id="frLink" readonly>
<button onclick="copyLink('frLink')">Copy</button>

<hr>

<h3>Introducer Tree</h3>
<div id="treeView"></div>

<h3>Sponsor Tree (LEFT / RIGHT)</h3>
<div id="sponsorTree"></div>

<h3>All Users</h3>
<div id="usersList"></div>

<br>
<button onclick="logout()">Logout</button>

<script>

// =====================
// GET LOGGED USER
// =====================
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Please login first");
  window.location.href = "login.html";
}

// =====================
// DISPLAY USER INFO
// =====================
document.getElementById("userInfo").innerHTML = `
  <p><b>User ID:</b> ${user.userId}</p>
  <p><b>Name:</b> ${user.username}</p>
  <p><b>Introducer ID:</b> ${user.introducerId}</p>
  <p><b>Position:</b> ${user.position}</p>
`;

// =====================
// LINKS (UGLI / RLI / FR)
// =====================
let baseUrl = "register.html";

document.getElementById("ugliLink").value = baseUrl + "?type=upgrade&id=" + user.userId;
document.getElementById("rliLink").value = baseUrl + "?type=repurchase&id=" + user.userId;
document.getElementById("frLink").value = baseUrl + "?ref=" + user.userId;

// Copy function
function copyLink(id) {
  let input = document.getElementById(id);
  input.select();
  document.execCommand("copy");
  alert("Copied!");
}

// =====================
// USERS DATA
// =====================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// =====================
// INTRODUCER TREE
// =====================
function getIntroducerTree(userId) {
  let users = getUsers();
  let result = [];
  let current = users.find(u => u.userId === userId);
  let level = 1;

  while (current && current.introducerId && level <= 30) {
    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    result.push({
      level: "L" + level,
      userId: parent.userId,
      name: parent.username
    });

    current = parent;
    level++;
  }

  return result;
}

// Render introducer tree
let tree = getIntroducerTree(user.userId);
let treeHtml = "";

if (tree.length === 0) {
  treeHtml = "<p>No introducer tree found</p>";
} else {
  tree.forEach(t => {
    treeHtml += `<p>${t.level} → ${t.userId} (${t.name})</p>`;
  });
}

document.getElementById("treeView").innerHTML = treeHtml;

// =====================
// SPONSOR TREE
// =====================
function getSponsorTree(userId) {
  let users = getUsers();

  let left = users.find(u => u.introducerId === userId && u.position === "LEFT");
  let right = users.find(u => u.introducerId === userId && u.position === "RIGHT");

  return { left, right };
}

// Render sponsor tree
let sponsor = getSponsorTree(user.userId);

let sponsorHtml = `
  <p><b>LEFT:</b> ${sponsor.left ? sponsor.left.userId + " (" + sponsor.left.username + ")" : "Empty"}</p>
  <p><b>RIGHT:</b> ${sponsor.right ? sponsor.right.userId + " (" + sponsor.right.username + ")" : "Empty"}</p>
`;

document.getElementById("sponsorTree").innerHTML = sponsorHtml;

// =====================
// ALL USERS LIST
// =====================
function renderUsers() {
  let users = getUsers();
  let html = "";

  if (users.length === 0) {
    html = "<p>No users found</p>";
  } else {
    users.forEach(u => {
      html += `<p>
        ${u.userId} — ${u.username} 
        (Intro: ${u.introducerId}, Pos: ${u.position})
      </p>`;
    });
  }

  document.getElementById("usersList").innerHTML = html;
}

renderUsers();

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
