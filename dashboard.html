<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BestWayGrow Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#f0f4f5; text-align:center; }
header { background:#006633; color:white; padding:25px 15px; }
h1 { margin:10px 0; }
section { background:white; margin:20px auto; padding:25px; border-radius:10px; max-width:500px; box-shadow:0 4px 8px rgba(0,0,0,0.1); text-align:left; }
button { background:#006633; color:white; border:none; padding:12px 20px; border-radius:6px; cursor:pointer; margin-top:10px; }
button:hover { background:#004d29; }
</style>
</head>
<body>

<header>
    <h1>BestWayGrow Dashboard</h1>
</header>

<section>
    <p><strong>User:</strong> <span id="usernameDisplay">admin</span></p>
    <p><strong>Active Plan:</strong> <span id="planDisplay">BV2100</span></p>
    <p><strong>Income:</strong> ₹0</p>
    <p><strong>Status:</strong> Active</p>
    <button onclick="logout()">Logout</button>
</section>

<script>
var username = localStorage.getItem("username") || "admin";
var plan = localStorage.getItem("plan") || "BV2100";

document.getElementById("usernameDisplay").innerText = username;
document.getElementById("planDisplay").innerText = plan;

function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("username");
    localStorage.removeItem("plan");
    window.location.href = "login.html";
}
</script>

</body>
</html>
