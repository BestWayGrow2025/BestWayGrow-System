<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<hr>

<h3>Your Links</h3>

<p><b>UGLI:</b></p>
<p id="ugliLink">Loading...</p>
<button onclick="copyText('ugliLink')">Copy</button>

<br><br>

<p><b>RLI:</b></p>
<p id="rliLink">Loading...</p>
<button onclick="copyText('rliLink')">Copy</button>

<br><br>

<p><b>FR:</b></p>
<p id="frLink">Loading...</p>
<button onclick="copyText('frLink')">Copy</button>

<hr>

<h3>Introducer Downline Tree</h3>
<div id="treeView"></div>

<br><br>

<button onclick="logout()">Logout</button>

<script>

window.onload = function() {

  // =====================
  // LOAD USER
  // =====================
  let user = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  // =====================
  // GET USERS
  // =====================
  function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
  }

  let users = getUsers();
  let freshUser = users.find(u => u.userId === user.userId);

  if (!freshUser) {
    alert("User not found");
    return;
  }

  // =====================
  // USER INFO
  // =====================
  document.getElementById("userInfo").innerHTML =
    "<p>User ID: " + freshUser.userId + "</p>" +
    "<p>Name: " + freshUser.username + "</p>" +
    "<p>Introducer: " + freshUser.introducerId + "</p>" +
    "<p>Position: " + freshUser.position + "</p>";

  // =====================
  // WALLET
  // =====================
  document.getElementById("wallet").innerText = freshUser.wallet || 0;

  // =====================
  // LINKS
  // =====================
  let base = window.location.origin + "/BestWayGrow-System/";

  let ugli = base + "upgrade.html?id=" + freshUser.userId;
  let rli  = base + "repurchase.html?id=" + freshUser.userId;
  let fr   = base + "register.html?ref=" + freshUser.userId;

  document.getElementById("ugliLink").innerText = ugli;
  document.getElementById("rliLink").innerText  = rli;
  document.getElementById("frLink").innerText   = fr;

  // =====================
  // TREE (INTRODUCER DOWNLINE TREE)
  // =====================
  function buildDownlineTree(parentId, users) {
    let children = users.filter(u => u.introducerId === parentId);

    if (children.length === 0) return "";

    let html = "<ul>";

    children.forEach(child => {
      html += "<li>" + child.userId + " (" + child.username + ")";
      html += buildDownlineTree(child.userId, users);
      html += "</li>";
    });

    html += "</ul>";

    return html;
  }

  let treeHTML = "<ul><li>" + freshUser.userId;
  treeHTML += buildDownlineTree(freshUser.userId, users);
  treeHTML += "</li></ul>";

  document.getElementById("treeView").innerHTML = treeHTML;

};

// =====================
// COPY FUNCTION
// =====================
function copyText(id) {
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
