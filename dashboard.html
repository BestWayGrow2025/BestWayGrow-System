<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - BestWayGrow</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f5;
    text-align: center;
    padding: 20px;
}
header {
    background: #006633;
    color: white;
    padding: 20px;
    border-radius: 8px;
}
header h1 {
    margin: 0 0 10px 0;
}
.dashboard-box {
    background: white;
    margin: 20px auto;
    padding: 25px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
button {
    background: #006633;
    color: white;
    border: none;
    padding: 12px 25px;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 15px;
}
button:hover {
    background: #004d29;
}
</style>
</head>
<body>

<header>
    <h1>BestWayGrow Dashboard</h1>
</header>

<div class="dashboard-box">
    <p><strong>User:</strong> <span id="userName"></span></p>
    <p><strong>Active Plan:</strong> <span id="userPlan"></span></p>
    <p><strong>Income:</strong> ₹0</p>
    <p><strong>Status:</strong> Active</p>
    <button onclick="logout()">Logout</button>
</div>

<script>
// 1️⃣ Load user info from localStorage
var loggedIn = localStorage.getItem("loggedIn");
if (loggedIn !== "true") {
    window.location.href = "login.html"; // Redirect if not logged in
}

document.getElementById("userName").innerText = localStorage.getItem("username");
document.getElementById("userPlan").innerText = localStorage.getItem("plan");

// 2️⃣ Logout function
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
