<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>

<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>-

  <h3>Introducer Tree</h3>
<div id="treeView"></div>

<br>

<h3>Introducer Tree (L1 → L30)</h3>
<div id="treeView"></div>

<br>

<button onclick="logout()">Logout</button>

<script>

// Get logged in user
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Please login first");
  window.location.href = "login.html";
}

// Display user info
document.getElementById("userInfo").innerHTML = `
  <p><b>User ID:</b> ${user.userId}</p>
  <p><b>Name:</b> ${user.username}</p>
  <p><b>Introducer ID:</b> ${user.introducerId}</p>
  <p><b>Position:</b> ${user.position}</p>
`;

// Get all users
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// Introducer Tree logic (L1 → L30)
function getIntroducerTree(userId) {
  let users = getUsers();
  let result = [];
  let current = users.find(u => u.userId === userId);

  let level = 1;

  while (current && current.introducerId && level <= 30) {
    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    result.push({
      level: "L" + level,
      userId: parent.userId,
      name: parent.username
    });

    current = parent;
    level++;
  }

  return result;
}

// Render tree
let tree = getIntroducerTree(user.userId);

let html = "";

if (tree.length === 0) {
  html = "<p>No introducer tree found</p>";
} else {
  tree.forEach(t => {
    html += `<p>${t.level} → ${t.userId} (${t.name})</p>`;
  });
}

document.getElementById("treeView").innerHTML = html;

// Logout
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</body>
</html>
