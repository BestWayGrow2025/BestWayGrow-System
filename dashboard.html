<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<hr>

<h3>Your Links</h3>

<p><b>UGLI:</b></p>
<p id="ugliLink">Loading...</p>
<button onclick="copyText('ugliLink')">Copy</button>

<br><br>

<p><b>RLI:</b></p>
<p id="rliLink">Loading...</p>
<button onclick="copyText('rliLink')">Copy</button>

<br><br>

<p><b>FR:</b></p>
<p id="frLink">Loading...</p>
<button onclick="copyText('frLink')">Copy</button>

<hr>

<h3>Introducer Tree</h3>
<div id="treeView"></div>

<br><br>

<button onclick="logout()">Logout</button>

<script>

window.onload = function() {

  // =====================
  // LOAD USER
  // =====================
  let user = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  // =====================
  // GET USERS
  // =====================
  function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
  }

  let users = getUsers();
  let freshUser = users.find(u => u.userId === user.userId);

  if (!freshUser) {
    alert("User not found");
    return;
  }

  // =====================
  // USER INFO
  // =====================
  document.getElementById("userInfo").innerHTML =
    "<p>User ID: " + freshUser.userId + "</p>" +
    "<p>Name: " + freshUser.username + "</p>" +
    "<p>Introducer: " + freshUser.introducerId + "</p>" +
    "<p>Position: " + freshUser.position + "</p>";

  // =====================
  // WALLET
  // =====================
  document.getElementById("wallet").innerText = freshUser.wallet || 0;

  // =====================
  // 🔥 FINAL LINK FIX (IMPORTANT)
  // =====================
  let base = window.location.origin + "/BestWayGrow-System/";

  let ugli = base + "upgrade.html?id=" + freshUser.userId;   // ✅ FIXED
  let rli  = base + "repurchase.html?id=" + freshUser.userId; // (next step)
  let fr   = base + "register.html?ref=" + freshUser.userId;  // correct

  document.getElementById("ugliLink").innerText = ugli;
  document.getElementById("rliLink").innerText  = rli;
  document.getElementById("frLink").innerText   = fr;

  // =====================
  // TREE
  // =====================
  function getTree(userId) {
    let result = [];
    let current = users.find(u => u.userId === userId);
    let level = 1;

    while (current && current.introducerId && level <= 30) {
      let parent = users.find(u => u.userId === current.introducerId);
      if (!parent) break;

      result.push("L" + level + " → " + parent.userId + " (" + parent.username + ")");
      current = parent;
      level++;
    }

    return result;
  }

  let tree = getTree(freshUser.userId);
  let html = "";

  tree.forEach(t => {
    html += "<p>" + t + "</p>";
  });

  document.getElementById("treeView").innerHTML = html;

};

// =====================
// COPY
// =====================
function copyText(id) {
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
