<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<hr>

<h3>Your Links</h3>

<p><b>UGLI:</b></p>
<input type="text" id="ugliLink" readonly style="width:100%"><br>
<button onclick="copyLink('ugliLink')">Copy</button>

<br><br>

<p><b>RLI:</b></p>
<input type="text" id="rliLink" readonly style="width:100%"><br>
<button onclick="copyLink('rliLink')">Copy</button>

<br><br>

<p><b>FR:</b></p>
<input type="text" id="frLink" readonly style="width:100%"><br>
<button onclick="copyLink('frLink')">Copy</button>

<hr>

<h3>Introducer Tree</h3>
<div id="treeView"></div>

<br><br>

<button onclick="logout()">Logout</button>

<script>

// =====================
// LOAD USER
// =====================
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Login first");
  window.location.href = "login.html";
}

// =====================
// GET USERS LIST
// =====================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// 🔥 ALWAYS GET LATEST USER DATA (IMPORTANT FIX)
let users = getUsers();
let freshUser = users.find(u => u.userId === user.userId);

// =====================
// USER INFO
// =====================
document.getElementById("userInfo").innerHTML =
  "<p>User ID: " + freshUser.userId + "</p>" +
  "<p>Name: " + freshUser.username + "</p>" +
  "<p>Introducer: " + freshUser.introducerId + "</p>" +
  "<p>Position: " + freshUser.position + "</p>";

// =====================
// WALLET (LIVE UPDATE)
// =====================
document.getElementById("wallet").innerText = freshUser.wallet || 0;

// =====================
// 🔥 FULL URL FIX (IMPORTANT)
// =====================
let base = window.location.origin + "/BestWayGrow-System/";

document.getElementById("ugliLink").value =
  base + "register.html?type=upgrade&id=" + freshUser.userId;

document.getElementById("rliLink").value =
  base + "register.html?type=repurchase&id=" + freshUser.userId;

document.getElementById("frLink").value =
  base + "register.html?ref=" + freshUser.userId;

// =====================
// COPY FUNCTION
// =====================
function copyLink(id) {
  let input = document.getElementById(id);
  input.select();
  document.execCommand("copy");
  alert("Copied!");
}

// =====================
// INTRODUCER TREE
// =====================
function getTree(userId) {
  let users = getUsers();
  let result = [];
  let current = users.find(u => u.userId === userId);
  let level = 1;

  while (current && current.introducerId && level <= 30) {
    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    result.push("L" + level + " → " + parent.userId + " (" + parent.username + ")");
    current = parent;
    level++;
  }

  return result;
}

// RENDER TREE
let tree = getTree(freshUser.userId);
let html = "";

if (tree.length === 0) {
  html = "<p>No tree found</p>";
} else {
  tree.forEach(t => {
    html += "<p>" + t + "</p>";
  });
}

document.getElementById("treeView").innerHTML = html;

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
