<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<hr>

<h3>Your Links</h3>

<p><b>UGLI (Upgrade Link):</b></p>
<p id="ugliLink"></p>
<button onclick="copyText('ugliLink')">Copy</button>

<br><br>

<p><b>RLI (Repurchase Link):</b></p>
<p id="rliLink"></p>
<button onclick="copyText('rliLink')">Copy</button>

<br><br>

<p><b>FR (Friend Referral Link):</b></p>
<p id="frLink"></p>
<button onclick="copyText('frLink')">Copy</button>

<hr>

<h3>Introducer Tree</h3>
<div id="treeView"></div>

<h3>Sponsor Tree (LEFT / RIGHT)</h3>
<div id="sponsorTree"></div>

<h3>All Users</h3>
<div id="usersList"></div>

<br>
<button onclick="logout()">Logout</button>

<script>

window.onload = function() {

  // =====================
  // USER LOAD
  // =====================
  let user = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  // =====================
  // USER INFO
  // =====================
  document.getElementById("userInfo").innerHTML = `
    <p><b>User ID:</b> ${user.userId}</p>
    <p><b>Name:</b> ${user.username}</p>
    <p><b>Introducer ID:</b> ${user.introducerId}</p>
    <p><b>Position:</b> ${user.position}</p>
  `;

  // =====================
  // 🔥 LINKS (FINAL FIXED)
  // =====================
  let ugli = "register.html?type=upgrade&id=" + user.userId;
  let rli  = "register.html?type=repurchase&id=" + user.userId;
  let fr   = "register.html?ref=" + user.userId;

  // FORCE SAFE RENDER
  setTimeout(function() {
    document.getElementById("ugliLink").innerText = ugli;
    document.getElementById("rliLink").innerText  = rli;
    document.getElementById("frLink").innerText   = fr;
  }, 200);

  // =====================
  // USERS
  // =====================
  function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
  }

  // =====================
  // INTRODUCER TREE
  // =====================
  function getIntroducerTree(userId) {
    let users = getUsers();
    let result = [];
    let current = users.find(u => u.userId === userId);
    let level = 1;

    while (current && current.introducerId && level <= 30) {
      let parent = users.find(u => u.userId === current.introducerId);
      if (!parent) break;

      result.push({
        level: "L" + level,
        userId: parent.userId,
        name: parent.username
      });

      current = parent;
      level++;
    }

    return result;
  }

  let tree = getIntroducerTree(user.userId);
  let treeHtml = "";

  if (tree.length === 0) {
    treeHtml = "<p>No introducer tree found</p>";
  } else {
    tree.forEach(t => {
      treeHtml += `<p>${t.level} → ${t.userId} (${t.name})</p>`;
    });
  }

  document.getElementById("treeView").innerHTML = treeHtml;

  // =====================
  // SPONSOR TREE
  // =====================
  function getSponsorTree(userId) {
    let users = getUsers();

    let left = users.find(u => u.introducerId === userId && u.position === "LEFT");
    let right = users.find(u => u.introducerId === userId && u.position === "RIGHT");

    return { left, right };
  }

  let sponsor = getSponsorTree(user.userId);

  document.getElementById("sponsorTree").innerHTML = `
    <p><b>LEFT:</b> ${sponsor.left ? sponsor.left.userId + " (" + sponsor.left.username + ")" : "Empty"}</p>
    <p><b>RIGHT:</b> ${sponsor.right ? sponsor.right.userId + " (" + sponsor.right.username + ")" : "Empty"}</p>
  `;

  // =====================
  // ALL USERS
  // =====================
  function renderUsers() {
    let users = getUsers();
    let html = "";

    if (users.length === 0) {
      html = "<p>No users found</p>";
    } else {
      users.forEach(u => {
        html += `<p>
          ${u.userId} — ${u.username}
          (Intro: ${u.introducerId}, Pos: ${u.position})
        </p>`;
      });
    }

    document.getElementById("usersList").innerHTML = html;
  }

  renderUsers();

};

// =====================
// COPY FUNCTION
// =====================
function copyText(id) {
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
