<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<hr>

<h3>Your Links</h3>

<p><b>UGLI:</b></p>
<input type="text" id="ugliLink" readonly><br>
<button onclick="copyLink('ugliLink')">Copy</button>

<br><br>

<p><b>RLI:</b></p>
<input type="text" id="rliLink" readonly><br>
<button onclick="copyLink('rliLink')">Copy</button>

<br><br>

<p><b>FR:</b></p>
<input type="text" id="frLink" readonly><br>
<button onclick="copyLink('frLink')">Copy</button>

<hr>

<h3>Introducer Tree</h3>
<div id="treeView"></div>

<br><br>

<button onclick="logout()">Logout</button>

<script>

// USER
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Login first");
  window.location.href = "login.html";
}

// INFO
document.getElementById("userInfo").innerHTML =
  "<p>User ID: " + user.userId + "</p>" +
  "<p>Name: " + user.username + "</p>" +
  "<p>Introducer: " + user.introducerId + "</p>" +
  "<p>Position: " + user.position + "</p>";

// WALLET
document.getElementById("wallet").innerText = user.wallet || 0;

// LINKS
let base = "register.html";

document.getElementById("ugliLink").value = base + "?type=upgrade&id=" + user.userId;
document.getElementById("rliLink").value  = base + "?type=repurchase&id=" + user.userId;
document.getElementById("frLink").value   = base + "?ref=" + user.userId;

// COPY
function copyLink(id) {
  let input = document.getElementById(id);
  input.select();
  document.execCommand("copy");
  alert("Copied");
}

// USERS
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// TREE
function getTree(userId) {
  let users = getUsers();
  let result = [];
  let current = users.find(u => u.userId === userId);
  let level = 1;

  while (current && current.introducerId && level <= 30) {
    let parent = users.find(u => u.userId === current.introducerId);
    if (!parent) break;

    result.push("L" + level + " → " + parent.userId + " (" + parent.username + ")");
    current = parent;
    level++;
  }

  return result;
}

// RENDER TREE
let tree = getTree(user.userId);
let html = "";

tree.forEach(t => {
  html += "<p>" + t + "</p>";
});

document.getElementById("treeView").innerHTML = html;

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
