<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div id="userInfo"></div>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<hr>

<h3>Your Links</h3>

<p><b>UGLI:</b></p>
<p id="ugliLink">Loading...</p>
<button onclick="copyText('ugliLink')">Copy</button>

<br><br>

<p><b>RLI:</b></p>
<p id="rliLink">Loading...</p>
<button onclick="copyText('rliLink')">Copy</button>

<br><br>

<p><b>FR:</b></p>
<p id="frLink">Loading...</p>
<button onclick="copyText('frLink')">Copy</button>

<hr>

<h3>Linear Next-to-Next Tree</h3>
<div id="treeView"></div>

<br><br>

<button onclick="logout()">Logout</button>

<script>

window.onload = function() {

  // =====================
  // LOAD USER
  // =====================
  let user = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  // =====================
  // GET USERS
  // =====================
  function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
  }

  let users = getUsers();
  let freshUser = users.find(u => u.userId === user.userId);

  if (!freshUser) {
    alert("User not found");
    return;
  }

  // =====================
  // USER INFO
  // =====================
  document.getElementById("userInfo").innerHTML =
    "<p>User ID: " + freshUser.userId + "</p>" +
    "<p>Name: " + freshUser.username + "</p>" +
    "<p>Introducer: " + freshUser.introducerId + "</p>" +
    "<p>Position: " + freshUser.position + "</p>";

  // =====================
  // WALLET
  // =====================
  document.getElementById("wallet").innerText = freshUser.wallet || 0;

  // =====================
  // LINKS
  // =====================
  let base = window.location.origin + "/BestWayGrow-System/";

  let ugli = base + "upgrade.html?id=" + freshUser.userId;
  let rli  = base + "repurchase.html?id=" + freshUser.userId;
  let fr   = base + "register.html?ref=" + freshUser.userId;

  document.getElementById("ugliLink").innerText = ugli;
  document.getElementById("rliLink").innerText  = rli;
  document.getElementById("frLink").innerText   = fr;

  // =====================
  // LINEAR TREE (NEXT → NEXT)
  // =====================
  function buildLinearChain(startUserId, users) {

    let chain = [];
    let currentId = startUserId;

    while (currentId) {

      let currentUser = users.find(u => u.userId === currentId);
      if (!currentUser) break;

      chain.push(currentUser);

      // find children
      let children = users.filter(u => u.introducerId === currentId);

      if (children.length === 0) break;

      // optional sorting (by creation time)
      if (children[0].createdAt) {
        children.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      }

      // take FIRST child as next
      currentId = children[0].userId;
    }

    return chain;
  }

  let chain = buildLinearChain(freshUser.userId, users);

  let html = "<ul>";

  chain.forEach(u => {
    html += "<li>" + u.userId + " (" + u.username + ")</li>";
  });

  html += "</ul>";

  document.getElementById("treeView").innerHTML = html;

};

// =====================
// COPY FUNCTION
// =====================
function copyText(id) {
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
