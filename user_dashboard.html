<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin:0;
      background: linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background: linear-gradient(135deg,#4a00e0,#8e2de2);
      color:#fff;
      padding:18px;
      text-align:center;
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
    }

    .menu button {
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg,#007bff,#00c6ff);
      color:#fff;
      cursor:pointer;
    }

    .menu button.active {
      background:linear-gradient(135deg,#003f88,#0059b3);
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      max-width:700px;
      margin:auto;
    }

    .section-title {
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .action-btn {
      margin:5px;
      padding:8px 14px;
      border:none;
      border-radius:8px;
      background:linear-gradient(135deg,#28a745,#00c851);
      color:#fff;
      cursor:pointer;
    }

    input.ref-box {
      width:100%;
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 USER DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="safeClick(this,loadHome)">Home</button>
  <button onclick="safeClick(this,loadPinSection)">PIN</button>
  <button onclick="safeClick(this,loadUpgrade)">Upgrade</button>
  <button onclick="safeClick(this,loadRepurchase)">Repurchase</button>
  <button onclick="safeClick(this,loadWallet)">Wallet</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>
<script src="pin_master_system.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") initCoreSystem();

// ================= SYSTEM SAFETY =================
function isDashboardAllowed() {

  if (typeof getSystemSettings === "function") {
    let s = getSystemSettings();
    if (s && s.lockMode) return false;
  }

  if (typeof isSystemSafe === "function") {
    if (!isSystemSafe()) return false;
  }

  return true;
}

// ================= SAFE CLICK =================
function safeClick(btn, fn) {
  if (window.uiLock) return;
  window.uiLock = true;

  setActive(btn);

  try {
    fn();
  } catch (e) {
    console.error(e);
  }

  setTimeout(() => {
    window.uiLock = false;
  }, 500);
}

// ================= AUTH =================
let session = null;

try {
  session = JSON.parse(localStorage.getItem("loggedInUser") || "null");
} catch {}

if (!session || !session.userId || !isDashboardAllowed()) {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
  throw new Error("STOP");
}

let user = typeof getUserById === "function"
  ? getUserById(session.userId)
  : null;

if (!user) {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
  throw new Error("STOP");
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome (" + user.userId + ")";

// ================= MENU =================
function setActive(btn) {
  document.querySelectorAll(".menu button")
    .forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// ================= REFERRAL =================
function generateRefLink(userId) {
  return window.location.origin +
    "/BestWayGrow-System/user_register.html?ref=" + userId;
}

function copyRefLink() {
  let input = document.getElementById("refLink");
  input.select();
  navigator.clipboard.writeText(input.value);
  document.getElementById("copyMsg").innerText = "✅ Link copied!";
}

// ================= HOME =================
function loadHome() {

  let refLink = generateRefLink(user.userId);

  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Dashboard Overview</div>

    <p>Status: ${user.status || "inactive"}</p>
    <p>Upgrade Level: ${user.upgradeLevel || 0}</p>
    <p>Repurchase Count: ${user.repurchaseCount || 0}</p>

    <hr><br>

    <div class="section-title">My Referral Link 🔗</div>

    <input id="refLink" class="ref-box" value="${refLink}" readonly><br><br>

    <button class="action-btn" onclick="copyRefLink()">Copy Link</button>

    <p id="copyMsg"></p>
  `;
}

// ================= PIN (FIXED 🔥) =================
function loadPinSection() {

  let allPins = typeof loadPins === "function" ? loadPins() : [];

  let pins = allPins.filter(p =>
    p.ownerId === user.userId || p.usedBy === user.userId
  );

  let html = `<div class="section-title">PIN Section</div>`;

  if (!pins.length) {
    html += `<p>No PIN</p>`;
  }

  pins.forEach(p => {
    html += `<p>${p.pinId} - ₹${p.amount || 0} (${p.status})</p>`;
  });

  document.getElementById("mainContent").innerHTML = html;
}

// ================= NAV =================
function loadUpgrade() {
  location.href = "user_upgrade.html";
}

function loadRepurchase() {
  location.href = "user_repurchase.html";
}

function loadWallet() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Wallet</div>
    <p>Balance: ₹${user.wallet || 0}</p>
  `;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
