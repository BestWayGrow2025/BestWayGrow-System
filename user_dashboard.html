<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#f4f7f9;
    }

    header {
      background: linear-gradient(90deg,#0066ff,#00cc99);
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 6px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:20px;
      background:#eee;
      cursor:pointer;
      transition:0.3s;
    }

    .menu button:hover {
      background:#00cc99;
      color:#fff;
    }

    .active {
      background:#0066ff !important;
      color:#fff !important;
    }

    .content {
      padding:20px;
      text-align:center;
    }

    .card {
      background:#fff;
      padding:20px;
      margin:10px auto;
      width:90%;
      max-width:500px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th,td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    input, button {
      padding:8px;
      margin:5px;
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 USER DASHBOARD V7</h2>
  <p id="welcome"></p>
</header>

<!-- MENU -->
<div class="menu">

  <button onclick="loadPage('home',this)">Home</button>
  <button onclick="loadPage('user',this)">User</button>
  <button onclick="loadPage('pin',this)">PIN</button>
  <button onclick="loadPage('wallet',this)">Wallet</button>
  <button onclick="loadPage('register',this)">Register</button>
  <button onclick="loadPage('upgrade',this)">Upgrade</button>
  <button onclick="loadPage('franchise',this)">Franchise</button>
  <button onclick="loadPage('ticket',this)">Ticket</button>
  <button onclick="loadPage('content',this)">Content</button>
  <button onclick="loadPage('plan',this)">Plan</button>
  <button onclick="loadPage('settings',this)">Settings</button>

</div>

<!-- CONTENT -->
<div class="content" id="contentBox">
  Loading...
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session;
try {
  session = JSON.parse(localStorage.getItem("loggedInUser"));
} catch {
  session = null;
}

if (!session || !session.userId) {
  location.href = "user_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user) {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome (" + user.userId + ")";

// MENU ACTIVE
function setActive(btn){
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// LOAD PAGE
function loadPage(page,btn){

  if(btn) setActive(btn);

  let html = "";

  // HOME
  if(page === "home"){
    html = `
    <div class="card">
      <h3>Dashboard Overview</h3>
      <p>User ID: ${user.userId}</p>
      <p>Status: ${user.status || "active"}</p>
    </div>`;
  }

  // USER TREE
  if(page === "user"){
    let directs = getDirectUsers(user.userId);
    html = `<div class="card"><h3>Direct Users</h3>`;

    if(!directs.length) html += "No Users";
    else {
      html += `<table><tr><th>ID</th></tr>`;
      directs.forEach(u=>{
        html += `<tr><td>${u.userId}</td></tr>`;
      });
      html += "</table>";
    }

    html += "</div>";
  }

  // PIN
  if(page === "pin"){
    html = `
    <div class="card">
      <h3>PIN System</h3>
      <p>Apply / View PIN here</p>
    </div>`;
  }

  // WALLET
  if(page === "wallet"){
    html = `
    <div class="card">
      <h3>Wallet</h3>
      <p>Balance: ₹0</p>
    </div>`;
  }

  // REGISTER
  if(page === "register"){
    html = `
    <div class="card">
      <h3>Register New User</h3>
      <button onclick="alert('Use registration page')">Open Register</button>
    </div>`;
  }

  // UPGRADE
  if(page === "upgrade"){
    html = `
    <div class="card">
      <h3>Upgrade Plan</h3>
      <p>Upgrade feature here</p>
    </div>`;
  }

  // FRANCHISE
  if(page === "franchise"){
    html = `
    <div class="card">
      <h3>Franchise</h3>
      <p>Apply / Status</p>
    </div>`;
  }

  // TICKET
  if(page === "ticket"){
    html = `
    <div class="card">
      <h3>Support Ticket</h3>
      <p>Create / View tickets</p>
    </div>`;
  }

  // CONTENT
  if(page === "content"){
    html = `
    <div class="card">
      <h3>Content Platform</h3>
      <p>Upload Shorts / View Feed</p>
    </div>`;
  }

  // PLAN
  if(page === "plan"){
    html = `
    <div class="card">
      <h3>Plan Overview</h3>
      <p>All plans here</p>
    </div>`;
  }

  // SETTINGS
  if(page === "settings"){
    html = `
    <div class="card">
      <h3>Settings</h3>
      <button onclick="logout()">Logout</button>
    </div>`;
  }

  document.getElementById("contentBox").innerHTML = html;
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
}

// DEFAULT LOAD
loadPage('home');

</script>

</body>
</html>
