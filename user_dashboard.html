<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin:0;
      background: linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background: linear-gradient(135deg,#4a00e0,#8e2de2);
      color:#fff;
      padding:18px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.2);
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    /* MENU */
    .menu {
      display:flex;
      overflow-x:auto;
      white-space:nowrap;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .menu button {
      flex:0 0 auto;
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      background:linear-gradient(135deg,#007bff,#00c6ff);
      color:#fff;
      font-size:13px;
      transition:0.3s;
    }

    .menu button.active {
      background:linear-gradient(135deg,#003f88,#0059b3);
    }

    .menu button:hover {
      transform:scale(1.05);
      opacity:0.9;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
      max-width:700px;
      margin:auto;
      animation:fadeIn 0.3s ease;
    }

    .section-title {
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
      border-bottom:2px solid #eee;
      padding-bottom:5px;
    }

    .action-btn {
      margin:5px;
      padding:8px 14px;
      border:none;
      border-radius:8px;
      background:linear-gradient(135deg,#28a745,#00c851);
      color:#fff;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
      font-size:13px;
    }

    th {
      background:#f1f4f8;
    }

    th, td {
      border:1px solid #eee;
      padding:10px;
      text-align:center;
    }

    .green { color:green; font-weight:bold; }
    .red { color:red; font-weight:bold; }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 USER DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="setActive(this);loadHome()">Home</button>
  <button onclick="setActive(this);loadPins()">PIN</button>
  <button onclick="setActive(this);loadUpgrade()">Upgrade</button>
  <button onclick="setActive(this);loadRepurchase()">Repurchase</button>
  <button onclick="setActive(this);loadWallet()">Wallet</button>
  <button onclick="setActive(this);loadTree()">Tree</button>
  <button onclick="setActive(this);loadTickets()">Support</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInUser") || "null");

if (!session || !session.userId) {
  location.href = "user_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "user") {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome (" + user.userId + ")";

// ACTIVE MENU
function setActive(btn) {
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// STORAGE
function getPins() {
  return JSON.parse(localStorage.getItem("pins") || "[]");
}

// HOME
function loadHome() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Dashboard Overview</div>
    <p>Status: ${user.status || "inactive"}</p>
    <p>Upgrade Level: ${user.upgradeLevel || 0}</p>
    <p>Repurchase Count: ${user.repurchaseCount || 0}</p>
  `;
}

// PIN
function loadPins() {

  let pins = getPins().filter(p =>
    p.ownerId === user.userId || p.usedBy === user.userId
  );

  let html = `<div class="section-title">PIN Section</div>
  <button class="action-btn" onclick="location.href='user_pin_activation.html'">Activate PIN</button>
  <button class="action-btn" onclick="location.href='user_pin_use.html'">Use PIN</button>
  <table>
    <tr><th>PIN</th><th>Amount</th><th>Status</th></tr>`;

  if (!pins.length) {
    html += `<tr><td colspan="3">No PIN</td></tr>`;
  }

  pins.forEach(p => {
    let status = p.used ? "USED" : "AVAILABLE";
    let cls = p.used ? "red" : "green";

    html += `
      <tr>
        <td>${p.pin}</td>
        <td>₹${p.amount || 0}</td>
        <td class="${cls}">${status}</td>
      </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// UPGRADE
function loadUpgrade() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Upgrade</div>
    <p>Current Level: ${user.upgradeLevel || 0}</p>
    <button class="action-btn" onclick="location.href='user_pin_use.html'">Upgrade Now</button>
  `;
}

// REPURCHASE
function loadRepurchase() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Repurchase</div>
    <p>Total Repurchase: ${user.repurchaseCount || 0}</p>
    <button class="action-btn" onclick="location.href='user_pin_use.html'">Repurchase Now</button>
  `;
}

// WALLET
function loadWallet() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Wallet</div>
    <p>Balance: ₹${user.wallet || 0}</p>
  `;
}

// TREE
function loadTree() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">User Tree</div>
    <p>Coming Soon 🌳</p>
  `;
}

// SUPPORT
function loadTickets() {
  document.getElementById("mainContent").innerHTML = `
    <div class="section-title">Support / Tickets</div>
    <p>Coming Soon 🎫</p>
  `;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
