<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
    ul { list-style-type: none; padding-left: 0; }
    li { margin-bottom: 10px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>USER DASHBOARD</h1>
<p id="welcome"></p>
<button onclick="logout()">Logout</button>

<div class="box">
  <h3>My Profile</h3>
  <p id="profile"></p>
</div>

<div class="box">
  <h3>My Wallet</h3>
  <p id="wallet"></p>
</div>

<div class="box">
  <h3>Transaction History</h3>
  <div id="transactions"></div>
</div>

<div class="box">
  <h3>Withdraw History</h3>
  <div id="withdrawHistory"></div>
</div>

<div class="box">
  <h3>My Links</h3>
  <p id="links"></p>
</div>

<div class="box">
  <h3>Actions</h3>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="repurchase()">Repurchase</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="applyFranchise()">Apply for Franchise</button>
</div>

<div class="box">
  <h3>My Team</h3>
  <div id="tree"></div>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem(); // ✅ MUST
</script>

<!-- ✅ OTHER SYSTEMS -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>
<script src="pin_system.js"></script>
<script src="withdrawal_system.js"></script>

<script>

// ================= AUTH =================
let sessionUser = JSON.parse(localStorage.getItem("loggedInUser"));

if (!sessionUser) {
  alert("Access denied");
  window.location.href = "user_login.html";
}

let users = getUsers();
let user = users.find(u => u.userId === sessionUser.userId);

if (!user) {
  alert("User not found");
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= PROFILE =================
function getSponsor(u) {
  let s = users.find(x => x.userId === u.sponsorId);
  return s ? s.username + " (" + s.userId + ")" : "SYSTEM";
}

document.getElementById("profile").innerHTML = `
  User ID: ${user.userId}<br>
  Name: ${user.username}<br>
  Mobile: ${user.mobile || "-"}<br>
  Sponsor: ${getSponsor(user)}<br>
  Introducer: ${user.introducerId || "-"}<br>
  Join Time: ${user.createdAt || "-"}<br>
  Status: ${user.status || "inactive"}<br>
  Active: ${isUserActive(user.userId) ? "YES" : "NO"}
`;

// ================= WALLET =================
function loadWallet() {
  let u = getUserById(user.userId);
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (u?.wallet || 0);
}

// ================= TRANSACTIONS =================
function loadTransactions() {
  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");
  let list = txns.filter(t => t.userId === user.userId);

  if (list.length === 0) {
    document.getElementById("transactions").innerHTML = "No transactions";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(t => {
    html += `<li>${t.type} ₹${t.amount} - ${t.reason}<br><small>${t.time}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("transactions").innerHTML = html;
}

// ================= WITHDRAW =================
function loadWithdrawHistory() {
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");
  let list = withdrawals.filter(w => w.userId === user.userId);

  if (list.length === 0) {
    document.getElementById("withdrawHistory").innerHTML = "No withdrawal history";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(w => {
    html += `<li>${w.requestId} - ₹${w.amount} (${w.status})<br><small>${w.time}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("withdrawHistory").innerHTML = html;
}

// ================= LINKS =================
let base = "https://bestwaygrow2025.github.io/BestWayGrow-System/";

document.getElementById("links").innerHTML = `
  Register Link:<br>
  ${base}register.html?ref=${user.userId}<br><br>

  Upgrade Link:<br>
  ${base}upgrade.html?user=${user.userId}<br><br>

  Repurchase Link:<br>
  ${base}repurchase.html?user=${user.userId}
`;

// ================= ACTIONS =================
function upgrade() {
  let pin = prompt("Enter Upgrade Pin:");
  if (!pin) return;
  usePin(pin, user.userId, "upgrade");
  loadWallet(); loadTransactions();
}

function repurchase() {
  let pin = prompt("Enter Repurchase Pin:");
  if (!pin) return;
  usePin(pin, user.userId, "repurchase");
  loadWallet(); loadTransactions();
}

function withdraw() {
  let amt = prompt("Enter amount:");
  if (!amt || amt <= 0) return alert("Invalid amount");

  requestWithdraw(user.userId, parseFloat(amt));
  loadWallet(); loadTransactions(); loadWithdrawHistory();
}

// ================= APPLY FRANCHISE =================
function applyFranchise() {
  let requests = JSON.parse(localStorage.getItem("franchiseRequests") || "[]");

  if (user.role === "franchise") return alert("Already franchise");

  if (requests.find(r => r.userId === user.userId)) {
    return alert("Already applied");
  }

  requests.push({
    requestId: "FR" + Date.now(),
    userId: user.userId,
    status: "PENDING",
    time: new Date().toISOString()
  });

  localStorage.setItem("franchiseRequests", JSON.stringify(requests));
  alert("Request submitted");
}

// ================= TEAM =================
function buildTree(id) {
  let users = getUsers();
  let children = users.filter(u => u.sponsorId === id);

  if (!children.length) return "No team";

  let html = "<ul>";
  children.forEach(c => {
    html += `<li>${c.username} (${c.userId})</li>`;
  });
  html += "</ul>";

  return html;
}

document.getElementById("tree").innerHTML = buildTree(user.userId);

// ================= INIT =================
loadWallet();
loadTransactions();
loadWithdrawHistory();

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
