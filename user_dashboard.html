<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
    ul { list-style-type: none; padding-left: 20px; }
    li { margin-bottom: 5px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>USER DASHBOARD</h1>
<p id="welcome"></p>
<button onclick="logout()">Logout</button>

<div class="box">
  <h3>My Profile</h3>
  <p id="profile"></p>
</div>

<div class="box">
  <h3>My Wallet</h3>
  <p id="wallet"></p>
</div>

<div class="box">
  <h3>Transaction History</h3>
  <div id="transactions"></div>
</div>

<div class="box">
  <h3>Withdraw History</h3>
  <div id="withdrawHistory"></div>
</div>

<div class="box">
  <h3>My Links</h3>
  <p id="links"></p>
</div>

<div class="box">
  <h3>Actions</h3>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="repurchase()">Repurchase</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="applyFranchise()">Apply for Franchise</button>
</div>

<!-- ✅ TREE CONTROL -->
<div class="box">
  <h3>My Team</h3>
  <button onclick="toggleTree()">View Team Tree</button>
  <div id="tree" style="display:none; margin-top:10px;"></div>
</div>

<!-- ✅ CORE -->
<script src="CORE_system.js"></script>

<!-- ✅ SYSTEM FILES -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>
<script src="pin_system.js"></script>
<script src="withdrawal_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let sessionUser = JSON.parse(localStorage.getItem("loggedInUser"));

if (!sessionUser) {
  alert("Access denied");
  window.location.href = "user_login.html";
}

let user = getUserById(sessionUser.userId);

if (!user) {
  alert("User not found");
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= PROFILE =================
function getSponsor(u) {
  let s = getUserById(u.sponsorId);
  return s ? s.username + " (" + s.userId + ")" : "SYSTEM";
}

document.getElementById("profile").innerHTML = `
  User ID: ${user.userId}<br>
  Name: ${user.username}<br>
  Mobile: ${user.mobile || "-"}<br>
  Sponsor: ${getSponsor(user)}<br>
  Introducer: ${user.introducerId || "-"}<br>
  Join Time: ${user.createdAt || "-"}<br>
  Status: ${user.status || "inactive"}<br>
  Active: ${isUserActive(user.userId) ? "YES" : "NO"}
`;

// ================= WALLET =================
function loadWallet() {
  let u = getUserById(user.userId);
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (u?.wallet || 0);
}

// ================= TRANSACTIONS =================
function loadTransactions() {
  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");
  let list = txns.filter(t => t.userId === user.userId);

  if (list.length === 0) {
    document.getElementById("transactions").innerHTML = "No transactions";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(t => {
    html += `<li>${t.type} ₹${t.amount} - ${t.reason}<br><small>${t.time}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("transactions").innerHTML = html;
}

// ================= WITHDRAW =================
function loadWithdrawHistory() {
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");
  let list = withdrawals.filter(w => w.userId === user.userId);

  if (list.length === 0) {
    document.getElementById("withdrawHistory").innerHTML = "No withdrawal history";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(w => {
    html += `<li>${w.requestId} - ₹${w.amount} (${w.status})<br><small>${w.time}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("withdrawHistory").innerHTML = html;
}

// ================= LINKS =================
let base = "https://bestwaygrow2025.github.io/BestWayGrow-System/";

document.getElementById("links").innerHTML = `
  Register Link:<br>
  ${base}user.register.html?ref=${user.userId}<br><br>

  Upgrade Link:<br>
  ${base}user.upgrade.html?user=${user.userId}<br><br>

  Repurchase Link:<br>
  ${base}user.repurchase.html?user=${user.userId}
`;

// ================= ACTIONS =================
function upgrade() {
  window.location.href = "user.upgrade.html?user=" + user.userId;
}

function repurchase() {
  window.location.href = "user.repurchase.html?user=" + user.userId;
}

function withdraw() {
  window.location.href = "user.withdraw.html?user=" + user.userId;
}

// ================= FRANCHISE =================
function applyFranchise() {
  let requests = JSON.parse(localStorage.getItem("franchiseRequests") || "[]");

  if (user.role === "franchise") return alert("Already franchise");

  if (requests.find(r => r.userId === user.userId)) {
    return alert("Already applied");
  }

  requests.push({
    requestId: "FR" + Date.now(),
    userId: user.userId,
    status: "PENDING",
    time: new Date().toISOString()
  });

  localStorage.setItem("franchiseRequests", JSON.stringify(requests));
  alert("Request submitted");
}

// ================= TREE (DEEP STRUCTURE) =================
function buildTree(userId) {
  let users = getUsers();

  function getChildren(parentId) {
    return users.filter(u => u.sponsorId === parentId);
  }

  function createNode(id) {
    let children = getChildren(id);

    let html = `<li>${id}`;

    if (children.length > 0) {
      html += "<ul>";
      children.forEach(c => {
        html += createNode(c.userId);
      });
      html += "</ul>";
    }

    html += "</li>";
    return html;
  }

  return "<ul>" + createNode(userId) + "</ul>";
}

// ================= TOGGLE TREE =================
let treeLoaded = false;

function toggleTree() {
  let div = document.getElementById("tree");

  if (div.style.display === "none") {
    div.style.display = "block";

    if (!treeLoaded) {
      div.innerHTML = buildTree(user.userId);
      treeLoaded = true;
    }

  } else {
    div.style.display = "none";
  }
}

// ================= INIT =================
loadWallet();
loadTransactions();
loadWithdrawHistory();

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
