<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
</head>
<body>

<h2>User Dashboard</h2>

<p id="userInfo"></p>

<hr>

<!-- 🔥 SHARE LINK -->
<h3>🔗 Share & Earn</h3>

<input type="text" id="refLink" readonly style="width: 300px;">
<br><br>

<button onclick="copyLink()">Copy Link</button>

<p id="copyMsg"></p>

<hr>

<h3>🎟️ My PINs (ASSIGNED ONLY)</h3>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>PIN</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="pinTable"></tbody>
</table>

<hr>

<button onclick="goUpgrade()">Upgrade</button>
<button onclick="goRepurchase()">Repurchase</button>

<!-- ✅ CORE -->
<script src="core_system.js"></script>

<!-- 🔥 PIN MASTER -->
<script src="pin_master_system.js"></script>

<script>

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {

  initCoreSystem();

  let session;
  try {
    session = JSON.parse(localStorage.getItem("loggedInUser"));
  } catch {
    session = null;
  }

  if (!session) {
    alert("Login required");
    window.location.href = "user_login.html";
    return;
  }

  let user = getUserById(session.userId);

  if (!user) {
    alert("User not found");
    localStorage.removeItem("loggedInUser");
    window.location.href = "user_login.html";
    return;
  }

  document.getElementById("userInfo").innerText =
    "User: " + user.username + " (" + user.userId + ")";

  // 🔥 SHARE LINK (LIVE)
  let link = "https://bestwaygrow2025.github.io/BestWayGrow-System/user_register.html?ref=" + user.userId;
  document.getElementById("refLink").value = link;

  loadUserPins();
});


// ================= COPY LINK =================
function copyLink() {
  let input = document.getElementById("refLink");
  input.select();
  document.execCommand("copy");

  document.getElementById("copyMsg").innerText = "✅ Link copied!";
}


// ================= LOAD USER PINS =================
function loadUserPins() {

  let session = JSON.parse(localStorage.getItem("loggedInUser"));
  if (!session) return;

  let allPins = [];
  try {
    allPins = loadPins();
  } catch {
    allPins = [];
  }

  // 🔥 ENTERPRISE FILTER
  // Only pins assigned to user
  let pins = allPins.filter(p =>
    p.ownerId === session.userId &&
    p.status === "assigned"
  );

  let table = document.getElementById("pinTable");
  table.innerHTML = "";

  if (!pins || pins.length === 0) {
    table.innerHTML = "<tr><td colspan='5'>No Assigned PINs</td></tr>";
    return;
  }

  pins.forEach(pin => {

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${pin.pinId}</td>
      <td>${pin.type}</td>
      <td>₹${pin.amount}</td>
      <td style="color:blue">ASSIGNED</td>
    `;

    let actionCell = document.createElement("td");

    // 🔥 ENTERPRISE ACTION
    let btn = document.createElement("button");
    btn.innerText = "Use";
    btn.onclick = function () {
      selectPin(pin);
    };

    actionCell.appendChild(btn);
    row.appendChild(actionCell);

    table.appendChild(row);
  });
}


// ================= SELECT PIN =================
function selectPin(pin) {

  if (!pin || !pin.pinId) {
    alert("Invalid PIN");
    return;
  }

  if (!confirm("Use this PIN?")) return;

  // 🔥 STORE SELECTED PIN (ENTERPRISE FLOW)
  localStorage.setItem("selectedPin", JSON.stringify({
    pinId: pin.pinId,
    type: pin.type
  }));

  if (pin.type === "upgrade") {
    window.location.href = "user_upgrade.html";
  } else {
    window.location.href = "user_repurchase.html";
  }
}


// ================= NAVIGATION =================
function goUpgrade() {
  window.location.href = "user_upgrade.html";
}

function goRepurchase() {
  window.location.href = "user_repurchase.html";
}

</script>

</body>
</html>
