<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
    .pending { color: orange; font-weight: bold; }
    .inactive { color: red; font-weight: bold; }
    .active { color: green; font-weight: bold; }
    ul { list-style-type: none; padding-left: 20px; }
    li { margin-bottom: 5px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>USER DASHBOARD</h1>
<p id="welcome"></p>
<button onclick="logout()">Logout</button>

<!-- ✅ STATUS ALERT -->
<div id="statusBox" class="box"></div>

<div class="box">
  <h3>My Profile</h3>
  <p id="profile"></p>
</div>

<div class="box">
  <h3>My Wallet</h3>
  <p id="wallet"></p>
</div>

<div class="box">
  <h3>Transaction History</h3>
  <div id="transactions"></div>
</div>

<div class="box">
  <h3>Withdraw History</h3>
  <div id="withdrawHistory"></div>
</div>

<div class="box">
  <h3>My Links</h3>
  <p id="links"></p>
</div>

<div class="box">
  <h3>Actions</h3>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="repurchase()">Repurchase</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="goFranchise()">Apply for Franchise</button>
</div>

<div class="box">
  <h3>My Team</h3>
  <button onclick="toggleTree()">View Team</button>
  <div id="tree" style="display:none; margin-top:10px;"></div>
</div>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM FILES -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>
<script src="pin_system.js"></script>
<script src="withdrawal_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let user = protectPage({ role: "user" });
if (!user) return;

// ================= STATUS CHECK =================
function loadStatus() {

  let box = document.getElementById("statusBox");

  if (user.status !== "active") {

    box.innerHTML = `
      <span class="inactive">⚠ Account Inactive</span><br>
      Please activate your account to unlock earnings.
    `;

  } else if (!isUserActive(user.userId)) {

    box.innerHTML = `
      <span class="pending">⏳ Plan Expired</span><br>
      Please repurchase to continue benefits.
    `;

  } else {

    box.innerHTML = `
      <span class="active">✅ Active Account</span><br>
      All systems running normally.
    `;
  }
}

// ================= UI =================
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= PROFILE =================
function getSponsor(u) {
  let s = getUserById(u.sponsorId);
  return s ? s.username + " (" + s.userId + ")" : "SYSTEM";
}

function loadProfile() {
  document.getElementById("profile").innerHTML = `
    User ID: ${user.userId}<br>
    Name: ${user.username}<br>
    Mobile: ${user.mobile || "-"}<br>
    Sponsor: ${getSponsor(user)}<br>
    Introducer: ${user.introducerId || "-"}<br>
    Join Time: ${user.createdAt || "-"}<br>
    Status: ${user.status}<br>
    Active: ${isUserActive(user.userId) ? "YES" : "NO"}
  `;
}

// ================= WALLET =================
function loadWallet() {
  let u = getUserById(user.userId);
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (u?.wallet || 0);
}

// ================= TRANSACTIONS =================
function loadTransactions() {
  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");
  let list = txns.filter(t => t.userId === user.userId);

  if (!list.length) {
    document.getElementById("transactions").innerHTML = "No transactions";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(t => {
    html += `<li>${t.type} ₹${t.amount} - ${t.reason}<br><small>${t.time}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("transactions").innerHTML = html;
}

// ================= WITHDRAW =================
function loadWithdrawHistory() {
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");
  let list = withdrawals.filter(w => w.userId === user.userId);

  if (!list.length) {
    document.getElementById("withdrawHistory").innerHTML = "No withdrawal history";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(w => {
    html += `<li>${w.requestId} - ₹${w.amount} (${w.status})<br><small>${w.time}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("withdrawHistory").innerHTML = html;
}

// ================= LINKS =================
function loadLinks() {
  let base = "https://bestwaygrow2025.github.io/BestWayGrow-System/";

  document.getElementById("links").innerHTML = `
    Register Link:<br>
    ${base}user.register.html?ref=${user.userId}<br><br>

    Upgrade Link:<br>
    ${base}user.upgrade.html?user=${user.userId}<br><br>

    Repurchase Link:<br>
    ${base}user.repurchase.html?user=${user.userId}
  `;
}

// ================= ACTIONS =================
function upgrade() {
  window.location.href = "user.upgrade.html?user=" + user.userId;
}

function repurchase() {
  window.location.href = "user.repurchase.html?user=" + user.userId;
}

function withdraw() {
  window.location.href = "user.withdraw.html?user=" + user.userId;
}

function goFranchise() {
  window.location.href = "user_apply_franchise.html";
}

// ================= TREE =================
function buildTree(userId, depth = 0) {

  if (depth > 10) return "";

  let users = getUsers();
  let children = users.filter(u => u.sponsorId === userId);

  if (!children.length) return "";

  let html = "<ul>";

  children.forEach(c => {
    html += `<li>${c.userId}`;
    html += buildTree(c.userId, depth + 1);
    html += "</li>";
  });

  html += "</ul>";

  return html;
}

let treeLoaded = false;

function toggleTree() {
  let div = document.getElementById("tree");

  if (div.style.display === "none") {
    div.style.display = "block";

    if (!treeLoaded) {
      div.innerHTML = buildTree(user.userId);
      treeLoaded = true;
    }

  } else {
    div.style.display = "none";
  }
}

// ================= AUTO REFRESH (PRO) =================
setInterval(() => {
  loadWallet();
  loadTransactions();
  loadWithdrawHistory();
}, 5000);

// ================= INIT LOAD =================
loadStatus();
loadProfile();
loadWallet();
loadTransactions();
loadWithdrawHistory();
loadLinks();

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
