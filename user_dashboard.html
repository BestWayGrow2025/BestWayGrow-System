<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
</head>
<body>

<h2>User Dashboard</h2>

<p id="userInfo"></p>

<hr>

<h3>🎟️ My PINs</h3>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>PIN</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="pinTable"></tbody>
</table>

<hr>

<button onclick="goUpgrade()">Upgrade</button>
<button onclick="goRepurchase()">Repurchase</button>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- PIN -->
<script src="pin_master_system.js"></script>

<script>

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {

  initCoreSystem();

  let session = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!session) {
    alert("Login required");
    window.location.href = "user_login.html";
    return;
  }

  let user = getUserById(session.userId);

  if (!user) {
    alert("User not found");
    localStorage.removeItem("loggedInUser");
    window.location.href = "user_login.html";
    return;
  }

  document.getElementById("userInfo").innerText =
    "User: " + user.username + " (" + user.userId + ")";

  loadUserPins();
});


// ================= LOAD USER PINS =================
function loadUserPins() {

  let session = JSON.parse(localStorage.getItem("loggedInUser"));
  if (!session) return;

  let pins = loadPins().filter(p => p.ownerId === session.userId);

  let table = document.getElementById("pinTable");
  table.innerHTML = "";

  if (pins.length === 0) {
    table.innerHTML = "<tr><td colspan='5'>No PINs found</td></tr>";
    return;
  }

  pins.forEach(pin => {

    let statusColor =
      pin.status === "active" ? "green" :
      pin.status === "used" ? "red" :
      "orange";

    let actionBtn = "";

    if (pin.status === "active") {
      actionBtn = `<button onclick="useMyPin('${pin.pinId}', '${pin.type}')">Use</button>`;
    } else {
      actionBtn = "-";
    }

    table.innerHTML += `
      <tr>
        <td>${pin.pinId}</td>
        <td>${pin.type}</td>
        <td>₹${pin.amount}</td>
        <td style="color:${statusColor}">${pin.status}</td>
        <td>${actionBtn}</td>
      </tr>
    `;
  });
}


// ================= USE PIN =================
function useMyPin(pinId, type) {

  if (!confirm("Use this PIN?")) return;

  // ✅ STORE PIN FOR AUTO FLOW
  localStorage.setItem("selectedPin", JSON.stringify({
    pinId: pinId,
    type: type
  }));

  // 🔁 REDIRECT
  if (type === "upgrade") {
    window.location.href = "user_upgrade.html";
  } else {
    window.location.href = "user_repurchase.html";
  }
}


// ================= NAVIGATION =================
function goUpgrade() {
  window.location.href = "user_upgrade.html";
}

function goRepurchase() {
  window.location.href = "user_repurchase.html";
}

</script>

</body>
</html>
