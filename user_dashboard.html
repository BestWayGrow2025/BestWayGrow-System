<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f7f9;
      text-align:center;
    }

    header {
      background:#4a00e0;
      color:#fff;
      padding:15px;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:8px 12px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      background:#007bff;
      color:#fff;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
      max-width:600px;
      margin:auto;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    .green { color:green; }
    .red { color:red; }
  </style>
</head>

<body>

<header>
  <h2>🚀 USER DASHBOARD V7</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<!-- TOP MENU -->
<div class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadPins()">PIN</button>
  <button onclick="loadUpgrade()">Upgrade</button>
  <button onclick="loadRepurchase()">Repurchase</button>
  <button onclick="loadWallet()">Wallet</button>
  <button onclick="loadTree()">Tree</button>
  <button onclick="loadTickets()">Support</button>
</div>

<!-- MAIN DISPLAY -->
<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInUser") || "null");

if (!session || !session.userId) {
  location.href = "user_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "user") {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome (" + user.userId + ")";

// STORAGE
function getPins() {
  return JSON.parse(localStorage.getItem("pins") || "[]");
}

// ================= HOME =================
function loadHome() {

  document.getElementById("mainContent").innerHTML = `
    <h3>Dashboard Overview</h3>
    <p>Status: ${user.status || "inactive"}</p>
    <p>Upgrade Level: ${user.upgradeLevel || 0}</p>
    <p>Repurchase Count: ${user.repurchaseCount || 0}</p>
  `;
}

// ================= PIN =================
function loadPins() {

  let pins = getPins().filter(p =>
    p.ownerId === user.userId || p.usedBy === user.userId
  );

  let html = `<h3>PIN Section</h3>
  <button onclick="location.href='user_pin_activation.html'">Activate PIN</button>
  <button onclick="location.href='user_pin_use.html'">Use PIN</button>
  <table>
    <tr><th>PIN</th><th>Amount</th><th>Status</th></tr>`;

  if (!pins.length) {
    html += `<tr><td colspan="3">No PIN</td></tr>`;
  }

  pins.forEach(p => {
    let status = p.used ? "USED" : "AVAILABLE";
    let cls = p.used ? "red" : "green";

    html += `
      <tr>
        <td>${p.pin}</td>
        <td>₹${p.amount || 0}</td>
        <td class="${cls}">${status}</td>
      </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= UPGRADE =================
function loadUpgrade() {

  document.getElementById("mainContent").innerHTML = `
    <h3>Upgrade</h3>
    <p>Current Level: ${user.upgradeLevel || 0}</p>
    <button onclick="location.href='user_pin_use.html'">Upgrade Now</button>
  `;
}

// ================= REPURCHASE =================
function loadRepurchase() {

  document.getElementById("mainContent").innerHTML = `
    <h3>Repurchase</h3>
    <p>Total Repurchase: ${user.repurchaseCount || 0}</p>
    <button onclick="location.href='user_pin_use.html'">Repurchase Now</button>
  `;
}

// ================= WALLET =================
function loadWallet() {

  document.getElementById("mainContent").innerHTML = `
    <h3>Wallet</h3>
    <p>Balance: ₹${user.wallet || 0}</p>
  `;
}

// ================= TREE =================
function loadTree() {

  document.getElementById("mainContent").innerHTML = `
    <h3>User Tree</h3>
    <p>Coming Soon 🌳</p>
  `;
}

// ================= SUPPORT =================
function loadTickets() {

  document.getElementById("mainContent").innerHTML = `
    <h3>Support / Tickets</h3>
    <p>Coming Soon 🎫</p>
  `;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
