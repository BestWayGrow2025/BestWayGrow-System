<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f7f9;
    }

    header {
      background:#00994d;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#007bff;
      color:#fff;
    }

    .menu button:hover {
      background:#0056b3;
    }

    .content {
      padding:20px;
      text-align:center;
    }

    .card {
      background:#fff;
      padding:20px;
      margin:auto;
      max-width:500px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
    }
  </style>
</head>

<body>

<header>
  <h2>USER DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<!-- TOP MENU -->
<div class="menu">
  <button onclick="loadSection('home')">Home</button>
  <button onclick="loadSection('pin')">PIN</button>
  <button onclick="loadSection('wallet')">Wallet</button>
  <button onclick="loadSection('upgrade')">Upgrade</button>
  <button onclick="loadSection('repurchase')">Repurchase</button>
  <button onclick="loadSection('franchise')">Franchise</button>
  <button onclick="loadSection('profile')">Profile</button>
</div>

<!-- DYNAMIC CONTENT -->
<div class="content">
  <div id="mainBox" class="card">
    Loading...
  </div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js not loaded"); throw new Error("STOP"); }

// AUTH
let session;
try {
  session = JSON.parse(localStorage.getItem("loggedInUser"));
} catch {
  session = null;
}

if (!session || !session.userId) {
  location.href = "user_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "user") {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome (" + user.userId + ")";

// SECTION LOADER
function loadSection(section) {

  let box = document.getElementById("mainBox");

  if (section === "home") {
    box.innerHTML = `
      <h3>Home</h3>
      <p>ID: ${user.userId}</p>
      <p>Name: ${user.username || user.userId}</p>
      <p>Status: ${user.status || "active"}</p>
    `;
  }

  else if (section === "pin") {
    box.innerHTML = `
      <h3>PIN Section</h3>
      <p>Apply PIN / View PIN / Used PIN</p>
    `;
  }

  else if (section === "wallet") {
    box.innerHTML = `
      <h3>Wallet</h3>
      <p>Balance: ₹0</p>
    `;
  }

  else if (section === "upgrade") {
    box.innerHTML = `
      <h3>Upgrade</h3>
      <button>Upgrade Plan</button>
    `;
  }

  else if (section === "repurchase") {
    box.innerHTML = `
      <h3>Repurchase</h3>
      <button>Buy Again</button>
    `;
  }

  else if (section === "franchise") {
    box.innerHTML = `
      <h3>Franchise</h3>
      <button>Apply for Franchise</button>
    `;
  }

  else if (section === "profile") {
    box.innerHTML = `
      <h3>Profile</h3>
      <p>ID: ${user.userId}</p>
      <p>Name: ${user.username || user.userId}</p>
      <p>Status: ${user.status || "active"}</p>
    `;
  }

}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInUser");
  location.href = "user_login.html";
}

// DEFAULT LOAD
loadSection("home");

</script>

</body>
</html>
