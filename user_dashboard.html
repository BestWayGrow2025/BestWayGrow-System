<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
</head>
<body>

<h2 id="welcome"></h2>

<div id="statusBox"></div><br>
<div id="systemStatus"></div><br>
<div id="profile"></div><br>
<div id="wallet"></div><br>

<h3>Transactions</h3>
<div id="transactions"></div><br>

<h3>Withdraw History</h3>
<div id="withdrawHistory"></div><br>

<h3>Referral Link</h3>
<div id="links"></div><br>

<button onclick="upgrade()">Upgrade</button>
<button onclick="repurchase()">Repurchase</button>
<button onclick="withdraw()">Withdraw</button>
<button onclick="goFranchise()">Franchise</button>
<button onclick="logout()">Logout</button>

<!-- CORE -->
<script src="CORE_system.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function () {

  initCoreSystem();

  let session = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!session) {
    alert("Login required");
    window.location.href = "user_login.html";
    throw new Error("STOP");
  }

  let user = getUserById(session.userId);

  if (!user) {
    alert("User not found");
    localStorage.removeItem("loggedInUser");
    window.location.href = "user_login.html";
    throw new Error("STOP");
  }

  function loadStatus() {
    let box = document.getElementById("statusBox");
    if (!box) return;

    if (user.status !== "active") {
      box.innerHTML = `⚠ Account Inactive`;
    } 
    else if (typeof isUserActive === "function" && !isUserActive(user.userId)) {
      box.innerHTML = `⏳ Plan Expired`;
    } 
    else {
      box.innerHTML = `✅ Active Account`;
    }
  }

  function loadSystemStatus() {
    let el = document.getElementById("systemStatus");
    if (!el) return;

    let upgradePin = typeof getActivePin === "function" ? getActivePin("upgrade") : null;
    let repurchasePin = typeof getActivePin === "function" ? getActivePin("repurchase") : null;

    let upgrade = upgradePin ? "🟢 ON" : "🔴 OFF";
    let repurchase = repurchasePin ? "🟢 ON" : "🔴 OFF";

    el.innerHTML = `
      Upgrade PIN: ${upgrade}<br>
      Repurchase PIN: ${repurchase}
    `;
  }

  function loadProfile() {
    let el = document.getElementById("profile");
    if (!el) return;

    el.innerHTML = `
      User ID: ${user.userId}<br>
      Name: ${user.username}
    `;
  }

  function loadWallet() {
    let el = document.getElementById("wallet");
    if (!el) return;

    let u = getUserById(user.userId);
    el.innerHTML = "Balance: ₹ " + (u?.wallet || 0);
  }

  function loadLinks() {
    let el = document.getElementById("links");
    if (!el) return;

    let base = "https://bestwaygrow2025.github.io/BestWayGrow-System/";

    el.innerHTML = `
      Register:<br>${base}user_register.html?ref=${user.userId}
    `;
  }

  document.getElementById("welcome").innerText =
    "Welcome " + user.username + " (" + user.userId + ")";

  loadStatus();
  loadSystemStatus();
  loadProfile();
  loadWallet();
  loadLinks();

});

// ✅ FINAL ROUTING FIX
function upgrade() { window.location.href = "user_upgrade.html"; }
function repurchase() { window.location.href = "user_repurchase.html"; }
function withdraw() { window.location.href = "user_withdraw.html"; }
function goFranchise() { window.location.href = "user_apply_franchise.html"; }

function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
