<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
    .pending { color: orange; font-weight: bold; }
    .inactive { color: red; font-weight: bold; }
    .active { color: green; font-weight: bold; }
    ul { list-style-type: none; padding-left: 20px; }
    li { margin-bottom: 5px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>USER DASHBOARD</h1>
<p id="welcome"></p>
<button onclick="logout()">Logout</button>

<!-- STATUS -->
<div id="statusBox" class="box"></div>

<!-- SYSTEM STATUS -->
<div class="box">
  <h3>System Status</h3>
  <p id="systemStatus"></p>
</div>

<div class="box">
  <h3>My Profile</h3>
  <p id="profile"></p>
</div>

<div class="box">
  <h3>My Wallet</h3>
  <p id="wallet"></p>
</div>

<div class="box">
  <h3>Transaction History</h3>
  <div id="transactions"></div>
</div>

<div class="box">
  <h3>Withdraw History</h3>
  <div id="withdrawHistory"></div>
</div>

<div class="box">
  <h3>My Links</h3>
  <p id="links"></p>
</div>

<div class="box">
  <h3>Actions</h3>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="repurchase()">Repurchase</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="goFranchise()">Apply for Franchise</button>
</div>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>
<script src="withdrawal_system.js"></script>

<!-- NEW SYSTEM -->
<script src="pin_config_system.js"></script>
<script src="income_control_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let user = protectPage({ role: "user" });
if (!user) return;

// ================= STATUS =================
function loadStatus() {

  let box = document.getElementById("statusBox");

  if (user.status !== "active") {
    box.innerHTML = `<span class="inactive">⚠ Account Inactive</span>`;
  } 
  else if (!isUserActive(user.userId)) {
    box.innerHTML = `<span class="pending">⏳ Plan Expired</span>`;
  } 
  else {
    box.innerHTML = `<span class="active">✅ Active Account</span>`;
  }
}

// ================= SYSTEM STATUS =================
function loadSystemStatus() {

  let upgradePin = getActivePin("upgrade");
  let repurchasePin = getActivePin("repurchase");

  let upgrade = upgradePin ? "🟢 ON" : "🔴 OFF";
  let repurchase = repurchasePin ? "🟢 ON" : "🔴 OFF";

  let ugli = isUGLIEnabled() ? "🟢 ON" : "🔴 OFF";
  let rli = isRLIEnabled() ? "🟢 ON" : "🔴 OFF";

  document.getElementById("systemStatus").innerHTML = `
    Upgrade PIN: ${upgrade}<br>
    Repurchase PIN: ${repurchase}<br>
    UGLI Income: ${ugli}<br>
    RLI Income: ${rli}
  `;
}

// ================= UI =================
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= PROFILE =================
function loadProfile() {
  document.getElementById("profile").innerHTML = `
    User ID: ${user.userId}<br>
    Name: ${user.username}<br>
    Status: ${user.status}<br>
    Active: ${isUserActive(user.userId) ? "YES" : "NO"}
  `;
}

// ================= WALLET =================
function loadWallet() {
  let u = getUserById(user.userId);
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (u?.wallet || 0);
}

// ================= TRANSACTIONS =================
function loadTransactions() {

  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");
  let list = txns.filter(t => t.userId === user.userId);

  if (!list.length) {
    document.getElementById("transactions").innerHTML = "No transactions";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(t => {
    html += `<li>${t.type} ₹${t.amount} - ${t.reason}<br><small>${t.time || ""}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("transactions").innerHTML = html;
}

// ================= WITHDRAW =================
function loadWithdrawHistory() {

  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");
  let list = withdrawals.filter(w => w.userId === user.userId);

  if (!list.length) {
    document.getElementById("withdrawHistory").innerHTML = "No withdrawal history";
    return;
  }

  let html = "<ul>";
  list.slice().reverse().forEach(w => {
    html += `<li>${w.requestId} - ₹${w.amount} (${w.status})<br><small>${w.time || ""}</small></li>`;
  });
  html += "</ul>";

  document.getElementById("withdrawHistory").innerHTML = html;
}

// ================= LINKS =================
function loadLinks() {

  let base = "https://bestwaygrow2025.github.io/BestWayGrow-System/";

  document.getElementById("links").innerHTML = `
    Register:<br>${base}user.register.html?ref=${user.userId}
  `;
}

// ================= ACTIONS =================
function upgrade() {
  window.location.href = "user.upgrade.html";
}

function repurchase() {
  window.location.href = "user.repurchase.html";
}

function withdraw() {
  window.location.href = "user.withdraw.html";
}

function goFranchise() {
  window.location.href = "user_apply_franchise.html";
}

// ================= AUTO REFRESH =================
setInterval(() => {
  loadWallet();
  loadTransactions();
  loadWithdrawHistory();
  loadSystemStatus();
}, 5000);

// ================= INIT =================
loadStatus();
loadSystemStatus();
loadProfile();
loadWallet();
loadTransactions();
loadWithdrawHistory();
loadLinks();

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
