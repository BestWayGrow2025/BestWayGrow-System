<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f7fa; }

    .box {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      background: white;
    }

    ul { list-style-type: none; padding: 0; }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
    }

    button:hover {
      background: #0056b3;
    }

    /* ✅ STATUS COLORS */
    .status-pending { color: orange; font-weight: bold; }
    .status-approved { color: green; font-weight: bold; }
    .status-rejected { color: red; font-weight: bold; }

  </style>
</head>

<body>

<h1>USER DASHBOARD</h1>
<p id="welcome"></p>
<button onclick="logout()">Logout</button>

<!-- PROFILE -->
<div class="box">
  <h3>My Profile</h3>
  <p id="profile"></p>
</div>

<!-- WALLET -->
<div class="box">
  <h3>My Wallet</h3>
  <p id="wallet"></p>
</div>

<!-- TRANSACTIONS -->
<div class="box">
  <h3>Transaction History</h3>
  <div id="transactions"></div>
</div>

<!-- WITHDRAW HISTORY -->
<div class="box">
  <h3>Withdraw History</h3>
  <div id="withdrawHistory"></div>
</div>

<!-- LINKS -->
<div class="box">
  <h3>My Links</h3>
  <p id="links"></p>
</div>

<!-- ACTIONS -->
<div class="box">
  <h3>Actions</h3>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="repurchase()">Repurchase</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="resendWithdraw()">Resend Withdrawal</button>
</div>

<!-- TREE -->
<div class="box">
  <h3>My Team Tree (Introducer)</h3>
  <div id="tree"></div>
</div>

<!-- SCRIPTS -->
<script src="wallet_system.js"></script>
<script src="active_system.js"></script>
<script src="commission_engine.js"></script>
<script src="pin_system.js"></script>
<script src="withdrawal_system.js"></script>
<script src="security_system.js"></script>

<script>

// ===================== AUTH CHECK =====================
let user = JSON.parse(localStorage.getItem("loggedInUser"));
if (!user) {
  alert("Access denied");
  window.location.href = "user_login.html";
}

let users = JSON.parse(localStorage.getItem("users") || "[]");

// ===================== WELCOME =====================
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ===================== GET SPONSOR =====================
function getSponsor(u) {
  let sponsor = users.find(x => x.userId === u.sponsorId);
  return sponsor ? sponsor.username + " (" + sponsor.userId + ")" : "SYSTEM";
}

// ===================== PROFILE =====================
document.getElementById("profile").innerHTML = `
  User ID: ${user.userId} <br>
  Name: ${user.username} <br>
  Mobile: ${user.mobile || "-"} <br>
  Sponsor: ${getSponsor(user)} <br>
  Introducer: ${user.introducerId || "-"} <br>
  Join Time: ${user.createdAt || "-"} <br>
  Status: ${user.status || "active"} <br>
  KYC: ${user.kyc || "pending"} <br>
  Upgrade Status: ${user.upgrade || "not upgraded"}
`;

// ===================== WALLET =====================
function loadWallet() {
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  let u = users.find(x => x.userId === user.userId);
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (u?.wallet || 0);
}

// ===================== TRANSACTIONS =====================
function loadTransactions() {
  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");
  let userTxns = txns.filter(t => t.userId === user.userId);

  let html = "<ul>";

  userTxns.reverse().forEach(t => {
    html += `<li>
      ${t.type} ₹${t.amount} - ${t.reason} <br>
      <small>${t.time}</small>
    </li><br>`;
  });

  html += "</ul>";

  document.getElementById("transactions").innerHTML = html;
}

// ===================== WITHDRAW HISTORY =====================
function loadWithdrawHistory() {

  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");

  let userWithdraws = withdrawals.filter(w => w.userId === user.userId);

  let html = "<ul>";

  userWithdraws.reverse().forEach(w => {

    let statusClass = "";

    if (w.status === "PENDING") statusClass = "status-pending";
    if (w.status === "APPROVED") statusClass = "status-approved";
    if (w.status === "REJECTED") statusClass = "status-rejected";

    html += `<li>
      <b>Request:</b> ${w.requestId} <br>
      <b>Amount:</b> ₹${w.amount} <br>
      <b>Charge:</b> ₹${w.charge || 0} <br>
      <b>Final:</b> ₹${w.finalAmount || w.amount} <br>
      <b>Status:</b> <span class="${statusClass}">${w.status}</span> <br>
      <small>${w.time}</small>
    </li><br>`;
  });

  html += "</ul>";

  document.getElementById("withdrawHistory").innerHTML = html;
}

// ===================== LINKS =====================
let baseUrl = window.location.origin;

document.getElementById("links").innerHTML = `
  FR Link:<br>
  ${baseUrl}/register.html?ref=${user.userId}&mode=fr <br><br>
  Upgrade Link:<br>
  ${baseUrl}/upgrade.html?user=${user.userId} <br><br>
  Repurchase Link:<br>
  ${baseUrl}/repurchase.html?user=${user.userId}
`;

// ===================== ACTIONS =====================
function upgrade() {
  let pinId = prompt("Enter Upgrade Pin:");
  if (!pinId) return;
  usePin(pinId.trim(), user.userId, "upgrade");
  loadWallet();
  loadTransactions();
}

function repurchase() {
  let pinId = prompt("Enter Repurchase Pin:");
  if (!pinId) return;
  usePin(pinId.trim(), user.userId, "repurchase");
  loadWallet();
  loadTransactions();
}

function withdraw() {
  let amount = prompt("Enter withdraw amount:");
  if (!amount || amount <= 0) {
    alert("Invalid amount");
    return;
  }
  requestWithdraw(user.userId, parseFloat(amount));
  loadWallet();
  loadTransactions();
  loadWithdrawHistory();
}

function resendWithdraw() {
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");

  let rejectedList = withdrawals.filter(
    w => w.userId === user.userId && w.status === "REJECTED"
  );

  if (rejectedList.length === 0) {
    alert("No rejected withdrawal found");
    return;
  }

  let lastRejected = rejectedList.sort(
    (a, b) => new Date(b.time) - new Date(a.time)
  )[0];

  if (!confirm("Resend withdrawal of ₹ " + lastRejected.amount + " ?")) return;

  requestWithdraw(user.userId, lastRejected.amount);

  alert("Withdrawal resent successfully");

  loadWallet();
  loadTransactions();
  loadWithdrawHistory();
}

// ===================== TREE =====================
function buildTree(parentId) {
  let children = users.filter(u => u.sponsorId === parentId);

  if (children.length === 0) return "";

  let html = "<ul>";

  children.forEach(child => {
    html += `
      <li>
        ${child.username} (${child.userId})
        ${buildTree(child.userId)}
      </li>
    `;
  });

  html += "</ul>";

  return html;
}

// ===================== INIT =====================
document.getElementById("tree").innerHTML = buildTree(user.userId);
loadWallet();
loadTransactions();
loadWithdrawHistory();

// ===================== LOGOUT =====================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

</script>

</body>
</html>
