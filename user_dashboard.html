<script src="core_system.js" defer></script>

<script>

// ================= INIT =================
window.addEventListener("load", function () {

  // ✅ STRICT CHECK
  if (typeof initCoreSystem !== "function") {
    alert("core_system.js missing");
    return;
  }

  initCoreSystem();

  // ✅ DELAY SAFE (ensures all scripts ready)
  setTimeout(() => {
    startDashboard();
  }, 50);
});

// ================= START =================
let session = null;
let user = null;
let clickLock = false;

// ================= SAFE USER ENGINE =================
function getSafeUser() {

  // ✅ SESSION CHECK
  if (!session || !session.userId) {
    alert("Session expired. Login again.");
    location.href = "user_login.html";
    return null;
  }

  // ✅ FUNCTION SAFETY
  if (typeof getUserById !== "function") {
    alert("User system missing");
    return null;
  }

  let u = getUserById(session.userId);

  // ✅ USER VALIDATION
  if (!u) {
    if (typeof clearSession === "function") {
      clearSession();
    }
    alert("User not found");
    location.href = "user_login.html";
    return null;
  }

  return u;
}


// ================= START DASHBOARD =================
function startDashboard() {

  // ================= SESSION CHECK =================
  if (typeof getSession !== "function") {
    alert("session_manager.js missing");
    location.href = "user_login.html";
    return;
  }

  session = getSession();

  // ✅ STRICT ROLE CHECK
  if (!session || session.role !== "user" || !session.userId) {
    location.href = "user_login.html";
    return;
  }

  // ================= USER LOAD =================
  user = getSafeUser();
  if (!user) return;

  // ================= SYSTEM SETTINGS =================
  let settings = {};

  try {
    if (typeof getSystemSettings === "function") {
      settings = getSystemSettings() || {};
    }
  } catch (err) {
    console.error("Settings error:", err);
  }

  if (settings.lockMode === true) {
    alert("System Locked");
    location.href = "user_login.html";
    return;
  }

  // ================= ACCOUNT STATUS =================
  if ((user.accountStatus || "active") !== "active") {

    if (typeof clearSession === "function") {
      clearSession();
    }

    alert("Account Inactive");
    location.href = "user_login.html";
    return;
  }

  // ================= UI LOAD =================
  let welcomeEl = document.getElementById("welcome");
  if (welcomeEl) {
    welcomeEl.innerText = "Welcome (" + user.userId + ")";
  }

  // ✅ SAFE ACTIVE BUTTON
  let firstBtn = document.querySelector(".menu button");
  if (firstBtn) {
    firstBtn.classList.add("active");
  }

  // ✅ LOAD DEFAULT PAGE
  loadHome();
}

// ================= SAFE CLICK (FINAL STABLE) =================
function safeClick(btn, fn) {

  if (clickLock) return;

  clickLock = true;

  // BUTTON UI
  if (btn) {
    document.querySelectorAll(".menu button")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
  }

  try {

    // SESSION REFRESH
    if (typeof getSession === "function") {
      session = getSession();
    }

    if (!session || !session.userId) {
      alert("Session expired. Login again.");
      location.href = "user_login.html";
      return;
    }

    // USER REFRESH
    user = getSafeUser();
    if (!user) return;

    // CALL FUNCTION
    if (typeof fn === "function") {
      fn();
    } else {
      console.error("Invalid function");
      alert("Feature not available");
    }

  } catch (err) {
    console.error("Click Error:", err);
    alert("Error: " + err.message);
  } finally {

    setTimeout(() => {
      clickLock = false;
    }, 200);
  }
}

// ================= REF LINK =================
function generateRefLink(userId) {

  if (!userId) return "";

  let basePath = window.location.pathname
    .replace("user_dashboard.html", "")
    .replace("user_login.html", "")
    .replace("user_profile.html", "");

  return window.location.origin +
    basePath +
    "user_register.html?ref=" + encodeURIComponent(userId); // ✅ SAFE URL
}

function copyRefLink() {

  let input = document.getElementById("refLink");

  if (!input) {
    alert("Referral link not found");
    return;
  }

  // ✅ MODERN + FALLBACK SUPPORT
  let text = input.value;

  if (navigator.clipboard && window.isSecureContext) {

    navigator.clipboard.writeText(text)
      .then(() => {
        let msg = document.getElementById("copyMsg");
        if (msg) msg.innerText = "✅ Referral Link Copied";
      })
      .catch(() => {
        alert("Copy Failed");
      });

  } else {
    // ✅ FALLBACK (OLD BROWSERS)
    input.select();
    input.setSelectionRange(0, 99999);

    try {
      document.execCommand("copy");
      let msg = document.getElementById("copyMsg");
      if (msg) msg.innerText = "✅ Referral Link Copied";
    } catch {
      alert("Copy Failed");
    }
  }
}

  main.innerHTML = `
    <div class="section-title">Dashboard Overview</div>

    <div class="info-box">

      <p><b>Full Name:</b> ${user.fullName || user.username || "N/A"}</p>
      <p><b>Mobile:</b> ${user.mobile || "N/A"}</p>
      <p><b>Email:</b> ${user.email || "N/A"}</p>
      <p><b>Sponsor ID:</b> ${user.sponsorId || "N/A"}</p>
      <p><b>Join Date:</b> ${user.joinDate ? new Date(user.joinDate).toLocaleDateString() : "N/A"}</p>
      <p><b>City:</b> ${user.city || "N/A"}</p>
      <p><b>State:</b> ${user.state || "N/A"}</p>
      <p><b>Country:</b> ${user.country || "N/A"}</p>
    </div>

    <div class="info-box">
      <p><b>Wallet Balance:</b> ₹${Number(user.walletBalance || 0)}</p>
      <p><b>Income Balance:</b> ₹${Number(user.incomeBalance || 0)}</p>
      <p><b>Hold Income:</b> ₹${Number(user.holdIncome || 0)}</p>
      <p><b>Total Credit:</b> ₹${Number(user.totalCredit || 0)}</p>
      <p><b>Total Debit:</b> ₹${Number(user.totalDebit || 0)}</p>
      <p><b>Total Income:</b> ₹${Number(user.totalIncome || 0)}</p>
    </div>

    <div class="info-box">
      <p><b>Total Pins:</b> ${user.totalPins || 0}</p>
      <p><b>Used Pins:</b> ${user.usedPins || 0}</p>
      <p><b>Available Pins:</b> ${user.availablePins || 0}</p>
      <p><b>Last Pin Used:</b> ${user.lastPinUsedDate || "N/A"}</p>
    </div>

    <div class="info-box">
      <p><b>Total Direct Team:</b> ${directUsers.length}</p>
      <p><b>Left Team:</b> ${leftCount}</p>
      <p><b>Right Team:</b> ${rightCount}</p>
    </div>

    <div class="section-title">Referral Link</div>

    <input id="refLink" class="ref-box" value="${refLink}" readonly>

    <button class="action-btn" onclick="copyRefLink()">Copy Link</button>

    <p id="copyMsg"></p>
  `;
}
  
// ================= PIN SECTION =================
function loadPinSection() {

  user = getSafeUser();
  if (!user) return;

  let main = document.getElementById("mainContent");
  if (!main) return;

  let pins = [];

  try {
    if (typeof loadPins === "function") {
      let allPins = loadPins() || [];

      pins = allPins.filter(pin =>
        (pin.ownerId === user.userId) ||
        (pin.usedBy === user.userId)
      );
    }
  } catch (err) {
    console.error("PIN error:", err);
  }

  let html = `
    <div class="section-title">PIN Section</div>

    <button class="action-btn" onclick="requestPin()">
      Request PIN
    </button>

    <table>
      <tr>
        <th>PIN</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
  `;

  if (!pins.length) {
    html += `<tr><td colspan="3">No PIN Available</td></tr>`;
  }

  pins.slice(-20).reverse().forEach(pin => {
    html += `
      <tr>
        <td>${pin.pinId || "N/A"}</td>
        <td>₹${Number(pin.amount || 0)}</td>
        <td>${pin.status || "unused"}</td>
      </tr>
    `;
  });

  html += `</table>`;

  main.innerHTML = html;
}

// ================= TREE =================
function loadTree() {

  user = getSafeUser();
  if (!user) return;

  let main = document.getElementById("mainContent");
  if (!main) return;

  let allUsers = [];

  try {
    if (typeof getUsers === "function") {
      allUsers = getUsers() || [];
    }
  } catch (err) {
    console.error("Users error:", err);
  }

  function buildTree(parentId, level = 1) {

    if (level > 10) return "";

    let team = allUsers.filter(u => u.sponsorId === parentId);

    if (!team.length) return "";

    let html = "";

    team.forEach(member => {

      html += `
        <div style="margin-left:${level * 20}px; padding:8px; border-left:3px solid #4a00e0; margin-bottom:8px;">
          <p><b>${member.userId || "N/A"}</b> - ${member.fullName || member.username || "N/A"}</p>
          <p>Position: ${member.position || "N/A"}</p>
        </div>
      `;

      html += buildTree(member.userId, level + 1);
    });

    return html;
  }

  main.innerHTML = `
    <div class="section-title">Full Team Tree</div>

    <div class="info-box">
      <p><b>My User ID:</b> ${user.userId || "N/A"}</p>
      <p><b>My Name:</b> ${user.fullName || user.username || "N/A"}</p>
    </div>

    <div class="info-box">
      <h3>Complete Downline Tree</h3>
      ${buildTree(user.userId) || "<p>No Team Found</p>"}
    </div>
  `;
}

  main.innerHTML = `

      <p><b>Total Debit:</b> ₹${Number(user.wallet?.totalDebit || 0)}</p>

}

    } else if (user.walletHistory) {
      history = user.walletHistory;

  } catch (err) {
    console.error("Wallet history error:", err);

  let html = `
    <div class="section-title">Wallet Transaction History</div>

      <tr>
        <th>Date</th>
        <th>Type</th>

  `;

  if (!history.length) {
    html += `

  history.slice(-20).reverse().forEach(item => {
    html += `

        <td>₹${Number(item.amount || 0)}</td>
        <td>${item.remark || "N/A"}</td>

  main.innerHTML = html;

// ================= UPGRADE STATUS CHECK =================
function canUpgrade(user) {
  if (!user) return false;

  return (user.accountStatus || "active") === "active" &&
         user.upgradeStatus !== "completed";
}

// ================= REPURCHASE STATUS CHECK =================
function canRepurchase(user) {
  if (!user) return false;

  return (user.accountStatus || "active") === "active" &&
         user.upgradeStatus === "completed";
}

// ================= PAGE NAVIGATION =================
function loadUpgrade() {

  user = getSafeUser();
  if (!user) return;

  if (!canUpgrade(user)) {
    alert("Upgrade Not Allowed");
    return;
  }

  location.href = "user_upgrade.html";
}

function loadRepurchase() {

  user = getSafeUser();
  if (!user) return;

  if (!canRepurchase(user)) {
    alert("Repurchase Not Allowed");
    return;
  }

  location.href = "user_repurchase.html";
}

function submitWithdrawRequest() {

  user = getSafeUser();   // ✅ FIX
  if (!user) return;

  let amount = Number(document.getElementById("withdrawAmount").value);

  if (!amount || amount <= 0 || amount > Number(user.walletBalance || 0)) {
    alert("Enter Valid Amount");
    return;
  }

  if (!user.withdrawRequests) {
    user.withdrawRequests = [];
  }

  user.withdrawRequests.push({
    amount: amount,
    status: "pending",
    date: new Date().toLocaleString()
  });

  user.walletBalance = Number(user.walletBalance || 0) - amount;
  user.totalDebit = Number(user.totalDebit || 0) + amount;

  if (!user.walletHistory) {
    user.walletHistory = [];
  }

  user.walletHistory.push({
    date: new Date().toLocaleString(),
    type: "Debit",
    amount: amount,
    remark: "Withdraw Request"
  });

  if (!user.notifications) {
    user.notifications = [];
  }

  user.notifications.push({
    title: "Withdraw Request Submitted",
    message: "₹" + amount + " withdraw request pending",
    date: new Date().toLocaleString()
  });

  if (typeof saveUsers === "function") {
    saveUsers();
  }

  alert("Withdraw Request Submitted");

  try {
    if (typeof logActivity === "function") {
      logActivity(
        user.userId,
        "USER",
        "Withdraw Request ₹" + amount,
        "USER_DASHBOARD"
      );
    }
  } catch (err) {
    console.error(err);
  }
}

// ================= PROFILE VALIDATION =================
function validateProfileBeforeSave() {

  user = getSafeUser();   // ✅ FIX
  if (!user) return "Session error";

  if (!user.fullName || user.fullName.trim().length < 3) {
    return "Full Name Required";
  }

  if (!user.mobile || user.mobile.trim().length < 10) {
    return "Valid Mobile Required";
  }

  if (!user.email || !user.email.includes("@")) {
    return "Valid Email Required";
  }

  return "ok";
}

// ================= SAVE PROFILE =================
function saveProfile() {

  user = getSafeUser();   // ✅ FIX
  if (!user) return;

  let fullName = document.getElementById("editFullName").value.trim();
  let mobile = document.getElementById("editMobile").value.trim();
  let email = document.getElementById("editEmail").value.trim();

  if (!fullName || !mobile || !email) {
    alert("All Fields Required");
    return;
  }

  if (!email.includes("@")) {
    alert("Enter Valid Email");
    return;
  }

  user.fullName = fullName;
  user.mobile = mobile;
  user.email = email;

  let validation = validateProfileBeforeSave();

  if (validation !== "ok") {
    alert(validation);
    return;
  }

  if (typeof saveUsers === "function") {
    saveUsers();
  }

  alert("Profile Updated Successfully");

  addUserNotification(
    "Profile Updated",
    "Your profile updated successfully"
  );

  try {
    if (typeof logActivity === "function") {
      logActivity(
        user.userId,
        "USER",
        "Profile Updated",
        "USER_DASHBOARD"
      );
    }
  } catch (err) {
    console.error(err);
  }
}

// ================= PASSWORD ENCODE / DECODE =================
function encode(p){ return btoa(p); }

function decode(p){
  try {
    return atob(p);
  } catch(e) {
    return "";   // ✅ FIX (prevent crash)
  }
}

// ================= CHANGE PASSWORD SAVE =================
function savePassword() {

  user = getSafeUser();   // ✅ FIX
  if (!user) return;

  let oldPassword = document.getElementById("oldPassword").value.trim();
  let newPassword = document.getElementById("newPassword").value.trim();
  let confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!oldPassword || !newPassword || !confirmPassword) {
    alert("All Fields Required");
    return;
  }

  if (decode(user.password || "") !== oldPassword) {
    alert("Old Password Incorrect");
    return;
  }

  if (newPassword.length < 6) {
    alert("Password Minimum 6 Characters");
    return;
  }

  if (newPassword !== confirmPassword) {
    alert("Password Not Match");
    return;
  }

  user.password = encode(newPassword);

  if (typeof saveUsers === "function") {
    saveUsers();
  }

  alert("Password Changed Successfully");

  try {
    if (typeof logActivity === "function") {
      logActivity(
        user.userId,
        "USER",
        "Password Changed",
        "USER_DASHBOARD"
      );
    }
  } catch (err) {
    console.error(err);
  }
}

  try {

      directCount = getDirectUsers(user.userId).length;
    }
  } catch (err) {
    console.error(err);
  }

  if (directCount >= 20) user.rank = "Diamond";
  else if (directCount >= 10) user.rank = "Gold";

    saveUsers();
  }
}
