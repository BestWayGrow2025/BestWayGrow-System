<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f2027,#2c5364);
      color:#fff;
    }

    header {
      padding:15px;
      text-align:center;
      background:#000;
      font-size:18px;
      font-weight:bold;
    }

    /* TOP MENU */
    .menu {
      display:flex;
      overflow-x:auto;
      background:#111;
      padding:10px;
    }

    .menu button {
      flex:1;
      min-width:90px;
      margin:5px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#222;
      color:#fff;
      cursor:pointer;
    }

    .menu button:hover {
      background:#00c6ff;
      color:#000;
    }

    /* CONTENT AREA */
    #content {
      padding:15px;
    }

    .card {
      background:#ffffff10;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .box {
      background:#ffffff20;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

  </style>
</head>

<body>

<header>
  USER DASHBOARD V5
</header>

<!-- TOP MENU -->
<div class="menu">
  <button onclick="loadSection('home')">Home</button>
  <button onclick="loadSection('category')">Category</button>
  <button onclick="loadSection('plan')">Plan</button>
  <button onclick="loadSection('pin')">PIN</button>
  <button onclick="loadSection('tree')">Tree</button>
  <button onclick="loadSection('ticket')">Ticket</button>
  <button onclick="loadSection('wallet')">Wallet</button>
  <button onclick="loadSection('profile')">Profile</button>
  <button onclick="loadSection('help')">Help</button>
</div>

<!-- CONTENT -->
<div id="content"></div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("core_system.js not loaded");
  throw new Error("STOP");
}

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInUser"));

if (!session) {
  location.href = "user_login.html";
}

let user = getUserById(session.userId);

// MAIN LOADER
function loadSection(name){

  let html = "";

  // HOME
  if(name === "home"){
    html = `
      <div class="card">
        <h3>Welcome ${user.userId}</h3>
        <p>Trending Videos / Content</p>
      </div>

      <div class="grid">
        <div class="box">Sarkari</div>
        <div class="box">Income</div>
        <div class="box">Education</div>
        <div class="box">Business</div>
      </div>
    `;
  }

  // CATEGORY
  if(name === "category"){
    html = `
      <div class="card">
        <h3>Categories</h3>
      </div>

      <div class="grid">
        <div class="box">Sarkari Kaam</div>
        <div class="box">Part Time</div>
        <div class="box">Education</div>
        <div class="box">Digital Skills</div>
      </div>
    `;
  }

  // PLAN
  if(name === "plan"){
    html = `
      <div class="card">
        <h3>Plans</h3>
        <p>Basic / Premium Plans</p>
        <button>Upgrade</button>
      </div>
    `;
  }

  // PIN
  if(name === "pin"){
    html = `
      <div class="card">
        <h3>PIN SYSTEM</h3>
        <button>Apply PIN</button>
        <button>Available PIN</button>
        <button>Used PIN</button>
      </div>
    `;
  }

  // TREE
  if(name === "tree"){
    html = `
      <div class="card">
        <h3>User Tree</h3>
        <p>Downline structure here</p>
      </div>
    `;
  }

  // TICKET
  if(name === "ticket"){
    html = `
      <div class="card">
        <h3>Support Ticket</h3>
        <button>Create Ticket</button>
        <button>View Tickets</button>
      </div>
    `;
  }

  // WALLET
  if(name === "wallet"){
    html = `
      <div class="card">
        <h3>Wallet</h3>
        <p>Balance: ₹0</p>
        <button>Withdraw</button>
      </div>
    `;
  }

  // PROFILE
  if(name === "profile"){
    html = `
      <div class="card">
        <h3>Profile</h3>
        <p>ID: ${user.userId}</p>
        <p>Name: ${user.username || user.userId}</p>
      </div>
    `;
  }

  // HELP
  if(name === "help"){
    html = `
      <div class="card">
        <h3>Help / FAQ</h3>
        <p>Common Questions</p>
      </div>
    `;
  }

  document.getElementById("content").innerHTML = html;
}

// DEFAULT LOAD
loadSection("home");

</script>

</body>
</html>
