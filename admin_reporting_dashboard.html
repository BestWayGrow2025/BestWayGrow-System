 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Reporting Dashboard</title>
  <link rel="icon" href="data:," />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      margin: 20px;
    }

    .admin-reports-module {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: #fff;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<div class="admin-reports-module">

  <h1>📊 SYSTEM REPORTS</h1>

  <button id="backBtn">⬅ Back</button>

  <div class="box">
    <h2>Total Users</h2>
    <p id="users">Loading...</p>
  </div>

  <div class="box">
    <h2>Pin Status</h2>
    <p id="pins">Loading...</p>
  </div>

  <div class="box">
    <h2>Income Summary</h2>
    <p id="income">Loading...</p>
  </div>

  <div class="box">
    <h2>Hold Income</h2>
    <p id="hold">Loading...</p>
  </div>

  <div class="box">
    <h2>CTOR Pool</h2>
    <p id="ctor">Loading...</p>
    <br><br>
    <button id="ctorBtn">Run CTOR Distribution</button>
  </div>

  <div class="box">
    <h2>All Transactions</h2>
    <div id="transactions">Loading...</div>
  </div>

  <div class="box">
    <h2>Pin Usage Logs</h2>
    <div id="pinLogs">Loading...</div>
  </div>

  <div class="box">
    <h2>Withdraw Requests</h2>
    <div id="withdrawals">Loading...</div>
  </div>

</div>

<script src="core_boot_manager.js"></script>
<script src="core_initializer.js"></script>
<script src="core_session_authority.js"></script>

<script src="core_reporting_engine.js"></script>

<script src="admin_reporting_dashboard.js"></script>

</body>
</html>
