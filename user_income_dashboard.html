<!DOCTYPE html>
<html>
<head>
  <title>User Income Dashboard</title>
</head>
<body>

<h2>💰 My Income Dashboard</h2>

<hr>

<!-- 🔹 SUMMARY -->
<h3>Summary</h3>

<p>Total Income: ₹<span id="totalIncome">0</span></p>
<p>Wallet Balance: ₹<span id="walletBalance">0</span></p>
<p>Hold Income: ₹<span id="holdIncome">0</span></p>

<hr>

<!-- 🔹 FILTER -->
<h3>Filter</h3>

<select id="filterType" onchange="loadIncomeLogs()">
  <option value="">All</option>
  <option value="upgrade">Upgrade</option>
  <option value="repurchase">Repurchase</option>
  <option value="ctor">CTOR</option>
</select>

<hr>

<!-- 🔹 LOG TABLE -->
<h3>Income Logs</h3>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>Date</th>
      <th>Type</th>
      <th>Amount</th>
      <th>From</th>
      <th>Note</th>
    </tr>
  </thead>
  <tbody id="incomeTable"></tbody>
</table>

<!-- 🔥 CORE -->
<script src="core_system.js"></script>

<!-- 🔥 INCOME LOG -->
<script src="income_log_system.js"></script>

<!-- 🔥 WALLET -->
<script src="wallet_system.js"></script>

<script>

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {

  initCoreSystem();

  loadSummary();
  loadIncomeLogs();
});

// ================= SUMMARY =================
function loadSummary() {

  let user = getCurrentUser();
  if (!user) return;

  let logs = getUserIncomeLogs(user.userId);

  let total = logs.reduce((sum, l) => sum + Number(l.amount), 0);

  document.getElementById("totalIncome").innerText = total.toFixed(2);

  // Wallet
  if (typeof getWalletBalance === "function") {
    document.getElementById("walletBalance").innerText =
      getWalletBalance(user.userId).toFixed(2);
  }

  // Hold
  if (typeof getHoldIncome === "function") {
    document.getElementById("holdIncome").innerText =
      getHoldIncome(user.userId).toFixed(2);
  }
}

// ================= LOAD LOGS =================
function loadIncomeLogs() {

  let user = getCurrentUser();
  if (!user) return;

  let type = document.getElementById("filterType").value;

  let logs = getUserIncomeLogs(user.userId);

  if (type) {
    logs = logs.filter(l => l.type === type);
  }

  let table = document.getElementById("incomeTable");
  table.innerHTML = "";

  if (!logs.length) {
    table.innerHTML = "<tr><td colspan='5'>No Income</td></tr>";
    return;
  }

  logs.reverse().forEach(log => {

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${new Date(log.time).toLocaleString()}</td>
      <td>${log.type}</td>
      <td>₹${Number(log.amount).toFixed(2)}</td>
      <td>${log.sourceUser || "-"}</td>
      <td>${log.note || ""}</td>
    `;

    table.appendChild(row);
  });
}

</script>

</body>
</html>
