<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BestWayGrow System</title>

<!-- ✅ FIX: REMOVE FAVICON ERROR -->

<style>

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
    text-align:center;
}

/* Header */
header {
    background: linear-gradient(90deg, #006633, #00994d);
    color:white;
    padding:30px 15px;
    position: relative;
}

header img {
    height:60px;
    margin-bottom:10px;
}

header h1 {
    margin:10px 0;
    font-size:28px;
}

/* Login area */
#loginArea {
    position:absolute;
    top:20px;
    right:20px;
}

/* Container */
.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:30px;
}

/* Plan box */
.plan {
    background:white;
    margin:20px;
    padding:30px;
    border-radius:15px;
    width:300px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.plan:hover {
    transform: translateY(-8px);
}

/* Buttons */
button {
    background: linear-gradient(90deg, #0077b5, #00aaff);
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background: linear-gradient(90deg, #005f8a, #008ecc);
}

/* Footer */
footer {
    background:#00331a;
    color:white;
    padding:20px;
    margin-top:40px;
}

</style>
</head>

<body>

<header>

    <img src="./design/logo.png" alt="BestWayGrow Logo">

    <h1>BestWayGrow</h1>
    <p>Select Your Digital Product Plan</p>

    <div id="loginArea"></div>

</header>

<div class="container">

    <div class="plan">
        <h2>BV 2100 Plan</h2>
        <p><strong>Amount:</strong> 3000</p>
        <p>Digital Product Category</p>
        <a href="BV2100/index.html">
            <button>View Details</button>
        </a>
    </div>

    <div class="plan">
        <h2>BV 500 Plan</h2>
        <p><strong>Amount:</strong> (your amount)</p>
        <p>Digital Product Category</p>
        <a href="BV500/index.html">
            <button>View Details</button>
        </a>
    </div>

</div>

<footer>
    © 2026 BestWayGrow
</footer>

<!-- ✅ CORE FIRST -->
<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script src="pin_config_system.js"></script>
<script src="pin_master_system.js"></script>
<script src="pin_request_system.js"></script>

<script src="wallet_system.js"></script>

<script src="income_log_system.js"></script>
<script src="income_control_system.js"></script>
<script src="hold_income_system.js"></script>
<script src="income_engine.js"></script> <!-- ✅ V7 MASTER -->

<script src="withdrawal_system.js"></script>

<!-- ✅ FIXED SCRIPT -->
<script>

// 🔥 INIT CORE SYSTEM
if (typeof initCoreSystem === "function") {
    initCoreSystem();
}

// ================= LOGIN CHECK =================
let loginArea = document.getElementById("loginArea");

let userSession =
  JSON.parse(localStorage.getItem("loggedInUser")) ||
  JSON.parse(localStorage.getItem("loggedInAdmin")) ||
  JSON.parse(localStorage.getItem("loggedInSystemAdmin")) ||
  JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (userSession) {

    let user = getUsers().find(u => u.userId === userSession.userId);

    loginArea.innerHTML = `
        <span style="margin-right:10px;">
            Welcome ${user ? user.username || user.userId : "User"}
        </span>
        <button onclick="logout()">Logout</button>
    `;

} else {

    loginArea.innerHTML = `
        <a href="user_login.html">
            <button>Login</button>
        </a>
    `;
}

// ================= LOGOUT =================
function logout() {
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("loggedInAdmin");
    localStorage.removeItem("loggedInSystemAdmin");
    localStorage.removeItem("loggedInSuperAdmin");

    window.location.reload();
}

</script>

</body>
</html>
