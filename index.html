<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BestWayGrow System</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    background:#f0f4f5;
    text-align:center;
}

/* Header */
header {
    background:#006633;
    color:white;
    padding:25px 15px;
    position: relative;
}

header h1 {
    margin:10px 0;
}

/* Login area */
#loginArea {
    position:absolute;
    top:20px;
    right:20px;
}

/* Container */
.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

/* Plan box */
.plan {
    background:white;
    margin:20px;
    padding:25px;
    border-radius:10px;
    width:280px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

/* Buttons */
button {
    background:#006633;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#004d29;
}

/* Footer */
footer {
    background:#00331a;
    color:white;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>BestWayGrow</h1>
    <p>Select Your Digital Product Plan</p>

    <!-- Dynamic Login Area -->
    <div id="loginArea"></div>
</header>

<div class="container">

    <div class="plan">
        <h2>BV 2100 Plan</h2>
        <p><strong>Amount:</strong> 3000</p>
        <p>Digital Product Category</p>
        <a href="BV2100/index.html">
            <button>View Details</button>
        </a>
    </div>

    <div class="plan">
        <h2>BV 500 Plan</h2>
        <p><strong>Amount:</strong> (your amount)</p>
        <p>Digital Product Category</p>
        <a href="BV500/index.html">
            <button>View Details</button>
        </a>
    </div>

</div>

<footer>
    © 2026 BestWayGrow
</footer>

<script>

// Check login status
var loggedIn = localStorage.getItem("loggedIn");
var loginArea = document.getElementById("loginArea");

if (loggedIn === "true") {

    var username = localStorage.getItem("username") || "User";

    loginArea.innerHTML = `
        <span style="margin-right:10px;">Welcome ${username}</span>
        <button onclick="logout()">Logout</button>
    `;

} else {

    loginArea.innerHTML = `
        <a href="login.html">
            <button>Login</button>
        </a>
    `;
}

// Logout
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

</script>

</body>
</html>
