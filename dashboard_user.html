<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 6px 10px; margin-top: 5px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h1>USER DASHBOARD</h1>
<p id="status"></p>

<button onclick="logout()">Logout</button>

<!-- ================= PROFILE ================= -->
<div class="section">
  <h2>My Profile</h2>
  <p id="profile"></p>
</div>

<!-- ================= WALLET ================= -->
<div class="section">
  <h2>My Wallet</h2>
  <p id="wallet"></p>
</div>

<!-- ================= UPGRADE ================= -->
<div class="section">
  <h2>Upgrade</h2>
  <button onclick="upgrade()">Upgrade Account</button>
</div>

<!-- ================= TREE ================= -->
<div class="section">
  <h2>My Tree (Binary View)</h2>
  <div id="tree"></div>
</div>

<script>
// ================= AUTH =================
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Please login first");
  window.location.href = "user_login.html";
}

// ================= STATUS =================
document.getElementById("status").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= USERS =================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// ================= PROFILE =================
function loadProfile() {
  document.getElementById("profile").innerHTML = `
    User ID: ${user.userId} <br>
    Name: ${user.username} <br>
    Mobile: ${user.mobile} <br>
    Role: ${user.role}
  `;
}

// ================= WALLET =================
function loadWallet() {
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (user.wallet || 0);
}

// ================= UPGRADE FUNCTION =================
function upgrade() {
  let users = getUsers();

  let currentUser = users.find(u => u.userId === user.userId);

  if (!currentUser) {
    alert("User not found");
    return;
  }

  if (currentUser.isActive) {
    alert("Already upgraded");
    return;
  }

  // Activate
  currentUser.isActive = true;
  currentUser.status = "active";

  localStorage.setItem("users", JSON.stringify(users));

  alert("Upgrade Successful");

  location.reload();
}

// ================= TREE LOGIC =================
function findChildren(parentId) {
  let users = getUsers();
  return users.filter(u => u.sponsorId === parentId);
}

function getLeftRight(parentId) {
  let children = findChildren(parentId);

  return {
    left: children.find(c => c.position === "LEFT"),
    right: children.find(c => c.position === "RIGHT")
  };
}

function formatNode(u) {
  if (!u) return "[ empty ]";
  return u.userId;
}

// ================= TREE RENDER =================
function renderTree() {
  let level0 = user;

  let level1 = getLeftRight(level0.userId);

  let level2Left = level1.left ? getLeftRight(level1.left.userId) : {};
  let level2Right = level1.right ? getLeftRight(level1.right.userId) : {};

  let html = "<pre>";

  html += "           " + formatNode(level0) + "\n\n";

  html += "     " + formatNode(level1.left) + "        " + formatNode(level1.right) + "\n\n";

  html += "  " + formatNode(level2Left.left) + "   " + formatNode(level2Left.right);
  html += "      ";
  html += formatNode(level2Right.left) + "   " + formatNode(level2Right.right);

  html += "</pre>";

  document.getElementById("tree").innerHTML = html;
}

// ================= INIT =================
loadProfile();
loadWallet();
renderTree();

</script>

</body>
</html>
