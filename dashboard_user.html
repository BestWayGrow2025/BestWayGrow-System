<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 6px 10px; margin-top: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>USER DASHBOARD</h1>
<p id="status"></p>

<button onclick="logout()">Logout</button>

<!-- ================= PROFILE ================= -->
<div class="section">
  <h2>My Profile</h2>
  <p id="profile"></p>
</div>

<!-- ================= WALLET ================= -->
<div class="section">
  <h2>My Wallet</h2>
  <p id="wallet"></p>
</div>

<!-- ================= TREE VIEW ================= -->
<div class="section">
  <h2>My Network (Direct)</h2>
  <div id="network"></div>
</div>

<script>
// ================= ACCESS CONTROL =================
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Please login");
  window.location.href = "user_login.html";
}

document.getElementById("status").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= LOAD USERS =================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// ================= PROFILE =================
function loadProfile() {
  document.getElementById("profile").innerHTML = `
    User ID: ${user.userId} <br>
    Name: ${user.username} <br>
    Mobile: ${user.mobile} <br>
    Role: ${user.role}
  `;
}

// ================= WALLET =================
function loadWallet() {
  document.getElementById("wallet").innerHTML =
    "Balance: ₹ " + (user.wallet || 0);
}

// ================= NETWORK =================
function loadNetwork() {
  let users = getUsers();

  let directUsers = users.filter(u => u.introducerId === user.userId);

  let html = "<ul>";

  directUsers.forEach(u => {
    html += `
      <li>
        <b>${u.userId}</b> | ${u.username}
      </li>
    `;
  });

  html += "</ul>";

  document.getElementById("network").innerHTML = html;
}

// ================= INIT =================
loadProfile();
loadWallet();
loadNetwork();
</script>

</body>
</html>
