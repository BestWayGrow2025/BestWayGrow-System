<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BestWayGrow</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.login-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
button {
    background: #006633;
    color: white;
    border: none;
    padding: 12px 25px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}
button:hover {
    background: #004d29;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button id="loginBtn">Login</button>
</div>

<script>
document.getElementById("loginBtn").addEventListener("click", function() {
    var user = document.getElementById("username").value.trim();
    var pass = document.getElementById("password").value.trim();

    if (user === "" || pass === "") {
        alert("Please enter Username & Password");
        return;
    }

    // Get saved password from localStorage
    var savedPass = localStorage.getItem("adminPass") || "1234";

    if (user === "admin" && pass === savedPass) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("username", user);
        localStorage.setItem("plan", "BV2100");

        // Check if default password
        if (savedPass === "1234") {
            var newPass = prompt("Welcome! Please change your password:");
            if (newPass && newPass.trim() !== "") {
                localStorage.setItem("adminPass", newPass.trim());
                alert("Password updated successfully!");
            } else {
                alert("Password not changed. Using default password.");
            }
        }

        alert("Login Successful");
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid login");
    }
});
</script>

</body>
</html>
