<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { display: block; margin: 10px 0; padding: 8px; width: 250px; }
  </style>
</head>
<body>

<h2>LOGIN</h2>

<input type="text" id="userId" placeholder="User ID (BWG000001)">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<script>

function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  let users = JSON.parse(localStorage.getItem("users") || "[]");

  let user = users.find(u =>
    String(u.userId).trim() === userId &&
    String(u.password).trim() === password
  );

  if (!user) {
    alert("❌ Invalid login");
    return;
  }

  // Save session
  localStorage.setItem("loggedInUser", JSON.stringify(user));

  alert("✅ Login Success: " + user.userId);

  // ================= ROLE BASED REDIRECT =================

  if (user.role === "superadmin") {
    window.location.href = "superadmin_dashboard.html";
  }

  else if (user.role === "admin") {
    window.location.href = "system_admin_dashboard.html";
  }

  else if (user.role === "franchise") {
    window.location.href = "franchise_dashboard.html";
  }

  else {
    window.location.href = "user_dashboard.html";
  }

}

</script>

</body>
</html>
