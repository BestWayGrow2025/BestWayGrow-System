<!DOCTYPE html>
<html>
<head>
  <title>User Upgrade</title>
</head>
<body>

<h2>User Upgrade</h2>

<p id="info"></p>

<button onclick="upgradeNow()">Upgrade Now</button>

<!-- ✅ CORE -->
<script src="CORE_system.js"></script>

<!-- ✅ SYSTEM -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>

<!-- ✅ PIN CONTROL -->
<script src="pin_config_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInUser"));

if (!session) {
  alert("Login required");
  window.location.href = "user_login.html";
}

let user = getUserById(session.userId);

if (!user) {
  alert("User not found");
  localStorage.removeItem("loggedInUser");
  window.location.href = "user_login.html";
}

// ================= INFO =================
document.getElementById("info").innerText =
  "User: " + user.username + " (" + user.userId + ")";


// ================= DUPLICATE FIX (FINAL) =================
function isAlreadyUpgraded(u) {
  return isUserActive(u.userId); // ✅ TIME BASED (FIXED)
}


// ================= UPGRADE =================
function upgradeNow() {

  let users = getUsers();
  let u = users.find(x => x.userId === user.userId);

  if (!u) return;

  // ❌ BLOCK ONLY IF STILL ACTIVE
  if (isAlreadyUpgraded(u)) {
    alert("Your ID is already active");
    return;
  }

  // 🔐 PIN CONTROL
  if (!isPinActive("upgrade")) {
    alert("Upgrade is OFF");
    return;
  }

  // ================= PIN DATA =================
  let pin = getPinSettings().upgrade;

  if (!pin) {
    alert("Upgrade plan not set");
    return;
  }

  let bv = pin.bv;
  let amount = pin.amount;

  // ================= WALLET CHECK =================
  if ((u.wallet || 0) < amount) {
    alert("Insufficient wallet balance");
    return;
  }

  // ================= DEBIT =================
  debitWallet(u.userId, amount, "Upgrade");

  // ================= ACTIVATE =================
  activateUser(u.userId);

  // ================= INCOME (UGLI) =================
  payUGLIIncome(u.userId, bv);

  // ================= CTOR =================
  addToCTORPool(bv);

  // ================= SAVE =================
  saveUsers(users);

  alert("✅ Upgrade Successful");

  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
