<!DOCTYPE html>
<html>
<head>
  <title>Admin Reports</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    h2 { margin-top: 0; }
  </style>
</head>
<body>

<h1>📊 SYSTEM REPORTS</h1>

<button onclick="goBack()">⬅ Back</button>

<!-- USERS -->
<div class="box">
  <h2>Total Users</h2>
  <p id="users"></p>
</div>

<!-- PIN STATUS -->
<div class="box">
  <h2>Pin Status</h2>
  <p id="pins"></p>
</div>

<!-- INCOME -->
<div class="box">
  <h2>Income Summary</h2>
  <p id="income"></p>
</div>

<!-- HOLD -->
<div class="box">
  <h2>Hold Income</h2>
  <p id="hold"></p>
</div>

<!-- CTOR -->
<div class="box">
  <h2>CTOR Pool</h2>
  <p id="ctor"></p>
  <br>
  <button onclick="runCTOR()">Run CTOR Distribution</button>
</div>

<!-- TRANSACTIONS -->
<div class="box">
  <h2>All Transactions</h2>
  <div id="transactions"></div>
</div>

<!-- PIN LOG -->
<div class="box">
  <h2>Pin Usage Logs</h2>
  <div id="pinLogs"></div>
</div>

<!-- WITHDRAW -->
<div class="box">
  <h2>Withdraw Requests</h2>
  <div id="withdrawals"></div>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script src="wallet_system.js"></script>
<script src="ctor_engine.js"></script>
<script src="withdrawal_system.js"></script>

<script>

// ================= AUTH =================
let adminSession = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!adminSession) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// ================= NAV =================
function goBack() {
  window.location.href = "dashboard_admin.html";
}

// ================= USERS =================
function loadUsers() {
  let users = getUsers();
  document.getElementById("users").innerText = "Total Users: " + users.length;
}

// ================= PIN STATUS =================
function loadPins() {
  let pins = JSON.parse(localStorage.getItem("pins") || "[]");

  let totalStock = 0;
  let totalUsed = 0;

  pins.forEach(p => {
    totalStock += p.stock || 0;
    totalUsed += p.used || 0;
  });

  document.getElementById("pins").innerHTML = `
    Total Stock: ${totalStock} <br>
    Total Used: ${totalUsed}
  `;
}

// ================= INCOME =================
function loadIncome() {
  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");

  let total = 0;

  txns.forEach(t => {
    total += t.amount || 0;
  });

  document.getElementById("income").innerText =
    "Total Distributed: ₹ " + total;
}

// ================= HOLD =================
function loadHold() {
  let holds = JSON.parse(localStorage.getItem("holdIncome") || "[]");

  let total = 0;

  holds.forEach(h => {
    if (h.status === "HOLD") total += h.amount || 0;
  });

  document.getElementById("hold").innerText =
    "Hold Amount: ₹ " + total;
}

// ================= CTOR =================
function loadCTOR() {
  let pool = JSON.parse(localStorage.getItem("ctorPool") || "0");

  document.getElementById("ctor").innerText =
    "CTOR Pool: ₹ " + pool;
}

function runCTOR() {
  runCTORDistribution(); // from ctor_engine.js
  alert("✅ CTOR Distributed");
  loadCTOR();
  loadTransactions();
}

// ================= TRANSACTIONS =================
function loadTransactions() {
  let txns = JSON.parse(localStorage.getItem("transactions") || "[]");

  if (txns.length === 0) {
    document.getElementById("transactions").innerHTML = "No transactions";
    return;
  }

  let html = "<ul>";

  txns.slice().reverse().forEach(t => {
    html += `<li>
      ${t.userId} → ₹${t.amount} (${t.reason}) <br>
      <small>${t.time}</small>
    </li><br>`;
  });

  html += "</ul>";

  document.getElementById("transactions").innerHTML = html;
}

// ================= PIN LOG =================
function loadPinLogs() {
  let logs = JSON.parse(localStorage.getItem("pinTransactions") || "[]");

  if (logs.length === 0) {
    document.getElementById("pinLogs").innerHTML = "No logs";
    return;
  }

  let html = "<ul>";

  logs.slice().reverse().forEach(l => {
    html += `<li>
      ${l.userId} used ${l.pinId} (${l.type}) <br>
      BV: ${l.bv} | ₹${l.amount} <br>
      <small>${l.time}</small>
    </li><br>`;
  });

  html += "</ul>";

  document.getElementById("pinLogs").innerHTML = html;
}

// ================= WITHDRAW =================
function loadWithdrawals() {

  let data = JSON.parse(localStorage.getItem("withdrawals") || "[]");

  if (data.length === 0) {
    document.getElementById("withdrawals").innerHTML = "No requests";
    return;
  }

  let html = "<ul>";

  data.slice().reverse().forEach(w => {
    html += `<li>
      ${w.requestId} | ${w.userId} | ₹${w.amount} | ${w.status}
      <br>
      ${w.status === "PENDING" ? `
        <button onclick="approve('${w.requestId}')">Approve</button>
        <button onclick="reject('${w.requestId}')">Reject</button>
      ` : "✔ Done"}
    </li><br>`;
  });

  html += "</ul>";

  document.getElementById("withdrawals").innerHTML = html;
}

function approve(id) {
  approveWithdraw(id);
  alert("✅ Approved");
  loadWithdrawals();
}

function reject(id) {
  rejectWithdraw(id);
  alert("❌ Rejected");
  loadWithdrawals();
}

// ================= INIT =================
loadUsers();
loadPins();
loadIncome();
loadHold();
loadCTOR();
loadTransactions();
loadPinLogs();
loadWithdrawals();

</script>

</body>
</html>
