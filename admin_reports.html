<!DOCTYPE html>
<html>
<head>
  <title>Admin Reports</title>
  <link rel="icon" href="data:,">
  <style>
    body{
      font-family:Arial,sans-serif;
      padding:20px;
      background:#f7f9fc;
      color:#222;
    }
    .box{
      border:1px solid #ddd;
      background:#fff;
      padding:15px;
      margin-bottom:20px;
      border-radius:10px;
    }
    h1,h2{
      margin-top:0;
    }
    button{
      padding:8px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
    #backBtn{
      background:#222;
      color:#fff;
      margin-bottom:20px;
    }
    #ctorBtn{
      background:#007bff;
      color:#fff;
    }
    ul{
      padding-left:18px;
      margin:0;
    }
    li{
      margin-bottom:10px;
    }
  </style>
</head>
<body>

<h1>📊 SYSTEM REPORTS</h1>

<button id="backBtn">⬅ Back</button>

<div class="box">
  <h2>Total Users</h2>
  <p id="users">Loading...</p>
</div>

<div class="box">
  <h2>Pin Status</h2>
  <p id="pins">Loading...</p>
</div>

<div class="box">
  <h2>Income Summary</h2>
  <p id="income">Loading...</p>
</div>

<div class="box">
  <h2>Hold Income</h2>
  <p id="hold">Loading...</p>
</div>

<div class="box">
  <h2>CTOR Pool</h2>
  <p id="ctor">Loading...</p>
  <br>
  <button id="ctorBtn">Run CTOR Distribution</button>
</div>

<div class="box">
  <h2>All Transactions</h2>
  <div id="transactions">Loading...</div>
</div>

<div class="box">
  <h2>Pin Usage Logs</h2>
  <div id="pinLogs">Loading...</div>
</div>

<div class="box">
  <h2>Withdraw Requests</h2>
  <div id="withdrawals">Loading...</div>
</div>

<script src="core_system.js"></script>
<script src="session_manager.js"></script>
<script src="activity_log.js"></script>
<script src="pin_master_system.js"></script>
<script src="income_log_system.js"></script>
<script src="hold_income_system.js"></script>
<script src="withdrawal_system.js"></script>
<script src="ctor_engine.js"></script>
<script src="admin_reports.js"></script>

</body>
</html>
