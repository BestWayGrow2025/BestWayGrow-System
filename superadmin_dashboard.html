<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 6px 10px; margin-top: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>SUPER ADMIN DASHBOARD</h1>

<p id="welcome"></p>

<button onclick="logout()">Logout</button>

<!-- SYSTEM STATUS -->
<div class="box">
  <h3>System Status</h3>
  <p id="systemStatus"></p>
</div>

<!-- ACTIONS -->
<div class="box">
  <h3>Actions</h3>
  <button onclick="goCreateSystemAdmin()">Create System Admin</button>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem();
</script>

<script>

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "superadmin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "superadmin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "superadmin_login.html";
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= SYSTEM STATUS =================
function loadSystem() {

  let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");

  document.getElementById("systemStatus").innerHTML = `
    Admin Access: ${s.adminAccess ? "ON" : "OFF"} <br>
    Franchise Access: ${s.franchiseAccess ? "ON" : "OFF"} <br>
    Registration: ${s.registrationOpen !== false ? "OPEN" : "CLOSED"} <br>
    Upgrades: ${s.upgradesOpen !== false ? "OPEN" : "CLOSED"} <br>
    Finance Dept: ${s.finance ? "ON" : "OFF"} <br>
    Franchise Dept: ${s.franchise ? "ON" : "OFF"} <br>
    KYC Dept: ${s.kyc ? "ON" : "OFF"}
  `;
}

// ================= NAV =================
function goCreateSystemAdmin() {
  window.location.href = "superadmin_create_system_admin.html";
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "superadmin_login.html";
}

// ================= INIT =================
loadSystem();

</script>

</body>
</html>
