<!DOCTYPE html>
<html>
<head>
  <title>User Withdraw</title>
</head>
<body>

<h2>Withdraw Request</h2>

<p>User ID: <span id="userId"></span></p>

<input type="number" id="amount" placeholder="Enter amount"><br><br>

<button onclick="submitWithdraw()">Submit Withdraw</button>

<p id="msg"></p>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="withdrawal_system.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH (SAFE) =================
let sessionUser = JSON.parse(localStorage.getItem("loggedInUser"));

if (!sessionUser) {
  alert("Login required");
  window.location.href = "user_login.html";
  throw new Error("STOP"); // 🔥 IMPORTANT FIX
}

let userId = sessionUser.userId;

// ✅ SAFE ELEMENT CHECK
let userIdEl = document.getElementById("userId");
if (userIdEl) {
  userIdEl.innerText = userId;
}

// ================= SUBMIT =================
function submitWithdraw() {

  let msgBox = document.getElementById("msg");
  let amount = parseFloat(document.getElementById("amount").value);

  if (!msgBox) return;

  msgBox.innerText = "";

  // 🔒 INPUT VALIDATION
  if (isNaN(amount) || amount <= 0) {
    msgBox.innerText = "❌ Invalid amount";
    return;
  }

  // 🔒 SYSTEM SAFETY
  if (typeof isWithdrawSystemSafe === "function") {
    if (!isWithdrawSystemSafe()) {
      msgBox.innerText = "⛔ Withdraw system disabled";
      return;
    }
  }

  // 🔒 FUNCTION CHECK
  if (typeof requestWithdraw !== "function") {
    msgBox.innerText = "❌ Withdraw system error";
    return;
  }

  try {

    // ✅ CALL SYSTEM
    requestWithdraw(userId, amount);

    msgBox.innerText = "✅ Withdraw request submitted";

    document.getElementById("amount").value = "";

    // ⏳ REDIRECT
    setTimeout(() => {
      window.location.href = "user_dashboard.html";
    }, 1500);

  } catch (err) {

    console.error(err);
    msgBox.innerText = "❌ Error processing request";
  }
}

</script>

</body>
</html>
