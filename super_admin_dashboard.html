<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 320px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    button {
      margin-top: 8px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: linear-gradient(90deg, #0077b5, #00aaff);
      color: white;
    }

    button:hover {
      background: linear-gradient(90deg, #005f8a, #008ecc);
    }

    footer {
      margin-top: 30px;
      background: #00331a;
      color: white;
      padding: 15px;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('adminAccess')">Admin Access</button>
    <button onclick="toggle('franchiseAccess')">Franchise</button>
    <button onclick="toggle('registrationOpen')">Registration</button>
    <button onclick="toggle('upgradesOpen')">Upgrades</button>
    <button onclick="toggle('finance')">Finance Dept</button>
    <button onclick="toggle('franchise')">Franchise Dept</button>
    <button onclick="toggle('kyc')">KYC Dept</button>
  </div>

  <!-- CREATE SYSTEM ADMIN -->
  <div class="card">
    <h3>Create System Admin</h3>
    <p>Manage system-level admins</p>
    <button onclick="goCreateSystemAdmin()">Open</button>
  </div>

  <!-- SYSTEM ADMIN LIST -->
  <div class="card">
    <h3>System Admins</h3>
    <div id="adminList"></div>
  </div>

</div>

<footer>
  ⬅ <a href="index.html" style="color:white;">Back to Home</a><br>
  © 2026 BestWayGrow
</footer>

<script src="CORE_system.js"></script>
<script>
initCoreSystem();

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch {
    return p;
  }
}

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= SYSTEM STATUS =================
function loadSystem() {

  let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");

  // ✅ DEFAULT SAFETY (IMPORTANT FIX)
  s.adminAccess = s.adminAccess ?? false;
  s.franchiseAccess = s.franchiseAccess ?? false;
  s.registrationOpen = s.registrationOpen ?? true;
  s.upgradesOpen = s.upgradesOpen ?? true;
  s.finance = s.finance ?? false;
  s.franchise = s.franchise ?? false;
  s.kyc = s.kyc ?? false;

  localStorage.setItem("systemSettings", JSON.stringify(s));

  document.getElementById("systemStatus").innerHTML = `
    Admin Access: ${s.adminAccess ? "ON" : "OFF"} <br>
    Franchise Access: ${s.franchiseAccess ? "ON" : "OFF"} <br>
    Registration: ${s.registrationOpen ? "OPEN" : "CLOSED"} <br>
    Upgrades: ${s.upgradesOpen ? "OPEN" : "CLOSED"} <br>
    Finance Dept: ${s.finance ? "ON" : "OFF"} <br>
    Franchise Dept: ${s.franchise ? "ON" : "OFF"} <br>
    KYC Dept: ${s.kyc ? "ON" : "OFF"}
  `;
}

// ================= TOGGLE =================
function toggle(key) {

  let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");

  s[key] = !s[key];

  localStorage.setItem("systemSettings", JSON.stringify(s));

  loadSystem();
}

// ================= SYSTEM ADMIN LIST =================
function loadAdmins() {

  let users = getUsers();

  let sysAdmins = users.filter(u => u.role === "system_admin");

  if (sysAdmins.length === 0) {
    document.getElementById("adminList").innerHTML = "No System Admin";
    return;
  }

  let html = `
    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Password</th>
        <th>Status</th>
      </tr>
  `;

  sysAdmins.forEach(a => {
    html += `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username}</td>
        <td>${safeDecode(a.password)}</td>
        <td>${a.status || "active"}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}

// ================= NAV =================
function goCreateSystemAdmin() {
  window.location.href = "super_admin_create_system_admin.html";
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSuperAdmin"); // ✅ SAFE LOGOUT
  window.location.href = "super_admin_login.html";
}

// ================= INIT =================
loadSystem();
loadAdmins();

</script>

</body>
</html>
