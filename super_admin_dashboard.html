<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Panel V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#eef2f7;
    }

    header {
      background:#111;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .top-menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 6px #ccc;
    }

    .top-menu button {
      margin:5px;
      padding:8px 12px;
      border:none;
      background:#007bff;
      color:#fff;
      border-radius:5px;
      cursor:pointer;
    }

    .top-menu button:hover {
      background:#0056b3;
    }

    .content {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 8px #ccc;
      margin-bottom:20px;
    }

    .stat {
      font-size:20px;
      font-weight:bold;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th,td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }
  </style>
</head>

<body>

<header>
  <h2>👑 SUPER ADMIN CONTROL V7</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<!-- TOP NAV -->
<div class="top-menu">
  <button onclick="loadSection('overview')">Overview</button>
  <button onclick="loadSection('system')">System Control</button>
  <button onclick="loadSection('admins')">Admins</button>
  <button onclick="loadSection('users')">Users</button>
  <button onclick="loadSection('plans')">Plans</button>
  <button onclick="loadSection('qa')">Q&A</button>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="mainContent"></div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin") || "null");

if (!session || !session.userId) {
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// LOAD SECTIONS
function loadSection(section) {

  let html = "";

  // ================= OVERVIEW =================
  if (section === "overview") {

    let users = getUsers() || [];

    html = `
    <div class="card">
      <h3>Overview</h3>
      <div>System Admins <div class="stat">${users.filter(u=>u.role==="system_admin").length}</div></div>
      <div>Admins <div class="stat">${users.filter(u=>u.role==="admin").length}</div></div>
      <div>Users <div class="stat">${users.filter(u=>u.role==="user").length}</div></div>
    </div>`;
  }

  // ================= SYSTEM =================
  if (section === "system") {

    let s = getSystemSettings() || {};

    html = `
    <div class="card">
      <h3>System Control</h3>

      Lock: ${s.lockMode ? "🔴" : "🟢"}<br>
      Admin: ${s.adminAccess !== false ? "🟢" : "🔴"}<br>
      Register: ${s.registrationOpen !== false ? "🟢" : "🔴"}<br>

      <br>

      <button onclick="toggle('lockMode')">Lock</button>
      <button onclick="toggle('adminAccess')">Admin</button>
      <button onclick="toggle('registrationOpen')">Register</button>
    </div>`;
  }

  // ================= ADMINS =================
  if (section === "admins") {

    let users = (getUsers() || []).filter(u => u.role !== "user");

    let rows = users.map(u => `
      <tr>
        <td>${u.userId}</td>
        <td>${u.role}</td>
        <td>${u.status || "active"}</td>
      </tr>
    `).join("");

    html = `
    <div class="card">
      <h3>All Admins</h3>
      <table>
        <tr><th>ID</th><th>Role</th><th>Status</th></tr>
        ${rows}
      </table>
    </div>`;
  }

  // ================= USERS =================
  if (section === "users") {

    let users = (getUsers() || []).filter(u => u.role === "user");

    let rows = users.map(u => `
      <tr>
        <td>${u.userId}</td>
        <td>${u.status || "active"}</td>
      </tr>
    `).join("");

    html = `
    <div class="card">
      <h3>Users</h3>
      <table>
        <tr><th>ID</th><th>Status</th></tr>
        ${rows}
      </table>
    </div>`;
  }

  // ================= PLANS =================
  if (section === "plans") {
    html = `
    <div class="card">
      <h3>Plans Overview</h3>
      <p>👉 Add plan system here (Upgrade / Repurchase)</p>
    </div>`;
  }

  // ================= Q&A =================
  if (section === "qa") {
    html = `
    <div class="card">
      <h3>Common Q&A</h3>
      <p>Q: How system works?</p>
      <p>A: Digital platform + internal logic</p>
    </div>`;
  }

  document.getElementById("mainContent").innerHTML = html;
}

// TOGGLE
function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSection("system");
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
}

// DEFAULT LOAD
loadSection("overview");

</script>

</body>
</html>
