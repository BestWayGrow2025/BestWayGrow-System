<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 340px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    th {
      background: #f0f0f0;
    }

    button {
      padding: 6px 10px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('lockMode')">🔒 System Lock</button>
    <button onclick="toggle('adminAccess')">Admin Access</button>
    <button onclick="toggle('franchiseAccess')">Franchise Access</button>
    <button onclick="toggle('registrationOpen')">Registration</button>
    <button onclick="toggle('upgradesOpen')">Upgrades</button>

    <button onclick="toggle('queueStop')">Queue ON/OFF</button>
    <button onclick="toggle('withdrawStop')">Withdraw ON/OFF</button>
  </div>

  <!-- SYSTEM ADMIN -->
  <div class="card">
    <h3>System Admins</h3>
    <div id="sysAdminList"></div>
  </div>

  <!-- ADMIN -->
  <div class="card">
    <h3>Admins</h3>
    <div id="adminList"></div>
  </div>

  <!-- 🔥 FRANCHISE -->
  <div class="card">
    <h3>Franchise</h3>
    <div id="franchiseList"></div>
  </div>

  <!-- 🔥 USERS -->
  <div class="card">
    <h3>Users</h3>
    <div id="userList"></div>
  </div>

</div>

<script src="CORE_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
initCoreSystem();

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// LOG
if (typeof logActivity === "function") {
  logActivity(user.userId, "SUPER_ADMIN", "Opened dashboard");
}

document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";


// ================= SYSTEM =================
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("systemStatus").innerHTML = `
    Lock Mode: ${s.lockMode ? "LOCKED 🔴" : "UNLOCKED 🟢"} <br>
    Admin Access: ${s.adminAccess !== false ? "ON 🟢" : "OFF 🔴"} <br>
    Franchise Access: ${s.franchiseAccess !== false ? "ON 🟢" : "OFF 🔴"} <br>
    Registration: ${s.registrationOpen !== false ? "OPEN 🟢" : "CLOSED 🔴"} <br>
    Upgrades: ${s.upgradesOpen !== false ? "OPEN 🟢" : "CLOSED 🔴"} <br>
    Queue: ${s.queueStop ? "STOPPED 🔴" : "RUNNING 🟢"} <br>
    Withdraw: ${s.withdrawStop ? "STOPPED 🔴" : "RUNNING 🟢"}
  `;
}

function toggle(key) {

  let s = getSystemSettings() || {};

  s[key] = !s[key];
  s.updatedAt = new Date().toISOString();

  localStorage.setItem("systemSettings", JSON.stringify(s));

  loadSystem();

  if (typeof logActivity === "function") {
    logActivity(user.userId, "SUPER_ADMIN", "Toggled " + key);
  }
}


// ================= SYSTEM ADMINS =================
function loadSystemAdmins() {

  let users = getUsers();
  let list = users.filter(u => u.role === "system_admin");

  if (!list.length) {
    document.getElementById("sysAdminList").innerHTML = "No System Admin";
    return;
  }

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr>`;

  list.forEach(u => {

    let isActive = u.status !== "inactive";

    html += `
    <tr>
      <td>${u.userId}</td>
      <td>${u.username}</td>
      <td>${isActive ? "ACTIVE" : "INACTIVE"}</td>
      <td>
        <button onclick="toggleUser('${u.userId}')">
          ${isActive ? "Deactivate" : "Activate"}
        </button>
      </td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("sysAdminList").innerHTML = html;
}


// ================= ADMINS =================
function loadAdmins() {

  let users = getUsers();
  let list = users.filter(u => u.role === "admin");

  if (!list.length) {
    document.getElementById("adminList").innerHTML = "No Admin";
    return;
  }

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr>`;

  list.forEach(u => {

    let isActive = u.status !== "inactive";

    html += `
    <tr>
      <td>${u.userId}</td>
      <td>${u.username}</td>
      <td>${isActive ? "ACTIVE" : "INACTIVE"}</td>
      <td>
        <button onclick="toggleAdmin('${u.userId}')">
          ${isActive ? "Deactivate" : "Activate"}
        </button>
      </td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}


// ================= FRANCHISE =================
function loadFranchise() {

  let users = getUsers();
  let list = users.filter(u => u.role === "franchise");

  if (!list.length) {
    document.getElementById("franchiseList").innerHTML = "No Franchise";
    return;
  }

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  list.forEach(u => {
    html += `
    <tr>
      <td>${u.userId}</td>
      <td>${u.username}</td>
      <td>${u.status}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("franchiseList").innerHTML = html;
}


// ================= USERS =================
function loadUsersList() {

  let users = getUsers();
  let list = users.filter(u => u.role === "user");

  if (!list.length) {
    document.getElementById("userList").innerHTML = "No Users";
    return;
  }

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  list.forEach(u => {
    html += `
    <tr>
      <td>${u.userId}</td>
      <td>${u.username}</td>
      <td>${u.status}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("userList").innerHTML = html;
}


// ================= TOGGLES =================
function toggleAdmin(id) {
  let users = getUsers();
  let u = users.find(x => x.userId === id);
  if (!u) return;

  u.status = (u.status === "inactive") ? "active" : "inactive";
  saveUsers(users);
  loadAdmins();
}

function toggleUser(id) {
  let users = getUsers();
  let u = users.find(x => x.userId === id);
  if (!u) return;

  u.status = (u.status === "inactive") ? "active" : "inactive";
  saveUsers(users);
  loadSystemAdmins();
}


// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}


// ================= AUTO REFRESH =================
setInterval(() => {
  loadSystem();
}, 3000);


// ================= INIT =================
loadSystem();
loadSystemAdmins();
loadAdmins();
loadFranchise();
loadUsersList();

</script>

</body>
</html>
