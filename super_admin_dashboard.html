<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; margin:0; background:#f4f7f9; text-align:center; }

    header {
      background:#006633;
      color:#fff;
      padding:15px;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:8px 12px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      background:#ff6600;
      color:#fff;
    }

    .container { padding:20px; }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
      max-width:800px;
      margin:auto;
    }

    input {
      padding:6px;
      margin:5px;
      width:85%;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }
  </style>
</head>

<body>

<header>
  <h2>👑 SUPER ADMIN V7 CONTROL</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<!-- MENU -->
<div class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadSystemAdmins()">System Admin</button>
  <button onclick="loadAdmins()">Admins</button>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSystem()">System</button>
  <button onclick="loadReset()">Reset</button>
</div>

<!-- CONTENT -->
<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin") || "null");

if (!session || !session.userId) {
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= HOME =================
function loadHome() {
  document.getElementById("mainContent").innerHTML = `
    <h3>Overview</h3>
    <p>ID: ${user.userId}</p>
    <p>Status: ${user.status || "active"}</p>
  `;
}

// ================= SYSTEM ADMIN =================
function loadSystemAdmins() {

  let users = (getUsers() || []).filter(u => u.role === "system_admin");

  let html = `<h3>System Admins</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= ADMINS =================
function loadAdmins() {

  let users = (getUsers() || []).filter(u => u.role === "admin");

  let html = `<h3>Admins</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= USERS =================
function loadUsers() {

  let users = (getUsers() || []).filter(u => u.role === "user");

  let html = `<h3>Users</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= SYSTEM =================
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("mainContent").innerHTML = `
    <h3>System Control</h3>

    <p>Lock Mode: ${s.lockMode ? "ON" : "OFF"}</p>
    <p>Admin Access: ${s.adminAccess ? "ON" : "OFF"}</p>
    <p>Registration: ${s.registrationOpen ? "ON" : "OFF"}</p>

    <button onclick="toggle('lockMode')">Toggle Lock</button>
    <button onclick="toggle('adminAccess')">Toggle Admin</button>
    <button onclick="toggle('registrationOpen')">Toggle Register</button>
  `;
}

// TOGGLE
function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// ================= RESET =================
function loadReset() {

  document.getElementById("mainContent").innerHTML = `
    <h3>System Reset</h3>

    <button onclick="softReset()">Soft Reset</button>
    <button onclick="fullReset()">Full Reset</button>
  `;
}

function softReset() {
  if (!confirm("Clear logs?")) return;
  localStorage.removeItem("activityLogs");
  alert("Done"); location.reload();
}

function fullReset() {
  if (!confirm("Full reset?")) return;

  let users = (getUsers() || []).filter(u => u.role === "super_admin");
  saveUsers(users);

  alert("System Reset Done");
  location.reload();
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
