<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>

  <!-- ✅ FIX favicon -->
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(90deg, #0077b5, #00aaff);
      color: white;
    }

    button:hover {
      background: linear-gradient(90deg, #005f8a, #008ecc);
    }

    footer {
      margin-top: 30px;
      background: #00331a;
      color: white;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="systemStatus"></p>
  </div>

  <!-- CREATE SYSTEM ADMIN -->
  <div class="card">
    <h3>Create System Admin</h3>
    <p>Manage system-level admins</p>
    <button onclick="goCreateSystemAdmin()">Open</button>
  </div>

</div>

<footer>
  ⬅ <a href="index.html" style="color:white;">Back to Home</a><br>
  © 2026 BestWayGrow
</footer>

<!-- ✅ CORE -->
<script src="CORE_system.js"></script>

<script>
initCoreSystem();

// ================= GLOBAL LOGOUT =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInFranchise");
  localStorage.removeItem("loggedInUser");
}

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") { // ✅ FIXED ROLE
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// ================= UI =================
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= SYSTEM STATUS =================
function loadSystem() {

  let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");

  document.getElementById("systemStatus").innerHTML = `
    Admin Access: ${s.adminAccess ? "ON" : "OFF"} <br>
    Franchise Access: ${s.franchiseAccess ? "ON" : "OFF"} <br>
    Registration: ${s.registrationOpen !== false ? "OPEN" : "CLOSED"} <br>
    Upgrades: ${s.upgradesOpen !== false ? "OPEN" : "CLOSED"} <br>
    Finance Dept: ${s.finance ? "ON" : "OFF"} <br>
    Franchise Dept: ${s.franchise ? "ON" : "OFF"} <br>
    KYC Dept: ${s.kyc ? "ON" : "OFF"}
  `;
}

// ================= NAV =================
function goCreateSystemAdmin() {
  window.location.href = "super_admin_create_system_admin.html";
}

// ================= LOGOUT =================
function logout() {
  logoutAll(); // ✅ IMPORTANT
  window.location.href = "super_admin_login.html";
}

// ================= INIT =================
loadSystem();

</script>

</body>
</html>
