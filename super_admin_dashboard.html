<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 340px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    button {
      padding: 6px 10px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('lockMode')">🔒 System Lock</button>
    <button onclick="toggle('adminAccess')">Admin Access</button>
    <button onclick="toggle('franchiseAccess')">Franchise Access</button>
    <button onclick="toggle('registrationOpen')">Registration</button>
    <button onclick="toggle('upgradesOpen')">Upgrades</button>
    <button onclick="toggle('queueStop')">Queue</button>
    <button onclick="toggle('withdrawStop')">Withdraw</button>
  </div>

  <!-- 📊 COUNTS -->
  <div class="card">
    <h3>System Overview</h3>

    <div>System Admins <div class="stat" id="sysCount">0</div></div>
    <div>Admins <div class="stat" id="adminCount">0</div></div>
    <div>Franchise <div class="stat" id="franchiseCount">0</div></div>
    <div>Users <div class="stat" id="userCount">0</div></div>
  </div>

  <!-- VIEW PANELS -->
  <div class="card">
    <h3>Quick Access</h3>

    <button onclick="goTo('system_admin_dashboard.html')">System Admins</button>
    <button onclick="goTo('admin_dashboard.html')">Admins</button>
    <button onclick="goTo('franchise_dashboard.html')">Franchise</button>
    <button onclick="goTo('user_panel.html')">Users</button>
  </div>

  <!-- SYSTEM ADMIN LIST -->
  <div class="card">
    <h3>System Admins</h3>
    <div id="sysAdminList"></div>
  </div>

  <!-- ADMIN LIST -->
  <div class="card">
    <h3>Admins</h3>
    <div id="adminList"></div>
  </div>

</div>

<script src="CORE_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
initCoreSystem();

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));
if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);
if (!user || user.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= SYSTEM =================
function loadSystem() {
  let s = getSystemSettings() || {};

  document.getElementById("systemStatus").innerHTML = `
    Lock: ${s.lockMode ? "🔴" : "🟢"} |
    Admin: ${s.adminAccess !== false ? "🟢" : "🔴"} |
    Franchise: ${s.franchiseAccess !== false ? "🟢" : "🔴"} <br>
    Register: ${s.registrationOpen !== false ? "🟢" : "🔴"} |
    Upgrade: ${s.upgradesOpen !== false ? "🟢" : "🔴"} <br>
    Queue: ${s.queueStop ? "🔴" : "🟢"} |
    Withdraw: ${s.withdrawStop ? "🔴" : "🟢"}
  `;
}

// ================= COUNTS =================
function loadCounts() {
  let users = getUsers();

  document.getElementById("sysCount").innerText =
    users.filter(u => u.role === "system_admin").length;

  document.getElementById("adminCount").innerText =
    users.filter(u => u.role === "admin").length;

  document.getElementById("franchiseCount").innerText =
    users.filter(u => u.role === "franchise").length;

  document.getElementById("userCount").innerText =
    users.filter(u => u.role === "user").length;
}

// ================= LISTS =================
function loadSystemAdmins() {
  let users = getUsers().filter(u => u.role === "system_admin");

  let html = "No Data";

  if (users.length) {
    html = `<table>
      <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

    users.forEach(u => {
      html += `<tr>
        <td>${u.userId}</td>
        <td>${u.username}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
    });

    html += "</table>";
  }

  document.getElementById("sysAdminList").innerHTML = html;
}

function loadAdmins() {
  let users = getUsers().filter(u => u.role === "admin");

  let html = "No Data";

  if (users.length) {
    html = `<table>
      <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

    users.forEach(u => {
      html += `<tr>
        <td>${u.userId}</td>
        <td>${u.username}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
    });

    html += "</table>";
  }

  document.getElementById("adminList").innerHTML = html;
}

// ================= TOGGLE =================
function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// ================= NAV =================
function goTo(page) {
  window.location.href = page;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// AUTO REFRESH
setInterval(() => {
  loadSystem();
  loadCounts();
}, 3000);

// INIT
loadSystem();
loadCounts();
loadSystemAdmins();
loadAdmins();

</script>

</body>
</html>
