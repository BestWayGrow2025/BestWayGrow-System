<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 340px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    th {
      background: #f0f0f0;
    }

    button {
      padding: 6px 10px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('lockMode')">🔒 System Lock</button>
    <button onclick="toggle('adminAccess')">Admin Access</button>
    <button onclick="toggle('franchiseAccess')">Franchise Access</button>
    <button onclick="toggle('registrationOpen')">Registration</button>
    <button onclick="toggle('upgradesOpen')">Upgrades</button>
  </div>

  <!-- SYSTEM ADMIN LIST -->
  <div class="card">
    <h3>System Admins</h3>
    <div id="sysAdminList"></div>
  </div>

  <!-- ADMIN CONTROL -->
  <div class="card">
    <h3>Admins Control</h3>
    <div id="adminList"></div>
  </div>

</div>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- LOG -->
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// LOG LOGIN
if (typeof logActivity === "function") {
  logActivity(user.userId, "SUPER_ADMIN", "Opened dashboard");
}

document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= SYSTEM (UPGRADE 🔥) =================
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("systemStatus").innerHTML = `
    Lock Mode: ${s.lockMode ? "LOCKED 🔴" : "UNLOCKED 🟢"} <br>
    Admin Access: ${s.adminAccess !== false ? "ON 🟢" : "OFF 🔴"} <br>
    Franchise Access: ${s.franchiseAccess !== false ? "ON 🟢" : "OFF 🔴"} <br>
    Registration: ${s.registrationOpen !== false ? "OPEN 🟢" : "CLOSED 🔴"} <br>
    Upgrades: ${s.upgradesOpen !== false ? "OPEN 🟢" : "CLOSED 🔴"} <br>
    Queue: ${s.queueStop ? "STOPPED 🔴" : "RUNNING 🟢"} <br>
    Withdraw: ${s.withdrawStop ? "STOPPED 🔴" : "RUNNING 🟢"}
  `;
}

// ================= TOGGLE =================
function toggle(key) {

  let s = getSystemSettings() || {};

  s[key] = !s[key];
  s.updatedAt = new Date().toISOString();

  localStorage.setItem("systemSettings", JSON.stringify(s));

  loadSystem();

  // LOG
  if (typeof logActivity === "function") {
    logActivity(user.userId, "SUPER_ADMIN", "Toggled " + key);
  }
}

// ================= SYSTEM ADMIN =================
function loadSystemAdmins() {

  let users = getUsers();
  let sysAdmins = users.filter(u => u.role === "system_admin");

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr>`;

  sysAdmins.forEach(a => {

    let isActive = a.status !== "inactive";

    html += `
    <tr>
      <td>${a.userId}</td>
      <td>${a.username}</td>
      <td>${isActive ? "ACTIVE" : "INACTIVE"}</td>
      <td>
        <button onclick="toggleUser('${a.userId}')">
          ${isActive ? "Deactivate" : "Activate"}
        </button>
      </td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("sysAdminList").innerHTML = html;
}

// ================= ADMIN CONTROL =================
function loadAdmins() {

  let users = getUsers();
  let admins = users.filter(u => u.role === "admin");

  if (!admins.length) {
    document.getElementById("adminList").innerHTML = "No Admin";
    return;
  }

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr>`;

  admins.forEach(a => {

    let isActive = a.status !== "inactive";

    html += `
    <tr>
      <td>${a.userId}</td>
      <td>${a.username}</td>
      <td>${isActive ? "ACTIVE" : "INACTIVE"}</td>
      <td>
        <button onclick="toggleAdmin('${a.userId}')">
          ${isActive ? "Deactivate" : "Activate"}
        </button>
      </td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}

function toggleAdmin(id) {

  let users = getUsers();
  let adminUser = users.find(u => u.userId === id);

  if (!adminUser) return;

  adminUser.status = (adminUser.status === "inactive") ? "active" : "inactive";

  saveUsers(users);
  loadAdmins();

  if (typeof logActivity === "function") {
    logActivity(user.userId, "SUPER_ADMIN", "Toggled admin " + id);
  }
}

// ================= COMMON =================
function toggleUser(id) {

  let users = getUsers();
  let u = users.find(x => x.userId === id);
  if (!u) return;

  u.status = (u.status === "inactive") ? "active" : "inactive";

  saveUsers(users);
  loadSystemAdmins();

  if (typeof logActivity === "function") {
    logActivity(user.userId, "SUPER_ADMIN", "Toggled system admin " + id);
  }
}

// ================= LOGOUT =================
function logout() {

  if (typeof logActivity === "function") {
    logActivity(user.userId, "SUPER_ADMIN", "Logout");
  }

  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// ================= AUTO REFRESH (🔥 FIX) =================
setInterval(() => {
  loadSystem();
}, 3000);

// ================= INIT =================
loadSystem();
loadSystemAdmins();
loadAdmins();

</script>

</body>
</html>
