<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard FINAL</title>
  <link rel="icon" href="data:,">

  <style>
    body {font-family:'Segoe UI'; margin:0; background:#eef2f7;}

    header {
      background:#ff6600;
      color:#fff;
      padding:18px;
      text-align:center;
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    .menu {
      display:flex;
      overflow:auto;
      background:#fff;
      padding:10px;
    }

    .menu button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ff944d;
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}

.menu {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  background: #fff;
  padding: 10px;
  justify-content: center; /* center align */
}


    .menu button.active {
      background:#cc5200;
    }

    .container {padding:20px;}

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      max-width:1000px;
      margin:auto;
    }

    input {padding:10px; margin:5px; width:90%;}

    table {width:100%; border-collapse:collapse; margin-top:10px;}
    th, td {border:1px solid #ddd; padding:8px;}
  </style>
</head>

<body>

<header>
  <h2>👑 SUPER ADMIN MASTER CONTROL</h2>
  <p id="welcome"></p>
  <button onclick="safeClick(null, logout)">Logout</button>
</header>

<div class="menu">
  <button onclick="safeClick(this,loadHome)">Home</button>
  <button onclick="safeClick(this,loadCreate)">Create Sys Admin</button>
  <button onclick="safeClick(this,loadUsers)">Users</button>
  <button onclick="safeClick(this,loadSystem)">System</button>
</div>

<div class="container">
  <div id="mainContent" class="card"></div>
</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>
<script src="session_manager.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// ================= AUTH (FINAL FIX ✅) =================
let session = null;

try {
  if (typeof getSession === "function") {
    session = getSession();
  }
} catch (e) {
  console.error(e);
}

if (!session || session.role !== "super_admin") {
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

let currentUser = session;

// ================= WELCOME =================
document.getElementById("welcome").innerText =
"Welcome SUPER ADMIN (" + currentUser.userId + ")";

// ================= LOCK SYSTEM =================
let lock = false;
function safeClick(btn, fn) {
  if (lock) return;
  lock = true;

  if (btn) {
    document.querySelectorAll(".menu button")
      .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  try { fn(); } catch (e) { console.error(e); }

  setTimeout(()=> lock=false, 400);
}

// ================= SYSTEM CHECK =================
function isSystemSafe() {
  let s = getSystemSettings() || {};
  if (s.lockMode) {
    alert("System Locked");
    return false;
  }
  return true;
}

// ================= HOME =================
function loadHome(){

  let users = getUsers() || [];

  let totalUsers = users.filter(u => u.role === "user").length;
  let admins = users.filter(u => u.role === "admin").length;
  let sysAdmins = users.filter(u => u.role === "system_admin").length;

  document.getElementById("mainContent").innerHTML = `
    <h3>📊 Dashboard Overview</h3>

    <div style="display:flex; flex-wrap:wrap; gap:15px; margin-top:15px;">

      <div style="flex:1; min-width:200px; background:#4CAF50; color:#fff; padding:20px; border-radius:10px;">
        <h4>👤 Users</h4>
        <h2>${totalUsers}</h2>
      </div>

      <div style="flex:1; min-width:200px; background:#2196F3; color:#fff; padding:20px; border-radius:10px;">
        <h4>🛠 Admins</h4>
        <h2>${admins}</h2>
      </div>

      <div style="flex:1; min-width:200px; background:#ff9800; color:#fff; padding:20px; border-radius:10px;">
        <h4>👑 System Admins</h4>
        <h2>${sysAdmins}</h2>
      </div>

    </div>

    <hr style="margin:20px 0;">
    <p>✔ System running normally</p>
  `;
}

// ================= CREATE =================
function loadCreate(){
  document.getElementById("mainContent").innerHTML=`
    <h3>Create System Admin</h3>

    <input id="id" placeholder="User ID"><br>
    <input id="name" placeholder="Name"><br>
    <input id="pass" placeholder="Password"><br>

    <button onclick="safeClick(null,create)">Create</button>
  `;
}

function create(){

  if (!isSystemSafe()) return;

  let id=document.getElementById("id").value.trim();
  let name=document.getElementById("name").value.trim();
  let pass=document.getElementById("pass").value.trim();

  if(!id||!name||!pass) return alert("Fill all fields");

  let users=getUsers() || [];

  if(users.find(u=>u.userId.toLowerCase()===id.toLowerCase()))
    return alert("Already exists");

  users.push({
    userId:id,
    username:name,
    password:btoa(pass),
    role:"system_admin",
    status:"active",
    createdAt:Date.now(),
    createdBy: currentUser.userId
  });

  saveUsers(users);

  if (typeof logActivity === "function") {
    logActivity(currentUser.userId, "SUPER_ADMIN", "Create System Admin: " + id);
  }

  alert("System Admin Created");
  loadUsers();
}

// ================= USERS =================
function loadUsers(){

  let users=getUsers() || [];

  let html=`<h3>All Users</h3>
  <table>
  <tr><th>ID</th><th>Name</th><th>Role</th></tr>`;

  users
    .filter(u => u.userId !== "BWG000000")
    .forEach(u => {
      html += `<tr>
        <td>${u.userId}</td>
        <td>${u.username || ""}</td>
        <td>${u.role}</td>
      </tr>`;
    });

  html+=`</table>`;

  document.getElementById("mainContent").innerHTML=html;
}
  
// ================= SYSTEM =================
function loadSystem(){

  let s=getSystemSettings()||{
    lockMode:false,
    registrationOpen:true,
    adminAccess:true,
    withdrawOpen:true
  };

  document.getElementById("mainContent").innerHTML=`
    <h3>System Control</h3>

    Lock Mode: ${s.lockMode?"ON":"OFF"}
    <button onclick="safeClick(null,toggleLock)">Toggle</button><br><br>

    Registration: ${s.registrationOpen?"ON":"OFF"}
    <button onclick="safeClick(null,toggleRegistration)">Toggle</button><br><br>

    Admin Access: ${s.adminAccess?"ON":"OFF"}
    <button onclick="safeClick(null,toggleAdmin)">Toggle</button><br><br>

    Withdraw: ${s.withdrawOpen?"ON":"OFF"}
    <button onclick="safeClick(null,toggleWithdraw)">Toggle</button>
  `;
}

// WRAPPERS
function toggleLock(){ toggle('lockMode'); }
function toggleRegistration(){ toggle('registrationOpen'); }
function toggleAdmin(){ toggle('adminAccess'); }
function toggleWithdraw(){ toggle('withdrawOpen'); }

function toggle(key){

  if (!isSystemSafe()) return;

  let s=getSystemSettings()||{};
  s[key]=!s[key];

  saveSystemSettings(s);

  if (typeof logActivity === "function") {
    logActivity(currentUser.userId, "SUPER_ADMIN", "Toggle " + key + ": " + s[key]);
  }

  loadSystem();
}

// ================= LOGOUT =================
function logout(){

  if (typeof logActivity === "function") {
    logActivity(currentUser.userId, "SUPER_ADMIN", "Logout");
  }

  if (typeof clearSession === "function") {
    clearSession();
  }

  location.href="super_admin_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
