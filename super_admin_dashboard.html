<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 340px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    button {
      padding: 6px 10px;
      margin: 5px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
    }

    .btn-main {
      background: #00994d;
      color: white;
    }

    input {
      padding: 6px;
      margin: 5px;
      width: 85%;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('lockMode')">🔒 Lock</button>
    <button onclick="toggle('adminAccess')">Admin</button>
    <button onclick="toggle('franchiseAccess')">Franchise</button>
    <button onclick="toggle('registrationOpen')">Register</button>
    <button onclick="toggle('upgradesOpen')">Upgrade</button>
    <button onclick="toggle('repurchaseOpen')">Repurchase</button>
    <button onclick="toggle('queueStop')">Queue</button>
    <button onclick="toggle('withdrawStop')">Withdraw</button>

    <hr>

    <h4>⚠ Reset Controls</h4>

    <button onclick="softReset()">🟢 Soft</button>
    <button onclick="mediumReset()">🟡 Medium</button>
    <button onclick="fullReset()">🔴 Full</button>
  </div>

  <!-- ✅ FIXED: CREATE SYSTEM ADMIN -->
  <div class="card">
    <h3>Create System Admin</h3>

    <input id="sysId" placeholder="User ID"><br>
    <input id="sysPass" type="password" placeholder="Password"><br>

    <button class="btn-main" onclick="createSystemAdmin()">CREATE</button>
  </div>

  <!-- COUNTS -->
  <div class="card">
    <h3>System Overview</h3>

    <div>System Admins <div class="stat" id="sysCount">0</div></div>
    <div>Admins <div class="stat" id="adminCount">0</div></div>
    <div>Franchise <div class="stat" id="franchiseCount">0</div></div>
    <div>Users <div class="stat" id="userCount">0</div></div>
  </div>

  <!-- QUICK VIEW -->
  <div class="card">
    <h3>Quick View</h3>

    <button onclick="showData('system_admin')">System Admins</button>
    <button onclick="showData('admin')">Admins</button>
    <button onclick="showData('franchise')">Franchise</button>
    <button onclick="showData('user')">Users</button>
  </div>

  <!-- DATA PANEL -->
  <div class="card">
    <h3>Details</h3>
    <div id="dataPanel">Click above button to view</div>
  </div>

</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  throw new Error("STOP");
}

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));
if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);
if (!user || user.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ✅ FIXED CREATE FUNCTION
function createSystemAdmin() {

  let id = document.getElementById("sysId").value.trim();
  let pass = document.getElementById("sysPass").value.trim();

  if (!id || !pass) {
    alert("Enter ID & Password");
    return;
  }

  let users = getUsers() || [];

  if (users.find(u => u.userId.toLowerCase() === id.toLowerCase())) {
    alert("User already exists");
    return;
  }

  let newUser = {
    userId: id,
    username: id,
    password: btoa(pass),
    role: "system_admin",
    status: "active",
    createdBy: user.userId
  };

  users.push(newUser);

  localStorage.setItem("users", JSON.stringify(users));

  alert("✅ System Admin Created");

  document.getElementById("sysId").value = "";
  document.getElementById("sysPass").value = "";

  loadCounts();
}

// SYSTEM
function loadSystem() {
  let s = getSystemSettings() || {};

  document.getElementById("systemStatus").innerHTML = `
    Lock: ${s.lockMode ? "🔴" : "🟢"} |
    Admin: ${s.adminAccess !== false ? "🟢" : "🔴"} |
    Franchise: ${s.franchiseAccess !== false ? "🟢" : "🔴"} <br>
    Register: ${s.registrationOpen !== false ? "🟢" : "🔴"} |
    Upgrade: ${s.upgradesOpen !== false ? "🟢" : "🔴"} |
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"}
  `;
}

// COUNTS
function loadCounts() {
  let users = getUsers() || [];

  document.getElementById("sysCount").innerText =
    users.filter(u => u.role === "system_admin").length;

  document.getElementById("adminCount").innerText =
    users.filter(u => u.role === "admin").length;

  document.getElementById("franchiseCount").innerText =
    users.filter(u => u.role === "franchise").length;

  document.getElementById("userCount").innerText =
    users.filter(u => u.role === "user").length;
}

// ✅ FIXED QUICK VIEW
function showData(role) {

  let users = (getUsers() || []).filter(u => u.role === role);

  if (!users.length) {
    document.getElementById("dataPanel").innerHTML = "No Data";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("dataPanel").innerHTML = html;
}

// TOGGLE
function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// AUTO REFRESH
setInterval(() => {
  loadSystem();
  loadCounts();
}, 3000);

// INIT
loadSystem();
loadCounts();

</script>

</body>
</html>
