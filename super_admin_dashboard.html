<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ef, #f8fbfa);
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #006633, #00994d);
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: white;
      width: 320px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #f0f0f0;
    }

    button {
      padding: 8px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>BestWayGrow</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('adminAccess')">Admin Access</button>
    <button onclick="toggle('franchiseAccess')">Franchise Access</button>
    <button onclick="toggle('registrationOpen')">Registration</button>
    <button onclick="toggle('upgradesOpen')">Upgrades</button>
  </div>

  <!-- SYSTEM ADMIN LIST -->
  <div class="card">
    <h3>System Admins</h3>
    <div id="sysAdminList"></div>
  </div>

  <!-- 🔥 NEW ADMIN CONTROL -->
  <div class="card">
    <h3>Admins Control</h3>
    <div id="adminList"></div>
  </div>

</div>

<script src="CORE_system.js"></script>
<script>
initCoreSystem();

function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ================= SYSTEM =================
function loadSystem() {
  let s = getSystemSettings();

  document.getElementById("systemStatus").innerHTML = `
    Admin Access: ${s.adminAccess ? "ON" : "OFF"} <br>
    Franchise Access: ${s.franchiseAccess ? "ON" : "OFF"}
  `;
}

function toggle(key) {
  let s = getSystemSettings();
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// ================= SYSTEM ADMIN =================
function loadSystemAdmins() {

  let users = getUsers();
  let sysAdmins = users.filter(u => u.role === "system_admin");

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr>`;

  sysAdmins.forEach(a => {
    html += `
    <tr>
      <td>${a.userId}</td>
      <td>${a.username}</td>
      <td>${a.status || "active"}</td>
      <td>
        <button onclick="toggleUser('${a.userId}')">
          ${a.status === "inactive" ? "Activate" : "Deactivate"}
        </button>
      </td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("sysAdminList").innerHTML = html;
}

// ================= ADMIN CONTROL (🔥 MAIN ADD) =================
function loadAdmins() {

  let users = getUsers();
  let s = getSystemSettings();

  let admins = users.filter(u => u.role === "admin");

  if (admins.length === 0) {
    document.getElementById("adminList").innerHTML = "No Admin";
    return;
  }

  let html = `<table>
  <tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr>`;

  admins.forEach(a => {

    let isActive = a.status === "active";

    html += `
    <tr>
      <td>${a.userId}</td>
      <td>${a.username}</td>
      <td>${isActive ? "ACTIVE" : "INACTIVE"}</td>
      <td>
        <button onclick="toggleAdmin('${a.userId}')">
          ${isActive ? "Deactivate" : "Activate"}
        </button>
      </td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}

function toggleAdmin(id) {

  let users = getUsers();
  let admin = users.find(u => u.userId === id);

  if (!admin) return;

  admin.status = (admin.status === "active") ? "inactive" : "active";

  saveUsers(users);

  loadAdmins();
}

// ================= COMMON TOGGLE =================
function toggleUser(id) {
  let users = getUsers();
  let u = users.find(x => x.userId === id);
  if (!u) return;

  u.status = (u.status === "inactive") ? "active" : "inactive";
  saveUsers(users);

  loadSystemAdmins();
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// ================= INIT =================
loadSystem();
loadSystemAdmins();
loadAdmins();

</script>

</body>
</html>
