<!DOCTYPE html>
<html>
<head>
  <title>Super Admin PRO Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family:'Segoe UI', Arial;
      margin:0;
      background:linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background:linear-gradient(135deg,#ff6600,#ff944d);
      color:#fff;
      padding:18px;
      text-align:center;
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
    }

    .menu button {
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      background:linear-gradient(135deg,#ff6600,#ff944d);
      color:#fff;
    }

    .menu button.active {
      background:#000;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      max-width:1000px;
      margin:auto;
    }

    .stats {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .box {
      flex:1;
      min-width:150px;
      background:#f1f4f8;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

    table {
      width:100%;
      margin-top:10px;
      border-collapse:collapse;
    }

    th, td {
      border:1px solid #eee;
      padding:8px;
      text-align:center;
    }
  </style>
</head>

<body>

<header>
  <h2>👑 SUPER ADMIN PANEL (PRO)</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="setActive(this);loadHome()">Home</button>
  <button onclick="setActive(this);loadUsers()">Users</button>
  <button onclick="setActive(this);loadAdmins()">Admins</button>
  <button onclick="setActive(this);loadSystem()">System</button>
  <button onclick="setActive(this);loadReset()">Reset</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
initCoreSystem();

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin") || "null");

if (!session) {
  location.href = "super_admin_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  location.href = "super_admin_login.html";
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// ACTIVE MENU
function setActive(btn) {
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// ================= HOME (UPGRADED) =================
function loadHome() {

  let users = getUsers() || [];

  let totalUsers = users.filter(u => u.role === "user").length;
  let admins = users.filter(u => u.role === "admin").length;
  let sysAdmins = users.filter(u => u.role === "system_admin").length;

  document.getElementById("mainContent").innerHTML = `
    <h3>📊 System Overview</h3>

    <div class="stats">
      <div class="box">Users<br><b>${totalUsers}</b></div>
      <div class="box">Admins<br><b>${admins}</b></div>
      <div class="box">Sys Admins<br><b>${sysAdmins}</b></div>
    </div>

    <br>
    <p><b>ID:</b> ${user.userId}</p>
    <p><b>Status:</b> ${user.status || "active"}</p>
  `;
}

// ================= USERS =================
function loadUsers() {

  let users = getUsers().filter(u => u.role === "user");

  let html = `<h3>Users</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= ADMINS =================
function loadAdmins() {

  let users = getUsers().filter(u => u.role !== "user");

  let html = `<h3>Admins</h3><table>
  <tr><th>ID</th><th>Role</th></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.role}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= SYSTEM =================
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("mainContent").innerHTML = `
    <h3>System Control</h3>

    <p>Lock Mode: ${s.lockMode ? "ON" : "OFF"}</p>
    <p>Registration: ${s.registrationOpen ? "ON" : "OFF"}</p>

    <button onclick="toggle('lockMode')">Toggle Lock</button>
    <button onclick="toggle('registrationOpen')">Toggle Register</button>
  `;
}

function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// ================= RESET =================
function loadReset() {
  document.getElementById("mainContent").innerHTML = `
    <h3>System Reset</h3>
    <button onclick="fullReset()">FULL RESET</button>
  `;
}

function fullReset() {
  if (!confirm("Danger! Reset system?")) return;

  let users = getUsers().filter(u => u.role === "super_admin");
  saveUsers(users);

  alert("Reset Done");
  location.reload();
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
