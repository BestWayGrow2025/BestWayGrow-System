<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f7f9;
    }

    header {
      background:#111;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:20px;
      background:#e0e0e0;
      cursor:pointer;
      white-space:nowrap;
    }

    .menu button.active {
      background:#000;
      color:#fff;
    }

    .content {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse: collapse;
    }

    th,td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    input {
      padding:6px;
      margin:5px;
      width:90%;
    }

    button.main {
      background:#000;
      color:#fff;
    }
  </style>
</head>

<body>

<header>
  <h2>👑 SUPER ADMIN PANEL V7</h2>
  <button onclick="logout()">Logout</button>
</header>

<!-- MENU -->
<div class="menu">
  <button onclick="loadSection('dashboard')">Dashboard</button>
  <button onclick="loadSection('systemAdmins')">System Admins</button>
  <button onclick="loadSection('createSystemAdmin')">Create System Admin</button>
  <button onclick="loadSection('admins')">Admins</button>
  <button onclick="loadSection('users')">Users</button>
  <button onclick="loadSection('system')">System Control</button>
  <button onclick="loadSection('reset')">Reset</button>
</div>

<!-- CONTENT -->
<div class="content" id="contentArea">
  Loading...
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin") || "null");

if (!session || !session.userId) {
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

// MAIN SWITCH
function loadSection(section) {

  let html = "";

  // DASHBOARD
  if (section === "dashboard") {

    let users = getUsers() || [];

    html = `
    <div class="card">
      <h3>Overview</h3>
      System Admins: ${users.filter(u=>u.role==="system_admin").length}<br>
      Admins: ${users.filter(u=>u.role==="admin").length}<br>
      Users: ${users.filter(u=>u.role==="user").length}
    </div>`;
  }

  // SYSTEM ADMINS LIST
  if (section === "systemAdmins") {

    let users = (getUsers() || []).filter(u=>u.role==="system_admin");

    let rows = users.map(a => `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username || a.userId}</td>
        <td>${a.status || "active"}</td>
      </tr>`).join("");

    html = `
    <div class="card">
      <h3>System Admin List</h3>
      <table>
        <tr><th>ID</th><th>Name</th><th>Status</th></tr>
        ${rows || "No Data"}
      </table>
    </div>`;
  }

  // CREATE SYSTEM ADMIN
  if (section === "createSystemAdmin") {

    html = `
    <div class="card">
      <h3>Create System Admin</h3>

      <input id="sysId" placeholder="User ID"><br>
      <input id="sysName" placeholder="Name"><br>
      <input id="sysPass" type="password" placeholder="Password"><br>

      <button class="main" onclick="createSystemAdmin()">Create</button>
      <p id="msg"></p>
    </div>`;
  }

  // ADMINS
  if (section === "admins") {

    let users = (getUsers() || []).filter(u=>u.role==="admin");

    html = `
    <div class="card">
      <h3>Admins</h3>
      Total: ${users.length}
    </div>`;
  }

  // USERS
  if (section === "users") {

    let users = (getUsers() || []).filter(u=>u.role==="user");

    html = `
    <div class="card">
      <h3>Users</h3>
      Total: ${users.length}
    </div>`;
  }

  // SYSTEM CONTROL
  if (section === "system") {

    let s = getSystemSettings() || {};

    html = `
    <div class="card">
      <h3>System Control</h3>

      Lock: ${s.lockMode ? "🔴":"🟢"}<br>
      Admin: ${s.adminAccess !== false ? "🟢":"🔴"}<br>
      Register: ${s.registrationOpen !== false ? "🟢":"🔴"}<br>
      Withdraw: ${s.withdrawStop ? "🔴":"🟢"}<br><br>

      <button onclick="toggle('lockMode')">Lock</button>
      <button onclick="toggle('adminAccess')">Admin</button>
      <button onclick="toggle('registrationOpen')">Register</button>
      <button onclick="toggle('withdrawStop')">Withdraw</button>
    </div>`;
  }

  // RESET
  if (section === "reset") {

    html = `
    <div class="card">
      <h3>System Reset</h3>

      <button onclick="softReset()">Soft Reset</button>
      <button onclick="fullReset()">Full Reset</button>
    </div>`;
  }

  document.getElementById("contentArea").innerHTML = html;
}

// CREATE SYSTEM ADMIN
function createSystemAdmin() {

  let id = document.getElementById("sysId").value.trim();
  let name = document.getElementById("sysName").value.trim();
  let pass = document.getElementById("sysPass").value.trim();

  if (!id || !name || !pass) return showMsg("Fill all");

  let users = getUsers() || [];

  if (users.find(u=>u.userId.toLowerCase()===id.toLowerCase()))
    return showMsg("Exists");

  users.push({
    userId:id,
    username:name,
    password:btoa(pass),
    role:"system_admin",
    status:"active"
  });

  saveUsers(users);

  showMsg("Created");
}

// HELPERS
function toggle(key){
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSection("system");
}

function softReset(){
  localStorage.removeItem("activityLogs");
  alert("Done");
}

function fullReset(){
  let users = (getUsers()||[]).filter(u=>u.role==="super_admin");
  saveUsers(users);
  alert("Reset Done");
  location.reload();
}

function showMsg(m){
  document.getElementById("msg").innerText = m;
}

function logout(){
  localStorage.removeItem("loggedInSuperAdmin");
  location.href="super_admin_login.html";
}

// INIT
loadSection("dashboard");

</script>

</body>
</html>
