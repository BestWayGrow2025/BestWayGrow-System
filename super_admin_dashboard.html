<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; margin:0; background:#f4f7f9; text-align:center; }
    header { background:#006633; color:#fff; padding:20px; }
    .container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; }
    .card { background:#fff; width:320px; margin:10px; padding:20px; border-radius:10px; box-shadow:0 4px 10px #ccc; }
    .stat { font-size:20px; font-weight:bold; }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th,td { border:1px solid #ddd; padding:6px; font-size:12px; }
    button { padding:6px 10px; margin:5px; cursor:pointer; border:none; border-radius:5px; }
    input { padding:6px; margin:5px; width:85%; }
    .btn-main { background:#00994d; color:#fff; }
  </style>
</head>

<body>

<header>
  <h2>BestWayGrow</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>
    <p id="systemStatus"></p>

    <button onclick="toggle('lockMode')">Lock</button>
    <button onclick="toggle('adminAccess')">Admin</button>
    <button onclick="toggle('franchiseAccess')">Franchise</button>
    <button onclick="toggle('registrationOpen')">Register</button>
    <button onclick="toggle('upgradesOpen')">Upgrade</button>
    <button onclick="toggle('repurchaseOpen')">Repurchase</button>
    <button onclick="toggle('queueStop')">Queue</button>
    <button onclick="toggle('withdrawStop')">Withdraw</button>

    <hr>

    <button onclick="softReset()">Soft</button>
    <button onclick="mediumReset()">Medium</button>
    <button onclick="fullReset()">Full</button>
  </div>

  <!-- CREATE SYSTEM ADMIN -->
  <div class="card">
    <h3>Create System Admin</h3>

    <input id="sysId" placeholder="User ID"><br>
    <input id="sysName" placeholder="Name"><br>
    <input id="sysPass" type="password" placeholder="Password"><br>

    <button class="btn-main" onclick="createSystemAdmin()">CREATE</button>
  </div>

  <!-- COUNTS -->
  <div class="card">
    <h3>Overview</h3>
    <div>System Admins <div class="stat" id="sysCount">0</div></div>
    <div>Admins <div class="stat" id="adminCount">0</div></div>
    <div>Franchise <div class="stat" id="franchiseCount">0</div></div>
    <div>Users <div class="stat" id="userCount">0</div></div>
  </div>

  <!-- QUICK VIEW -->
  <div class="card">
    <h3>Quick View</h3>
    <button onclick="showData('system_admin')">System Admins</button>
    <button onclick="showData('admin')">Admins</button>
    <button onclick="showData('franchise')">Franchise</button>
    <button onclick="showData('user')">Users</button>
  </div>

  <!-- DATA -->
  <div class="card">
    <h3>Details</h3>
    <div id="dataPanel">Click to view</div>
  </div>

</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT SAFE
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH SAFE
let session;
try {
  session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));
} catch {
  session = null;
}

if (!session || !session.userId) {
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// CREATE SYSTEM ADMIN (FIXED)
function createSystemAdmin() {

  let id = sysId.value.trim();
  let name = sysName.value.trim();
  let pass = sysPass.value.trim();

  if (!id || !name || !pass) return alert("Fill all fields");

  let users = getUsers() || [];

  if (users.find(u => u.userId.toLowerCase() === id.toLowerCase()))
    return alert("User exists");

  users.push({
    userId: id,
    username: name,
    password: btoa(pass),
    role: "system_admin",
    status: "active"
  });

  saveUsers(users);

  alert("System Admin Created");

  sysId.value = "";
  sysName.value = "";
  sysPass.value = "";

  loadCounts();
}

// SYSTEM STATUS
function loadSystem() {
  let s = getSystemSettings() || {};

  document.getElementById("systemStatus").innerHTML = `
    Lock: ${s.lockMode ? "🔴" : "🟢"} |
    Admin: ${s.adminAccess !== false ? "🟢" : "🔴"} |
    Franchise: ${s.franchiseAccess !== false ? "🟢" : "🔴"} <br>
    Register: ${s.registrationOpen !== false ? "🟢" : "🔴"} |
    Upgrade: ${s.upgradesOpen !== false ? "🟢" : "🔴"} |
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"} <br>
    Queue: ${s.queueStop ? "🔴" : "🟢"} |
    Withdraw: ${s.withdrawStop ? "🔴" : "🟢"}
  `;
}

// COUNTS (100% CORRECT)
function loadCounts() {
  let users = getUsers() || [];

  sysCount.innerText = users.filter(u => u.role === "system_admin").length;
  adminCount.innerText = users.filter(u => u.role === "admin").length;
  franchiseCount.innerText = users.filter(u => u.role === "franchise").length;
  userCount.innerText = users.filter(u => u.role === "user").length;
}

// QUICK VIEW (FIXED)
function showData(role) {

  let users = (getUsers() || []).filter(u => u.role === role);

  if (!users.length) return dataPanel.innerHTML = "No Data";

  let html = `<table><tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username || u.userId}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  dataPanel.innerHTML = html;
}

// TOGGLE
function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// RESET
function softReset() {
  if (!confirm("Clear logs?")) return;
  localStorage.removeItem("activityLogs");
  alert("Done"); location.reload();
}

function mediumReset() {
  if (!confirm("Clear logs + withdrawals?")) return;
  localStorage.removeItem("activityLogs");
  localStorage.removeItem("withdrawals");
  alert("Done"); location.reload();
}

function fullReset() {
  if (!confirm("Full reset?")) return;

  let users = (getUsers() || []).filter(u => u.role === "super_admin");
  saveUsers(users);

  alert("Reset Done");
  location.reload();
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
}

// AUTO REFRESH (PRO FIXED ↓)
setInterval(() => {
  loadSystem();
  loadCounts();
}, 8000);

// INIT
loadSystem();
loadCounts();

</script>

</body>
</html>
