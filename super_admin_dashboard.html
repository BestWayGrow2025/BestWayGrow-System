<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family:'Segoe UI', Arial;
      margin:0;
      background:linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background:linear-gradient(135deg,#ff6600,#ff944d);
      color:#fff;
      padding:18px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.2);
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    /* MENU */
    .menu {
      display:flex;
      overflow-x:auto;
      white-space:nowrap;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .menu button {
      flex:0 0 auto;
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      background:linear-gradient(135deg,#ff6600,#ff944d);
      color:#fff;
      font-size:13px;
      transition:0.3s;
    }

    .menu button:hover {
      transform:scale(1.05);
      opacity:0.9;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
      max-width:900px;
      margin:auto;
      animation:fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    input {
      padding:10px;
      margin:6px 0;
      width:90%;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:13px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
      font-size:13px;
    }

    th {
      background:#f1f4f8;
    }

    th, td {
      border:1px solid #eee;
      padding:10px;
      text-align:center;
    }

    h3 {
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>👑 SUPER ADMIN CONTROL PANEL</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadSystemAdmins()">System Admin</button>
  <button onclick="loadAdmins()">Admins</button>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSystem()">System</button>
  <button onclick="loadReset()">Reset</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin") || "null");

if (!session || !session.userId) {
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

let user = getUserById(session.userId);

if (!user || user.role !== "super_admin") {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SUPER ADMIN (" + user.userId + ")";

// HOME
function loadHome() {
  document.getElementById("mainContent").innerHTML = `
    <h3>Overview</h3>
    <p>ID: ${user.userId}</p>
    <p>Status: ${user.status || "active"}</p>
  `;
}

// SYSTEM ADMINS
function loadSystemAdmins() {

  let users = (getUsers() || []).filter(u => u.role === "system_admin");

  let html = `<h3>System Admins</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// ADMINS
function loadAdmins() {

  let users = (getUsers() || []).filter(u => u.role === "admin");

  let html = `<h3>Admins</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// USERS
function loadUsers() {

  let users = (getUsers() || []).filter(u => u.role === "user");

  let html = `<h3>Users</h3><table>
  <tr><th>ID</th><th>Status</th></tr>`;

  if (!users.length) html += `<tr><td colspan="2">No Data</td></tr>`;

  users.forEach(u => {
    html += `<tr>
      <td>${u.userId}</td>
      <td>${u.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// SYSTEM
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("mainContent").innerHTML = `
    <h3>System Control</h3>

    <p>Lock Mode: ${s.lockMode ? "ON" : "OFF"}</p>
    <p>Admin Access: ${s.adminAccess ? "ON" : "OFF"}</p>
    <p>Registration: ${s.registrationOpen ? "ON" : "OFF"}</p>

    <button onclick="toggle('lockMode')">Toggle Lock</button>
    <button onclick="toggle('adminAccess')">Toggle Admin</button>
    <button onclick="toggle('registrationOpen')">Toggle Register</button>
  `;
}

// TOGGLE
function toggle(key) {
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSystem();
}

// RESET
function loadReset() {

  document.getElementById("mainContent").innerHTML = `
    <h3>System Reset</h3>

    <button onclick="softReset()">Soft Reset</button>
    <button onclick="fullReset()">Full Reset</button>
  `;
}

function softReset() {
  if (!confirm("Clear logs?")) return;
  localStorage.removeItem("activityLogs");
  alert("Done"); location.reload();
}

function fullReset() {
  if (!confirm("Full reset?")) return;

  let users = (getUsers() || []).filter(u => u.role === "super_admin");
  saveUsers(users);

  alert("System Reset Done");
  location.reload();
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSuperAdmin");
  location.href = "super_admin_login.html";
}

// INIT
loadHome();

</script>

</body>
</html>
