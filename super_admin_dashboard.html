<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Dashboard FINAL</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: 'Segoe UI'; margin: 0; background: #eef2f7; }

    header {
      background: #ff6600;
      color: #fff;
      padding: 18px;
      text-align: center;
    }

    header button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #ff4d4d;
      color: #fff;
      cursor: pointer;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: #fff;
      padding: 10px;
      justify-content: center;
    }

    .menu button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #ff944d;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .menu button.active {
      background: #cc5200;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 1000px;
      margin: auto;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 90%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
  </style>
</head>
<body>

<header>
  <h2>👑 SUPER ADMIN MASTER CONTROL</h2>
  <p id="welcome"></p>
  <button onclick="safeClick(null, logout)">Logout</button>
</header>

<div class="menu">
  <button onclick="safeClick(this, loadHome)">Home</button>
  <button onclick="safeClick(this, loadCreate)">Create Sys Admin</button>
  <button onclick="safeClick(this, loadUsers)">Users</button>
  <button onclick="safeClick(this, loadSystem)">System</button>
  <button onclick="safeClick(this, loadResetPanel)">Reset</button>
</div>

<div class="container">
  <div id="mainContent" class="card"></div>
</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>
<script src="session_manager.js"></script>
<script src="super_admin_dashboard.js"></script>

</body>
</html>
