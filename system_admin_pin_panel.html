<!DOCTYPE html>
<html>
<head>
  <title>PIN Panel V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f7f9;
    }

    header {
      background:#006633;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:8px 12px;
      border:none;
      border-radius:20px;
      background:#e0e0e0;
      cursor:pointer;
    }

    .content {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th,td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    input {
      padding:6px;
      margin:5px;
      width:90%;
    }

    button.main {
      background:#00994d;
      color:#fff;
    }
  </style>
</head>

<body>

<header>
  <h2>PIN SYSTEM V7</h2>
  <button onclick="logout()">Logout</button>
</header>

<!-- MENU -->
<div class="menu">
  <button onclick="loadSection('create')">Create PIN</button>
  <button onclick="loadSection('all')">All PIN</button>
  <button onclick="loadSection('available')">Available</button>
  <button onclick="loadSection('used')">Used</button>
</div>

<!-- CONTENT -->
<div class="content" id="contentArea"></div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSystemAdmin") || "null");

if (!session || !session.userId) {
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// STORAGE
function getPins() {
  return JSON.parse(localStorage.getItem("pins") || "[]");
}

function savePins(pins) {
  localStorage.setItem("pins", JSON.stringify(pins));
}

// MAIN SWITCH
function loadSection(section) {

  let html = "";

  // CREATE PIN
  if (section === "create") {
    html = `
    <div class="card">
      <h3>Create PIN</h3>

      <input id="amount" placeholder="Amount (e.g. 500)"><br>
      <input id="qty" placeholder="Quantity"><br>

      <button class="main" onclick="createPins()">Generate</button>
      <p id="msg"></p>
    </div>`;
  }

  // ALL PIN
  if (section === "all") {
    renderPins(getPins());
    return;
  }

  // AVAILABLE
  if (section === "available") {
    let pins = getPins().filter(p=>!p.used);
    renderPins(pins);
    return;
  }

  // USED
  if (section === "used") {
    let pins = getPins().filter(p=>p.used);
    renderPins(pins);
    return;
  }

  document.getElementById("contentArea").innerHTML = html;
}

// CREATE
function createPins() {

  let amount = document.getElementById("amount").value.trim();
  let qty = parseInt(document.getElementById("qty").value.trim());

  if (!amount || !qty) return showMsg("Enter amount & qty");

  let pins = getPins();

  for (let i=0;i<qty;i++) {
    pins.push({
      pin: "PIN" + Math.floor(Math.random()*1000000000),
      amount: amount,
      used: false,
      createdAt: Date.now()
    });
  }

  savePins(pins);

  showMsg("PIN Created");
}

// RENDER
function renderPins(pins) {

  if (!pins.length) {
    document.getElementById("contentArea").innerHTML = "No PIN";
    return;
  }

  let rows = pins.map(p=>`
    <tr>
      <td>${p.pin}</td>
      <td>${p.amount}</td>
      <td>${p.used ? "USED":"AVAILABLE"}</td>
    </tr>
  `).join("");

  document.getElementById("contentArea").innerHTML = `
    <div class="card">
      <h3>PIN List</h3>
      <table>
        <tr><th>PIN</th><th>Amount</th><th>Status</th></tr>
        ${rows}
      </table>
    </div>`;
}

// MESSAGE
function showMsg(m){
  document.getElementById("msg").innerText = m;
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedInSystemAdmin");
  location.href="system_admin_login.html";
}

// INIT
loadSection("create");

</script>

</body>
</html>
