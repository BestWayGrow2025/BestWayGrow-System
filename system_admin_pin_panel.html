<!DOCTYPE html>
<html>
<head>
  <title>System Admin PIN Panel</title>
  <link rel="icon" href="data:,">
</head>

<body>

<h2>🔐 SYSTEM ADMIN PIN PANEL (V6++++)</h2>

<button onclick="logout()">Logout</button>

<!-- CREATE PIN -->
<h3>Create PIN</h3>
<input id="amount" placeholder="Amount"><br>
<input id="count" placeholder="Count"><br>
<button onclick="createPins()">Generate</button>

<p id="msg"></p>

<hr>

<!-- REQUESTS -->
<h3>Admin Requests</h3>
<div id="requests"></div>

<script src="core_system.js"></script>
<script src="system_config.js"></script>
<script src="pin_master_system.js"></script>
<script src="pin_request_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
initCoreSystem();

// AUTH
let user = protectPage({ role: "system_admin" });

// ================= CREATE PIN =================
function createPins() {

  let amount = document.getElementById("amount").value;
  let count = parseInt(document.getElementById("count").value);

  if (!amount || !count) {
    show("❌ Invalid input");
    return;
  }

  // ✅ USE MASTER SYSTEM (NOT localStorage)
  if (typeof generatePins === "function") {
    generatePins(amount, count, user.userId);
  } else {
    alert("PIN engine not loaded");
    return;
  }

  show("✅ PINs Created");
}

// ================= LOAD REQUESTS =================
function loadRequests() {

  if (typeof getPinRequests !== "function") {
    document.getElementById("requests").innerText = "No request system";
    return;
  }

  let reqs = getPinRequests();

  if (!reqs.length) {
    document.getElementById("requests").innerText = "No Requests";
    return;
  }

  let html = "";

  reqs.forEach((r, i) => {
    html += `
      <div>
        Admin: ${r.adminId} |
        Amount: ${r.amount} |
        Qty: ${r.count}
        <button onclick="approve(${i})">Approve</button>
      </div>
      <hr>
    `;
  });

  document.getElementById("requests").innerHTML = html;
}

// ================= APPROVE =================
function approve(i) {

  if (typeof approvePinRequest === "function") {
    approvePinRequest(i, user.userId);
  } else {
    alert("Approval system missing");
    return;
  }

  alert("✅ Approved");
  loadRequests();
}

// ================= UTILS =================
function show(m) {
  document.getElementById("msg").innerText = m;
}

function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

// INIT
loadRequests();

</script>

</body>
</html>
