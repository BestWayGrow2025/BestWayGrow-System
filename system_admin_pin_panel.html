<!DOCTYPE html>
<html>
<head>
  <title>System Admin PIN Panel</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7f9;
    }

    header {
      background: #006633;
      color: white;
      padding: 15px;
      text-align: center;
    }

    header button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: red;
      color: white;
      cursor: pointer;
    }

    .menu {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: white;
      justify-content: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .menu button {
      padding: 10px 14px;
      border: none;
      border-radius: 20px;
      background: #00994d;
      color: white;
      cursor: pointer;
    }

    #contentArea {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    input {
      width: 250px;
      padding: 10px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h2>SYSTEM ADMIN PIN PANEL</h2>
  <p id="welcome"></p>
  <button id="logoutBtn">Logout</button>
</header>

<div class="menu">
  <button id="createTabBtn">Create PIN</button>
  <button id="allTabBtn">All PIN</button>
  <button id="availableTabBtn">Available</button>
  <button id="usedTabBtn">Used</button>
</div>

<div id="contentArea"></div>

<script src="core_system.js"></script>
<script src="session_manager.js"></script>
<script src="system_admin_pin_panel.js"></script>
</body>
</html>
