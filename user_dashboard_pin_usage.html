<!DOCTYPE html>
<html>
<head>
  <title>User Pin Usage</title>
</head>
<body>

<h2>User Pin Actions</h2>

<button onclick="upgrade()">Upgrade</button>
<button onclick="repurchase()">Repurchase</button>

<script src="pin_system.js"></script>

<script>

// =====================
// GET LOGGED USER
// =====================
function getLoggedInUser() {
  return JSON.parse(localStorage.getItem("loggedInUser"));
}

// =====================
// UPGRADE
// =====================
function upgrade() {
  let user = getLoggedInUser();

  if (!user) {
    alert("User not logged in");
    return;
  }

  let pinId = prompt("Enter Pin ID for Upgrade:");
  if (!pinId) {
    alert("Pin ID required");
    return;
  }

  usePin(pinId.trim(), user.userId, "upgrade");
}

// =====================
// REPURCHASE
// =====================
function repurchase() {
  let user = getLoggedInUser();

  if (!user) {
    alert("User not logged in");
    return;
  }

  let pinId = prompt("Enter Pin ID for Repurchase:");
  if (!pinId) {
    alert("Pin ID required");
    return;
  }

  usePin(pinId.trim(), user.userId, "repurchase");
}

</script>

</body>
</html>
