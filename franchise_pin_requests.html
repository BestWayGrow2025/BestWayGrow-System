<!DOCTYPE html>
<html>
<head>
  <title>Franchise Pin Requests</title>
</head>
<body>

  <h2>📌 FRANCHISE PIN REQUEST SYSTEM</h2>

  <button id="backBtn">⬅ Back to Dashboard</button>

  <div class="box">
    <h3>Create PIN Request</h3>
    <input id="quantity" type="number" placeholder="Enter quantity">
    <button id="submitBtn">Submit Request</button>
  </div>

  <div class="box">
    <h3>My Requests</h3>
    <table border="1" width="100%">
      <thead>
        <tr>
          <th>Request ID</th>
          <th>Quantity</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="requestTable"></tbody>
    </table>
  </div>

  <script src="core_system.js"></script>
  <script src="session_manager.js"></script>
  <script src="franchise_pin_requests.js"></script>
</body>
</html>
