<!DOCTYPE html>
<html>
<head>
  <title>Franchise Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
    .nav { margin-bottom: 15px; }
  </style>
</head>
<body>

<h1>FRANCHISE DASHBOARD</h1>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="goTo('franchise_pin_requests.html')">📌 Pin Requests</button>
  <button onclick="goTo('franchise_upgrade.html')">⬆ Upgrade</button>
  <button onclick="goTo('franchise_wallet.html')">💰 Wallet</button>
  <button onclick="goTo('franchisee_login.html')">🔐 Switch Login</button>
</div>

<p id="welcome"></p>
<button onclick="logout()">Logout</button>

<!-- PROFILE -->
<div class="box">
  <h3>Profile</h3>
  <p id="profile"></p>
</div>

<!-- INCOME -->
<div class="box">
  <h3>Income</h3>
  <p id="income">₹ 0</p>
</div>

<!-- TEAM -->
<div class="box">
  <h3>My Team</h3>
  <div id="team"></div>
</div>

<!-- ACTIONS -->
<div class="box">
  <h3>Actions</h3>
  <button onclick="viewRequests()">View Franchise Requests</button>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem();
</script>

<script>

// ================= AUTH =================
let sessionUser = JSON.parse(localStorage.getItem("loggedInUser"));

if (!sessionUser) {
  alert("Please login");
  window.location.href = "franchisee_login.html";
}

let users = getUsers();
let user = users.find(u => u.userId === sessionUser.userId);

if (!user || user.role !== "franchise") {
  alert("Access denied");
  window.location.href = "franchisee_login.html";
}

// ================= NAVIGATION =================
function goTo(page) {
  window.location.href = page;
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " (" + user.userId + ")";

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  User ID: ${user.userId} <br>
  Name: ${user.username} <br>
  Mobile: ${user.mobile || "-"} <br>
  Role: ${user.role} <br>
  Joined: ${user.createdAt || "-"}
`;

// ================= INCOME =================
document.getElementById("income").innerText =
  "₹ " + (user.franchiseIncome || 0);

// ================= TEAM =================
function buildTeam(parentId) {
  let children = users.filter(u => u.introducerId === parentId);

  if (children.length === 0) return "No team members";

  let html = "<ul>";
  children.forEach(c => {
    html += `<li>${c.username} (${c.userId})</li>`;
  });
  html += "</ul>";

  return html;
}

document.getElementById("team").innerHTML = buildTeam(user.userId);

// ================= REQUESTS =================
function viewRequests() {
  window.location.href = "franchise_approval.html";
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "franchisee_login.html";
}

</script>

</body>
</html>
