<!DOCTYPE html>
<html>
<head>
  <title>Franchise Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      text-align:center; 
      background:#f5f5f5; 
    }

    .card { 
      background:#fff; 
      padding:20px; 
      margin:15px; 
      border-radius:10px; 
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    th { background:#eee; }

    button {
      padding:6px 10px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>FRANCHISE DASHBOARD</h2>
<button onclick="logout()">Logout</button>

<div class="card">
  <h3>Profile</h3>
  <p id="profile"></p>
</div>

<!-- 🔥 NEW -->
<div class="card">
  <h3>System Status</h3>
  <p id="system"></p>
</div>

<div class="card">
  <h3>Users Under You</h3>
  <div id="userList"></div>
</div>

<script src="CORE_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInFranchise"));

if (!session) {
  alert("Login required");
  window.location.href = "franchise_login.html";
}

let user = getUserById(session.userId);

if (!user || user.role !== "franchise") {
  alert("Invalid session");
  localStorage.removeItem("loggedInFranchise");
  window.location.href = "franchise_login.html";
}

// LOG
if (typeof logActivity === "function") {
  logActivity(user.userId, "FRANCHISE", "Opened dashboard");
}

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  ID: ${user.userId} <br>
  Name: ${user.username} <br>
  Status: ${user.status || "N/A"}
`;

// ================= SYSTEM STATUS (NEW) =================
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("system").innerHTML = `
    Registration: ${s.registrationOpen !== false ? "OPEN 🟢" : "CLOSED 🔴"} <br>
    Franchise Access: ${s.franchiseAccess !== false ? "ON 🟢" : "OFF 🔴"} <br>
    Lock Mode: ${s.lockMode ? "LOCKED 🔴" : "UNLOCKED 🟢"}
  `;
}

// ================= USERS (UPGRADE TABLE) =================
function loadUsers() {

  let users = getUsers().filter(u => u.introducerId === user.userId);

  if (!users.length) {
    document.getElementById("userList").innerHTML = "No Users";
    return;
  }

  let html = `
  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Status</th>
      <th>Wallet</th>
    </tr>
  `;

  users.forEach(u => {

    html += `
    <tr>
      <td>${u.userId}</td>
      <td>${u.username}</td>
      <td>${u.isActive ? "ACTIVE 🟢" : "INACTIVE 🔴"}</td>
      <td>₹ ${u.wallet || 0}</td>
    </tr>
    `;
  });

  html += "</table>";

  document.getElementById("userList").innerHTML = html;
}

// ================= LOGOUT =================
function logout() {

  if (typeof logActivity === "function") {
    logActivity(user.userId, "FRANCHISE", "Logout");
  }

  localStorage.removeItem("loggedInFranchise");
  window.location.href = "franchise_login.html";
}

// ================= AUTO REFRESH =================
setInterval(() => {
  loadUsers();
  loadSystem();
}, 5000);

// ================= INIT =================
loadUsers();
loadSystem();

</script>

</body>
</html>
