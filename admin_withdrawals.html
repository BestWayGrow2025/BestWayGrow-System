<!DOCTYPE html>
<html>
<head>
  <title>Admin Withdrawals</title>

  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    button { padding: 5px 10px; margin: 2px; cursor: pointer; }
  </style>
</head>
<body>

<h1>ADMIN WITHDRAWALS</h1>

<button onclick="goBack()">⬅ Back</button>
<button onclick="loadRequests()">🔄 Refresh</button>

<table>
  <thead>
    <tr>
      <th>Request ID</th>
      <th>User ID</th>
      <th>Amount</th>
      <th>Charge</th>
      <th>Final Amount</th>
      <th>Status</th>
      <th>Time</th>
      <th>Processed</th> <!-- 🔥 NEW -->
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="withdrawTable"></tbody>
</table>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="withdrawal_system.js"></script>
<script src="activity_log.js"></script> <!-- 🔥 ADDED -->

<script>

// ================= INIT =================
initCoreSystem();

// 🔒 SECURITY
let admin = protectPage({
  role: "admin",
  department: "finance"
});

if (!admin) {
  throw new Error("Access Blocked");
}


// ================= NAV =================
function goBack() {
  window.location.href = "admin_dashboard.html";
}


// ================= COLOR STATUS (NEW 🔥)
function getStatusColor(status) {
  if (status === "PENDING") return "orange";
  if (status === "APPROVED") return "green";
  if (status === "REJECTED") return "red";
  return "black";
}


// ================= LOAD =================
function loadRequests() {

  let requests = [];

  try {
    requests = getWithdrawals() || [];
  } catch {
    requests = [];
  }

  let table = document.getElementById("withdrawTable");
  table.innerHTML = "";

  if (!requests.length) {
    table.innerHTML = "<tr><td colspan='9'>No withdrawal requests found</td></tr>";
    return;
  }

  requests.slice().reverse().forEach(req => {

    let color = getStatusColor(req.status);

    let row = `
      <tr>
        <td>${req.requestId}</td>
        <td>${req.userId}</td>
        <td>₹ ${req.amount}</td>
        <td>₹ ${req.charge || 0}</td>
        <td>₹ ${req.finalAmount || req.amount}</td>
        <td style="color:${color}">${req.status}</td>
        <td>${req.time ? new Date(req.time).toLocaleString() : "-"}</td>
        <td>${req.processedAt ? new Date(req.processedAt).toLocaleString() : "-"}</td>
        <td>
          ${req.status === "PENDING" ? `
            <button onclick="approve('${req.requestId}')">Approve</button>
            <button onclick="reject('${req.requestId}')">Reject</button>
          ` : "✔ Done"}
        </td>
      </tr>
    `;

    table.innerHTML += row;

  });

  // 📜 VIEW LOG
  if (typeof logActivity === "function") {
    logActivity(admin.userId, "ADMIN", "Viewed withdrawals");
  }
}


// ================= ACTIONS =================
function approve(id) {

  approveWithdraw(id, admin.userId); // 🔥 PASS ADMIN ID

  alert("✅ Approved");
  loadRequests();
}

function reject(id) {

  rejectWithdraw(id, admin.userId); // 🔥 PASS ADMIN ID

  alert("❌ Rejected");
  loadRequests();
}


// ================= INIT =================
loadRequests();

</script>

</body>
</html>
