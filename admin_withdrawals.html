<!DOCTYPE html>
<html>
<head>
  <title>Admin Withdraw Panel</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    button { padding: 5px 10px; margin: 2px; cursor: pointer; }
  </style>
</head>
<body>

<h1>ADMIN WITHDRAW PANEL</h1>

<button onclick="goBack()">⬅ Back</button>
<button onclick="loadRequests()">🔄 Refresh</button>

<table>
  <thead>
    <tr>
      <th>Request ID</th>
      <th>User ID</th>
      <th>Amount</th>
      <th>Charge</th>
      <th>Final Amount</th>
      <th>Status</th>
      <th>Time</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="withdrawTable"></tbody>
</table>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem(); // ✅ MUST ADD
</script>

<!-- SYSTEM -->
<script src="withdrawal_system.js"></script>

<script>

// ================= AUTH =================
let adminSession = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!adminSession) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// ================= NAV =================
function goBack() {
  window.location.href = "dashboard_admin.html";
}

// ================= LOAD REQUESTS =================
function loadRequests() {

  let requests = JSON.parse(localStorage.getItem("withdrawals") || "[]");
  let table = document.getElementById("withdrawTable");

  table.innerHTML = "";

  if (requests.length === 0) {
    table.innerHTML = "<tr><td colspan='8'>No withdrawal requests found</td></tr>";
    return;
  }

  requests.slice().reverse().forEach(req => {

    let row = `
      <tr>
        <td>${req.requestId}</td>
        <td>${req.userId}</td>
        <td>₹ ${req.amount}</td>
        <td>₹ ${req.charge || 0}</td>
        <td>₹ ${req.finalAmount || req.amount}</td>
        <td>${req.status}</td>
        <td>${req.time}</td>
        <td>
          ${req.status === "PENDING" ? `
            <button onclick="approve('${req.requestId}')">Approve</button>
            <button onclick="reject('${req.requestId}')">Reject</button>
          ` : "✔ Done"}
        </td>
      </tr>
    `;

    table.innerHTML += row;

  });
}

// ================= APPROVE =================
function approve(id) {
  approveWithdraw(id);
  alert("✅ Approved");
  loadRequests();
}

// ================= REJECT =================
function reject(id) {
  rejectWithdraw(id);
  alert("❌ Rejected");
  loadRequests();
}

// ================= INIT =================
loadRequests();

</script>

</body>
</html>
