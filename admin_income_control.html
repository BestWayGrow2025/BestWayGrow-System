<!DOCTYPE html>
<html>
<head>
  <title>ADMIN INCOME CONTROL</title>                                       
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    button { padding: 6px 12px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h2>INCOME CONTROL PANEL</h2>

<!-- ================= UGLI ================= -->
<div class="box">
  <h3>UGLI (Upgrade Income)</h3>

  <button onclick="setUGLI(true)">ON</button>
  <button onclick="setUGLI(false)">OFF</button>

  <p id="ugliStatus"></p>
</div>

<!-- ================= RLI ================= -->
<div class="box">
  <h3>RLI (Repurchase Income)</h3>

  <button onclick="setRLI(true)">ON</button>
  <button onclick="setRLI(false)">OFF</button>

  <p id="rliStatus"></p>
</div>

<!-- ================= BINARY ================= -->
<div class="box">
  <h3>Binary Income (Future)</h3>

  <button onclick="setBinary(true)">ON</button>
  <button onclick="setBinary(false)">OFF</button>

  <p id="binaryStatus"></p>
</div>

<!-- ================= SCRIPT ================= -->
<script src="income_control_system.js"></script>

<script>

// ================= SAFE INIT =================
initIncomeControl();

// ================= SAFE GET =================
function safeStatus(fn) {
  try {
    return fn();
  } catch {
    return false;
  }
}

// ================= REFRESH =================
function refreshStatus() {

  document.getElementById("ugliStatus").innerText =
    safeStatus(isUGLIEnabled) ? "🟢 ACTIVE" : "🔴 OFF";

  document.getElementById("rliStatus").innerText =
    safeStatus(isRLIEnabled) ? "🟢 ACTIVE" : "🔴 OFF";

  document.getElementById("binaryStatus").innerText =
    safeStatus(isBinaryEnabled) ? "🟢 ACTIVE" : "🔴 OFF";
}

// ================= SETTERS =================
function setUGLI(state) {
  let s = getIncomeSettings();
  s.ugli = state;
  saveIncomeSettings(s);
  refreshStatus();
  alert("UGLI " + (state ? "ENABLED" : "DISABLED"));
}

function setRLI(state) {
  let s = getIncomeSettings();
  s.rli = state;
  saveIncomeSettings(s);
  refreshStatus();
  alert("RLI " + (state ? "ENABLED" : "DISABLED"));
}

function setBinary(state) {
  let s = getIncomeSettings();
  s.binary = state;
  saveIncomeSettings(s);
  refreshStatus();
  alert("Binary " + (state ? "ENABLED" : "DISABLED"));
}

// ================= INIT =================
refreshStatus();

</script>

</body>
</html>
