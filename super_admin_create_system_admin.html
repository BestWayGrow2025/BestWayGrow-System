<!DOCTYPE html>
<html>
<head>
  <title>Create System Admin</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f7f6;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      width: 100%;
      background: #0077b5;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background: #005f8a;
    }

    #msg {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2 style="text-align:center;">CREATE SYSTEM ADMIN</h2>

  <div class="box">
    <input id="sysId" placeholder="System Admin ID">
    <input id="sysName" placeholder="Name">
    <input id="sysPass" type="password" placeholder="Password">

    <button id="createBtn">Create</button>

    <p id="msg"></p>
  </div>

  <script src="core_system.js"></script>
  <script src="session_manager.js"></script>
  <script src="super_admin_create_system_admin.js"></script>

</body>
</html>
