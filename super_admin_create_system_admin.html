<!DOCTYPE html>
<html>
<head>
  <title>Create System Admin</title>

  <!-- ✅ remove favicon error -->
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin-bottom: 10px; padding: 6px; width: 220px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>SUPER ADMIN → CREATE SYSTEM ADMIN</h2>

<input id="sysId" placeholder="System Admin ID"><br>
<input id="sysName" placeholder="Name"><br>
<input id="sysPass" type="password" placeholder="Password"><br>

<button onclick="createSystemAdmin()">Create System Admin</button>

<p id="msg"></p>

<!-- ✅ CORE -->
<script src="CORE_system.js"></script>

<script>
initCoreSystem();
</script>

<script>

// ================= AUTH CHECK =================
let session = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "super_admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSuperAdmin");
  window.location.href = "super_admin_login.html";
}

// ================= CREATE SYSTEM ADMIN =================
function createSystemAdmin() {

  let id = document.getElementById("sysId").value.trim();
  let name = document.getElementById("sysName").value.trim();
  let pass = document.getElementById("sysPass").value.trim();

  if (!id || !name || !pass) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers();

  // ✅ DUPLICATE CHECK (SAFE)
  if (users.find(u => u.userId.toLowerCase() === id.toLowerCase())) {
    showMsg("⚠️ ID already exists");
    return;
  }

  // ✅ FINAL OBJECT
  let newAdmin = {
    userId: id,
    username: name,
    password: btoa(pass), // 🔥 ENCODE
    role: "system_admin",
    type: "all",
    departments: ["finance", "franchisee", "kyc"],
    status: "active",
    createdAt: new Date().toISOString()
  };

  users.push(newAdmin);
  saveUsers(users);

  showMsg("✅ System Admin created successfully");

  console.log("System Admin Created:", newAdmin);

  // ✅ OPTIONAL CLEAR FORM
  document.getElementById("sysId").value = "";
  document.getElementById("sysName").value = "";
  document.getElementById("sysPass").value = "";
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
