<!DOCTYPE html>
<html>
<head>
  <title>Create System Admin</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin-bottom: 10px; padding: 5px; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>CREATE SYSTEM ADMIN</h2>

<input id="sysId" placeholder="System Admin ID"><br>
<input id="sysName" placeholder="Name"><br>
<input id="sysPass" type="password" placeholder="Password"><br>

<button onclick="createSystemAdmin()">Create System Admin</button>

<p id="msg"></p>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem();
</script>

<script>

// ================= AUTH =================
let superAdmin = JSON.parse(localStorage.getItem("loggedInSuperAdmin"));

if (!superAdmin) {
  alert("Access denied");
  window.location.href = "super_admin_login.html";
}

// ================= CREATE SYSTEM ADMIN =================
function createSystemAdmin() {

  let id = document.getElementById("sysId").value.trim();
  let name = document.getElementById("sysName").value.trim();
  let pass = document.getElementById("sysPass").value.trim();

  if (!id || !name || !pass) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers();

  // ✅ DUPLICATE CHECK
  if (users.find(u => u.userId === id)) {
    showMsg("⚠️ ID already exists");
    return;
  }

  // ✅ ENCODE PASSWORD (MATCH LOGIN SYSTEM)
  let encodedPass = btoa(pass);

  let newAdmin = {
    userId: id,
    username: name,
    password: encodedPass,
    role: "system_admin",
    status: "active",
    createdAt: new Date().toISOString()
  };

  users.push(newAdmin);
  localStorage.setItem("users", JSON.stringify(users));

  showMsg("✅ System Admin created successfully");

  // CLEAR
  document.getElementById("sysId").value = "";
  document.getElementById("sysName").value = "";
  document.getElementById("sysPass").value = "";

  console.log("System Admin:", newAdmin);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
