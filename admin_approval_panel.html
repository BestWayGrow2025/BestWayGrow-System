<!DOCTYPE html>
<html>
<head>
  <title>Admin Approval Panel</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    button { padding: 5px 10px; }
  </style>
</head>
<body>

<h2>Admin Approval Panel</h2>

<button onclick="loadUsers()">Refresh</button>

<table>
  <thead>
    <tr>
      <th>User ID</th>
      <th>Name</th>
      <th>Mobile</th>
      <th>Role</th>
      <th>Status</th>
      <th>KYC</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="userTable"></tbody>
</table>

<script>

// ===================== GET USERS =====================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// ===================== SAVE USERS =====================
function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// ===================== LOAD USERS =====================
function loadUsers() {

  let users = getUsers();
  let table = document.getElementById("userTable");
  table.innerHTML = "";

  users.forEach((user, index) => {

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${user.userId}</td>
      <td>${user.username}</td>
      <td>${user.mobile}</td>
      <td>${user.role}</td>
      <td>${user.status}</td>
      <td>${user.kyc}</td>
      <td>
        ${user.status === "inactive" ? `<button onclick="approveUser(${index})">Approve</button>` : "✔ Active"}
      </td>
    `;

    table.appendChild(row);
  });
}

// ===================== APPROVE USER =====================
function approveUser(index) {

  let users = getUsers();

  users[index].status = "active";
  users[index].isActive = true;

  saveUsers(users);

  alert("User Approved: " + users[index].userId);

  loadUsers();
}

// ===================== INIT =====================
loadUsers();

</script>

</body>
</html>
