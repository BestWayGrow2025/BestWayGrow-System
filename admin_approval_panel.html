<!DOCTYPE html>
<html>
<head>
  <title>Admin Approval Panel</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    button { padding: 5px 10px; }
    .nav { margin-bottom: 15px; }
  </style>
</head>
<body>

<h2>Admin Approval Panel</h2>

<!-- ================= NAV ================= -->
<div class="nav">
  <button onclick="goBack()">⬅ Back to Dashboard</button>
  <button onclick="loadUsers()">🔄 Refresh</button>
</div>

<table>
  <thead>
    <tr>
      <th>User ID</th>
      <th>Name</th>
      <th>Mobile</th>
      <th>Role</th>
      <th>Status</th>
      <th>KYC</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="userTable"></tbody>
</table>

<script>

// ================= AUTH CHECK =================
let sysAdmin = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));
if (!sysAdmin) {
  alert("Access denied");
  window.location.href = "system_admin_login.html";
}

// ================= NAVIGATION =================
function goBack() {
  window.location.href = "system_admin_dashboard.html";
}

// ================= GET USERS =================
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

// ================= SAVE USERS =================
function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

// ================= LOAD USERS =================
function loadUsers() {

  let users = getUsers();
  let table = document.getElementById("userTable");
  table.innerHTML = "";

  users.forEach((user) => {

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${user.userId}</td>
      <td>${user.username}</td>
      <td>${user.mobile}</td>
      <td>${user.role}</td>
      <td>${user.status}</td>
      <td>${user.kyc}</td>
      <td>
        ${user.status === "inactive" 
          ? `<button onclick="approveUser('${user.userId}')">Approve</button>` 
          : "✔ Active"}
      </td>
    `;

    table.appendChild(row);
  });
}

// ================= APPROVE USER =================
function approveUser(userId) {

  let users = getUsers();

  let user = users.find(u => u.userId === userId);

  if (!user) {
    alert("User not found");
    return;
  }

  user.status = "active";
  user.isActive = true;

  saveUsers(users);

  alert("User Approved: " + user.userId);

  loadUsers();
}

// ================= INIT =================
loadUsers();

</script>

</body>
</html>
