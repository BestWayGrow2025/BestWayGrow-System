<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; text-align:center; background:#f4f7f9; }
    .card { background:#fff; padding:20px; margin:15px; border-radius:10px; box-shadow:0 4px 10px #ccc;}
    .container { display:flex; flex-wrap:wrap; justify-content:center; }
    table { width:100%; margin-top:10px; border-collapse: collapse; }
    th,td { border:1px solid #ddd; padding:8px; font-size:13px; }
    button { padding:6px 10px; margin:5px; cursor:pointer; }
    select, input { padding:6px; margin:5px; width:85%; }
    .stat { font-size:20px; font-weight:bold; }
  </style>
</head>

<body>

<h2>SYSTEM ADMIN DASHBOARD</h2>
<button onclick="logout()">Logout</button>

<div class="container">

  <!-- CREATE ADMIN -->
  <div class="card">
    <h3>Create Admin</h3>

    <input id="adminId" placeholder="Admin ID"><br>
    <input id="name" placeholder="Name"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <select id="type" onchange="toggleDepartments()">
      <option value="A">TYPE A - All in One</option>
      <option value="B">TYPE B - Department Wise</option>
    </select>

    <div id="deptBox" style="display:none; text-align:left;">
      <label><input type="checkbox" value="finance"> Finance</label><br>
      <label><input type="checkbox" value="franchise"> Franchise</label><br>
      <label><input type="checkbox" value="kyc"> KYC</label><br>
      <label><input type="checkbox" value="report"> Report</label>
    </div>

    <button onclick="createAdmin()">Create</button>
    <p id="msg"></p>
  </div>

  <!-- 📊 COUNTS -->
  <div class="card">
    <h3>Overview</h3>

    <div>Admins <div class="stat" id="adminCount">0</div></div>
    <div>Franchise <div class="stat" id="franchiseCount">0</div></div>
    <div>Users <div class="stat" id="userCount">0</div></div>
  </div>

  <!-- 🔥 QUICK VIEW -->
  <div class="card">
    <h3>Quick View</h3>

    <button onclick="showData('admin')">Admins</button>
    <button onclick="showData('franchise')">Franchise</button>
    <button onclick="showData('user')">Users</button>
  </div>

  <!-- 🔥 DATA PANEL -->
  <div class="card">
    <h3>Details</h3>
    <div id="dataPanel">Click button to view</div>
  </div>

  <!-- ADMIN LIST -->
  <div class="card">
    <h3>Admin List</h3>
    <div id="adminList"></div>
  </div>

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="systemStatus"></p>
  </div>

</div>

<script src="CORE_system.js"></script>
<script src="activity_log.js"></script>

<script>

// INIT
initCoreSystem();

let currentUser = protectPage({ role: "system_admin" });
if (!currentUser) throw new Error("Security failed");

// TYPE SWITCH
function toggleDepartments() {
  let type = document.getElementById("type").value;
  document.getElementById("deptBox").style.display =
    (type === "B") ? "block" : "none";
}

// SYSTEM STATUS (UPGRADE)
function loadSystem() {
  let s = getSystemSettings();

  document.getElementById("systemStatus").innerHTML = `
    Admin: ${s.adminAccess ? "🟢" : "🔴"} |
    Lock: ${s.lockMode ? "🔴" : "🟢"} <br>
    Queue: ${s.queueStop ? "🔴" : "🟢"} |
    Withdraw: ${s.withdrawStop ? "🔴" : "🟢"} <br>
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"}
  `;
}

// COUNTS
function loadCounts() {
  let users = getUsers();

  document.getElementById("adminCount").innerText =
    users.filter(u => u.role === "admin").length;

  document.getElementById("franchiseCount").innerText =
    users.filter(u => u.role === "franchise").length;

  document.getElementById("userCount").innerText =
    users.filter(u => u.role === "user").length;
}

// SHOW DATA
function showData(role) {

  let users = getUsers().filter(u => u.role === role);

  if (!users.length) {
    document.getElementById("dataPanel").innerHTML = "No Data";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("dataPanel").innerHTML = html;
}

// CREATE ADMIN (same as yours)
function createAdmin() {

  let adminId = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let password = document.getElementById("password").value.trim();
  let type = document.getElementById("type").value;

  if (!adminId || !name || !password) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers();

  if (users.find(u => u.userId.toLowerCase() === adminId.toLowerCase())) {
    showMsg("⚠️ Admin exists");
    return;
  }

  let departments = [];

  if (type === "B") {
    document.querySelectorAll("#deptBox input:checked").forEach(cb => {
      departments.push(cb.value);
    });

    if (departments.length === 0) {
      showMsg("⚠️ Select at least one department");
      return;
    }
  } else {
    departments = ["finance","franchise","kyc","report"];
  }

  users.push({
    userId: adminId,
    username: name,
    password: btoa(password),
    role: "admin",
    type: type,
    departments: departments,
    status: "active",
    createdBy: currentUser.userId
  });

  saveUsers(users);

  showMsg("✅ Created");

  loadAdmins();
  loadCounts();
}

// ADMIN LIST
function loadAdmins() {

  let users = getUsers().filter(u => u.role === "admin");

  if (!users.length) {
    document.getElementById("adminList").innerHTML = "No Admin";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(a => {
    html += `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username}</td>
        <td>${a.status}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

function showMsg(msg) {
  document.getElementById("msg").innerText = msg;
}

// AUTO REFRESH
setInterval(() => {
  loadSystem();
  loadCounts();
}, 3000);

// INIT
loadSystem();
loadCounts();
loadAdmins();

</script>

</body>
</html>
