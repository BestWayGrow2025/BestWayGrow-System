<!DOCTYPE html>
<html>
<head>
  <title>System Admin Login</title>
  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      text-align: center;
      background: #f4f7f9;
    }

    input { 
      margin-bottom: 10px; 
      padding: 8px; 
      width: 240px; 
    }

    button { 
      padding: 8px 15px; 
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>SYSTEM ADMIN LOGIN</h2>

<input id="userId" placeholder="User ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="safeClick(login)">Login</button>

<p id="msg"></p>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("core_system.js missing");
  throw new Error("STOP");
}

// ================= AUTH =================
let session = JSON.parse(
  localStorage.getItem("loggedInSystemAdmin")
);

console.log(session);

if (!session || session.role !== "system_admin") {
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// ================= CURRENT USER =================
let currentUser = null;

if (typeof getUserById === "function") {
  currentUser = getUserById(session.userId);
}

if (!currentUser) {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

if (currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

if ((currentUser.status || "active") !== "active") {
  localStorage.removeItem("loggedInSystemAdmin");
  alert("Account inactive");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// ================= LOCK SYSTEM =================
let lock = false;
function safeClick(fn) {
  if (lock) return;
  lock = true;

  try {
    fn();
  } catch (e) {
    console.error(e);
  }

  setTimeout(() => lock = false, 500);
}

// ================= LOGOUT ALL =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInUser");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { 
    return atob(p); 
  } catch { 
    return p; 
  }
}

// ================= SAFE USERS =================
function getSafeUsers() {
  if (typeof getUsers !== "function") {
    showMsg("❌ System Error: getUsers missing");
    return [];
  }
  return getUsers() || [];
}

// ================= LOGIN =================
function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    return showMsg("⚠️ Enter ID & Password");
  }

  let users = getSafeUsers();

  let user = users.find(u =>
    u.userId === userId &&
    u.role === "system_admin"
  );

  if (!user) {
    return showMsg("❌ Invalid ID");
  }

  // ================= STATUS CHECK =================
  if (user.status && user.status !== "active") {
    return showMsg("🚫 Account inactive");
  }

  // ================= PASSWORD CHECK =================
  let storedPass = safeDecode(user.password);

  if (storedPass !== password) {
    return showMsg("❌ Wrong Password");
  }

  // ================= CLEAR OLD SESSIONS =================
  logoutAll();

  // ================= SAVE SESSION =================
  localStorage.setItem("loggedInSystemAdmin", JSON.stringify({
    userId: user.userId,
    role: user.role
  }));

  // ================= ACTIVITY LOG =================
  if (typeof logActivity === "function") {
    logActivity(user.userId, "SYSTEM_ADMIN", "Login");
  }

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "system_admin_dashboard.html";
  }, 500);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
