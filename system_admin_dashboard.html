<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7f9;
    }

    header {
      background: #ff6600;
      color: white;
      padding: 15px;
      text-align: center;
    }

    header button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .menu {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: white;
      justify-content: center;
      flex-wrap: wrap;
    }

    .menu button {
      padding: 10px 15px;
      border: none;
      background: #ff944d;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    #mainContent {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  <h2>SYSTEM ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSettings()">Settings</button>
</div>

<div id="mainContent"></div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("core_system.js missing");
  throw new Error("STOP");
}

// ================= AUTH =================
let session = JSON.parse(
  localStorage.getItem("loggedInSystemAdmin")
);

if (!session || session.role !== "system_admin") {
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// ================= CURRENT USER =================
let currentUser = null;

if (typeof getUserById === "function") {
  currentUser = getUserById(session.userId);
}

if (!currentUser) {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

if (currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

if ((currentUser.status || "active") !== "active") {
  localStorage.removeItem("loggedInSystemAdmin");
  alert("Account inactive");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + (currentUser.username || "") + " (" + currentUser.userId + ")";

// ================= HOME =================
// ================= HOME =================
function loadHome() {

  let users = getUsers() || [];

  // ================= OFFICE TREE =================
  let officeUsers = users.filter(
    u => u.tree === "office" && u.role === "user"
  );

  let officeAdmins = users.filter(
    u => u.tree === "office" && u.role === "admin"
  );

  // ================= USER TREE =================
  let fieldUsers = users.filter(
    u => u.tree === "field" && u.role === "user"
  );

  let fieldAdmins = users.filter(
    u => u.tree === "field" && u.role === "admin"
  );

  document.getElementById("mainContent").innerHTML = `
    <div class="card">
      <h3>Dashboard Overview</h3>

      <div style="display:flex; flex-wrap:wrap; gap:15px;">

        <div style="flex:1; min-width:250px; background:#4CAF50; color:#fff; padding:20px; border-radius:10px;">
          <h4>🏢 Office Tree</h4>
          <p>Total Office Users: ${officeUsers.length}</p>
          <p>Total Office Admins: ${officeAdmins.length}</p>
        </div>

        <div style="flex:1; min-width:250px; background:#2196F3; color:#fff; padding:20px; border-radius:10px;">
          <h4>👤 User Tree</h4>
          <p>Total Field Users: ${fieldUsers.length}</p>
          <p>Total Field Admins: ${fieldAdmins.length}</p>
        </div>

      </div>
    </div>
  `;
}

// ================= USERS =================
function loadUsers() {

  let users = typeof getUsers === "function" ? getUsers() : [];

  let html = `
    <div class="card">
      <h3>All Users</h3>
      <table>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Role</th>
        </tr>
  `;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username || ""}</td>
        <td>${u.role}</td>
      </tr>
    `;
  });

  html += `
      </table>
    </div>
  `;

  document.getElementById("mainContent").innerHTML = html;
}

// ================= SETTINGS =================
function loadSettings() {
  document.getElementById("mainContent").innerHTML = `
    <div class="card">
      <h3>Settings</h3>
      <p>System Admin settings panel ❤️</p>
    </div>
  `;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

// ================= INIT PAGE =================
loadHome();

</script>

</body>
</html>
