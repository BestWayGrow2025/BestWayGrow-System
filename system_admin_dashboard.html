<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js not loaded"); throw new Error("STOP"); }

// AUTH
let session;
try {
  session = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));
} catch {
  session = null;
}

if (!session || !session.userId) {
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// NAV
function goTo(page){
  window.location.href = page;
}

// TYPE SWITCH (FIXED)
function toggleDepartments() {
  const typeEl = document.getElementById("type");
  const box = document.getElementById("deptBox");

  box.style.display = (typeEl.value === "B") ? "block" : "none";
}

// SYSTEM STATUS
function loadSystem() {
  let s = getSystemSettings() || {};

  document.getElementById("systemStatus").innerHTML = `
    Admin: ${s.adminAccess !== false ? "🟢" : "🔴"} |
    Lock: ${s.lockMode ? "🔴" : "🟢"} <br>
    Queue: ${s.queueStop ? "🔴" : "🟢"} |
    Withdraw: ${s.withdrawStop ? "🔴" : "🟢"} <br>
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"}
  `;
}

// COUNTS
function loadCounts() {
  let users = getUsers() || [];

  document.getElementById("adminCount").innerText =
    users.filter(u => u.role === "admin").length;

  document.getElementById("franchiseCount").innerText =
    users.filter(u => u.role === "franchise").length;

  document.getElementById("userCount").innerText =
    users.filter(u => u.role === "user").length;
}

// SHOW DATA
function showData(role) {

  let users = (getUsers() || []).filter(u => u.role === role);

  if (!users.length) {
    document.getElementById("dataPanel").innerHTML = "No Data";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username || u.userId}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("dataPanel").innerHTML = html;
}

// CREATE ADMIN (FIXED)
function createAdmin() {

  let adminIdVal = document.getElementById("adminId").value.trim();
  let nameVal = document.getElementById("name").value.trim();
  let pass = document.getElementById("password").value.trim();
  let typeVal = document.getElementById("type").value;

  if (!adminIdVal || !nameVal || !pass) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers() || [];

  if (users.find(u => u.userId.toLowerCase() === adminIdVal.toLowerCase())) {
    showMsg("⚠️ Admin exists");
    return;
  }

  let departments = [];

  if (typeVal === "B") {
    document.querySelectorAll("#deptBox input:checked").forEach(cb => {
      departments.push(cb.value);
    });

    if (!departments.length) {
      showMsg("⚠️ Select department");
      return;
    }
  } else {
    departments = ["finance","franchise","kyc","report"];
  }

  users.push({
    userId: adminIdVal,
    username: nameVal,
    password: btoa(pass),
    role: "admin",
    type: typeVal,
    departments: departments,
    status: "active",
    createdBy: currentUser.userId
  });

  saveUsers(users);

  showMsg("✅ Admin Created");

  document.getElementById("adminId").value = "";
  document.getElementById("name").value = "";
  document.getElementById("password").value = "";

  loadAdmins();
  loadCounts();
}

// ADMIN LIST
function loadAdmins() {

  let users = (getUsers() || []).filter(u => u.role === "admin");

  if (!users.length) {
    document.getElementById("adminList").innerHTML = "No Admin";
    return;
  }

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(a => {
    html += `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username || a.userId}</td>
        <td>${a.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
}

// MESSAGE (FIXED)
function showMsg(msg) {
  document.getElementById("msg").innerText = msg;
}

// AUTO REFRESH
setInterval(() => {
  loadSystem();
  loadCounts();
}, 8000);

// INIT
loadSystem();
loadCounts();
loadAdmins();

</script>
