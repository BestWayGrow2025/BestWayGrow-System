<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#eef3f8;
    }

    header {
      background:#006633;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#00994d;
      color:#fff;
    }

    .menu button:hover {
      background:#007a3d;
    }

    .content {
      padding:20px;
      text-align:center;
    }

    .card {
      background:#fff;
      padding:20px;
      margin:auto;
      max-width:700px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
    }

    input, select {
      padding:8px;
      margin:5px;
      width:90%;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      border:1px solid #ddd;
      padding:6px;
      font-size:13px;
    }

  </style>
</head>

<body>

<header>
  <h2>SYSTEM ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<!-- MENU -->
<div class="menu">
  <button onclick="loadSection('home')">Home</button>
  <button onclick="loadSection('createAdmin')">Create Admin</button>
  <button onclick="loadSection('admins')">Admins</button>
  <button onclick="loadSection('users')">Users</button>
  <button onclick="loadSection('system')">System</button>
  <button onclick="loadSection('profile')">Profile</button>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="mainBox" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js not loaded"); throw new Error("STOP"); }

// AUTH
let session;
try {
  session = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));
} catch {
  session = null;
}

if (!session || !session.userId) {
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SYSTEM ADMIN (" + currentUser.userId + ")";

// MAIN SECTION SWITCH
function loadSection(section) {

  let box = document.getElementById("mainBox");

  // HOME
  if (section === "home") {
    box.innerHTML = `
      <h3>Dashboard</h3>
      <p>ID: ${currentUser.userId}</p>
      <p>Name: ${currentUser.username || currentUser.userId}</p>
      <p>Status: ${currentUser.status || "active"}</p>
    `;
  }

  // CREATE ADMIN
  else if (section === "createAdmin") {
    box.innerHTML = `
      <h3>Create Admin</h3>

      <input id="adminId" placeholder="Admin ID"><br>
      <input id="name" placeholder="Name"><br>
      <input id="password" type="password" placeholder="Password"><br>

      <select id="type" onchange="toggleDept()">
        <option value="A">TYPE A - All Access</option>
        <option value="B">TYPE B - Department</option>
      </select>

      <div id="deptBox" style="display:none;">
        <label><input type="checkbox" value="finance"> Finance</label><br>
        <label><input type="checkbox" value="franchise"> Franchise</label><br>
        <label><input type="checkbox" value="kyc"> KYC</label><br>
        <label><input type="checkbox" value="report"> Report</label>
      </div>

      <button onclick="createAdmin()">Create</button>
      <p id="msg"></p>
    `;
  }

  // ADMIN LIST
  else if (section === "admins") {

    let users = (getUsers() || []).filter(u => u.role === "admin");

    if (!users.length) {
      box.innerHTML = "<h3>No Admin</h3>";
      return;
    }

    let html = `<h3>Admins</h3><table>
      <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

    users.forEach(a => {
      html += `
        <tr>
          <td>${a.userId}</td>
          <td>${a.username || a.userId}</td>
          <td>${a.status || "active"}</td>
        </tr>`;
    });

    html += "</table>";

    box.innerHTML = html;
  }

  // USERS
  else if (section === "users") {

    let users = (getUsers() || []).filter(u => u.role === "user");

    if (!users.length) {
      box.innerHTML = "<h3>No Users</h3>";
      return;
    }

    let html = `<h3>Users</h3><table>
      <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

    users.forEach(u => {
      html += `
        <tr>
          <td>${u.userId}</td>
          <td>${u.username || u.userId}</td>
          <td>${u.status || "active"}</td>
        </tr>`;
    });

    html += "</table>";

    box.innerHTML = html;
  }

  // SYSTEM CONTROL
  else if (section === "system") {

    let s = getSystemSettings() || {};

    box.innerHTML = `
      <h3>System Control</h3>

      Admin: ${s.adminAccess !== false ? "🟢" : "🔴"} <br>
      Lock: ${s.lockMode ? "🔴" : "🟢"} <br><br>

      <button onclick="toggle('adminAccess')">Toggle Admin</button>
      <button onclick="toggle('lockMode')">Toggle Lock</button>
    `;
  }

  // PROFILE
  else if (section === "profile") {
    box.innerHTML = `
      <h3>Profile</h3>
      <p>ID: ${currentUser.userId}</p>
      <p>Name: ${currentUser.username || currentUser.userId}</p>
      <p>Status: ${currentUser.status || "active"}</p>
    `;
  }

}

// CREATE ADMIN FUNCTION
function createAdmin() {

  let adminId = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let pass = document.getElementById("password").value.trim();
  let type = document.getElementById("type").value;

  if (!adminId || !name || !pass) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers() || [];

  if (users.find(u => u.userId.toLowerCase() === adminId.toLowerCase())) {
    showMsg("⚠️ Admin exists");
    return;
  }

  let departments = [];

  if (type === "B") {
    document.querySelectorAll("#deptBox input:checked").forEach(cb => {
      departments.push(cb.value);
    });

    if (!departments.length) {
      showMsg("⚠️ Select department");
      return;
    }
  } else {
    departments = ["finance","franchise","kyc","report"];
  }

  users.push({
    userId: adminId,
    username: name,
    password: btoa(pass),
    role: "admin",
    type: type,
    departments: departments,
    status: "active",
    createdBy: currentUser.userId
  });

  saveUsers(users);

  showMsg("✅ Admin Created");

  loadSection("admins");
}

// TOGGLE DEPT
function toggleDept() {
  let type = document.getElementById("type").value;
  document.getElementById("deptBox").style.display =
    (type === "B") ? "block" : "none";
}

// SYSTEM TOGGLE
function toggle(key) {

  let s = getSystemSettings() || {};
  s[key] = !s[key];

  localStorage.setItem("systemSettings", JSON.stringify(s));

  loadSection("system");
}

// MESSAGE
function showMsg(msg) {
  document.getElementById("msg").innerText = msg;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
}

// DEFAULT
loadSection("home");

</script>

</body>
</html>
