<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7f9;
    }

    header {
      background: #ff6600;
      color: white;
      padding: 15px;
      text-align: center;
    }

    header button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .menu {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: white;
      justify-content: center;
      flex-wrap: wrap;
    }

    .menu button {
      padding: 10px 15px;
      border: none;
      background: #ff944d;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    .menu button.active {
      background: #cc5200;
    }

    #mainContent {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 1100px;
      margin: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    @media (max-width: 768px) {
      #mainContent {
        padding: 10px;
      }

      .menu {
        gap: 8px;
      }

      .menu button {
        padding: 8px 12px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<header>
  <h2>SYSTEM ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button id="logoutBtn">Logout</button>
</header>

<div class="menu">
  <button data-page="home">Home</button>
  <button data-page="users">Users</button>
  <button data-page="create">Create Admin</button>
  <button data-page="pins">Pins</button>
  <button data-page="settings">Settings</button>
</div>

<div id="mainContent"></div>

<!-- ================= BOOT MANAGER ================= -->
<script src="boot_manager.js"></script>

<!-- ================= CORE ================= -->
<script src="core_system.js"></script>
<script src="session_manager.js"></script>
<script src="route_guard.js"></script>

<!-- ================= ACTIVITY ================= -->
<script src="activity_log.js"></script>

<!-- ================= PIN SYSTEM ================= -->
<script src="pin_product_master.js"></script>
<script src="pin_master_system.js"></script>
<script src="pin_request_system.js"></script>

<!-- ================= PAGE MODULE ================= -->
<script src="system_admin_dashboard.js"></script>

</body>
</html>
