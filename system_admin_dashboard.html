<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family:'Segoe UI', Arial;
      margin:0;
      background:linear-gradient(135deg,#eef2f7,#e6ecf5);
    }

    header {
      background:linear-gradient(135deg,#006633,#00a86b);
      color:#fff;
      padding:18px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.2);
    }

    header button {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:#fff;
      cursor:pointer;
    }

    /* MENU */
    .menu {
      display:flex;
      overflow-x:auto;
      white-space:nowrap;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .menu button {
      flex:0 0 auto;
      margin:5px;
      padding:10px 14px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      background:linear-gradient(135deg,#28a745,#00c851);
      color:#fff;
      font-size:13px;
      transition:0.3s;
    }

    .menu button:hover {
      transform:scale(1.05);
      opacity:0.9;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:15px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
      max-width:850px;
      margin:auto;
      animation:fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    input, select {
      padding:10px;
      margin:6px 0;
      width:90%;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:13px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
      font-size:13px;
    }

    th {
      background:#f1f4f8;
    }

    th, td {
      border:1px solid #eee;
      padding:10px;
      text-align:center;
    }

    h3 {
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>🛠 SYSTEM ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadCreateAdmin()">Create Admin</button>
  <button onclick="loadAdmins()">Admins</button>
  <button onclick="loadPins()">PIN</button>
  <button onclick="loadSystem()">System</button>
</div>

<div class="container">
  <div id="mainContent" class="card">Loading...</div>
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSystemAdmin") || "null");

if (!session || !session.userId) {
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome SYSTEM ADMIN (" + currentUser.userId + ")";

// STORAGE
function getPins() {
  return JSON.parse(localStorage.getItem("pins") || "[]");
}

// HOME
function loadHome() {
  document.getElementById("mainContent").innerHTML = `
    <h3>Overview</h3>
    <p>Name: ${currentUser.username || currentUser.userId}</p>
    <p>Status: ${currentUser.status}</p>
  `;
}

// CREATE ADMIN
function loadCreateAdmin() {
  document.getElementById("mainContent").innerHTML = `
    <h3>Create Admin</h3>

    <input id="adminId" placeholder="Admin ID"><br>
    <input id="name" placeholder="Name"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button onclick="createAdmin()">Create</button>
    <p id="msg"></p>
  `;
}

function createAdmin() {

  let id = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!id || !name || !pass) return showMsg("⚠ Fill all fields");

  let users = getUsers() || [];

  if (users.find(u => u.userId.toLowerCase() === id.toLowerCase()))
    return showMsg("❌ Admin exists");

  users.push({
    userId: id,
    username: name,
    password: btoa(pass),
    role: "admin",
    status: "active",
    createdBy: currentUser.userId
  });

  saveUsers(users);

  showMsg("✅ Admin Created");
}

// ADMIN LIST
function loadAdmins() {

  let admins = (getUsers() || []).filter(u => u.role === "admin");

  let html = `<h3>Admin List</h3><table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  if (!admins.length) html += `<tr><td colspan="3">No Admin</td></tr>`;

  admins.forEach(a => {
    html += `<tr>
      <td>${a.userId}</td>
      <td>${a.username || a.userId}</td>
      <td>${a.status || "active"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// PIN
function loadPins() {

  let pins = getPins();

  let html = `<h3>PIN Management</h3>
  <button onclick="location.href='system_admin_pin_panel.html'">Open PIN Panel</button>
  <table>
    <tr><th>PIN</th><th>Status</th></tr>`;

  if (!pins.length) html += `<tr><td colspan="2">No PIN</td></tr>`;

  pins.forEach(p => {
    html += `<tr>
      <td>${p.pin}</td>
      <td>${p.used ? "USED" : "AVAILABLE"}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("mainContent").innerHTML = html;
}

// SYSTEM
function loadSystem() {

  let s = getSystemSettings() || {};

  document.getElementById("mainContent").innerHTML = `
    <h3>System Status</h3>
    <p>Admin Access: ${s.adminAccess ? "ON" : "OFF"}</p>
    <p>Lock Mode: ${s.lockMode ? "ON" : "OFF"}</p>
    <p>Queue: ${s.queueStop ? "STOP" : "RUNNING"}</p>
  `;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
}

function showMsg(m) {
  document.getElementById("msg").innerText = m;
}

// INIT
loadHome();

</script>

</body>
</html>
