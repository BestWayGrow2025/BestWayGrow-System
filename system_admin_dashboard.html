<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; text-align:center; background:#f4f7f9; }
    .card { background:#fff; padding:20px; margin:15px; border-radius:10px; box-shadow:0 4px 10px #ccc;}
    .container { display:flex; flex-wrap:wrap; justify-content:center; }
    table { width:100%; margin-top:10px; border-collapse: collapse; }
    th,td { border:1px solid #ddd; padding:8px; font-size:13px; }
    button { padding:6px 10px; margin:5px; cursor:pointer; }
    select, input { padding:6px; margin:5px; width:85%; }
    .stat { font-size:20px; font-weight:bold; }
  </style>
</head>

<body>

<h2>SYSTEM ADMIN DASHBOARD</h2>
<button onclick="logout()">Logout</button>

<div class="container">

  <!-- CREATE ADMIN -->
  <div class="card">
    <h3>Create Admin</h3>

    <input id="adminId" placeholder="Admin ID"><br>
    <input id="name" placeholder="Name"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <select id="type" onchange="toggleDepartments()">
      <option value="A">TYPE A - All in One</option>
      <option value="B">TYPE B - Department Wise</option>
    </select>

    <div id="deptBox" style="display:none; text-align:left;">
      <label><input type="checkbox" value="finance"> Finance</label><br>
      <label><input type="checkbox" value="franchise"> Franchise</label><br>
      <label><input type="checkbox" value="kyc"> KYC</label><br>
      <label><input type="checkbox" value="report"> Report</label>
    </div>

    <button onclick="createAdmin()">Create</button>
    <p id="msg"></p>
  </div>

  <!-- PIN PANEL -->
  <div class="card">
    <h3>PIN CONTROL</h3>
    <button onclick="goTo('system_admin_pin_panel.html')">
      OPEN PIN PANEL
    </button>
  </div>

  <!-- COUNTS -->
  <div class="card">
    <h3>Overview</h3>
    <div>Admins <div class="stat" id="adminCount">0</div></div>
    <div>Franchise <div class="stat" id="franchiseCount">0</div></div>
    <div>Users <div class="stat" id="userCount">0</div></div>
  </div>

  <!-- QUICK VIEW -->
  <div class="card">
    <h3>Quick View</h3>
    <button onclick="showData('admin')">Admins</button>
    <button onclick="showData('franchise')">Franchise</button>
    <button onclick="showData('user')">Users</button>
  </div>

  <!-- DATA PANEL -->
  <div class="card">
    <h3>Details</h3>
    <div id="dataPanel">Click button to view</div>
  </div>

  <!-- ADMIN LIST -->
  <div class="card">
    <h3>Admin List</h3>
    <div id="adminList"></div>
  </div>

  <!-- SYSTEM STATUS -->
  <div class="card">
    <h3>System Status</h3>
    <p id="systemStatus"></p>
  </div>

</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js not loaded"); throw new Error("STOP"); }

// AUTH
let session;
try {
  session = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));
} catch {
  session = null;
}

if (!session || !session.userId) {
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// NAV
function goTo(page){
  window.location.href = page;
}

// TYPE SWITCH (SAFE)
function toggleDepartments() {
  const box = document.getElementById("deptBox");
  box.style.display = (type.value === "B") ? "block" : "none";
}

// SYSTEM STATUS
function loadSystem() {
  let s = getSystemSettings() || {};

  systemStatus.innerHTML = `
    Admin: ${s.adminAccess !== false ? "🟢" : "🔴"} |
    Lock: ${s.lockMode ? "🔴" : "🟢"} <br>
    Queue: ${s.queueStop ? "🔴" : "🟢"} |
    Withdraw: ${s.withdrawStop ? "🔴" : "🟢"} <br>
    Repurchase: ${s.repurchaseOpen !== false ? "🟢" : "🔴"}
  `;
}

// COUNTS
function loadCounts() {
  let users = getUsers() || [];

  adminCount.innerText = users.filter(u => u.role === "admin").length;
  franchiseCount.innerText = users.filter(u => u.role === "franchise").length;
  userCount.innerText = users.filter(u => u.role === "user").length;
}

// SHOW DATA
function showData(role) {

  let users = (getUsers() || []).filter(u => u.role === role);

  if (!users.length) return dataPanel.innerHTML = "No Data";

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.userId}</td>
        <td>${u.username || u.userId}</td>
        <td>${u.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  dataPanel.innerHTML = html;
}

// CREATE ADMIN
function createAdmin() {

  let adminId = adminId.value.trim();
  let nameVal = name.value.trim();
  let pass = password.value.trim();
  let typeVal = type.value;

  if (!adminId || !nameVal || !pass) return showMsg("❌ Fill all fields");

  let users = getUsers() || [];

  if (users.find(u => u.userId.toLowerCase() === adminId.toLowerCase()))
    return showMsg("⚠️ Admin exists");

  let departments = [];

  if (typeVal === "B") {
    document.querySelectorAll("#deptBox input:checked").forEach(cb => {
      departments.push(cb.value);
    });

    if (!departments.length) return showMsg("⚠️ Select department");
  } else {
    departments = ["finance","franchise","kyc","report"];
  }

  users.push({
    userId: adminId,
    username: nameVal,
    password: btoa(pass),
    role: "admin",
    type: typeVal,
    departments: departments,
    status: "active",
    createdBy: currentUser.userId
  });

  saveUsers(users);

  showMsg("✅ Admin Created");

  adminId.value = "";
  name.value = "";
  password.value = "";

  loadAdmins();
  loadCounts();
}

// ADMIN LIST (SAFE)
function loadAdmins() {

  let users = (getUsers() || []).filter(u => u.role === "admin");

  if (!users.length) return adminList.innerHTML = "No Admin";

  let html = `<table>
    <tr><th>ID</th><th>Name</th><th>Status</th></tr>`;

  users.forEach(a => {
    html += `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username || a.userId}</td>
        <td>${a.status || "active"}</td>
      </tr>`;
  });

  html += "</table>";

  adminList.innerHTML = html;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
}

function showMsg(msg) {
  msgBox.innerText = msg;
}

// AUTO REFRESH (PRO FIX)
setInterval(() => {
  loadSystem();
  loadCounts();
}, 8000);

// INIT
loadSystem();
loadCounts();
loadAdmins();

</script>

</body>
</html>
