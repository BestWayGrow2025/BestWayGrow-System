<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; text-align:center; }
    .card { background:#fff; padding:20px; margin:15px; border-radius:10px; box-shadow:0 4px 10px #ccc;}
    .container { display:flex; flex-wrap:wrap; justify-content:center; }
    table { width:100%; margin-top:10px; border-collapse: collapse; }
    th,td { border:1px solid #ddd; padding:8px; font-size:13px; }
    button { padding:6px 10px; cursor:pointer; }
    select, input { padding:6px; margin:5px; width:85%; }
  </style>
</head>

<body>

<h2>SYSTEM ADMIN DASHBOARD</h2>
<button onclick="logout()">Logout</button>

<div class="container">

  <!-- CREATE ADMIN -->
  <div class="card">
    <h3>Create Admin</h3>

    <input id="adminId" placeholder="Admin ID"><br>
    <input id="name" placeholder="Name"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <select id="type" onchange="toggleDepartments()">
      <option value="A">TYPE A - All in One</option>
      <option value="B">TYPE B - Department Wise</option>
    </select>

    <div id="deptBox" style="display:none; text-align:left;">
      <label><input type="checkbox" value="finance"> Finance</label><br>
      <label><input type="checkbox" value="franchise"> Franchise</label><br>
      <label><input type="checkbox" value="kyc"> KYC</label><br>
      <label><input type="checkbox" value="report"> Report</label>
    </div>

    <button onclick="createAdmin()">Create</button>
    <p id="msg"></p>
  </div>

  <!-- ADMIN LIST -->
  <div class="card">
    <h3>Admin List</h3>
    <div id="adminList"></div>
  </div>

  <!-- SYSTEM STATUS (UPGRADED) -->
  <div class="card">
    <h3>System Status</h3>
    <p id="systemStatus"></p>
  </div>

</div>

<script src="CORE_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
initCoreSystem();

let currentUser = protectPage({
  role: "system_admin"
});

if (!currentUser) {
  throw new Error("Security check failed");
}

// ================= TYPE SWITCH =================
function toggleDepartments() {
  let type = document.getElementById("type").value;
  document.getElementById("deptBox").style.display =
    (type === "B") ? "block" : "none";
}

// ================= SYSTEM STATUS (UPGRADE 🔥) =================
function loadSystem() {
  let s = getSystemSettings();

  document.getElementById("systemStatus").innerHTML = `
    Admin Access: ${s.adminAccess ? "ON 🟢" : "OFF 🔴"} <br>
    Lock Mode: ${s.lockMode ? "LOCKED 🔴" : "UNLOCKED 🟢"} <br>
    Queue: ${s.queueStop ? "STOPPED 🔴" : "RUNNING 🟢"} <br>
    Withdraw: ${s.withdrawStop ? "STOPPED 🔴" : "RUNNING 🟢"}
  `;
}

// ================= CREATE ADMIN =================
function createAdmin() {

  let adminId = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let password = document.getElementById("password").value.trim();
  let type = document.getElementById("type").value;

  if (!adminId || !name || !password) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers();

  if (users.find(u => u.userId.toLowerCase() === adminId.toLowerCase())) {
    showMsg("⚠️ Admin exists");
    return;
  }

  let departments = [];

  if (type === "B") {
    document.querySelectorAll("#deptBox input:checked").forEach(cb => {
      departments.push(cb.value);
    });

    if (departments.length === 0) {
      showMsg("⚠️ Select at least one department");
      return;
    }
  } else {
    departments = ["finance","franchise","kyc","report"];
  }

  users.push({
    userId: adminId,
    username: name,
    password: btoa(password),
    role: "admin",
    type: type,
    departments: departments,
    status: "active",
    createdBy: currentUser.userId
  });

  saveUsers(users);

  // 📜 LOG
  if (typeof logActivity === "function") {
    logActivity(currentUser.userId, "SYSTEM_ADMIN", "Created admin " + adminId);
  }

  showMsg("✅ Created");

  document.getElementById("adminId").value = "";
  document.getElementById("name").value = "";
  document.getElementById("password").value = "";

  loadAdmins();
}

// ================= ADMIN LIST =================
function loadAdmins() {

  let users = getUsers();
  let admins = users.filter(u => u.role === "admin");

  if (admins.length === 0) {
    document.getElementById("adminList").innerHTML = "No Admin";
    return;
  }

  let html = `
    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Type</th>
        <th>Departments</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
  `;

  admins.forEach(a => {

    let isActive = a.status === "active";

    html += `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username}</td>
        <td>${a.type}</td>
        <td>${(a.departments || []).join(", ")}</td>
        <td>${isActive ? "ACTIVE" : "INACTIVE"}</td>
        <td>
          <button onclick="toggleAdmin('${a.userId}')">
            ${isActive ? "Deactivate" : "Activate"}
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("adminList").innerHTML = html;
}

// ================= TOGGLE ADMIN =================
function toggleAdmin(id) {

  let users = getUsers();
  let admin = users.find(u => u.userId === id);

  if (!admin) return;

  admin.status = (admin.status === "active") ? "inactive" : "active";

  saveUsers(users);

  // 📜 LOG
  if (typeof logActivity === "function") {
    logActivity(currentUser.userId, "SYSTEM_ADMIN", "Toggled admin " + id);
  }

  loadAdmins();
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

// ================= MESSAGE =================
function showMsg(msg) {
  document.getElementById("msg").innerText = msg;
}

// ================= INIT =================
loadSystem();
loadAdmins();

</script>

</body>
</html>
