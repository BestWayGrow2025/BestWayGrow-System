<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      background: #f4f7f9;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1976d2;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 800px;
      margin: auto;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>SYSTEM ADMIN DASHBOARD</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">
  <div class="card">
    <h3>Welcome System Admin</h3>
    <p>Dashboard working correctly ❤️</p>
  </div>
</div>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("core_system.js missing");
  throw new Error("STOP");
}

// ================= AUTH =================
let session = JSON.parse(
  localStorage.getItem("loggedInSystemAdmin")
);

console.log(session);

if (!session || session.role !== "system_admin") {
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// ================= CURRENT USER =================
let currentUser = null;

if (typeof getUserById === "function") {
  currentUser = getUserById(session.userId);
}

console.log(currentUser);

if (!currentUser) {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

if (currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

if ((currentUser.status || "active") !== "active") {
  localStorage.removeItem("loggedInSystemAdmin");
  alert("Account inactive");
  window.location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + (currentUser.username || currentUser.userId) +
  " (" + currentUser.userId + ")";

// ================= LOGOUT =================
function logout() {

  if (typeof logActivity === "function") {
    logActivity(currentUser.userId, "SYSTEM_ADMIN", "Logout");
  }

  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

</script>

</body>
</html>
