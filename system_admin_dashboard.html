<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin-bottom: 10px; padding: 5px; }
    button { padding: 6px 10px; cursor: pointer; margin: 3px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
    .nav { margin-bottom: 20px; }
    .nav button { background: #333; color: #fff; }
  </style>
</head>
<body>

<h2>SYSTEM ADMIN DASHBOARD</h2>

<!-- ================= NAVIGATION ================= -->
<div class="nav">
  <button onclick="goTo('admin_franchise_requests.html')">📋 Approval Panel</button>
  <button onclick="goTo('admin_reports.html')">📊 Reports</button>
  <button onclick="goTo('admin_withdrawals.html')">💰 Withdrawals</button>
  <button onclick="goTo('franchise_login.html')">🏢 Franchise</button>
</div>

<hr>

<h2>SYSTEM ADMIN → CREATE ADMIN</h2>
<input id="adminId" placeholder="Admin ID"><br>
<input id="name" placeholder="Name"><br>
<input id="password" type="password" placeholder="Password"><br>

<label>Type:</label><br>
<select id="type" onchange="toggleDepartments()">
  <option value="all">All-in-One (Type A)</option>
  <option value="department">Department (Type B)</option>
</select>
<br><br>

<div id="departmentsBox" style="display:none;">
  <label>Select Departments:</label><br>
  <input type="checkbox" value="finance"> Finance<br>
  <input type="checkbox" value="franchisee"> Franchisee<br>
  <input type="checkbox" value="kyc"> KYC<br>
</div>

<br>
<button onclick="createAdmin()">Create Admin</button>
<p id="msg"></p>

<!-- ================= PIN REQUEST ================= -->
<div class="box">
  <h3>Pin Requests (Franchise)</h3>
  <div id="requests"></div>
</div>

<!-- ================= SYSTEM CONTROL ================= -->
<div class="box">
  <h3>System Control</h3>
  <button onclick="lockSystem()">🔒 Lock System</button>
  <button onclick="unlockSystem()">🔓 Unlock System</button>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem();
</script>

<!-- SYSTEM -->
<script src="pin_system.js"></script>
<script src="pin_request_system.js"></script>

<script>

// ================= AUTH =================
let sysAdmin = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));

if (!sysAdmin) {
  alert("Access denied");
  window.location.href = "system_admin_login.html";
}

// ================= NAV =================
function goTo(page) {
  window.location.href = page;
}

// ================= TOGGLE =================
function toggleDepartments() {
  let type = document.getElementById("type").value;
  document.getElementById("departmentsBox").style.display =
    type === "department" ? "block" : "none";
}

// ================= CREATE ADMIN =================
function createAdmin() {

  let adminId = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let password = document.getElementById("password").value.trim();
  let type = document.getElementById("type").value;

  if (!adminId || !name || !password) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers();

  if (users.find(u => u.userId === adminId)) {
    showMsg("⚠️ Admin already exists");
    return;
  }

  let departments = [];

  if (type === "all") {
    departments = ["finance", "franchisee", "kyc"];
  } else {
    let checkboxes = document.querySelectorAll("#departmentsBox input:checked");
    checkboxes.forEach(cb => departments.push(cb.value));

    if (departments.length === 0) {
      showMsg("⚠️ Select at least one department");
      return;
    }
  }

  let newAdmin = {
    userId: adminId,
    username: name,
    password: btoa(password), // ✅ encoded
    role: "admin",
    type: type,
    departments: departments,
    createdBy: sysAdmin.userId,
    status: "active"
  };

  users.push(newAdmin);
  saveUsers(users);

  showMsg("✅ Admin created");

  document.getElementById("adminId").value = "";
  document.getElementById("name").value = "";
  document.getElementById("password").value = "";
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

// ================= PIN REQUEST =================
function loadRequests() {

  let requests = JSON.parse(localStorage.getItem("pinRequests") || "[]");

  if (requests.length === 0) {
    document.getElementById("requests").innerHTML = "No requests";
    return;
  }

  let html = "<ul>";

  requests.slice().reverse().forEach(r => {
    html += `<li>
      ${r.requestId} | Qty: ${r.quantity} | ${r.status}
      <br>
      ${r.status === "PENDING" ? `
        <button onclick="approve('${r.requestId}')">Approve</button>
        <button onclick="reject('${r.requestId}')">Reject</button>
      ` : ""}
    </li><br>`;
  });

  html += "</ul>";

  document.getElementById("requests").innerHTML = html;
}

function approve(id) {
  approvePinRequest(id);
  loadRequests();
}

function reject(id) {
  rejectPinRequest(id);
  loadRequests();
}

// ================= SYSTEM CONTROL =================
function lockSystem() {
  let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");
  s.lockMode = true;
  localStorage.setItem("systemSettings", JSON.stringify(s));
  alert("System Locked");
}

function unlockSystem() {
  let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");
  s.lockMode = false;
  localStorage.setItem("systemSettings", JSON.stringify(s));
  alert("System Unlocked");
}

// ================= INIT =================
loadRequests();

</script>
</body>
</html>
