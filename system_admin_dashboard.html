<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard V7</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f7f9;
    }

    header {
      background:#006633;
      color:#fff;
      padding:15px;
      text-align:center;
    }

    .menu {
      display:flex;
      overflow-x:auto;
      background:#fff;
      padding:10px;
      box-shadow:0 2px 5px #ccc;
    }

    .menu button {
      margin:5px;
      padding:10px 15px;
      border:none;
      border-radius:20px;
      background:#e0e0e0;
      cursor:pointer;
      white-space:nowrap;
    }

    .menu button.active {
      background:#00994d;
      color:#fff;
    }

    .content {
      padding:20px;
    }

    .card {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px #ccc;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse: collapse;
    }

    th,td {
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    input, select {
      padding:6px;
      margin:5px;
      width:90%;
    }

    button.main {
      background:#00994d;
      color:#fff;
    }
  </style>
</head>

<body>

<header>
  <h2>SYSTEM ADMIN PANEL V7</h2>
  <button onclick="logout()">Logout</button>
</header>

<!-- TOP MENU -->
<div class="menu">
  <button onclick="loadSection('dashboard')">Dashboard</button>
  <button onclick="loadSection('createAdmin')">Create Admin</button>
  <button onclick="loadSection('admins')">Admin List</button>
  <button onclick="loadSection('users')">Users</button>
  <button onclick="loadSection('franchise')">Franchise</button>
  <button onclick="loadSection('pin')">PIN Panel</button>
  <button onclick="loadSection('system')">System</button>
</div>

<!-- CONTENT -->
<div class="content" id="contentArea">
  Loading...
</div>

<script src="core_system.js"></script>

<script>

// INIT
if (typeof initCoreSystem === "function") initCoreSystem();
else { alert("core_system.js missing"); throw new Error("STOP"); }

// AUTH
let session = JSON.parse(localStorage.getItem("loggedInSystemAdmin") || "null");

if (!session || !session.userId) {
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "system_admin") {
  localStorage.removeItem("loggedInSystemAdmin");
  location.href = "system_admin_login.html";
  throw new Error("STOP");
}

// MAIN SWITCH SYSTEM
function loadSection(section) {

  let html = "";

  // DASHBOARD
  if (section === "dashboard") {

    let users = getUsers() || [];

    html = `
    <div class="card">
      <h3>Overview</h3>
      Admins: ${users.filter(u=>u.role==="admin").length}<br>
      Franchise: ${users.filter(u=>u.role==="franchise").length}<br>
      Users: ${users.filter(u=>u.role==="user").length}
    </div>`;
  }

  // CREATE ADMIN
  if (section === "createAdmin") {

    html = `
    <div class="card">
      <h3>Create Admin</h3>

      <input id="adminId" placeholder="Admin ID"><br>
      <input id="name" placeholder="Name"><br>
      <input id="password" type="password" placeholder="Password"><br>

      <select id="type" onchange="toggleDept()">
        <option value="A">Type A</option>
        <option value="B">Type B</option>
      </select>

      <div id="deptBox" style="display:none;">
        <label><input type="checkbox" value="finance">Finance</label><br>
        <label><input type="checkbox" value="kyc">KYC</label><br>
        <label><input type="checkbox" value="report">Report</label>
      </div>

      <button class="main" onclick="createAdmin()">Create</button>
      <p id="msg"></p>
    </div>`;
  }

  // ADMIN LIST
  if (section === "admins") {

    let users = (getUsers() || []).filter(u=>u.role==="admin");

    let rows = users.map(a => `
      <tr>
        <td>${a.userId}</td>
        <td>${a.username || a.userId}</td>
        <td>${a.status || "active"}</td>
      </tr>`).join("");

    html = `
    <div class="card">
      <h3>Admin List</h3>
      <table>
        <tr><th>ID</th><th>Name</th><th>Status</th></tr>
        ${rows || "No Admin"}
      </table>
    </div>`;
  }

  // USERS
  if (section === "users") {

    let users = (getUsers() || []).filter(u=>u.role==="user");

    html = `
    <div class="card">
      <h3>User List</h3>
      Total: ${users.length}
    </div>`;
  }

  // FRANCHISE
  if (section === "franchise") {

    let users = (getUsers() || []).filter(u=>u.role==="franchise");

    html = `
    <div class="card">
      <h3>Franchise</h3>
      Total: ${users.length}
    </div>`;
  }

  // PIN
  if (section === "pin") {
    html = `
    <div class="card">
      <h3>PIN PANEL</h3>
      <button onclick="goTo('system_admin_pin_panel.html')">Open Panel</button>
    </div>`;
  }

  // SYSTEM
  if (section === "system") {

    let s = getSystemSettings() || {};

    html = `
    <div class="card">
      <h3>System Control</h3>
      Lock: ${s.lockMode ? "🔴":"🟢"}<br>
      Admin: ${s.adminAccess !== false ? "🟢":"🔴"}<br>
      Withdraw: ${s.withdrawStop ? "🔴":"🟢"}<br><br>

      <button onclick="toggle('lockMode')">Lock</button>
      <button onclick="toggle('adminAccess')">Admin</button>
      <button onclick="toggle('withdrawStop')">Withdraw</button>
    </div>`;
  }

  document.getElementById("contentArea").innerHTML = html;
}

// CREATE ADMIN
function createAdmin() {

  let id = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let pass = document.getElementById("password").value.trim();
  let type = document.getElementById("type").value;

  if (!id || !name || !pass) return showMsg("Fill all fields");

  let users = getUsers() || [];

  if (users.find(u=>u.userId.toLowerCase()===id.toLowerCase()))
    return showMsg("Exists");

  let departments = [];

  if (type==="B") {
    document.querySelectorAll("#deptBox input:checked")
      .forEach(cb=>departments.push(cb.value));

    if (!departments.length) return showMsg("Select dept");
  } else {
    departments = ["finance","kyc","report"];
  }

  users.push({
    userId:id,
    username:name,
    password:btoa(pass),
    role:"admin",
    departments,
    status:"active"
  });

  saveUsers(users);

  showMsg("Created");
}

// HELPERS
function toggleDept(){
  let t = document.getElementById("type").value;
  document.getElementById("deptBox").style.display =
    (t==="B")?"block":"none";
}

function toggle(key){
  let s = getSystemSettings() || {};
  s[key] = !s[key];
  localStorage.setItem("systemSettings", JSON.stringify(s));
  loadSection("system");
}

function goTo(p){ location.href = p; }

function showMsg(m){
  document.getElementById("msg").innerText = m;
}

function logout(){
  localStorage.removeItem("loggedInSystemAdmin");
  location.href="system_admin_login.html";
}

// INIT
loadSection("dashboard");

</script>

</body>
</html>
