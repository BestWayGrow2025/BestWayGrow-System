<!DOCTYPE html>
<html>
<head>
  <title>System Admin Dashboard</title>

  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      margin: 0;
      background: #f4f7f9;
      text-align: center;
    }

    header {
      background: #004d66;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 320px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 6px;
      margin: 5px 0;
    }

    button {
      padding: 8px 15px;
      margin-top: 8px;
      border: none;
      background: #0077b5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }

    footer {
      background: #003344;
      color: white;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>SYSTEM ADMIN DASHBOARD</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- CREATE ADMIN -->
  <div class="card">
    <h3>Create Admin</h3>

    <input id="adminId" placeholder="Admin ID">
    <input id="name" placeholder="Name">
    <input id="password" type="password" placeholder="Password">

    <select id="type" onchange="toggleDepartments()">
      <option value="A">All-in-One</option>
      <option value="B">Department</option>
    </select>

    <div id="deptBox" style="display:none;">
      <label><input type="checkbox" value="finance"> Finance</label><br>
      <label><input type="checkbox" value="franchisee"> Franchise</label><br>
      <label><input type="checkbox" value="kyc"> KYC</label>
    </div>

    <button onclick="createAdmin()">Create</button>
    <p id="msg"></p>
  </div>

  <!-- SYSTEM CONTROL -->
  <div class="card">
    <h3>System Control</h3>

    <button onclick="lockSystem()">🔒 Lock</button>
    <button onclick="unlockSystem()">🔓 Unlock</button>
  </div>

</div>

<footer>
  ⬅ Back to Home <br>
  © 2026 BestWayGrow
</footer>

<script src="CORE_system.js"></script>
<script>
initCoreSystem();

// ================= AUTH =================
let session = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));

if (!session) {
  alert("Access denied");
  window.location.href = "system_admin_login.html";
}

let currentUser = getUserById(session.userId);

if (!currentUser || currentUser.role !== "system_admin") {
  alert("Invalid session");
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

// ================= TOGGLE =================
function toggleDepartments() {
  let type = document.getElementById("type").value;
  document.getElementById("deptBox").style.display =
    (type === "B") ? "block" : "none";
}

// ================= CREATE ADMIN =================
function createAdmin() {

  let adminId = document.getElementById("adminId").value.trim();
  let name = document.getElementById("name").value.trim();
  let password = document.getElementById("password").value.trim();
  let type = document.getElementById("type").value;

  if (!adminId || !name || !password) {
    showMsg("❌ Fill all fields");
    return;
  }

  let users = getUsers();

  // ✅ CASE SAFE DUPLICATE CHECK
  if (users.find(u => u.userId.toLowerCase() === adminId.toLowerCase())) {
    showMsg("⚠️ Admin already exists");
    return;
  }

  let departments = [];

  if (type === "B") {
    document.querySelectorAll("#deptBox input:checked").forEach(cb => {
      departments.push(cb.value);
    });

    if (departments.length === 0) {
      showMsg("⚠️ Select at least one department");
      return;
    }

  } else {
    departments = ["finance", "franchisee", "kyc"];
  }

  let newAdmin = {
    userId: adminId,
    username: name,
    password: btoa(password),
    role: "admin",
    type,
    departments,
    createdBy: currentUser.userId, // ✅ added
    status: "active",
    createdAt: new Date().toISOString()
  };

  users.push(newAdmin);
  saveUsers(users);

  showMsg("✅ Admin created successfully");

  // ✅ CLEAR FORM
  document.getElementById("adminId").value = "";
  document.getElementById("name").value = "";
  document.getElementById("password").value = "";
}

// ================= SYSTEM CONTROL =================
function lockSystem() {
  let s = getSystemSettings();
  s.lockMode = true;
  localStorage.setItem("systemSettings", JSON.stringify(s));
  alert("System Locked");
}

function unlockSystem() {
  let s = getSystemSettings();
  s.lockMode = false;
  localStorage.setItem("systemSettings", JSON.stringify(s));
  alert("System Unlocked");
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInSystemAdmin");
  window.location.href = "system_admin_login.html";
}

// ================= MESSAGE =================
function showMsg(msg) {
  document.getElementById("msg").innerText = msg;
}

</script>

</body>
</html>
