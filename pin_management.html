<!DOCTYPE html>
<html>
<head>
  <title>PIN Management</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h2>ADMIN → PIN MANAGEMENT</h2>

<button onclick="goBack()">⬅ Back</button>
<button onclick="loadPins()">🔄 Refresh</button>

<div class="box">
  <h3>Generate PIN</h3>
  <button onclick="generatePin()">➕ Generate New PIN</button>
</div>

<div class="box">
  <h3>All PINs</h3>
  <div id="pinList"></div>
</div>

<script>

// ================= AUTH =================
let admin = JSON.parse(localStorage.getItem("loggedInSystemAdmin"));

if (!admin) {
  alert("Access denied");
  window.location.href = "system_admin_login.html";
}

// ================= NAV =================
function goBack() {
  window.location.href = "system_admin_dashboard.html";
}

// ================= STORAGE =================
function getPins() {
  return JSON.parse(localStorage.getItem("pins") || "[]");
}

function savePins(data) {
  localStorage.setItem("pins", JSON.stringify(data));
}

// ================= GENERATE PIN =================
function generatePin() {

  let pins = getPins();

  let newPin = {
    pinId: "PIN" + (pins.length + 1).toString().padStart(3, "0"),
    value: Math.floor(100000 + Math.random() * 900000).toString(),
    assignedTo: null,
    status: "AVAILABLE",
    createdAt: new Date().toISOString()
  };

  pins.push(newPin);
  savePins(pins);

  alert("New PIN Generated: " + newPin.pinId);

  loadPins();
}

// ================= LOAD PINS =================
function loadPins() {

  let pins = getPins();
  let container = document.getElementById("pinList");

  if (pins.length === 0) {
    container.innerHTML = "No PINs available";
    return;
  }

  let html = "<ul>";

  pins.forEach(pin => {

    html += `
      <li>
        <b>${pin.pinId}</b> <br>
        Value: ${pin.value} <br>
        Status: ${pin.status} <br>
        Assigned To: ${pin.assignedTo || "-"} <br>
        Created: ${pin.createdAt} <br>
        <hr>
      </li>
    `;
  });

  html += "</ul>";

  container.innerHTML = html;
}

// ================= INIT =================
loadPins();

</script>

</body>
</html>
