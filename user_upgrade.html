<!DOCTYPE html>
<html>
<head>
  <title>User Upgrade</title>
</head>
<body>

<h2>User Upgrade</h2>

<p id="info"></p>

<button onclick="upgradeNow()">Upgrade Now</button>

<!-- CORE -->
<script src="CORE_system.js"></script>

<!-- SYSTEM -->
<script src="wallet_system.js"></script>
<script src="commission_engine.js"></script>
<script src="income_control_system.js"></script>
<script src="active_system.js"></script>

<!-- PIN -->
<script src="pin_config_system.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function () {

  // ================= INIT =================
  initCoreSystem();

  // ================= AUTH =================
  let session = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!session) {
    alert("Login required");
    window.location.href = "user_login.html";
    throw new Error("STOP");
  }

  let user = getUserById(session.userId);

  if (!user) {
    alert("User not found");
    localStorage.removeItem("loggedInUser");
    window.location.href = "user_login.html";
    throw new Error("STOP");
  }

  // ================= UI =================
  document.getElementById("info").innerText =
    "User: " + user.username + " (" + user.userId + ")";

});


// ================= CHECK =================
function isAlreadyUpgraded(u) {
  if (typeof isUserActive !== "function") return false;
  return isUserActive(u.userId);
}


// ================= UPGRADE =================
function upgradeNow() {

  let users = getUsers();
  let u = users.find(x => x.userId === JSON.parse(localStorage.getItem("loggedInUser")).userId);

  if (!u) return;

  // ❌ Already active
  if (isAlreadyUpgraded(u)) {
    alert("Your ID is already active");
    return;
  }

  // 🔒 PIN SYSTEM CHECK (FIXED 🔥)
  if (typeof isPinSystemSafe !== "function" || !isPinSystemSafe("upgrade")) {
    alert("Upgrade PIN expired or not available");
    return;
  }

  // 🔒 INCOME SYSTEM CHECK
  if (typeof isIncomeSystemSafe === "function" && !isIncomeSystemSafe()) {
    alert("System temporarily unavailable");
    return;
  }

  let pin = getActivePin("upgrade");

  if (!pin) {
    alert("Upgrade PIN not found");
    return;
  }

  let bv = Number(pin.bv || 0);
  let amount = Number(pin.amount || 0);

  if (bv <= 0 || amount <= 0) {
    alert("Invalid PIN configuration");
    return;
  }

  // 💰 WALLET CHECK
  if ((u.wallet || 0) < amount) {
    alert("Insufficient wallet balance");
    return;
  }

  // 💸 DEBIT
  debitWallet(u.userId, amount, "Upgrade");

  // ✅ ACTIVATE USER
  if (typeof activateUser === "function") {
    activateUser(u.userId);
  } else {
    alert("Activation system missing");
    return;
  }

  // 💰 INCOME
  if (typeof isUGLIEnabled === "function" &&
      typeof processIncome === "function" &&
      isUGLIEnabled() &&
      isUserActive(u.userId)) {

    processIncome("upgrade", u.userId, bv);
  }

  alert("✅ Upgrade Successful");

  window.location.href = "user_dashboard.html";
}

</script>

</body>
</html>
