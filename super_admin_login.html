<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Login</title>

  <!-- ✅ FIX: remove favicon 404 -->
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin-bottom: 10px; padding: 6px; width: 220px; }
    button { padding: 6px 10px; }
  </style>
</head>
<body>

<h2>SUPER ADMIN LOGIN</h2>

<input id="userId" placeholder="User ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ CORE SYSTEM -->
<script src="CORE_system.js"></script>

<script>
initCoreSystem();
</script>

<script>

// ================= SAFE DECODE =================
function safeDecode(p) {
  try {
    return atob(p);
  } catch (e) {
    return p;
  }
}

// ================= LOGIN =================
function login() {

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    showMsg("⚠️ Enter ID & Password");
    return;
  }

  let users = getUsers();

  // ✅ FINAL LOGIN
  let user = users.find(u =>
    u.userId.toLowerCase() === userId.toLowerCase() &&
    u.role === "super_admin" &&
    (u.password === password || safeDecode(u.password) === password)
  );

  if (!user) {
    showMsg("❌ Invalid login");
    return;
  }

  // ✅ SAVE SESSION
  localStorage.setItem("loggedInSuperAdmin", JSON.stringify({
    userId: user.userId
  }));

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "super_admin_dashboard.html";
  }, 800);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
