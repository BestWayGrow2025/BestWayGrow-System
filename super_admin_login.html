<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Login</title>
  <link rel="icon" href="data:,">

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      text-align: center;
      background: #f4f7f9;
    }

    input { 
      margin-bottom: 10px; 
      padding: 8px; 
      width: 240px; 
    }

    button { 
      padding: 8px 15px; 
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>SUPER ADMIN LOGIN</h2>

<input id="userId" placeholder="User ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="safeClick(login)">Login</button>

<p id="msg"></p>

<script src="core_system.js"></script>
<script src="activity_log.js"></script>

<script>

// ================= INIT =================
if (typeof initCoreSystem === "function") {
  initCoreSystem();
} else {
  alert("❌ core_system.js not loaded");
  if (typeof logCritical === "function") {
    logCritical("core_system.js missing");
  }
  throw new Error("STOP");
}

// ================= LOCK SYSTEM =================
let lock = false;
function safeClick(fn) {
  if (lock) return;
  lock = true;

  try {
    fn();
  } catch (e) {
    console.error(e);
    if (typeof logCritical === "function") {
      logCritical("Login crash: " + e.message);
    }
  }

  setTimeout(() => lock = false, 500);
}

// ================= LOGOUT ALL =================
function logoutAll() {
  localStorage.removeItem("loggedInSuperAdmin");
  localStorage.removeItem("loggedInSystemAdmin");
  localStorage.removeItem("loggedInAdmin");
  localStorage.removeItem("loggedInUser");
}

// ================= SAFE DECODE =================
function safeDecode(p) {
  try { return atob(p); } catch { return p; }
}

// ================= SAFE SYSTEM SETTINGS =================
function getSafeSystemSettings() {
  try {
    if (typeof getSystemSettings !== "function") {
      throw new Error("getSystemSettings missing");
    }
    return getSystemSettings() || {};
  } catch (e) {
    console.error(e);
    if (typeof logCritical === "function") {
      logCritical("getSystemSettings failed: " + e.message);
    }
    return {};
  }
}

// ================= SYSTEM CHECK =================
function isSystemAllowed() {
  let s = getSafeSystemSettings();

  if (s.lockMode === true) {
    showMsg("🚫 System Locked");
    return false;
  }

  return true;
}

// ================= SAFE USERS =================
function getSafeUsers() {
  try {
    if (typeof getUsers !== "function") {
      throw new Error("getUsers missing");
    }
    return getUsers() || [];
  } catch (e) {
    console.error(e);
    showMsg("❌ System Error");

    if (typeof logCritical === "function") {
      logCritical("getUsers failed: " + e.message);
    }

    return [];
  }
}

// ================= SAFE SESSION SAVE =================
function saveSession(user) {
  try {
    localStorage.setItem("loggedInSuperAdmin", JSON.stringify({
      userId: user.userId,
      role: user.role
    }));

    // ✅ VERIFY SAVE
    let test = localStorage.getItem("loggedInSuperAdmin");
    return !!test;

  } catch (e) {
    console.error(e);
    if (typeof logCritical === "function") {
      logCritical("Session save failed");
    }
    return false;
  }
}

// ================= LOGIN =================
function login() {

  if (!isSystemAllowed()) return;

  let userId = document.getElementById("userId").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!userId || !password) {
    return showMsg("⚠️ Enter ID & Password");
  }

  let users = getSafeUsers();

  let user = users.find(u =>
    u.userId.toLowerCase() === userId.toLowerCase() &&
    u.role === "super_admin"
  );

  if (!user) {
    return showMsg("❌ Invalid ID");
  }

  // STATUS CHECK
  if (user.status && user.status !== "active") {
    return showMsg("🚫 Account inactive");
  }

  // PASSWORD CHECK
  let storedPass = safeDecode(user.password);
  if (storedPass !== password) {
    return showMsg("❌ Wrong Password");
  }

  // CLEAR OLD
  logoutAll();

  // SAVE SESSION
  let saved = saveSession(user);

  if (!saved) {
    return showMsg("❌ Session Failed");
  }

  // LOG
  if (typeof logActivity === "function") {
    logActivity(user.userId, "SUPER_ADMIN", "Login", "LOGIN_PAGE");
  }

  showMsg("✅ Login successful");

  setTimeout(() => {
    window.location.href = "super_admin_dashboard.html";
  }, 500);
}

// ================= MESSAGE =================
function showMsg(text) {
  document.getElementById("msg").innerText = text;
}

</script>

</body>
</html>
