<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; }
    button { padding: 8px 12px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<div class="box">
  <h3>My Profile</h3>
  <p id="profile"></p>
</div>

<div class="box">
  <h3>Admin Controls</h3>

  <!-- 🔗 CONNECTED FILE -->
  <button onclick="openFranchise()">Franchise Requests</button>

  <!-- Future buttons -->
  <button onclick="comingSoon()">Withdraw Panel</button>
  <button onclick="comingSoon()">User Control</button>

</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>

// ================= AUTH =================
let admin = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!admin) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// ================= GET REAL DATA =================
let users = getUsers();
let realAdmin = users.find(u => u.userId === admin.userId);

if (!realAdmin) {
  alert("Admin not found");
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome " + realAdmin.username + " (" + realAdmin.userId + ")";

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  User ID: ${realAdmin.userId} <br>
  Name: ${realAdmin.username} <br>
  Role: ${realAdmin.role}
`;

// ================= NAVIGATION =================
function openFranchise() {
  window.location.href = "admin_franchise_requests.html";
}

function comingSoon() {
  alert("Coming soon...");
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

</script>

</body>
</html>
