<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 6px 10px; margin-top: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>ADMIN DASHBOARD</h1>
<p id="status"></p>
<button onclick="logout()">Logout</button>

<!-- PROFILE -->
<div class="section">
  <h2>My Profile</h2>
  <p id="profile"></p>
</div>

<!-- SYSTEM STATUS -->
<div class="section">
  <h2>System Status</h2>
  <p id="systemStatus"></p>
</div>

<script>

// AUTH
let admin = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!admin) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// SYSTEM SETTINGS
function getSystemSettings() {
  return JSON.parse(localStorage.getItem("systemSettings") || "{}");
}

// STATUS
function loadStatus() {
  document.getElementById("status").innerText =
    "Welcome " + admin.name + " (" + admin.userId + ")";
}

// PROFILE
function loadProfile() {
  document.getElementById("profile").innerHTML = `
    User ID: ${admin.userId} <br>
    Name: ${admin.name || "-"} <br>
    Type: ${admin.type || "-"} <br>
    Departments: ${(admin.departments || []).join(", ")}
  `;
}

// SYSTEM STATUS
function loadSystemStatus() {
  let settings = getSystemSettings();

  document.getElementById("systemStatus").innerHTML = `
    Admin Access: ${settings.adminAccess ? "ON" : "OFF"} <br>
    Franchisee Access: ${settings.franchiseeAccess ? "ON" : "OFF"} <br>
    Registration: ${settings.registrationOpen ? "OPEN" : "CLOSED"} <br>
    Upgrades: ${settings.upgradesOpen ? "OPEN" : "CLOSED"}
  `;
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

// INIT
loadStatus();
loadProfile();
loadSystemStatus();

</script>

</body>
</html>
