<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<div id="profile"></div>
<div id="system"></div>

<script>

let admin = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!admin) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// WELCOME
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.adminId + ")";

// PROFILE
document.getElementById("profile").innerHTML = `
  <h3>My Profile</h3>
  User ID: ${admin.adminId} <br>
  Name: ${admin.name} <br>
  Type: ${admin.type} <br>
  Departments: ${admin.departments.join(", ")}
`;

// SYSTEM STATUS
let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");

document.getElementById("system").innerHTML = `
  <h3>System Status</h3>
  Admin Access: ${s.adminAccess ? "ON" : "OFF"} <br>
  Franchisee Access: ${s.franchiseeAccess ? "ON" : "OFF"} <br>
  Registration: ${s.registrationOpen ? "OPEN" : "CLOSED"} <br>
  Upgrades: ${s.upgradesOpen ? "OPEN" : "CLOSED"} <br>
  Repurchase: ${s.repurchaseOpen ? "OPEN" : "CLOSED"}
`;

// LOGOUT
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

</script>

</body>
</html>
