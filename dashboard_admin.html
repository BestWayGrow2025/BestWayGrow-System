<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; }
    button { padding: 6px 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<div class="box">
  <h3>Admin Profile</h3>
  <p id="profile"></p>
</div>

<div class="box">
  <h3>System Status</h3>
  <p id="system"></p>
</div>

<div class="box">
  <h3>Admin Controls</h3>
  <button onclick="openFranchise()">Franchise Requests</button>
  <button onclick="openWithdraw()">Withdraw Panel</button>
  <button onclick="openReports()">Reports</button>
</div>

<!-- ✅ CORE FIRST -->
<script src="CORE_system.js"></script>

<script>
  initCoreSystem(); // ✅ MUST ADD
</script>

<script>

// ================= AUTH =================
let adminSession = JSON.parse(localStorage.getItem("loggedInAdmin"));

if (!adminSession) {
  alert("Access denied");
  window.location.href = "admin_login.html";
}

// ================= USERS =================
let users = getUsers();

// ✅ FIX: support both adminId & userId
let admin = users.find(u =>
  (u.userId === adminSession.adminId || u.userId === adminSession.userId)
  && u.role === "admin"
);

if (!admin) {
  alert("Admin not found");
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

// ================= WELCOME =================
document.getElementById("welcome").innerText =
  "Welcome ADMIN (" + admin.userId + ")";

// ================= PROFILE =================
document.getElementById("profile").innerHTML = `
  ID: ${admin.userId} <br>
  Name: ${admin.username} <br>
  Role: ${admin.role} <br>
  Status: ${admin.status || "active"}
`;

// ================= SYSTEM =================
let s = JSON.parse(localStorage.getItem("systemSettings") || "{}");

document.getElementById("system").innerHTML = `
  Registration: ${s.registrationOpen !== false ? "OPEN" : "CLOSED"} <br>
  Lock Mode: ${s.lockMode ? "ON" : "OFF"}
`;

// ================= NAV =================
function openFranchise() {
  window.location.href = "admin_franchise_requests.html";
}

function openWithdraw() {
  window.location.href = "admin_withdraw_panel.html";
}

function openReports() {
  window.location.href = "admin_reports.html";
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("loggedInAdmin");
  window.location.href = "admin_login.html";
}

</script>

</body>
</html>
